[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests
    integration: Integration tests
    contract: Contract tests
    legacy_tdd: Legacy fail-first specs (opt-in via RUN_LEGACY_TDD_TESTS=1)
    slow: Slow tests
    database_integration: Database integration tests requiring connection to AGR curation database
    live_pdfx: Manual/live PDFX integration tests against real service endpoints
    live_llm: Manual/live LLM integration tests that make real provider calls
    provider_openai: Live tests targeting OpenAI model/provider path
    provider_groq: Live tests targeting Groq model/provider path
    streaming: Tests that validate SSE/event-stream behavior
    manual_only: Tests that should only run when explicitly selected by marker
    requires_repo_root: Tests requiring full repository checkout layout (packages/, config/, docker-compose.test.yml)
    requires_workspace_root: Tests requiring /workspace mount (standalone installer CI layout)
asyncio_mode = auto
