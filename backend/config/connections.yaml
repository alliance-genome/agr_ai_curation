# =============================================================================
# EXTERNAL SERVICE CONNECTIONS
# =============================================================================
# Define all external services the application connects to.
# Health checks run at startup to verify connectivity.
#
# IMPORTANT: This file is the source of truth for service connections.
#
# Fields for each service:
#   - description: Human-readable description
#   - url: Service URL (supports ${ENV_VAR:-default} syntax)
#   - health_check: How to verify the service is available
#       - endpoint: Path to health check endpoint
#       - method: HTTP method (GET, POST, etc.)
#       - expected_status: Expected HTTP status code
#       - headers: Optional headers for the request
#   - required: If true, app fails to start if health check fails
#   - timeout_seconds: Timeout for health check requests
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Weaviate (Vector Database)
  # ---------------------------------------------------------------------------
  weaviate:
    description: "Vector database for document search and RAG"
    url: "${WEAVIATE_SCHEME:-http}://${WEAVIATE_HOST:-weaviate}:${WEAVIATE_PORT:-8080}"
    health_check:
      endpoint: "/v1/.well-known/ready"
      method: GET
      expected_status: 200
    required: true
    timeout_seconds: 30

  # ---------------------------------------------------------------------------
  # AGR Curation API (Alliance-specific)
  # ---------------------------------------------------------------------------
  agr_curation_api:
    description: "Alliance Genome Resources curation database"
    url: "${AGR_CURATION_API_URL:-https://curation.alliancegenome.org}"
    health_check:
      endpoint: "/health"
      method: GET
      expected_status: 200
    required: false
    timeout_seconds: 10

  # ---------------------------------------------------------------------------
  # OpenAI API
  # ---------------------------------------------------------------------------
  openai:
    description: "OpenAI API for LLM inference"
    url: "https://api.openai.com"
    health_check:
      endpoint: "/v1/models"
      method: GET
      headers:
        Authorization: "Bearer ${OPENAI_API_KEY}"
      expected_status: 200
    required: true
    timeout_seconds: 15

  # ---------------------------------------------------------------------------
  # Redis (Session/Cache Store)
  # ---------------------------------------------------------------------------
  redis:
    description: "Redis for session storage and caching"
    url: "${REDIS_URL:-redis://redis:6379}"
    health_check:
      endpoint: null  # Redis uses PING command, not HTTP
      method: PING
      expected_status: "PONG"
    required: false
    timeout_seconds: 5

  # ---------------------------------------------------------------------------
  # PostgreSQL (Application Database)
  # ---------------------------------------------------------------------------
  # Set DATABASE_URL for the full connection string.
  # Format: postgresql://[user]:[pass]@[host]:[port]/[dbname]
  # If not set, falls back to docker-compose default with postgres user
  # (relies on trust auth for local connections in docker-compose setup)
  postgres:
    description: "PostgreSQL database for application data"
    url: "${DATABASE_URL:-postgresql://postgres@postgres:5432/ai_curation}"
    health_check:
      endpoint: null  # PostgreSQL uses connection test, not HTTP
      method: CONNECT
      expected_status: null
    required: true
    timeout_seconds: 10

  # ---------------------------------------------------------------------------
  # Langfuse (Observability - Optional)
  # ---------------------------------------------------------------------------
  langfuse:
    description: "LLM observability and tracing"
    url: "${LANGFUSE_HOST:-http://langfuse:3000}"
    health_check:
      endpoint: "/api/public/health"
      method: GET
      expected_status: 200
    required: false
    timeout_seconds: 5

  # ---------------------------------------------------------------------------
  # Reranker Service (Optional ML Service)
  # ---------------------------------------------------------------------------
  reranker:
    description: "Cross-encoder reranking service for improved search"
    url: "${RERANKER_URL:-http://reranker-transformers:8080}"
    health_check:
      endpoint: "/.well-known/ready"
      method: GET
      expected_status: 204
    required: true
    timeout_seconds: 10

  # ---------------------------------------------------------------------------
  # AGR Curation Database (Direct PostgreSQL Connection - Optional)
  # ---------------------------------------------------------------------------
  # Direct database connection for agent SQL queries (gene lookups, etc.).
  # This is separate from the agr_curation_api HTTP endpoint above.
  # If not configured, agents gracefully degrade (PDF/Weaviate tools still work).
  #
  # Credential resolution priority:
  #   1. CURATION_DB_URL env var (full connection string)
  #   2. credentials.source config below (env/aws_secrets/url)
  curation_db:
    description: "AGR Curation PostgreSQL database (direct connection)"
    url: "${CURATION_DB_URL:-}"
    health_check:
      endpoint: null
      method: CONNECT
      expected_status: null
    required: false
    timeout_seconds: 10
    credentials:
      source: "${CURATION_DB_CREDENTIALS_SOURCE:-env}"  # "env", "aws_secrets", or "url"
      aws_secret_id: "${CURATION_DB_AWS_SECRET_ID:-ai-curation/db/curation-readonly}"
      aws_profile: "${AWS_PROFILE:-}"
      aws_region: "${AWS_REGION:-us-east-1}"
