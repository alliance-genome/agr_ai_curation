# Curator-facing docs for synthetic flow nodes that have no agent bundle folder.
# Voice: curator-friendly, plain language (no developer jargon).
# task_input and curation_prep are the only AGENT_DOCUMENTATION entries with no
# agent folder; their prose lives here so it stays out of Python.
task_input:
  summary: "The starting point for curation workflows - defines what task the AI should perform."
  capabilities:
    - name: "Define extraction tasks"
      description: "Tell the AI what data to extract from the paper"
      example_query: "Extract all gene names and their expression patterns from this paper"
      example_result: "The flow begins processing your request through the configured agents"
    - name: "Set curation context"
      description: "Provide background information about what you're looking for"
      example_query: "This paper describes insulin signaling in C. elegans. Find all relevant genes."
      example_result: "Context is passed to downstream agents to improve accuracy"
  data_sources: []
  limitations:
    - "Instructions should be clear and specific for best results"
    - "Complex multi-part requests may need to be broken into separate flows"
curation_prep:
  summary: "Gathers everything the earlier agents found, checks that each item is complete and well-formed, and opens a ready-to-review session for you — keeping the supporting quotes attached to every item."
  capabilities:
    - name: "Upstream extraction intake"
      description: "Pulls together what the earlier agents extracted, what you confirmed was in scope, and the supporting quotes, into one review package."
      example_query: "Prepare the confirmed extraction findings for curator review"
      example_result: "Creates a curation review session seeded from upstream extraction output instead of re-reading the paper from scratch"
    - name: "Evidence-backed review session prep"
      description: "Keeps the supporting quotes attached to each item, so the later automated steps work from exactly the evidence the extractor found."
      example_query: "Create curation prep candidates with the supporting quotes attached"
      example_result: "Returns the items for review, each still linked to its supporting quote and any notes about uncertainty."
    - name: "Structural validation before handoff"
      description: "Checks that each item is complete and well-formed, and flags anything incomplete or uncertain before you open the review session."
      example_query: "Validate the candidate structure before opening the curation workspace"
      example_result: "Returns only the in-scope items, plus warnings where a field still needs your attention."
    - name: "Flow-final curation handoff"
      description: "Works best as the last step after extraction/validation agents have already gathered the evidence that should enter curation review"
      example_query: "Use this as the final step after gene extraction and validation"
      example_result: "Hands the curator a review-ready session rather than acting like a standalone extractor or summarizer"
  limitations:
    - "Requires upstream extraction output and evidence records; it does not discover new evidence on its own"
    - "Should not be used as a standalone extraction, PDF reading, or summarization step"
    - "Does not replace curator review or approval; it prepares the review session but does not submit final curation"
    - "The later automated steps still handle matching items to official records and saving them."
