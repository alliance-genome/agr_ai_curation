package_id: org.custom
display_name: Custom Organization Runtime
version: 1.0.0
package_api_version: 1.0.0
min_runtime_version: 1.0.0
max_runtime_version: 2.0.0
python_package_root: python/src/org_custom
requirements_file: requirements/runtime.txt
exports:
  - kind: tool_binding
    name: default
    path: tools/bindings.yaml
    description: Neutral custom organization tool bindings
  - kind: curation_adapter
    name: default
    path: python/src/org_custom/curation_adapters.py
    description: Neutral custom organization curation adapter registrations
agent_bundles:
  - name: demo_agent
    has_schema: true
    group_rules: [demo]
