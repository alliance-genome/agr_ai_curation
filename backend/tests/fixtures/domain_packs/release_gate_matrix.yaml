matrix_api_version: 1.0.0
display_name: 0.7.0 domain-envelope release gate matrix
required_surfaces:
  - provider_agnostic_fixture_pack
  - alliance_domain_pack_metadata
  - alliance_linkml_grounding
  - live_db_projection
  - one_off_migration
  - materialization
  - validation_findings
  - export_submission
  - opus_tool
  - trace_review
  - end_to_end_integration
suites:
  provider_agnostic_unit:
    runner: backend-unit-tests
    command: bash tests/unit/run_ci_unit_tests.sh --suite domain-envelope-release
    path_file: tests/unit/.domain-envelope-release-test-paths
    markers:
      - provider_agnostic_domain_pack
      - domain_envelope_release_gate
    external_dependencies: []
    surfaces:
      - provider_agnostic_fixture_pack
      - one_off_migration
      - materialization
      - validation_findings
      - export_submission
      - opus_tool
      - trace_review
  alliance_domain_pack_contract:
    runner: backend-contract-tests
    command: bash tests/contract/run_ci_contract_core_tests.sh --path-file tests/contract/.alliance-domain-pack-test-paths --suite-label alliance-domain-pack
    path_file: tests/contract/.alliance-domain-pack-test-paths
    markers:
      - alliance_domain_pack
      - alliance_linkml
    external_dependencies:
      - pinned_alliance_linkml_cache
    surfaces:
      - alliance_domain_pack_metadata
      - alliance_linkml_grounding
      - materialization
      - validation_findings
      - export_submission
  alliance_live_db_contract:
    runner: backend-contract-tests
    command: ALLIANCE_LIVE_DB_CONTRACT_TESTS=1 bash tests/contract/run_ci_contract_core_tests.sh --path-file tests/contract/.alliance-live-db-test-paths --suite-label alliance-live-db --require-truthy-env ALLIANCE_LIVE_DB_CONTRACT_TESTS
    path_file: tests/contract/.alliance-live-db-test-paths
    markers:
      - alliance_live_db
    explicit_opt_in_env: ALLIANCE_LIVE_DB_CONTRACT_TESTS
    external_dependencies:
      - read_only_curation_db_tunnel
    surfaces:
      - live_db_projection
  end_to_end_integration:
    runner: backend-integration-tests/backend-persistence-tests
    command: bash scripts/testing/domain_envelope_e2e_gate.sh
    path_file: tests/integration/.domain-envelope-e2e-test-paths
    markers:
      - integration
      - domain_envelope_release_gate
    external_dependencies: []
    surfaces:
      - end_to_end_integration
      - materialization
      - validation_findings
      - export_submission
      - one_off_migration
