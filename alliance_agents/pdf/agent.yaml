# =============================================================================
# AGENT DEFINITION: pdf_extraction
# =============================================================================
# Extracts text, tables, and data from uploaded PDF documents.
# Tool name generated at runtime: ask_pdf_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: pdf_extraction

name: "General PDF Extraction Agent"

description: >
  Provides broad document extraction for uploaded PDFs with verified evidence,
  explicit retention/exclusion decisions, and a concise answer summary for
  general paper questions when a more specific extractor is not required.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Ask the General PDF Extraction Agent about the loaded document. Use for
    broad questions about paper content, methods, results, and figures.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - search_document
  - read_section
  - read_subsection
  - record_evidence

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: PdfExtractionResultEnvelope

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_PDF_MODEL:-gpt-4o}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "📄"
  show_in_palette: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
