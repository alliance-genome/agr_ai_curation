services:
  frontend:
    build: ./frontend
    ports:
      - "${TRACE_REVIEW_FRONTEND_HOST_PORT:-3001}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TRACE_REVIEW_PUBLIC_API_URL=${TRACE_REVIEW_PUBLIC_API_URL:-http://host.docker.internal:${TRACE_REVIEW_BACKEND_HOST_PORT:-8001}}
      - VITE_DEV_MODE=${VITE_DEV_MODE:-false}
    depends_on:
      - backend

  backend:
    build: ./backend
    network_mode: host  # Use host network to access VPN (EC2 Langfuse)
    # Environment loaded from shell (via Makefile) or optional local .env
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      # Langfuse config comes from .env (supports both local and remote sources)
      # - source="remote" uses LANGFUSE_HOST (EC2 VPN)
      # - source="local" uses LANGFUSE_LOCAL_HOST (host.docker.internal)
      - DEV_MODE=${DEV_MODE:-false}
      - CACHE_TTL_HOURS=1
      - BACKEND_PORT=${TRACE_REVIEW_BACKEND_HOST_PORT:-8001}
      - FRONTEND_URL=${TRACE_REVIEW_FRONTEND_URL:-http://localhost:${TRACE_REVIEW_FRONTEND_HOST_PORT:-3001}}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_LOCAL_HOST=${LANGFUSE_LOCAL_HOST:-http://host.docker.internal:3000}
      - LANGFUSE_LOCAL_PUBLIC_KEY=${LANGFUSE_LOCAL_PUBLIC_KEY:-}
      - LANGFUSE_LOCAL_SECRET_KEY=${LANGFUSE_LOCAL_SECRET_KEY:-}
