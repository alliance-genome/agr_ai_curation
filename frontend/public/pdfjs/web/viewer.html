<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    >
    <title>PDF Viewer</title>
    <link rel="stylesheet" href="./pdf_viewer.css">
    <link rel="stylesheet" href="./viewer.css">
  </head>
  <body>
    <div id="outerContainer">
      <div id="viewerContainer" tabindex="0">
        <div id="viewer" class="pdfViewer"></div>
      </div>
    </div>

    <div id="viewerLoading" class="viewerStatus" role="status">
      Loading PDF...
    </div>
    <div id="viewerError" class="viewerError" role="alert" hidden></div>

    <script type="module" src="./viewer.mjs"></script>
  </body>
</html>
