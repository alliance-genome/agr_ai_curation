server {
    listen 80;
    server_name localhost;

    # Re-resolve backend DNS inside Docker to avoid stale upstream IPs
    # when backend container is recreated/restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_origin http://backend:8000;

    # Prevent absolute redirects that drop port numbers
    absolute_redirect off;
    port_in_redirect off;

    # Allow larger file uploads (default is 1MB)
    client_max_body_size 50M;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Chat API requests to backend
    location /api/chat/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE support for streaming
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;
    }

    # Proxy Weaviate API requests to backend
    location /api/weaviate/ {
        rewrite ^/api/weaviate/(.*)$ /weaviate/$1 break;
        proxy_pass $backend_origin$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cache-Control "no-cache";
        proxy_set_header Connection "";
        proxy_set_header Accept-Encoding "";
        proxy_set_header X-Accel-Buffering "no";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;
    }

    # Proxy PDF Viewer API requests to backend
    location /api/pdf-viewer/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Feedback API requests to backend
    location /api/feedback/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Maintenance API requests to backend
    location /api/maintenance/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Agent Studio API requests to backend
    location /api/agent-studio/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for chat streaming
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;
    }

    # Proxy Flows API requests to backend (exact match for POST /api/flows)
    location = /api/flows {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Flows API requests to backend (with path suffix like /api/flows/{id})
    location /api/flows/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Batch API requests to backend (exact match for POST /api/batches)
    location = /api/batches {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy Batch API requests to backend (with path suffix like /api/batches/{id})
    location /api/batches/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;

        # SSE support for batch streaming progress
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;
    }

    # Proxy File outputs API requests to backend (CSV/TSV/JSON downloads)
    location /api/files/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy curation workspace API requests to backend.
    # Prep runs can take longer than the default upstream timeout.
    location /api/curation-workspace/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        keepalive_timeout 3600s;
    }

    # Proxy uploads (PDF files) to backend
    location /uploads/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to backend health endpoint
    location /health {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy to backend docs (Swagger)
    location /docs {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy any remaining backend API routes not covered above.
    # This keeps auth, users, admin, and future /api/* endpoints
    # from falling through to the SPA index.html handler.
    location /api/ {
        proxy_pass $backend_origin$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend routes - serve index.html for client-side routing
    # This must come BEFORE more specific location blocks
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}
