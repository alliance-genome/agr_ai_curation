server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Standalone production deployments discover containers by the
          # production logging labels instead of the dev/shared project filter.
          - name: label
            values: ["log_env"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'

      - source_labels: ['__meta_docker_container_label_log_env']
        target_label: 'environment'

      - source_labels: ['__meta_docker_container_label_log_tier']
        target_label: 'tier'

      - source_labels: ['__meta_docker_container_label_log_component']
        target_label: 'component'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_project_config_files']
        target_label: 'compose_file'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_image']
        target_label: 'image'

      - source_labels: ['service']
        regex: 'weaviate'
        target_label: 'database_type'
        replacement: 'vector'

      - source_labels: ['service']
        regex: 'backend'
        target_label: 'application_type'
        replacement: 'api'

      - source_labels: ['service']
        regex: 'frontend'
        target_label: 'application_type'
        replacement: 'web'

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            error: error

      - regex:
          expression: '(?P<level>(DEBUG|INFO|WARN|WARNING|ERROR|FATAL|TRACE|debug|info|warn|warning|error|fatal|trace))'

      - labels:
          level:

      - timestamp:
          source: time
          format: RFC3339
          fallback_formats:
            - UnixMs
            - Unix
            - RFC3339Nano

      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_wait_time: 3s
          max_lines: 128
