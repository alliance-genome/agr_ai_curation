# =============================================================================
# AGENT DEFINITION: data_provider
# =============================================================================
# Validates Alliance data provider abbreviations and taxon consistency.
# Tool name generated at runtime: ask_data_provider_specialist
# =============================================================================

agent_id: data_provider_validation

name: "Data Provider Validation Agent"

description: >
  Validates Alliance data provider abbreviations, display names, and
  provider-to-taxon consistency using package-owned Alliance provider lookup
  helpers.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: false

  description: >
    Use for validating Organization/data_provider payload snapshots and
    checking whether a supplied provider abbreviation matches the supplied
    NCBITaxon context.
  batchable: true
  batching_instructions: >
    When validating multiple data providers, combine them into one request with
    one target per provider and preserve each target's abbreviation, provider
    name, and taxon context.

tools:
  - get_agent_contract
  - agr_curation_query

output_schema: DataProviderValidationResult

structured_finalization:
  enabled: true
  tool_name: finalize_data_provider_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: agr_curation_query
    provider_terms:
      - agr_curation_query
    request_keys:
      - abbreviation
      - abbreviations
      - provider_name
      - provider_names
      - display_name
      - display_names
      - taxon
      - taxon_id
      - taxon_ids
      - species
    result_collections:
      - resolved_values
      - resolved_objects
      - data_provider_candidates
      - candidates
    grounded_fact_paths:
      - data_provider_candidates[].abbreviation
      - data_provider_candidates[].taxon_id
      - data_provider_candidates[].display_name
      - data_provider_candidates[].species
      - candidates[].value
      - candidates[].label
    resolved_fact_paths:
      - resolved_values
      - resolved_objects[]
      - data_provider_candidates[]
    fact_identity_paths:
      - resolved_values.abbreviation
      - resolved_values.taxon
      - resolved_values.taxon_id
      - resolved_values.display_name
      - resolved_values.species
      - resolved_objects[].abbreviation
      - resolved_objects[].taxon
      - resolved_objects[].taxon_id
      - resolved_objects[].display_name
      - resolved_objects[].species
      - data_provider_candidates[].abbreviation
      - data_provider_candidates[].taxon_id
      - data_provider_candidates[].display_name
      - data_provider_candidates[].species

model_config:
  model: "${AGENT_DATA_PROVIDER_MODEL:-gpt-5.4-mini}"
  temperature: 0.1
  reasoning: "high"

requires_document: false
required_params: []

batch_capabilities: []

frontend:
  icon: "🏢"
  show_in_palette: true

group_rules_enabled: false
