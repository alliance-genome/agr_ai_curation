# =============================================================================
# AGENT DEFINITION: data_provider
# =============================================================================
# Validates Alliance data provider abbreviations and taxon consistency.
# Tool name generated at runtime: ask_data_provider_specialist
# =============================================================================

agent_id: data_provider_validation

name: "Data Provider Validation Agent"

description: >
  Validates Alliance data provider abbreviations, display names, and
  provider-to-taxon consistency using package-owned Alliance provider lookup
  helpers.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: true
  description: >
    Use for validating Organization/data_provider payload snapshots and
    checking whether a supplied provider abbreviation matches the supplied
    NCBITaxon context.
  batchable: true
  batching_instructions: >
    When validating multiple data providers, combine them into one request with
    one target per provider and preserve each target's abbreviation, provider
    name, and taxon context.

tools:
  - get_agent_contract
  - agr_curation_query

output_schema: DataProviderValidationResult

model_config:
  model: "${AGENT_DATA_PROVIDER_MODEL:-gpt-4o}"
  temperature: 0.1
  reasoning: "low"

requires_document: false
required_params: []

batch_capabilities: []

frontend:
  icon: "🏢"
  show_in_palette: true

documentation:
  summary: >
    Validates Alliance data provider abbreviations, display names, and
    provider-to-taxon consistency for submitted curation records.
  capabilities:
    - name: "Provider abbreviation lookup"
      description: >
        Checks whether a submitted data provider abbreviation exists in Alliance
        curation data.
      example_query: "Validate data provider WB"
      example_result: >
        Returns the matched provider, display name, and validation status.
    - name: "Provider name matching"
      description: >
        Resolves provider display names or alternate names to their official
        Alliance abbreviation when possible.
      example_query: "Resolve WormBase as a data provider"
      example_result: "Returns provider abbreviation WB with lookup evidence."
    - name: "Taxon consistency check"
      description: >
        Checks whether a provider matches the supplied NCBITaxon context for the
        curation payload.
      example_query: "Check whether WB is valid for NCBITaxon:6239"
      example_result: >
        Returns a provider result with taxon_match status and mismatch notes
        when applicable.
  data_sources:
    - name: "Alliance Curation Database"
      description: >
        Alliance data provider and organism metadata used for provider
        abbreviations, display names, and taxon relationships.
      species_supported:
        - "C. elegans (WB)"
        - "D. melanogaster (FB)"
        - "D. rerio (ZFIN)"
        - "M. musculus (MGI)"
        - "R. norvegicus (RGD)"
        - "S. cerevisiae (SGD)"
        - "X. laevis (XB)"
        - "H. sapiens (HGNC)"
      data_types:
        - "provider abbreviations"
        - "provider names"
        - "NCBITaxon identifiers"
        - "provider-to-taxon relationships"
  limitations:
    - "Requires a provider abbreviation, provider name, or taxon context from upstream data."
    - "Does not infer data provider ownership from paper affiliation or author text."
    - "Cannot validate entity identifiers owned by the provider; use the relevant entity validation agent."
    - "Cannot create new provider records or taxon relationships."
    - "Provider-to-taxon checks are limited to relationships present in Alliance curation data."

group_rules_enabled: false
