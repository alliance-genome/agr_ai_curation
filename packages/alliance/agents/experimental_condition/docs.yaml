summary: >
  Validates composite Alliance experimental-condition payloads by checking
  ontology, chemical, taxon, vocabulary, quantity, and provider components
  together.
capabilities:
  - name: "Condition component validation"
    description: >
      Reviews each experimental-condition component, including condition
      class, condition ID, chemical, taxon, relation, and free-text fields.
    example_query: "Validate this experimental condition for a chemical treatment with sirolimus"
    example_result: >
      Returns component-level validation statuses and an overall condition
      decision.
  - name: "Chemical and ontology checks"
    description: >
      Uses curation-DB ontology-term lookups for ChEBI chemicals (CHEBITerm) and
      typed ontology condition terms when those fields are present.
    example_query: "Check whether this condition ID and chemical term match the submitted condition"
    example_result: >
      Returns matched ontology or chemical identifiers plus unresolved or
      ambiguous component notes.
  - name: "Auditable condition summary"
    description: >
      Combines component evidence into one condition-level result so curators
      can see which fields block acceptance.
    example_query: "Summarize whether this experimental condition is ready for curator review"
    example_result: >
      Returns accepted, needs_review, or unresolved status with field paths
      and evidence messages.
data_sources:
  - name: "Alliance Curation Database"
    description: >
      Alliance curation records for condition relation vocabulary, taxa, data
      providers, and ontology-backed condition fields.
    species_supported:
      - "C. elegans (WB)"
      - "D. melanogaster (FB)"
      - "D. rerio (ZFIN)"
      - "M. musculus (MGI)"
      - "R. norvegicus (RGD)"
      - "S. cerevisiae (SGD)"
      - "X. laevis (XB)"
      - "H. sapiens (HGNC)"
    data_types:
      - "condition relation vocabulary"
      - "data providers"
      - "taxon identifiers"
      - "ontology-backed condition terms"
      - "ChEBI chemical ontology terms (CHEBITerm)"
limitations:
  - "Validates submitted condition payloads; it does not extract experimental conditions from PDFs."
  - "Component-level ambiguity can make the overall condition require curator review."
  - "Does not decide whether an experiment is biologically well designed or statistically sufficient."
  - "Cannot create missing ontology, chemical, vocabulary, taxon, or provider records."
  - "Quantity and unit validation depends on the submitted field context and available vocabulary evidence."
