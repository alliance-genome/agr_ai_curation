# =============================================================================
# AGENT DEFINITION: experimental_condition
# =============================================================================
# Validates composite Alliance ExperimentalCondition payloads.
# Tool name generated at runtime: ask_experimental_condition_specialist
# =============================================================================

agent_id: experimental_condition_validation

name: "Experimental Condition Validation Agent"

description: >
  Validates composite Alliance experimental-condition payloads by composing
  condition ontology, chemical, taxon, controlled vocabulary, and data-provider
  component checks into one auditable condition-level decision.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: true
  description: >
    Use for validating ExperimentalCondition payloads that combine condition
    class/id ontology terms, condition chemicals, condition taxa, relation
    vocabulary, data-provider context, free text, and quantity/unit evidence.
  batchable: true
  batching_instructions: >
    When validating multiple experimental conditions, combine them into one
    request with one target per condition and preserve each component's field
    path, expected result field, and lower-level validator/tool evidence.

tools:
  - get_agent_contract
  - agr_curation_query
  - chebi_api_call

output_schema: ExperimentalConditionValidationResult

model_config:
  model: "${AGENT_EXPERIMENTAL_CONDITION_MODEL:-gpt-4o}"
  temperature: 0.1
  reasoning: "low"

requires_document: false
required_params: []

batch_capabilities: []

frontend:
  icon: "🧪"
  show_in_palette: true

documentation:
  summary: >
    Validates composite Alliance experimental-condition payloads by checking
    ontology, chemical, taxon, vocabulary, quantity, and provider components
    together.
  capabilities:
    - name: "Condition component validation"
      description: >
        Reviews each experimental-condition component, including condition
        class, condition ID, chemical, taxon, relation, and free-text fields.
      example_query: "Validate this experimental condition for a chemical treatment with sirolimus"
      example_result: >
        Returns component-level validation statuses and an overall condition
        decision.
    - name: "Chemical and ontology checks"
      description: >
        Uses lower-level lookup evidence for ChEBI chemicals and typed ontology
        condition terms when those fields are present.
      example_query: "Check whether this condition ID and chemical term match the submitted condition"
      example_result: >
        Returns matched ontology or chemical identifiers plus unresolved or
        ambiguous component notes.
    - name: "Auditable condition summary"
      description: >
        Combines component evidence into one condition-level result so curators
        can see which fields block acceptance.
      example_query: "Summarize whether this experimental condition is ready for curator review"
      example_result: >
        Returns accepted, needs_review, or unresolved status with field paths
        and evidence messages.
  data_sources:
    - name: "Alliance Curation Database"
      description: >
        Alliance curation records for condition relation vocabulary, taxa, data
        providers, and ontology-backed condition fields.
      species_supported:
        - "C. elegans (WB)"
        - "D. melanogaster (FB)"
        - "D. rerio (ZFIN)"
        - "M. musculus (MGI)"
        - "R. norvegicus (RGD)"
        - "S. cerevisiae (SGD)"
        - "X. laevis (XB)"
        - "H. sapiens (HGNC)"
      data_types:
        - "condition relation vocabulary"
        - "data providers"
        - "taxon identifiers"
        - "ontology-backed condition terms"
    - name: "ChEBI API"
      description: "External chemical ontology lookup for chemical condition components."
      species_supported: null
      data_types:
        - "ChEBI identifiers"
        - "chemical labels"
        - "chemical synonyms"
  limitations:
    - "Validates submitted condition payloads; it does not extract experimental conditions from PDFs."
    - "Component-level ambiguity can make the overall condition require curator review."
    - "Does not decide whether an experiment is biologically well designed or statistically sufficient."
    - "Cannot create missing ontology, chemical, vocabulary, taxon, or provider records."
    - "Quantity and unit validation depends on the submitted field context and available vocabulary evidence."

group_rules_enabled: false
