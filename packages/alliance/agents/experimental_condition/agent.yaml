# =============================================================================
# AGENT DEFINITION: experimental_condition
# =============================================================================
# Validates composite Alliance ExperimentalCondition payloads.
# Tool name generated at runtime: ask_experimental_condition_specialist
# =============================================================================

agent_id: experimental_condition_validation

name: "Experimental Condition Validation Agent"

description: >
  Validates composite Alliance experimental-condition payloads by composing
  condition ontology, chemical, taxon, controlled vocabulary, and data-provider
  component checks into one auditable condition-level decision.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: false

  description: >
    Use for validating ExperimentalCondition payloads that combine condition
    class/id ontology terms, condition chemicals, condition taxa, relation
    vocabulary, data-provider context, free text, and quantity/unit evidence.
  batchable: true
  batching_instructions: >
    When validating multiple experimental conditions, combine them into one
    request with one target per condition. Within that request, collect all
    present ontology CURIE components across the targets and resolve them with
    the bulk `agr_curation_query` `get_ontology_terms` method before falling
    back to any per-component lookup. Preserve each target's component field
    path, expected result field, and lower-level validator/tool evidence.

tools:
  - get_agent_contract
  # FIX 3 — condition chemicals (ChEBI) are ontology terms in the curation DB and are validated via
  # agr_curation_query get_ontology_term (ontologytermtype CHEBITerm), like ZECO/taxon. The broken
  # chebi_api_call REST path (https://www.ebi.ac.uk/chebi/ws/rest/<id> -> 404) is no longer used.
  - agr_curation_query

output_schema: ExperimentalConditionValidationResult

structured_finalization:
  enabled: true
  tool_name: finalize_experimental_condition_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: agr_curation_query
    provider_terms:
      - agr_curation_query
    request_keys:
      - condition_id
      - condition_class_curie
      - condition_id_curie
      - condition_chemical_curie
      - condition_taxon_curie
      - condition_relation_type
      - condition_taxon
      - data_provider
      - quantity
      - unit
    result_collections:
      - resolved_values
      - resolved_objects
      - normalized_components
      - component_validations
      - candidates
      - unresolved_components
    grounded_fact_paths:
      - normalized_components[].resolved_values.curie
      - normalized_components[].resolved_values.id
      - normalized_components[].resolved_values.name
      - normalized_components[].resolved_values.label
      - normalized_components[].resolved_values.internal_id
      - normalized_components[].resolved_values.abbreviation
      - normalized_components[].resolved_values.taxon_id
      - component_validations[].resolved_values.curie
      - component_validations[].resolved_values.id
      - component_validations[].resolved_values.name
      - component_validations[].resolved_values.label
      - component_validations[].resolved_values.internal_id
      - component_validations[].resolved_values.abbreviation
      - component_validations[].resolved_values.taxon_id
      - component_validations[].candidates[].value
      - component_validations[].candidates[].label
      - candidates[].value
      - candidates[].label
    resolved_fact_paths:
      - resolved_values
      - resolved_objects[]
      - normalized_components[]
      - component_validations[]
    fact_identity_paths:
      - condition_id
      - resolved_values.condition_id
      - resolved_values.condition_class_curie
      - resolved_values.condition_id_curie
      - resolved_values.condition_chemical_curie
      - resolved_values.condition_taxon_curie
      - resolved_objects[].condition_id
      - resolved_objects[].curie
      - resolved_objects[].id
      - resolved_objects[].name
      - normalized_components[].resolved_values.curie
      - normalized_components[].resolved_values.id
      - normalized_components[].resolved_values.name
      - normalized_components[].resolved_values.label
      - normalized_components[].resolved_values.internal_id
      - normalized_components[].resolved_values.abbreviation
      - normalized_components[].resolved_values.taxon_id
      - component_validations[].resolved_values.curie
      - component_validations[].resolved_values.id
      - component_validations[].resolved_values.name
      - component_validations[].resolved_values.label
      - component_validations[].resolved_values.internal_id
      - component_validations[].resolved_values.abbreviation
      - component_validations[].resolved_values.taxon_id

model_config:
  model: "${AGENT_EXPERIMENTAL_CONDITION_MODEL:-gpt-5.4-mini}"
  temperature: 0.1
  reasoning: "high"

requires_document: false
required_params: []

# Opted into domain-validator batching so the experimental_condition_validation binding's
# batch block can group multiple per-condition composite validations into one request
# (mirrors ontology_term_validation / controlled_vocabulary_validation).
batch_capabilities:
  - domain_validator_batch

frontend:
  icon: "🧪"
  show_in_palette: true

group_rules_enabled: false
