# =============================================================================
# AGENT DEFINITION: chemical
# =============================================================================
# Maps chemical names to ChEBI ontology identifiers.
# Tool name generated at runtime: ask_chemical_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: chemical_validation

name: "Chemical Ontology Agent"

description: >
  Maps chemical compound names to ChEBI ontology identifiers.
  Supports lookup by compound name, synonym, or ChEBI ID.

category: "Validation"
subcategory: "Data Validation"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Use for mapping chemical compound names to ChEBI identifiers, looking up
    compound synonyms, or chemical ontology queries.
  batchable: true
  batching_instructions: >
    When looking up multiple chemicals, combine them into a single request.
    Example: "Look up these chemicals: glucose, ATP, ethanol"

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - get_agent_contract
  - chebi_api_call

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: ChemicalValidationResult
structured_finalization:
  enabled: true
  tool_name: finalize_chemical_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: chebi_api_call
    provider_terms: [chebi_api_call, ebi_chebi, chebi, ebi]
    request_keys:
      - chebi_id
      - chebi_ids
      - chemical_id
      - chemical_ids
      - chemical_name
      - chemical_names
      - term
      - terms
      - name
      - names
      - synonym
      - synonyms
    result_collections:
      - resolved_values
      - resolved_objects
      - candidates
      - missing_expected_fields
    grounded_fact_paths:
      - candidates[].value
      - candidates[].label
      - candidates[].details.chebi_id
      - candidates[].details.curie
      - candidates[].details.name
    resolved_fact_paths:
      - resolved_values
      - "resolved_objects[]"
    fact_identity_paths:
      - resolved_values.chebi_id
      - resolved_values.curie
      - resolved_values.chemical_id
      - "resolved_objects[].chebi_id"
      - "resolved_objects[].curie"
      - "resolved_objects[].id"

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_CHEMICAL_MODEL:-gpt-5.6-terra}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: false
required_params: []

batch_capabilities: []

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "⚗️"
  show_in_palette: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: false
