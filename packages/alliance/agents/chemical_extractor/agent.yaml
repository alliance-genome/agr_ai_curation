# =============================================================================
# AGENT DEFINITION: chemical_extractor
# =============================================================================
# Extracts experimentally supported chemical assertions from uploaded PDFs.
# Tool name generated at runtime: ask_chemical_extractor_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: chemical_extractor

name: "Chemical Extraction Agent"

description: >
  Extracts chemical-condition findings from uploaded PDFs as domain-envelope
  curatable_objects[] containing ChemicalCondition curatable units, ChemicalTerm
  and Reference validated references, and EvidenceQuote metadata-only objects
  with evidence-first inclusion/exclusion decisions and ChEBI normalization.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Use for extracting experimentally supported chemical conditions from the
    loaded paper. Returns domain-envelope curatable_objects[] with
    ChemicalCondition, ChemicalTerm, Reference, and EvidenceQuote objects, plus
    non-semantic metadata for raw mentions, exclusions, ambiguities,
    normalization notes, verified evidence, export blockers, and curator review
    handoff.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - search_document
  - read_section
  - read_subsection
  - record_evidence
  - agr_curation_query

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: ChemicalExtractionResultEnvelope

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_CHEMICAL_EXTRACTOR_MODEL:-gpt-4o}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "⚗️"
  show_in_palette: true

# -----------------------------------------------------------------------------
# CURATION ROUTING
# -----------------------------------------------------------------------------
curation:
  adapter_key: "chemical"
  domain_pack_id: "agr.alliance.chemical_condition"
  launchable: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
