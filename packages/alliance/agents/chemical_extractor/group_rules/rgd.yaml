group_id: RGD
content: |
  ## RGD-SPECIFIC RULES (Rat Chemical Extraction)

  ### Shared builder output contract
  - Stage retained chemical-condition findings with `stage_chemical_condition_evidence`; do not hand-author `curatable_objects[]` or top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Use builder fields `source_chemical_mention` and `condition_chemical_name`; include `condition_chemical_curie` only when the paper supplies an exact CHEBI CURIE.
  - Use `condition_relation_type_name: "has_condition"` and `condition_class_name: "chemical treatment"` for retained chemical exposures unless paper evidence supports a more specific selector.
  - Preserve dose, timing, route, role, unresolved identity, and exclusion/ambiguity context in builder fields, finalization records, and notes.
  - Call `finalize_chemical_extraction` exactly once after all retained chemical conditions have been staged.
