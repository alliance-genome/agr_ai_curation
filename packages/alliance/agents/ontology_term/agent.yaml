# =============================================================================
# AGENT DEFINITION: ontology_term
# =============================================================================
# Validates generic ontology term CURIE and label fields against package tools.
# Tool name generated at runtime: ask_ontology_term_validation_specialist
# =============================================================================

agent_id: ontology_term_validation
system_agent_key: ontology_term_validation

name: "Ontology Term Resolver Agent"

description: >
  Resolves ontology term CURIEs and typed labels against package-owned Alliance
  ontology lookup helpers. Exact CURIE lookup is global; label and synonym
  lookup must be typed or provider-scoped to avoid cross-ontology ambiguity.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: true
  description: >
    Use for validating ontology term CURIEs, resolving typed ontology labels or
    synonyms to CURIEs, checking accepted prefixes, or explaining ambiguous and
    missing ontology term matches.
  batchable: true
  batching_instructions: >
    When validating multiple ontology terms, combine them into one request with
    one target per term and preserve each binding's ontology_family, accepted
    prefixes, and exact-match policy.

tools:
  - get_agent_contract
  - agr_curation_query

output_schema: OntologyTermValidationResult

structured_finalization:
  enabled: true
  tool_name: finalize_ontology_term_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: agr_curation_query
    provider_terms:
      - agr_curation_query
    request_keys:
      - curie
      - curies
      - term
      - terms
      - label
      - labels
      - name
      - names
      - ontology_term_type
      - ontology_family
    result_collections:
      - resolved_values
      - resolved_objects
      - ontology_term_candidates
      - candidates
    grounded_fact_paths:
      - ontology_term_candidates[].curie
      - ontology_term_candidates[].label
      - ontology_term_candidates[].ontology_type
      - ontology_term_candidates[].ontology_family
      - candidates[].value
      - candidates[].label
    resolved_fact_paths:
      - resolved_values
      - resolved_objects[]
      - ontology_term_candidates[]
    fact_identity_paths:
      - resolved_values.curie
      - resolved_values.label
      - resolved_values.name
      - resolved_values.ontology_term_type
      - resolved_values.ontology_family
      - resolved_values.terms[]
      - resolved_objects[].curie
      - resolved_objects[].id
      - resolved_objects[].name
      - resolved_objects[].label
      - resolved_objects[].ontology_type
      - ontology_term_candidates[].curie
      - ontology_term_candidates[].label
      - ontology_term_candidates[].ontology_type
      - ontology_term_candidates[].ontology_family

model_config:
  model: "${AGENT_ONTOLOGY_TERM_MODEL:-gpt-5.4-mini}"
  temperature: 0.1
  reasoning: "high"

requires_document: false
required_params: []

batch_capabilities:
  - domain_validator_batch

frontend:
  icon: "🔎"
  show_in_palette: true

group_rules_enabled: false
