# =============================================================================
# AGENT DEFINITION: gene_expression
# =============================================================================
# Extracts gene expression patterns and experimental data from PDFs.
# Tool name generated at runtime: ask_gene_expression_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: gene_expression_extraction

name: "Gene Expression Extractor"

description: >
  Extracts gene expression patterns and experimental data from PDFs by recording
  evidence, resolving controlled selectors, staging builder observations, and
  triggering backend-owned GeneExpressionEnvelope materialization.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Extract gene expression data from the paper through the builder workflow.
    Records evidence, resolves selectors, stages observations, finalizes the
    backend-owned GeneExpressionEnvelope, and returns a compact status.
    Use the CSV/TSV/JSON formatter specialists to save results as files.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - search_document
  - read_chunk
  - read_section
  - read_subsection
  - record_evidence
  - list_recorded_evidence
  - get_recorded_evidence
  - attach_evidence_to_object
  - detach_evidence_from_object
  - discard_recorded_evidence
  - update_recorded_evidence_metadata
  - get_agent_contract
  - agr_species_context_lookup
  - search_domain_field_terms
  - inspect_ontology_term
  - resolve_domain_field_term
  - stage_gene_expression_observation
  - patch_gene_expression_observation
  - discard_gene_expression_observation
  - list_staged_gene_expression_observations
  - find_staged_gene_expression_observations
  - finalize_gene_expression_extraction

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: null

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_GENE_EXPRESSION_MODEL:-gpt-5.6-sol}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "📊"
  show_in_palette: true

# -----------------------------------------------------------------------------
# CURATION ROUTING
# -----------------------------------------------------------------------------
curation:
  adapter_key: "gene_expression"
  domain_pack_id: "agr.alliance.gene_expression"
  launchable: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
