# =============================================================================
# AGENT DEFINITION: gene_expression
# =============================================================================
# Extracts gene expression patterns and experimental data from PDFs.
# Tool name generated at runtime: ask_gene_expression_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: gene_expression_extraction

name: "Gene Expression Extractor"

description: >
  Extracts gene expression patterns and experimental data from PDFs,
  emitting GeneExpressionAnnotation domain-envelope objects with evidence and
  raw extraction detail preserved as metadata.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Extract gene expression data from the paper. Returns GeneExpressionAnnotation
    curatable_objects with anatomy, life stage, assay, reagent, evidence, and
    curation notes preserved in domain-envelope metadata.
    Use export_to_file to save results as CSV, TSV, or JSON.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - search_document
  - read_section
  - read_subsection
  - record_evidence
  - get_agent_contract
  - agr_species_context_lookup
  - stage_gene_expression_evidence
  - finalize_gene_expression_extraction

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: GeneExpressionEnvelope

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_GENE_EXPRESSION_MODEL:-gpt-4o}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "📊"
  show_in_palette: true

# -----------------------------------------------------------------------------
# CURATION ROUTING
# -----------------------------------------------------------------------------
curation:
  adapter_key: "gene_expression"
  domain_pack_id: "agr.alliance.gene_expression"
  launchable: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
