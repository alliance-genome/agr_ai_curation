# Curator-facing documentation for the Gene Expression Extraction Agent.
summary: "Reads an uploaded paper and pulls out where and when each gene is expressed — the tissues, cell types, developmental stages, and any sex-specific patterns — with the supporting quote, ready for the specialist validators to confirm."
capabilities:
  - name: "Expression Pattern Extraction"
    description: "Identifies and extracts gene expression patterns from PDFs including anatomical locations (tissues, cell types, organs), developmental stages, temporal qualifiers, and sex-specific expression."
    example_query: "Extract all gene expression patterns from this paper"
    example_result: "Returns structured annotations with gene symbol, anatomy label, life stage label, GO cellular component, and evidence text with page numbers"
  - name: "Reagent Information Capture"
    description: "Extracts detailed reagent information used for expression detection including reporter fusions, CRISPR knock-ins, antibodies, in situ probes, and transgenic constructs."
    example_query: "What reagents were used to detect gene expression?"
    example_result: "Returns reagent details like type ('CRISPR_knockin'), name ('dmd-3::YFP'), genotype, and strain"
  - name: "Negative Evidence Capture"
    description: "Identifies and extracts negative expression evidence where genes are NOT expressed in specific locations or stages."
    example_query: "Find tissues where the gene is not expressed"
    example_result: "Flags these as negative results — for example 'not detected in neurons'."
  - name: "Hands expression details to the validators"
    description: "Passes each expression observation — the gene, the tissue or cell type, the developmental stage, the data provider, and the reagent used — to the specialist validators, each backed by its supporting quote. The extractor proposes; the validators authoritatively confirm the official terms and the data provider."
    example_query: "Extract the expression observations and pass them on for confirmation"
    example_result: "Returns each expression observation with its supporting quote, ready for the validators to confirm the official terms"
data_sources:
  - name: "PDF Document Search (Weaviate)"
    description: "Hybrid semantic/keyword plus lexical-heavy search modes over uploaded PDF documents. Supports searching by query terms, filtering by section, and reading full sections or subsections."
    species_supported: null
    data_types: ["PDF text chunks", "Section content", "Subsection content"]
  - name: "Expression validators"
    description: "Specialist validators confirm the expression-relation vocabulary and the data provider after extraction. Confirming the gene, anatomy term, developmental stage, and reference against the database is still in development."
    species_supported: ["C. elegans (WB)", "D. melanogaster (FB)", "M. musculus (MGI)", "D. rerio (ZFIN)", "R. norvegicus (RGD)", "S. cerevisiae (SGD)", "H. sapiens (HGNC)"]
    data_types: ["Proposed expression relations", "Proposed data providers", "Evidence-backed expression observations"]
limitations:
  - "Returns plain text output only - JSON conversion is handled by a separate Formatter Agent"
  - "Does NOT extract expression data from mutant phenotypes or experimental perturbations (heat shock, RNAi knockdown, drug treatment) - only baseline/wild-type expression"
  - "Does NOT annotate transgenic markers used solely for strain identification (e.g., rol-6, myo-2::GFP co-injection markers)"
  - "The extractor records the term wording it finds; turning that into an official ontology ID is the validators' or the Ontology Term Resolver's job."
  - "Requires at least one document search or read tool call before returning results"
