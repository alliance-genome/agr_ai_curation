group_id: WB
content: |
  ## WB-SPECIFIC RULES (C. elegans Gene Expression Curation)

  These rules apply for WormBase group curation and refine the base extractor policy.
  Reference guidance: https://academic.oup.com/database/article/doi/10.1093/database/baaf063/8268905?login=false

  ### Anatomy specificity
  - Prefer the most specific supported anatomy label.
  - Use curated WB-preferred granularity where evidence supports it (for example prefer `dendrite` over `dendritic tree`).
  - Do not infer finer specificity than what evidence supports.

  ### Marker/promoter exclusions
  - Exclude promoter-driven localization used only to label cells (reason_code: `promoter_driven_marker_localization`).
    Example pattern: ser-2 promoter used to drive PVD labeling.
  - Exclude marker-only visualization constructs (reason_code: `marker_only_visualization`).
    Example pattern: wdIs52 [F49H12.4p::GFP] used only to visualize PVD.
  - Exclude structural labeling markers not representing new expression findings (reason_code: `structural_label_or_fusion_only`).
    Example pattern: tagRFP::TBA-1 or UtrCH used as microtubule/F-actin marker.

  ### Previously reported / non-experimental exclusions
  - Exclude prior-literature/background-only statements (reason_code: `previously_reported`).
    Example pattern: act-4 expression cited as previously described/data not shown.
  - Exclude narrative/mechanistic statements that are not direct experimental findings in this paper (reason_code: `non_experimental_claim`).
    Example pattern: speculative discussion of SAX-7/MNR-1 roles without direct new experiment readout.

  ### Mutant-background exclusion
  - Exclude annotations observed only in mutant/perturbation background when no direct wild-type finding is established (reason_code: `mutant_background_only`).
    Example pattern: TIAM-1::GFP observation only in dma-1(DPDZ) mutant context.

  ### Reagent/genotype capture
  - Capture full reagent genotype strings exactly as written when reporting retained findings, without inferring, normalizing, or modifying them.
  - Include full genotype details for constructs such as qyIs369 when present in the evidence.
  - C. elegans transgene arrays follow the format: xxIs### (integrated) or xxEx### (extrachromosomal).

  ### Positive inclusion reminder
  - Retain directly supported experimental positives with complete evidence.
  - Example: hpo-30 expression findings directly demonstrated in this paper should be retained.
  - Gene names like hpo-30 follow C. elegans nomenclature (lowercase, 3-letter code + hyphen + number).

  ### Output discipline
  - Every excluded candidate must land in `metadata.exclusions[]` with canonical reason_code and evidence refs when available.
  - Keep only experimentally observed WB-curation-relevant GeneExpressionAnnotation objects in `curatable_objects[]`.
  - Store verified quotes, page numbers, figure references, genotype strings, and unresolved WB anatomy/stage labels in envelope metadata or object metadata; do not put legacy flat evidence fields in payload.

  ### Rescue experiment language exclusion
  - Exclude sentences where "expression" refers to transgenic rescue, not endogenous expression profiling (reason_code: `rescue_experiment_not_expression`).
    Example pattern: "Expression of CKR-1 in AIB robustly rescued ckr-1 mutant animal's escape defects."
  - Cue words in C. elegans papers: "rescued", "restored", "suppressed", "complemented".
  - This is distinct from promoter-driven localization: rescue experiments use a transgene to test gene function, not to profile where a gene is expressed.
  - Common in C. elegans rescue experiments where tissue-specific promoters drive gene expression to test sufficiency.

  ### Summary/conclusion statements from this paper
  - Summary or conclusion statements about experiments performed IN THIS paper are curatable expression findings.
  - Do NOT exclude these as non-experimental claims.
    Example INCLUDE: "In conclusion, gmap1 and gmap-2/3 genes are both expressed in epithelial cells."
    Example EXCLUDE: "abts-1 is expressed in HSNs from the L4 larval stage onward (Shinkai et al. 2018)." (external citation = previously_reported)
  - The key distinction: does the statement summarize experiments in THIS paper (include), or cite prior work (exclude)?

  ### Incomplete annotation handling
  - When expression is mentioned but key details (anatomy, life stage) are missing from the text:
    - Still capture the annotation with null values at the relevant domain-pack payload paths, such as `expression_pattern.where_expressed.anatomical_structure.name` and/or `when_expressed_stage_name`.
    - Add a `metadata.ambiguities[]` entry noting which fields are incomplete and may require curator review of figures.
    - Example: "Expression pattern of the acox-1.1 gene." -> capture with gene but null anatomy.
  - When neuron or tissue identities are stated as uncertain ("possibly M3, AWB, and ASJ"):
    - Capture the annotation with the tentative identities.
    - Preserve the uncertainty qualifier verbatim in the linked `metadata.evidence_records[]` quote and raw mention metadata.
    - Add a `metadata.ambiguities[]` entry noting the tentative identification.

  ### Negative expression results (C. elegans)
  - Experimentally demonstrated absence of expression is a valid annotation with payload `negated: true`.
    Example: "no GFP signal was observed in the pharynx" -> annotation with `expression_pattern.where_expressed.anatomical_structure.name: pharynx` and `negated: true`.
  - Expression unchanged in perturbation background (e.g., "expression of RAB-11 in acs-1(RNAi) embryos was not different from wild type") is generally NOT a new expression annotation.
    - If wild-type expression is established elsewhere in the paper, do not duplicate it.
    - If this is the ONLY evidence of the expression pattern, capture it with context.

  ### Ambiguity handling policy
  - When uncertain whether a sentence reports new experimental results or summarizes prior work, err on the side of INCLUSION with a `metadata.ambiguities[]` entry.
  - WormBase curators prefer high recall over high precision for AI-assisted triage. It is easier for a curator to dismiss a false positive than to find a missed annotation.

  ### Additional WB exclusion reason_codes
  - rescue_experiment_not_expression: The sentence uses expression-related language but describes a transgenic rescue experiment, not endogenous expression profiling. Cues: "rescued", "restored", "suppressed", "complemented".


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only as `GeneExpressionAnnotation` entries in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - Each curatable object should include `object_type`, `object_role`, `payload`, `evidence_record_ids`, `metadata_refs`, and either `object_id` or `pending_ref_id`; include `schema_ref` or `model_ref`, definition-state notes, field/object refs, and `repair_hints` when available.
  - In repair mode, keep object IDs stable and repair only the affected payload fields while preserving evidence and metadata references.
