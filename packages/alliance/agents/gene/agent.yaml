# =============================================================================
# AGENT DEFINITION: gene
# =============================================================================
# Validates gene identifiers against the Alliance Curation Database.
# Tool name generated at runtime: ask_gene_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: gene_validation

name: "Gene Validation Agent"

description: >
  Validates gene identifiers against the Alliance Curation Database.
  Supports lookup by symbol, name, ID, or cross-reference.

category: "Validation"
subcategory: "Data Validation"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: false

  description: >
    Use for validating genes against the database, looking up gene symbols,
    finding gene IDs, or any gene-related queries.
  batchable: true
  batching_instructions: >
    When looking up multiple genes, combine them into a single request.
    Example: "Look up these genes: daf-16, lin-3, unc-54, act-1"

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - get_agent_contract
  - agr_curation_query

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: GeneResultEnvelope

structured_finalization:
  enabled: true
  tool_name: finalize_gene_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: agr_curation_query
    provider_terms:
      - agr_curation_query
    request_keys:
      - gene_id
      - gene_ids
      - primary_external_id
      - primary_external_ids
      - gene_symbol
      - gene_symbols
      - symbol
      - symbols
      - name
      - names
    result_collections:
      - resolved_values
      - resolved_objects
      - gene_candidates
      - candidates
    grounded_fact_paths:
      - gene_candidates[].gene_id
      - gene_candidates[].symbol
      - gene_candidates[].taxon
      - gene_candidates[].data_provider
      - gene_candidates[].name
      - candidates[].value
      - candidates[].label
    resolved_fact_paths:
      - resolved_values
      - resolved_objects[]
      - gene_candidates[]
    fact_identity_paths:
      - resolved_values.primary_external_id
      - resolved_values.gene_id
      - resolved_values.gene_symbol
      - resolved_values.symbol
      - resolved_values.taxon
      - resolved_values.taxon_curie
      - resolved_values.data_provider
      - resolved_values.name
      - resolved_objects[].primary_external_id
      - resolved_objects[].gene_id
      - resolved_objects[].symbol
      - resolved_objects[].taxon
      - resolved_objects[].data_provider
      - resolved_objects[].name
      - gene_candidates[].gene_id
      - gene_candidates[].symbol
      - gene_candidates[].taxon
      - gene_candidates[].data_provider
      - gene_candidates[].name

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_GENE_MODEL:-gpt-5.6-terra}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: false
required_params: []

batch_capabilities:
  - domain_validator_batch

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "🧬"
  show_in_palette: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
