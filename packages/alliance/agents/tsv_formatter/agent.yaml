# =============================================================================
# AGENT DEFINITION: tsv_formatter
# =============================================================================
# Formats saved curation results as downloadable TSV files.
# Context-bound output terminal with source-backed projection tools.
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: tsv_output_formatter

name: "TSV File Formatter"

description: >
  Builds source-backed TSV (tab-separated values) downloads from saved
  curation results using validated projection plans.

category: "Output"
subcategory: "Output"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
supervisor_routing:
  enabled: true
  description: >
    Use for creating downloadable TSV files from saved curation results when
    the caller needs import-friendly tabular rows, headers, filters, ordering,
    field selection, or a clear cannot-complete response.
  batchable: false

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - explain_formatter_capabilities
  - inspect_output_artifacts
  - inspect_output_rows
  - inspect_field_values
  - build_default_projection_plan
  - validate_output_projection
  - preview_output_projection
  - finalize_and_save
  - formatter_cannot_complete

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: null

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_TSV_FORMATTER_MODEL:-gpt-5.5}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: false
required_params: []

batch_capabilities:
  - file_output

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "📄"
  show_in_palette: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: false
