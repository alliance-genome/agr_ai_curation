# =============================================================================
# AGENT DEFINITION: agm
# =============================================================================
# Validates affected genomic model subjects against Alliance entity helpers.
# =============================================================================

agent_id: agm_validation

name: "AGM Validation Agent"

description: >
  Validates affected genomic model identifiers and labels using package-owned
  Alliance entity lookup helpers.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: false

  description: >
    Use for validating affected genomic model subjects, AGM identifiers, and
    AGM labels in phenotype or disease annotation subject context.
  batchable: true
  batching_instructions: >
    When validating multiple AGM subjects, combine them into one request while
    preserving each subject's identifier, label, and taxon context.

tools:
  - get_agent_contract
  - agr_curation_query

output_schema: AgmValidationResult

structured_finalization:
  enabled: true
  tool_name: finalize_agm_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: agr_curation_query
    provider_terms:
      - agr_curation_query
    request_keys:
      - agm_id
      - agm_ids
      - subject_identifier
      - subject_identifiers
      - subject_label
      - subject_labels
      - label
      - labels
      - taxon
      - taxon_id
    result_collections:
      - resolved_values
      - resolved_objects
      - agm_candidates
      - candidates
    grounded_fact_paths:
      - agm_candidates[].agm_id
      - agm_candidates[].label
      - agm_candidates[].taxon
      - agm_candidates[].data_provider
      - candidates[].value
      - candidates[].label
    resolved_fact_paths:
      - resolved_values
      - resolved_objects[]
      - agm_candidates[]
    fact_identity_paths:
      - resolved_values.agm_id
      - resolved_values.subject_identifier
      - resolved_values.subject_label
      - resolved_values.label
      - resolved_values.taxon
      - resolved_objects[].agm_id
      - resolved_objects[].subject_identifier
      - resolved_objects[].label
      - resolved_objects[].taxon
      - agm_candidates[].agm_id
      - agm_candidates[].label
      - agm_candidates[].taxon
      - agm_candidates[].data_provider

model_config:
  model: "${AGENT_AGM_MODEL:-gpt-5.6-terra}"
  temperature: 0.1
  reasoning: "medium"

requires_document: false
required_params: []

batch_capabilities: []

frontend:
  icon: "🧬"
  show_in_palette: true

group_rules_enabled: false
