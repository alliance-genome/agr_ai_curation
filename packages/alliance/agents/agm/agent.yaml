# =============================================================================
# AGENT DEFINITION: agm
# =============================================================================
# Validates affected genomic model subjects against Alliance entity helpers.
# =============================================================================

agent_id: agm_validation

name: "AGM Validation Agent"

description: >
  Validates affected genomic model identifiers and labels using package-owned
  Alliance entity lookup helpers.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: true
  description: >
    Use for validating affected genomic model subjects, AGM identifiers, and
    AGM labels in phenotype or disease annotation subject context.
  batchable: true
  batching_instructions: >
    When validating multiple AGM subjects, combine them into one request while
    preserving each subject's identifier, label, and taxon context.

tools:
  - get_agent_contract
  - agr_curation_query

output_schema: AgmValidationResult

model_config:
  model: "${AGENT_AGM_MODEL:-gpt-5.4-mini}"
  temperature: 0.1
  reasoning: "high"

requires_document: false
required_params: []

batch_capabilities: []

frontend:
  icon: "🧬"
  show_in_palette: true

group_rules_enabled: false
