# =============================================================================
# AGENT DEFINITION: agm
# =============================================================================
# Validates affected genomic model subjects against Alliance entity helpers.
# =============================================================================

agent_id: agm_validation

name: "AGM Validation Agent"

description: >
  Validates affected genomic model identifiers and labels using package-owned
  Alliance entity lookup helpers.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: true
  description: >
    Use for validating affected genomic model subjects, AGM identifiers, and
    AGM labels in phenotype or disease annotation subject context.
  batchable: true
  batching_instructions: >
    When validating multiple AGM subjects, combine them into one request while
    preserving each subject's identifier, label, and taxon context.

tools:
  - get_agent_contract
  - agr_curation_query

output_schema: AgmValidationResult

model_config:
  model: "${AGENT_AGM_MODEL:-gpt-5.5}"
  temperature: 0.1
  reasoning: "low"

requires_document: false
required_params: []

batch_capabilities: []

frontend:
  icon: "🧬"
  show_in_palette: true

documentation:
  summary: >
    Validates affected genomic model (AGM) subjects by matching supplied
    identifiers or labels to Alliance model-organism records.
  capabilities:
    - name: "AGM identifier lookup"
      description: >
        Checks supplied affected genomic model identifiers against Alliance
        curation records.
      example_query: "Validate AGM WB:WBStrain00000001 for this phenotype subject"
      example_result: >
        Returns a resolved AGM record, provider context, and validation status
        for the subject field.
    - name: "Label and taxon matching"
      description: >
        Uses a supplied label and organism context to find the intended affected
        genomic model when an identifier is missing.
      example_query: "Resolve the affected genomic model label N2 for WormBase"
      example_result: >
        Returns matching AGM candidates or marks the subject unresolved when the
        label is ambiguous.
    - name: "Subject-field validation evidence"
      description: >
        Preserves the original field path, submitted value, and lookup evidence
        so curators can review why a model was accepted or rejected.
      example_query: "Check whether this phenotype annotation subject can use the submitted AGM"
      example_result: >
        Returns a per-target validation result with matched_id, matched_label,
        status, and evidence notes.
  data_sources:
    - name: "Alliance Curation Database"
      description: >
        Alliance curation records for affected genomic models and provider-owned
        model identifiers.
      species_supported:
        - "C. elegans (WB)"
        - "D. melanogaster (FB)"
        - "D. rerio (ZFIN)"
        - "M. musculus (MGI)"
        - "R. norvegicus (RGD)"
        - "S. cerevisiae (SGD)"
        - "X. laevis (XB)"
        - "H. sapiens (HGNC)"
      data_types:
        - "affected genomic model identifiers"
        - "model labels"
        - "provider abbreviations"
        - "taxon context"
  limitations:
    - "Cannot infer an AGM from paper text; it validates values supplied by extraction output or domain-pack validation inputs."
    - "Ambiguous model labels require provider or taxon context for reliable resolution."
    - "Does not validate gene or allele subjects; use Subject Entity Validation Agent or the type-specific validation agent instead."
    - "Cannot create missing model records or assign new provider identifiers."
    - "Only reports lookup evidence available from Alliance curation data."

group_rules_enabled: false
