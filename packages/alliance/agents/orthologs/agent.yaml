# =============================================================================
# AGENT DEFINITION: orthologs
# =============================================================================
# Queries orthology relationships across species.
# Tool name generated at runtime: ask_orthologs_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: orthologs_lookup

name: "Ortholog Lookup Agent"

description: >
  Finds orthologs (equivalent genes) across species using the
  Alliance Orthology Database with DIOPT-based orthology calls.

category: "Validation"
subcategory: "Data Validation"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Use for finding orthologs (equivalent genes) across species, querying
    orthology relationships, or DIOPT-based orthology calls.
  batchable: true
  batching_instructions: >
    When finding orthologs for multiple genes, combine them into a single request.
    Example: "Find orthologs for: WB:WBGene00000912, MGI:97490, HGNC:11998, etc."

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - alliance_api_call

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: OrthologsResult
structured_finalization:
  enabled: true
  tool_name: finalize_orthologs_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: alliance_api_call
    provider_terms: [alliance_api_call, alliance, alliancegenome]
    request_keys: [gene_id, gene_ids]
    result_collections: [query_gene, orthologs]
    resolved_fact_paths:
      - query_gene
    fact_identity_paths:
      - "orthologs[].ortholog.gene_id"
      - "orthologs[].ortholog.id"
      - "orthologs[].gene.gene_id"
      - "orthologs[].gene.id"
      - "orthologs[].gene_id"
      - "orthologs[].id"

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_ORTHOLOGS_MODEL:-gpt-5.6-terra}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: false
required_params: []

batch_capabilities: []

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "🔄"
  show_in_palette: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: false
