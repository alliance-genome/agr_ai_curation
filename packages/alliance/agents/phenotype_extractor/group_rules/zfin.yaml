group_id: ZFIN
content: |
  ## ZFIN-SPECIFIC RULES (Zebrafish Phenotype Extraction)

  ### Phenotype ontology
  - Use Zebrafish Phenotype (ZP) ontology terms for zebrafish phenotype annotations.
  - ZP terms are composed from multiple ontologies (PATO + ZFA anatomy + BSPO spatial terms).

  ### Life stage specificity
  - Zebrafish developmental stages: zygote, cleavage, blastula, gastrula, segmentation, pharyngula, hatching, larval, juvenile, adult.
  - Hours post-fertilization (hpf) and days post-fertilization (dpf) are commonly used timing markers.
  - Specify developmental stage or timing when stated: "pericardial edema at 48 hpf".

  ### Common zebrafish phenotype patterns
  - Cardiovascular: pericardial edema, reduced heart rate, blood pooling, circulation defects.
  - CNS: small eyes, brain ventricle defects, reduced brain size, behavioral abnormalities.
  - Body axis: curved body axis, shortened body, cyclopia, ventralization, dorsalization.
  - Pigmentation: reduced pigmentation, melanophore defects, iridophore loss.
  - Craniofacial: jaw defects, cartilage malformation, pharyngeal arch defects.
  - Fin: fin fold defects, pectoral fin absence/reduction.
  - Lethality: embryonic lethal, larval lethal.

  ### Morpholino phenotypes
  - Morpholino knockdown phenotypes should be annotated as morpholino-induced, not genetic.
  - Distinguish morpholino phenotypes from stable mutant phenotypes.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
  - Each retained assertion must be a `PhenotypeAnnotation` object with `object_role: curatable_unit`, `model_ref: PhenotypeAnnotationPayload`, `definition_state: in_development`, blocked export/write metadata, and object refs to `PhenotypeSubject`, `PhenotypeTerm`, `Reference`, and `EvidenceQuote` objects.
  - Use `PhenotypeSubject` for pending or resolved gene/allele/AGM subject context and `PhenotypeTerm` for the grounded phenotype ontology CURIE; unresolved terms belong in `metadata.ambiguities[]`, not in a semantic helper list.
