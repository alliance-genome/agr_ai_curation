group_id: RGD
content: |
  ## RGD-SPECIFIC RULES (Rat Phenotype Extraction)

  ### Phenotype ontology
  - Use Mammalian Phenotype (MP) ontology terms for rat phenotype annotations (shared with mouse).
  - MP IDs follow the format MP:NNNNNNN.

  ### Common rat phenotype patterns
  - Behavioral: anxiety, depression-like behavior, locomotor activity, learning/memory (Morris water maze, radial arm maze).
  - Cardiovascular: hypertension, cardiac hypertrophy, stroke susceptibility.
  - Metabolic: glucose intolerance, insulin resistance, obesity, dyslipidemia.
  - Renal: proteinuria, glomerulosclerosis, renal hypertrophy.
  - Neurological: seizures, neuropathic pain, motor deficits.

  ### Rat-specific phenotype conventions
  - Rat studies frequently combine genetic models with pharmacological interventions.
  - Only capture phenotypes associated with genetic variation (alleles), not drug-induced phenotypes (unless the drug is applied to a specific genotype to reveal a phenotype).
  - Spontaneously hypertensive rat (SHR) phenotypes are strain-associated, not allele-specific — note this distinction.
  - Zucker fatty rat and Zucker diabetic fatty (ZDF) rat have well-characterized metabolic phenotypes.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - Each retained assertion must be a `PhenotypeAnnotation` object with `object_role: curatable_unit`, `model_ref: PhenotypeAnnotationPayload`, `definition_state: in_development`, blocked export/write metadata, and object refs to `PhenotypeSubject`, `PhenotypeTerm`, `Reference`, and `EvidenceQuote` objects.
  - Use `PhenotypeSubject` for pending or resolved gene/allele/AGM subject context and `PhenotypeTerm` for the grounded phenotype ontology CURIE; unresolved terms belong in `metadata.ambiguities[]`, not in a semantic helper list.
  - In repair mode, keep object IDs stable, use `field_refs[]` for the requested field paths, and repair only the affected payload or metadata paths while preserving evidence and metadata references.
