group_id: RGD
content: |
  ## RGD-SPECIFIC RULES (Rat Phenotype Extraction)

  ### Phenotype ontology
  - Preserve paper-supplied Mammalian Phenotype (MP) identifiers as validator hints for rat phenotype annotations (shared with mouse).
  - MP IDs follow the format MP:NNNNNNN.
  - When the paper gives only a phenotype label, keep a label-backed candidate and let the active ontology validator resolve the final term.

  ### Common rat phenotype patterns
  - Behavioral: anxiety, depression-like behavior, locomotor activity, learning/memory (Morris water maze, radial arm maze).
  - Cardiovascular: hypertension, cardiac hypertrophy, stroke susceptibility.
  - Metabolic: glucose intolerance, insulin resistance, obesity, dyslipidemia.
  - Renal: proteinuria, glomerulosclerosis, renal hypertrophy.
  - Neurological: seizures, neuropathic pain, motor deficits.

  ### Rat-specific phenotype conventions
  - Rat studies frequently combine genetic models with pharmacological interventions.
  - Only capture phenotypes associated with genetic variation (alleles), not drug-induced phenotypes (unless the drug is applied to a specific genotype to reveal a phenotype).
  - Spontaneously hypertensive rat (SHR) phenotypes are strain-associated, not allele-specific — note this distinction.
  - Zucker fatty rat and Zucker diabetic fatty (ZDF) rat have well-characterized metabolic phenotypes.
