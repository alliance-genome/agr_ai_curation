group_id: MGI
content: |
  ## MGI-SPECIFIC RULES (Mouse Phenotype Extraction)

  ### Phenotype ontology
  - Use Mammalian Phenotype (MP) ontology terms for mouse phenotype annotations.
  - MP IDs follow the format MP:NNNNNNN.

  ### Life stage specificity
  - Mouse developmental stages: embryonic (E0.5-E18.5), neonatal (P0-P7), postnatal, juvenile, adult, aged.
  - Embryonic stages use the E-notation: E9.5, E12.5, E18.5.
  - Postnatal stages use the P-notation: P0, P7, P14, P21.

  ### Common mouse phenotype patterns
  - Lethality: embryonic lethal (specify stage), perinatal lethal, postnatal lethal, reduced viability.
  - Growth: growth retardation, obesity, lean body mass changes.
  - Behavior: hyperactivity, anxiety-related behavior, learning/memory deficits, seizures.
  - Organ-specific: hepatomegaly, cardiomyopathy, kidney defects, skeletal abnormalities.
  - Immune: immunodeficiency, autoimmunity, inflammation, altered cytokine levels.
  - Fertility: male/female infertility, reduced litter size, gonadal defects.

  ### Conditional phenotypes
  - Cre-lox conditional knockouts produce tissue-specific or temporally specific phenotypes.
  - Note the Cre driver and the resulting tissue specificity when reporting conditional phenotypes.
  - Inducible systems (CreERT2) add temporal control — note the induction timing.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - Each curatable object should include `object_type`, `object_role`, `payload`, `evidence_record_ids`, `metadata_refs`, and either `object_id` or `pending_ref_id`; include `schema_ref` or `model_ref`, definition-state notes, field/object refs, and `repair_hints` when available.
  - In repair mode, keep object IDs stable and repair only the affected payload fields while preserving evidence and metadata references.
