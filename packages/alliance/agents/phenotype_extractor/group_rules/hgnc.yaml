group_id: HGNC
content: |
  ## HGNC-SPECIFIC RULES (Human Phenotype Extraction)

  ### Phenotype ontology
  - Use Human Phenotype Ontology (HPO) terms for human phenotype annotations.
  - HPO IDs follow the format HP:NNNNNNN.

  ### Clinical phenotype conventions
  - Human phenotypes are often described in clinical terminology.
  - Map clinical descriptions to HPO terms when possible: "intellectual disability" → HP:0001249.
  - Distinguish between findings in individual patients/families and population-level associations.

  ### Common human phenotype categories
  - Neurological: intellectual disability, seizures, ataxia, peripheral neuropathy.
  - Growth: short stature, tall stature, microcephaly, macrocephaly.
  - Dysmorphic features: facial dysmorphism, limb abnormalities, digital anomalies.
  - Organ-specific: cardiomyopathy, hepatic dysfunction, renal anomalies.
  - Metabolic: hyperglycemia, hyperlipidemia, metabolic acidosis.

  ### Phenotype vs disease distinction
  - In human clinical papers, "phenotype" often refers to the clinical presentation of a disease.
  - The disease (e.g., "Marfan syndrome") goes to disease_extractor; the clinical features
    (e.g., "aortic root dilation", "lens subluxation") are individual phenotypes.
  - GWAS-associated traits may be phenotypes (e.g., "height", "BMI") rather than diseases.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
  - Each retained assertion must be a `PhenotypeAnnotation` object with `object_role: curatable_unit`, `model_ref: PhenotypeAnnotationPayload`, `definition_state: in_development`, blocked export/write metadata, and object refs to `PhenotypeSubject`, `PhenotypeTerm`, `Reference`, and `EvidenceQuote` objects.
  - Use `PhenotypeSubject` for pending or resolved gene/allele/AGM subject context and `PhenotypeTerm` for the grounded phenotype ontology CURIE; unresolved terms belong in `metadata.ambiguities[]`, not in a semantic helper list.
