group_id: SGD
content: |
  ## SGD-SPECIFIC RULES (Yeast Phenotype Extraction)

  ### Phenotype ontology
  - Use Ascomycete Phenotype Ontology (APO) terms for yeast phenotype annotations.
  - APO IDs follow the format APO:NNNNNNN.

  ### Common yeast phenotype patterns
  - Growth: growth defect, temperature sensitivity (ts), cold sensitivity, slow growth, no growth.
  - Morphology: abnormal cell morphology, elongated cells, enlarged cells, budding defects.
  - Cell cycle: cell cycle arrest (specify stage: G1, S, G2/M), mitotic defects.
  - Sporulation: sporulation deficiency, reduced sporulation efficiency.
  - Stress response: sensitivity to DNA damage agents (HU, MMS, UV), oxidative stress sensitivity.
  - Drug resistance/sensitivity: rapamycin sensitivity, caffeine sensitivity, cycloheximide resistance.
  - Viability: inviable (lethal), synthetic lethality, conditional lethality.

  ### Yeast-specific phenotype conventions
  - Yeast phenotypes are often measured as growth on selective media.
  - "Fails to grow on galactose" = carbon source utilization phenotype.
  - "Sensitive to 4-NQO" = DNA damage sensitivity phenotype.
  - Spot assay results (serial dilution growth) are a common phenotype readout.
  - Petite colony phenotype indicates mitochondrial defects.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - Each retained assertion must be a `PhenotypeAnnotation` object with `object_role: curatable_unit`, `model_ref: PhenotypeAnnotationPayload`, `definition_state: in_development`, blocked export/write metadata, and object refs to `PhenotypeSubject`, `PhenotypeTerm`, `Reference`, and `EvidenceQuote` objects.
  - Use `PhenotypeSubject` for pending or resolved gene/allele/AGM subject context and `PhenotypeTerm` for the grounded phenotype ontology CURIE; unresolved terms belong in `metadata.ambiguities[]`, not in a semantic helper list.
  - In repair mode, keep object IDs stable, use `field_refs[]` for the requested field paths, and repair only the affected payload or metadata paths while preserving evidence and metadata references.
