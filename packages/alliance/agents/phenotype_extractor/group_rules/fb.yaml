group_id: FB
content: |
  ## FB-SPECIFIC RULES (Drosophila Phenotype Extraction)

  ### Phenotype ontology
  - Use FlyBase Controlled Vocabulary (FBcv) terms for Drosophila phenotype annotations.
  - FBcv IDs follow the format FBcv:NNNNNNN.

  ### Life stage specificity
  - Drosophila developmental stages: embryo, larval (L1/L2/L3 instar), pupal, pharate adult, adult.
  - Specify life stage when stated: "third instar larval lethality", "pupal lethality", "adult wing defect".

  ### Common Drosophila phenotype patterns
  - Wing: wing vein defects, blistered wings, wing margin defects, wing size changes.
  - Eye: rough eye, reduced eye size, ommatidia disorganization, eye color changes.
  - Bristle/cuticle: bristle loss, extra bristles, cuticle defects.
  - Nervous system: bang-sensitive paralysis, seizure-like behavior, climbing defects.
  - Lethality: embryonic lethal, larval lethal, pupal lethal, semi-lethal.
  - Fertility: male/female sterility, reduced fertility.
  - Neurodegeneration: "Parkinson's-like motor defects in LRRK2 mutant flies" → motor defects are phenotypes;
    the Parkinson's disease reference is disease model context (see disease_extractor).

  ### Phenotype vs disease distinction
  - Drosophila disease models produce phenotypes that recapitulate disease features.
  - "Polyglutamine aggregation in fly neurons" → phenotype in a Drosophila context.
  - The human disease name (e.g., Huntington's, Parkinson's) is disease model context, not a fly phenotype.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - Each curatable object should include `object_type`, `object_role`, `payload`, `evidence_record_ids`, `metadata_refs`, and either `object_id` or `pending_ref_id`; include `schema_ref` or `model_ref`, definition-state notes, field/object refs, and `repair_hints` when available.
  - In repair mode, keep object IDs stable and repair only the affected payload fields while preserving evidence and metadata references.
