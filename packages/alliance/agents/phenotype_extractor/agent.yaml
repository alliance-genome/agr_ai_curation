# =============================================================================
# AGENT DEFINITION: phenotype_extractor
# =============================================================================
# Extracts experimentally supported phenotype assertions from uploaded PDFs.
# Tool name generated at runtime: ask_phenotype_extractor_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: phenotype_extractor

name: "Phenotype Extraction Agent"

description: >
  Extracts phenotype assertions from uploaded PDFs as Alliance phenotype
  domain-envelope curatable_objects[] with evidence-first inclusion/exclusion
  decisions, pending subject/term references, and blocked export/write metadata.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Use for extracting phenotype assertions from the loaded paper into
    curatable_objects[] only, including phenotype term, subject/context,
    verified evidence, blocker metadata, and explicit exclusion reasons.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
# Builder tool-loop: record evidence -> stage phenotype observations -> finalize. Mirrors the
# gene builder tool set. The active phenotype_term_ontology_validator resolves the staged term
# inline, so there is no controlled-field resolver loop here.
tools:
  - search_document
  - read_chunk
  - read_section
  - read_subsection
  - record_evidence
  - list_recorded_evidence
  - get_recorded_evidence
  - attach_evidence_to_object
  - detach_evidence_from_object
  - discard_recorded_evidence
  - update_recorded_evidence_metadata
  - get_agent_contract
  - agr_species_context_lookup
  # GROUNDING (experimental conditions): the same extractor-side lookup tools gene_expression uses.
  # Used to ground condition terms to REAL CURIEs while reading — ZECO condition class/id via the
  # ontology term helpers declared on condition_relations.conditions.* — rather than guessing
  # obscure ontology CURIEs from memory.
  - search_domain_field_terms
  - inspect_ontology_term
  - resolve_domain_field_term
  - stage_phenotype_observation
  - patch_phenotype_observation
  - discard_phenotype_observation
  - list_staged_phenotype_observations
  - find_staged_phenotype_observations
  - finalize_phenotype_extraction

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
# Builder-pattern agents are FORBIDDEN an output schema; the backend materializes
# PhenotypeResultEnvelope from staged builder state (see streaming_tools forbid-output-schema
# guard + builder-materializer detection).
output_schema: null

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_PHENOTYPE_MODEL:-gpt-5.5}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "🧫"
  show_in_palette: true

# -----------------------------------------------------------------------------
# CURATION ROUTING
# -----------------------------------------------------------------------------
curation:
  adapter_key: "phenotype"
  domain_pack_id: "agr.alliance.phenotype"
  launchable: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
