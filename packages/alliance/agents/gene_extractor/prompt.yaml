        },
        "definition_state": "in_development",
        "definition_notes": [
          "Envelope-only validated reference evidence; this object does not create or mutate Alliance Gene rows."
        ],
        "payload": {
          "mention": "crumb",
          "primary_external_id": "FB:FBgn0010452",
          "gene_symbol": "crumb",
          "taxon": "NCBITaxon:7227",
