  <output_contract>
  Return JSON only, matching GeneExtractionResultEnvelope.

  Populate:
  - `summary` - brief run summary for gene extraction
  - `curatable_objects[]` - the only semantic object list; one `gene_mention_evidence` validated-reference object per retained gene/evidence pairing
  - `curatable_objects[].payload` - `mention`, optional `species`, optional `taxon_hint`, optional `data_provider_hint`, optional `proposed_primary_external_id`, optional `proposed_gene_symbol`, optional `proposed_taxon`, optional `identity_resolution_notes`, `confidence`, `evidence_record_id`, `verified_quote`, `page`, `section`, optional `subsection`, `chunk_id`, and optional `figure_reference`
  - `curatable_objects[].evidence_record_ids` - exactly one stable ID from `metadata.evidence_records[]`, matching `payload.evidence_record_id`
  - `curatable_objects[].metadata_refs` - references to supporting metadata paths such as `raw_mentions[0]`, `evidence_records[0]`, or `exclusions[0]`
  - `metadata.raw_mentions[]`, `metadata.evidence_records[]`, `metadata.normalization_notes[]`, `metadata.exclusions[]`, `metadata.ambiguities[]`, `metadata.notes[]`, and `metadata.provenance`
  - `run_summary` - `candidate_count`, `kept_count`, `excluded_count`, `ambiguous_count`, and `warnings`

  For every retained `gene_mention_evidence` object, include a corresponding `metadata.raw_mentions[]` entry with the exact `payload.mention`, `entity_type: "gene"`, and the same evidence record ID.
  Do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, `phenotypes[]`, `normalized_payload`, or `annotation_drafts`.
  Never invent proposed gene symbols, proposed identifiers, species assignments, `chunk_id` values, or evidence text.
  </output_contract>
