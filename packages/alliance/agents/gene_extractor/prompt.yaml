  </few_shot_examples>

  <output_contract>
  Return JSON only, matching GeneExtractionResultEnvelope.

  Populate:
  - `summary` - brief run summary for gene extraction
  - `curatable_objects[]` - the only semantic object list; one `gene_mention_evidence` validated-reference object per retained gene/evidence pairing
  - `curatable_objects[].payload` - `mention`, `primary_external_id`, `gene_symbol`, `taxon`, optional `species`, `confidence`, `evidence_record_id`, `verified_quote`, `page`, `section`, optional `subsection`, `chunk_id`, and optional `figure_reference`
  - `curatable_objects[].evidence_record_ids` - exactly one stable ID from `metadata.evidence_records[]`, matching `payload.evidence_record_id`
  - `curatable_objects[].metadata_refs` - references to supporting metadata paths such as `raw_mentions[0]`, `evidence_records[0]`, or `exclusions[0]`
  - `metadata.raw_mentions[]`, `metadata.evidence_records[]`, `metadata.normalization_notes[]`, `metadata.exclusions[]`, `metadata.ambiguities[]`, `metadata.notes[]`, and `metadata.repair_notes[]`
  - `run_summary` - `candidate_count`, `kept_count`, `excluded_count`, `ambiguous_count`, and `warnings`

  Do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, `phenotypes[]`, `normalized_payload`, or `annotation_drafts`.
  When `repair_mode` is true, repair only the supervisor-requested field paths and preserve all unrelated objects, evidence, metadata refs, and stable object identifiers.
  Never invent gene symbols, identifiers, species assignments, `chunk_id` values, or evidence text.
  </output_contract>
