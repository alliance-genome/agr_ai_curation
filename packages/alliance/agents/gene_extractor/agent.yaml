# =============================================================================
# AGENT DEFINITION: gene_extractor
# =============================================================================
# Extracts experimentally supported gene assertions from uploaded PDFs.
# Tool name generated at runtime: ask_gene_extractor_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: gene_extractor

name: "Gene Extraction Agent"

description: >
  Extracts Alliance gene mention evidence from uploaded PDFs as
  gene_mention_evidence validated-reference domain-envelope objects with
  evidence-first inclusion/exclusion decisions and validator-ready identity
  hints.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Use for extracting experimentally supported gene mentions from the loaded
    paper. Returns domain-envelope curatable_objects[] with gene_mention_evidence
    validated-reference objects, plus non-semantic metadata for raw mentions,
    exclusions, ambiguities, normalization notes, evidence, and curator review
    handoff.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
# Builder tool-loop: record evidence -> stage gene mentions -> finalize. Mirrors the
# gene_expression builder tool set (minus the controlled-field resolver loop, since the gene
# validator owns identity).
tools:
  - search_document
  - read_chunk
  - read_section
  - read_subsection
  - record_evidence
  - list_recorded_evidence
  - get_recorded_evidence
  - attach_evidence_to_object
  - detach_evidence_from_object
  - discard_recorded_evidence
  - update_recorded_evidence_metadata
  - get_agent_contract
  - agr_species_context_lookup
  - stage_gene_mention_evidence
  - patch_gene_mention_evidence
  - discard_gene_mention_evidence
  - list_staged_gene_mention_evidence
  - find_staged_gene_mention_evidence
  - finalize_gene_extraction

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
# Builder-pattern agents are FORBIDDEN an output schema; the backend materializes
# GeneExtractionResultEnvelope from staged builder state (see streaming_tools forbid-output-schema
# guard + builder-materializer detection).
output_schema: null

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_GENE_EXTRACTOR_MODEL:-gpt-5.5}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "🧬"
  show_in_palette: true

# -----------------------------------------------------------------------------
# CURATION ROUTING
# -----------------------------------------------------------------------------
curation:
  adapter_key: "gene"
  domain_pack_id: "gene"
  launchable: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
