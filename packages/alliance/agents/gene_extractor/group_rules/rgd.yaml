group_id: RGD
content: |
  ## RGD-SPECIFIC RULES (Rat Gene Extraction)

  ### Nomenclature conventions
  - Rat gene symbols follow mouse conventions: italic, first letter uppercase, remaining lowercase: Tp53, Pax6, Brca1.
  - Note subtle differences from mouse: rat uses Tp53 (not Trp53 as in mouse).

  ### Common-word gene disambiguation
  - Rat gene symbols have the same disambiguation challenges as mouse.
  - Check that context is biological and not a non-gene abbreviation.

  ### Multi-species disambiguation
  - Rat Tp53 (NOT TP53 which is human, nor Trp53 which is mouse — though some papers conflate rat and mouse nomenclature).
  - When a paper uses both rat and mouse, use strain names to disambiguate (rat strains: Sprague-Dawley, Wistar, Fischer 344, Lewis; mouse strains: C57BL/6, BALB/c).
