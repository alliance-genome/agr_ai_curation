group_id: MGI
content: |
  ## MGI-SPECIFIC RULES (Mouse Gene Extraction)

  ### Nomenclature conventions
  - Mouse gene symbols are italic with the first letter uppercase and remaining lowercase: Trp53, Brca1, Pax6, Apc.
  - Gene symbols should not be confused with protein names (which are non-italic, all uppercase: TRP53 protein).

  ### Common-word gene disambiguation
  - Mouse gene symbols are less prone to common-word conflicts than Drosophila, but short symbols still need species context verification.
  - Check that context is biological and not an abbreviation for a non-gene entity.

  ### Multi-species disambiguation
  - Mouse p53 ortholog is Trp53 (NOT TP53 which is human, nor tp53 which is zebrafish).
  - Mouse Brca1 (NOT BRCA1 which is human).
  - When a paper uses both human and mouse nomenclature, carefully assign species based on surrounding strain/organism mentions.


  ### Shared gene validated-reference output contract
  - Stage retained gene mention/evidence findings through the builder tools only; the backend materializes them as `gene_mention_evidence` objects in `curatable_objects[]`. Do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]` yourself.
  - Each object must use `object_role: validated_reference`, `model_ref: GeneMentionEvidencePayload`, `definition_state: in_development`, `payload.mention`, evidence fields, and optional `payload.species`, `payload.taxon_hint`, `payload.data_provider_hint`, `payload.proposed_primary_external_id`, `payload.proposed_gene_symbol`, and `payload.proposed_taxon` when supported.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
