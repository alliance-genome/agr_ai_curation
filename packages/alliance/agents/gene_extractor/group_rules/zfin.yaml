group_id: ZFIN
content: |
  ## ZFIN-SPECIFIC RULES (Zebrafish Gene Extraction)

  ### Nomenclature conventions
  - Zebrafish gene symbols are italic, all lowercase: tp53, shha, bmp2b, fgf8a.
  - Duplicate genes from the teleost whole-genome duplication are distinguished by letter suffixes: shha/shhb, fgf8a/fgf8b.

  ### Common-word gene disambiguation
  - Zebrafish gene names are less commonly English words, but short lowercase symbols need species context.
  - Verify that lowercase gene-like strings in a zebrafish paper are actual gene mentions and not abbreviations.
  - Do not retain uppercase alphanumeric treatment or compound codes such as `SB225002` as zebrafish genes. If a paper mentions such a code as a drug, chemical treatment, reagent, screen compound, or phenotype trigger, exclude it with reason_code: `unsupported_entity_type`.
  - If a paper writes a real zebrafish gene in uppercase or mixed case, retain it only when the context explicitly supports a gene and include the lowercase ZFIN symbol as `payload.proposed_gene_symbol` or a paper/tool-supported identifier as `payload.proposed_primary_external_id`.

  ### Multi-species disambiguation
  - Zebrafish p53 ortholog is tp53 (lowercase, NOT TP53 which is human, nor Trp53 which is mouse).
  - Zebrafish gene symbols are all lowercase, so a paper mentioning "tp53" in a zebrafish context refers to the zebrafish gene.
  - When a paper studies both zebrafish and mammals, use strain (AB, TU, WIK) and species mentions to disambiguate.


  ### Shared gene validated-reference output contract
  - Stage retained gene mention/evidence findings through the builder tools only; the backend materializes them as `gene_mention_evidence` objects in `curatable_objects[]`. Do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]` yourself.
  - Each object must use `object_role: validated_reference`, `model_ref: GeneMentionEvidencePayload`, `definition_state: in_development`, `payload.mention`, evidence fields, and optional `payload.species`, `payload.taxon_hint`, `payload.data_provider_hint`, `payload.proposed_primary_external_id`, `payload.proposed_gene_symbol`, and `payload.proposed_taxon` when supported.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
