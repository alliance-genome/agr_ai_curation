group_id: ZFIN
content: |
  ## ZFIN-SPECIFIC RULES (Zebrafish Gene Extraction)

  ### Nomenclature conventions
  - Zebrafish gene symbols are italic, all lowercase: tp53, shha, bmp2b, fgf8a.
  - Duplicate genes from the teleost whole-genome duplication are distinguished by letter suffixes: shha/shhb, fgf8a/fgf8b.

  ### Common-word gene disambiguation
  - Zebrafish gene names are less commonly English words, but short lowercase symbols need species context.
  - Verify that lowercase gene-like strings in a zebrafish paper are actual gene mentions and not abbreviations.

  ### Multi-species disambiguation
  - Zebrafish p53 ortholog is tp53 (lowercase, NOT TP53 which is human, nor Trp53 which is mouse).
  - Zebrafish gene symbols are all lowercase, so a paper mentioning "tp53" in a zebrafish context refers to the zebrafish gene.
  - When a paper studies both zebrafish and mammals, use strain (AB, TU, WIK) and species mentions to disambiguate.


  ### Shared gene validated-reference output contract
  - Emit retained gene mention/evidence findings only as `gene_mention_evidence` objects in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Each object must use `object_role: validated_reference`, `model_ref: GeneMentionEvidencePayload`, `definition_state: in_development`, `payload.primary_external_id`, `payload.gene_symbol`, `payload.taxon`, `payload.evidence_record_id`, and verified evidence locator fields.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
