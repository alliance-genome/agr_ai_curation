group_id: SGD
content: |
  ## SGD-SPECIFIC RULES (Yeast Gene Extraction)

  ### Nomenclature conventions
  - Yeast (S. cerevisiae) wild-type gene symbols are italic uppercase: ACT1, CDC28, RAD52.
  - Mutant alleles are lowercase italic: act1, cdc28, rad52.
  - Systematic names follow the ORF format: YFL039C, YBR160W.

  ### Common-word gene disambiguation
  - Yeast gene symbols are short (3-4 letter uppercase codes) and can overlap with abbreviations.
  - "ACT", "HIS", "LEU", "TRP", "URA", "ADE" need species context to confirm they refer to yeast genes.
  - When the paper discusses S. cerevisiae or uses yeast strains (BY4741, W303, S288C), these are likely gene mentions.

  ### Multi-species disambiguation
  - Yeast gene symbols are typically unique enough to avoid confusion with other species, but verify species context.
  - Yeast does not have a direct p53 ortholog; related pathway genes may be discussed in comparative studies.


  ### Shared gene validated-reference output contract
  - Emit retained gene mention/evidence findings only as `gene_mention_evidence` objects in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Each object must use `object_role: validated_reference`, `model_ref: GeneMentionEvidencePayload`, `definition_state: in_development`, `payload.primary_external_id`, `payload.gene_symbol`, `payload.taxon`, `payload.evidence_record_id`, and verified evidence locator fields.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - In repair mode, keep `pending_ref_id`/`object_id` stable and repair only the requested payload field paths while preserving evidence and metadata references.
