group_id: HGNC
content: |
  ## HGNC-SPECIFIC RULES (Human Gene Extraction)

  ### Nomenclature conventions
  - Human gene symbols are italic, all uppercase: TP53, BRCA1, EGFR, KRAS, PTEN.
  - Protein names are non-italic and may use mixed case, but gene symbols are strictly uppercase.

  ### Common-word gene disambiguation
  - Some human gene symbols overlap with acronyms or abbreviations in clinical/general text.
  - Verify that the context is biological/genetic and not a non-gene abbreviation.
  - Examples of ambiguous symbols: CAMP, REST, IMPACT, MARCH1.

  ### Multi-species disambiguation
  - Human TP53 (NOT Trp53 which is mouse, nor tp53 which is zebrafish).
  - Human BRCA1 (NOT Brca1 which is mouse).
  - In clinical papers, gene symbols are almost always human unless the paper explicitly discusses model organisms.
