group_id: WB
content: |
  ## WB-SPECIFIC RULES (C. elegans Gene Extraction)

  ### Nomenclature conventions
  - C. elegans gene names are lowercase italic, 3-letter code + hyphen + number: daf-16, unc-86, let-7, par-3.
  - Cosmid-based names (e.g., F49H12.4) are also valid gene identifiers.

  ### Common-word gene disambiguation
  - Many C. elegans genes have names that overlap with English words or short codes.
  - "let-*", "unc-*", "daf-*" patterns are almost always genes when the hyphen-number suffix is present.
  - Bare "let" or "unc" alone (without the hyphen-number) is NOT a gene mention.
  - Other common-word genes: eat-*, egl-*, mec-*, osm-*, sem-*, vab-*.

  ### Multi-species disambiguation
  - C. elegans p53 ortholog is cep-1, NOT "p53". If a paper mentions "p53" in a C. elegans context, the gene is cep-1.
  - When a paper studies both C. elegans and another species, use strain/species mentions near each gene symbol to disambiguate.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - Each curatable object should include `object_type`, `object_role`, `payload`, `evidence_record_ids`, `metadata_refs`, and either `object_id` or `pending_ref_id`; include `schema_ref` or `model_ref`, definition-state notes, field/object refs, and `repair_hints` when available.
  - In repair mode, keep object IDs stable and repair only the affected payload fields while preserving evidence and metadata references.
