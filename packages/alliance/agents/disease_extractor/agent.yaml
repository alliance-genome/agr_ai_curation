# =============================================================================
# AGENT DEFINITION: disease_extractor
# =============================================================================
# Extracts experimentally supported disease assertions from uploaded PDFs.
# Tool name generated at runtime: ask_disease_extractor_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: disease_extractor

name: "Disease Extraction Agent"

description: >
  Extracts disease assertions from uploaded PDFs as DiseaseAnnotation pending
  assertion domain-envelope objects with evidence-first inclusion/exclusion
  decisions and validator-owned normalization.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Use for extracting experimentally supported disease assertions from the
    loaded paper. Returns DiseaseAnnotation curatable_objects[] with pending
    disease assertion payloads, required context blockers, and non-semantic
    metadata for raw mentions, exclusions, ambiguities, evidence,
    normalization notes, and curator review handoff.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
# Builder tool-loop: record evidence -> stage disease observations -> finalize. Mirrors the
# phenotype builder tool set. The active validator bindings resolve the staged DOID/subject/relation/
# ECO/data-provider inputs inline, so there is no controlled-field resolver loop here.
tools:
  - search_document
  - read_chunk
  - read_section
  - read_subsection
  - record_evidence
  - list_recorded_evidence
  - get_recorded_evidence
  - attach_evidence_to_object
  - detach_evidence_from_object
  - discard_recorded_evidence
  - update_recorded_evidence_metadata
  - get_agent_contract
  - agr_species_context_lookup
  # GROUNDING (experimental conditions): the same extractor-side lookup tools gene_expression
  # uses. Used to ground condition terms to REAL CURIEs while reading — ZECO condition
  # class/id via the ontology term helpers declared on condition_relations.conditions.* —
  # rather than guessing obscure ontology CURIEs from memory.
  - search_domain_field_terms
  - inspect_ontology_term
  - resolve_domain_field_term
  - stage_disease_observation
  - patch_disease_observation
  - discard_disease_observation
  - list_staged_disease_observations
  - finalize_disease_extraction

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
# Builder-pattern agents are FORBIDDEN an output schema; the backend materializes
# DiseaseExtractionResultEnvelope from staged builder state (see streaming_tools forbid-output-schema
# guard + builder-materializer detection).
output_schema: null

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_DISEASE_EXTRACTOR_MODEL:-gpt-5.5}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "🏥"
  show_in_palette: true

# -----------------------------------------------------------------------------
# CURATION ROUTING
# -----------------------------------------------------------------------------
curation:
  adapter_key: "disease"
  domain_pack_id: "agr.alliance.disease"
  launchable: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
