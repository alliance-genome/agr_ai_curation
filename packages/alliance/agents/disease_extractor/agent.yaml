# =============================================================================
# AGENT DEFINITION: disease_extractor
# =============================================================================
# Extracts experimentally supported disease assertions from uploaded PDFs.
# Tool name generated at runtime: ask_disease_extractor_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: disease_extractor

name: "Disease Extraction Agent"

description: >
  Extracts disease assertions from uploaded PDFs as DiseaseAnnotation pending
  assertion domain-envelope objects with evidence-first inclusion/exclusion
  decisions and validator-owned normalization.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Use for extracting experimentally supported disease assertions from the
    loaded paper. Returns DiseaseAnnotation curatable_objects[] with pending
    disease assertion payloads, required context blockers, and non-semantic
    metadata for raw mentions, exclusions, ambiguities, evidence,
    normalization notes, and curator review handoff.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - search_document
  - read_section
  - read_subsection
  - record_evidence
  - get_agent_contract
  - agr_species_context_lookup

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: DiseaseExtractionResultEnvelope

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_DISEASE_EXTRACTOR_MODEL:-gpt-4o}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "🏥"
  show_in_palette: true

# -----------------------------------------------------------------------------
# CURATION ROUTING
# -----------------------------------------------------------------------------
curation:
  adapter_key: "disease"
  domain_pack_id: "agr.alliance.disease"
  launchable: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
