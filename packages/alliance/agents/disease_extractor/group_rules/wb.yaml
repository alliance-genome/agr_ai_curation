group_id: WB
content: |
  ## WB-SPECIFIC RULES (C. elegans Disease Extraction)

  ### Disease model context
  - C. elegans is widely used to model conserved-pathway human diseases.
  - When a paper describes a C. elegans model of a human disease, capture the human disease
    and note model_context as the role.

  ### Common C. elegans disease model areas
  - Neurodegeneration: Alzheimer's (amyloid/tau models), Parkinson's (alpha-synuclein, LRRK2),
    Huntington's (polyglutamine expansions), ALS (SOD1, TDP-43, FUS).
  - Aging-related diseases: insulin signaling pathway (daf-2/daf-16) and metabolic disease models.
  - Muscular dystrophy: dystrophin pathway genes (dys-1).
  - Rare/metabolic diseases: lysosomal storage disorders, mitochondrial diseases.

  ### Worm phenotype vs human disease
  - "Neurodegeneration in a C. elegans mutant" describes a worm phenotype, not the human disease itself.
  - Capture the human disease name when explicitly stated (e.g., "model of Alzheimer's disease").
  - The worm phenotype (e.g., "neuronal cell death") goes to phenotype_extractor.


  ### Shared domain-envelope output contract
  - Stage retained semantic findings with `stage_disease_assertion_evidence`; do not hand-author `curatable_objects[]` or top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Use builder fields `disease_name` plus optional `disease_curie`; do not use legacy flat `normalized_id` or `normalized_label` fields.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
  - Surface incomplete subject, reference, evidence-code, data-provider, or concrete write-target context with blocked write behavior and definition-state notes rather than inventing values.
