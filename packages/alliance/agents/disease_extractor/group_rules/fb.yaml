group_id: FB
content: |
  ## FB-SPECIFIC RULES (Drosophila Disease Extraction)

  ### Disease model context
  - Drosophila is extensively used to model human diseases, especially neurological and developmental disorders.
  - When a paper describes a Drosophila model of a human disease, capture the human disease
    and note model_context as the role.
  - "Drosophila model of polyglutamine disease" → capture the human disease (polyglutamine disease),
    note the model organism context.

  ### Common Drosophila disease model areas
  - Neurodegeneration: Alzheimer's (APP, tau), Parkinson's (LRRK2, alpha-synuclein, parkin, PINK1),
    Huntington's (polyglutamine), ALS (TDP-43, FUS, SOD1), spinocerebellar ataxias.
  - Cancer: RAS/RAF signaling models, tumor suppressor (Rb, p53) studies, growth control.
  - Developmental disorders: Notch signaling disorders, Hedgehog pathway disorders.
  - Cardiac disease: cardiomyopathy models using cardiac-specific expression.
  - Metabolic disease: diabetes-like models, lipid storage disorders.

  ### Fly phenotype vs human disease
  - "Motor defects in LRRK2 mutant flies" describes fly phenotypes — these go to phenotype_extractor.
  - The human disease reference ("Parkinson's-like") is disease model context — capture here.
  - Do NOT exclude disease mentions just because they appear in a Drosophila study.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - Each curatable object should include `object_type`, `object_role`, `payload`, `evidence_record_ids`, `metadata_refs`, and either `object_id` or `pending_ref_id`; include `schema_ref` or `model_ref`, definition-state notes, field/object refs, and `repair_hints` when available.
  - In repair mode, keep object IDs stable and repair only the affected payload fields while preserving evidence and metadata references.
