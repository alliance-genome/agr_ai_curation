group_id: HGNC
content: |
  ## HGNC-SPECIFIC RULES (Human Disease Extraction)

  ### Direct clinical associations
  - Human studies provide direct gene-disease associations rather than model-based evidence.
  - Clinical papers typically describe disease in patients or families, not in model organisms.
  - GWAS findings identify genetic risk factors (contributes_to association type).

  ### Common human disease study types
  - Mendelian disease: loss-of-function or gain-of-function variants causing disease (is_implicated_in).
  - Complex/common disease: GWAS associations, polygenic risk (contributes_to).
  - Cancer genomics: driver mutations, tumor suppressor loss, oncogene activation.
  - Pharmacogenomics: gene variants affecting drug response.
  - Biomarker studies: gene products as diagnostic/prognostic markers (is_marker_for).

  ### Clinical nomenclature
  - Diseases may be referred to by OMIM numbers (e.g., "OMIM #606764").
  - Clinical syndromes may have eponymous names (e.g., "Lynch syndrome", "Marfan syndrome").
  - Cancer types follow WHO/ICD classification terminology.
  - For retained `DiseaseAnnotation` objects, use Alliance-supported Disease Ontology labels in `disease_annotation_object.name`; include `disease_annotation_object.curie` only when an exact DOID is evidence-backed, and preserve unresolved MONDO, OMIM, synonym, or alternate ontology candidates in metadata normalization notes.

  ### Phenotype vs disease in clinical context
  - Individual clinical features (e.g., "aortic root dilation") are phenotypes → phenotype_extractor.
  - The named disease/syndrome (e.g., "Marfan syndrome") is a disease → capture here.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only as `DiseaseAnnotation` pending assertions in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Use `object_role: "curatable_unit"`, `model_ref: "PendingDiseaseAssertionPayload"`, `definition_state: "in_development"`, and payload field `disease_annotation_object.name` plus optional `disease_annotation_object.curie`; do not use legacy flat `normalized_id` or `normalized_label` fields.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
  - Surface incomplete subject, reference, evidence-code, data-provider, or concrete write-target context with blocked write behavior and definition-state notes rather than inventing values.
