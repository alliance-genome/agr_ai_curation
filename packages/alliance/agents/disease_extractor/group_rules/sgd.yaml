group_id: SGD
content: |
  ## SGD-SPECIFIC RULES (Yeast Disease Extraction)

  ### Disease model context
  - Yeast (S. cerevisiae) models human disease through conserved pathway studies.
  - Yeast does not "have" human diseases — it models conserved molecular mechanisms.
  - When a paper describes a yeast study relevant to a human disease, capture the human disease
    and note model_context as the role.

  ### Common yeast disease model areas
  - Cancer: cell cycle checkpoint genes (p53 pathway homologs, Rb pathway), DNA repair (BRCA pathway).
  - Neurodegeneration: protein aggregation models (alpha-synuclein, polyglutamine, TDP-43 expressed in yeast).
  - Metabolic disease: amino acid metabolism disorders, mitochondrial diseases.
  - Aging: replicative and chronological lifespan studies relevant to aging-related diseases.
  - Rare genetic diseases: complementation studies using human disease genes in yeast.

  ### Yeast-specific considerations
  - Yeast phenotypes (growth defects, stress sensitivity) are phenotypes, not diseases.
  - Only capture disease mentions when the paper explicitly connects yeast findings to a human disease.
  - Humanized yeast (expressing human disease genes) provides model_context evidence.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only as `DiseaseAnnotation` pending assertions in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Use `object_role: "curatable_unit"`, `model_ref: "PendingDiseaseAssertionPayload"`, `definition_state: "in_development"`, and payload field `disease_annotation_object.name` plus optional `disease_annotation_object.curie`; do not use legacy flat `normalized_id` or `normalized_label` fields.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
  - Surface incomplete subject, reference, evidence-code, data-provider, or concrete write-target context with blocked write behavior and definition-state notes rather than inventing values.
