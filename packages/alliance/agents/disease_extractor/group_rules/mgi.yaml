group_id: MGI
content: |
  ## MGI-SPECIFIC RULES (Mouse Disease Extraction)

  ### Disease model context
  - Mouse is the primary mammalian model for human disease research.
  - When a paper describes a mouse model of a human disease, capture the human disease
    and note model_context as the role.
  - For retained mouse disease-model assertions, include `payload.data_provider.abbreviation: MGI` as the required LinkML data-provider selector hint.
  - "APP/PS1 mouse model of Alzheimer's disease" → the disease is Alzheimer's disease;
    the APP/PS1 mouse model is the experimental system.

  ### Common mouse disease model areas
  - Neurodegeneration: Alzheimer's (APP/PS1, 5xFAD, 3xTg-AD), Parkinson's, ALS (SOD1-G93A), Huntington's (R6/2).
  - Cancer: conditional tumor models (using Cre-lox), xenograft models, genetically engineered mouse models (GEMMs).
  - Metabolic disease: diabetes (db/db, ob/ob, diet-induced obesity), atherosclerosis (ApoE-/-, LDLR-/-).
  - Immune/inflammatory: autoimmune models (EAE, colitis), immunodeficiency (SCID, NSG).
  - Cardiovascular: hypertension models, cardiac hypertrophy, cardiomyopathy.
  - Developmental: skeletal dysplasias, craniofacial disorders, organ formation defects.

  ### Targeted mutation disease associations
  - Mouse gene knockouts are the primary tool for establishing gene-disease relationships.
  - "is_implicated_in" associations often come from mouse knockout/knockin phenotypes that recapitulate human disease.
  - Conditional knockouts may model tissue-specific disease manifestations.


  ### Shared domain-envelope output contract
  - Stage retained semantic findings through the builder tools only; the backend materializes them as `DiseaseAnnotation` pending assertions in `curatable_objects[]`. Do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]` yourself.
  - Use `object_role: "curatable_unit"`, `model_ref: "PendingDiseaseAssertionPayload"`, `definition_state: "in_development"`, and payload field `disease_annotation_object.name` plus optional `disease_annotation_object.curie`; do not use legacy flat `normalized_id` or `normalized_label` fields.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
  - Surface incomplete subject, reference, evidence-code, or concrete write-target context with blocked write behavior and definition-state notes rather than inventing values. `data_provider.abbreviation` is required for retained DiseaseAnnotation objects; if provider context is unclear, preserve the candidate as ambiguity/exclusion metadata instead of emitting a retained object.
