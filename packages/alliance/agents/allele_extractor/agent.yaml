# =============================================================================
# AGENT DEFINITION: allele_extractor
# =============================================================================
# Extracts experimentally supported allele/variant assertions from uploaded PDFs.
# Tool name generated at runtime: ask_allele_extractor_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: allele_extractor

name: "Allele/Variant Extraction Agent"

description: >
  Extracts allele and variant assertions from uploaded PDFs with evidence-first
  inclusion/exclusion decisions and validator-ready identity hints.

category: "Extraction"
subcategory: "PDF Extraction"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: true
  description: >
    Use for extracting allele/variant assertions from the loaded paper,
    including exact notation, gene context, and explicit exclusion reasons.
  batchable: false  # Document-based agent, processes one document at a time

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
# Builder tool-loop: record evidence -> stage allele observations -> finalize. Mirrors the gene
# builder tool set. Allele is mention-only: the active allele_mention_reference_validation binding
# owns allele identity, so there is no controlled-field resolver loop here.
tools:
  - search_document
  - read_chunk
  - read_section
  - read_subsection
  - record_evidence
  - list_recorded_evidence
  - get_recorded_evidence
  - attach_evidence_to_object
  - detach_evidence_from_object
  - discard_recorded_evidence
  - update_recorded_evidence_metadata
  - get_agent_contract
  - agr_species_context_lookup
  - stage_allele_observation
  - patch_allele_observation
  - discard_allele_observation
  - list_staged_allele_observations
  - find_staged_allele_observations
  - finalize_allele_extraction

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
# Builder-pattern agents are FORBIDDEN an output schema; the backend materializes
# AlleleExtractionResultEnvelope from staged builder state (see streaming_tools forbid-output-schema
# guard + builder-materializer detection).
output_schema: null

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_ALLELE_EXTRACTOR_MODEL:-gpt-5.6-sol}"
  temperature: 0.1
  reasoning: "medium"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: true
required_params:
  - document_id
  - user_id

batch_capabilities:
  - pdf_extraction

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "🧬"
  show_in_palette: true

# -----------------------------------------------------------------------------
# CURATION ROUTING
# -----------------------------------------------------------------------------
curation:
  adapter_key: "allele"
  domain_pack_id: "agr.alliance.allele"
  launchable: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: true
