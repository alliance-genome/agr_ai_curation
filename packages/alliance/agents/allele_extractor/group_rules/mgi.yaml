group_id: MGI
content: |
  ## MGI-SPECIFIC RULES (Mouse Allele Extraction)

  ### Nomenclature conventions
  - Targeted mutations: gene<tm#Lab> — e.g., Trp53<tm1Tyj>, Brca1<tm1Brd>.
  - Gene-trap alleles: gene<Gt(construct)Lab> — e.g., Apc<Gt(ROSA)26Sor>.
  - Spontaneous/induced alleles: gene<allele> — e.g., Apc<Min>, Kit<W>.
  - Conditional alleles: gene<tm#(flox)Lab> or gene<fl> notation.

  ### Transgenes (exclude from curatable_objects[])
  - Transgene notation: Tg(construct)### — e.g., Tg(Camk2a-cre)T29-1Stl.
  - Cre driver lines (Tg(promoter-Cre)) are tools for conditional genetics, NOT alleles.
  - Reporter transgenes (Tg(promoter-GFP), ROSA26 reporters) are tools.
  - Do not stage transgene constructs as alleles unless the transgene IS the experimental variable (the system still records them for audit).

  ### Strain disambiguation
  - C57BL/6 (B6), BALB/c, 129S1, FVB/N, DBA/2 are inbred mouse strains — NOT alleles.
  - Mixed background notations (e.g., "B6;129") describe strain background.
  - Congenic/consomic strain designations are background context, not alleles.
  - Strain names belong in strain context, not in curatable_objects[].

  ### Knockout/knockin conventions
  - "Knockout" or "KO" alleles are targeted null alleles (tm notation).
  - "Knockin" or "KI" alleles are targeted replacement alleles.
  - Conditional knockouts require Cre-mediated recombination — note the Cre driver separately from the floxed allele.

  ### Lab-code and attribution context for validator hints
  - MGI engineered allele superscripts often end with a creator or institution lab code:
    `tm1.1Hko` -> Haruhiko Koseki, `em1Cya` -> Cyagen Biosciences, `em1Gpt` -> GemPharmatech.
  - Do not validate or search MGI allele symbols during extraction. Active allele
    validator bindings own final allele identity and database-backed
    normalization.
  - Preserve the exact allele notation supplied by the paper as
    `mention.text`. When the paper itself gives a stable identifier or explicit
    normalized notation, preserve that as `mention.normalized_hint`.
  - Preserve paper-backed context that can help validation, such as the gene
    discussed in the paper, allele type described there (null, floxed,
    knockin, endonuclease-mediated, etc.), author/lab-code clues,
    acknowledgements, repositories, and company/institution mentions.
  - Treat lab-code, author, institution, and allele-type reasoning as curator
    and validator context, not as final identity resolution.
  - If the paper gives only a gene plus knockout/conditional wording, keep the
    exact wording and paper-backed gene/taxon context in the envelope; do not
    fabricate a likely MGI allele symbol.
  - If multiple same-gene candidates might fit from paper context alone, still
    stage the allele with the paper wording you have and leave that field for
    the validator rather than guessing.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and curator review notes under `metadata.*` as non-semantic envelope metadata.
  - Each curatable object should include `object_type`, `object_role`, `payload`, `evidence_record_ids`, `metadata_refs`, and either `object_id` or `pending_ref_id`; include `schema_ref` or `model_ref`, definition-state notes, and field/object refs when available.
