group_id: RGD
content: |
  ## RGD-SPECIFIC RULES (Rat Allele Extraction)

  ### Nomenclature conventions
  - Rat allele nomenclature follows mouse conventions: gene<allele> format.
  - Targeted mutations: gene<tm#Lab> — similar to MGI conventions.
  - Spontaneous mutations: gene<allele_name>.
  - ENU-induced alleles are common in rat forward genetics studies.

  ### Transgene constructs (exclude from alleles[])
  - Transgene notation follows mouse conventions: Tg(construct)###.
  - Reporter constructs are tools, not alleles.
  - Capture in raw_mentions[] but exclude from alleles[] unless the transgene IS the experimental variable.

  ### Strain disambiguation
  - Sprague-Dawley (SD), Wistar, Fischer 344 (F344), Lewis, Brown Norway (BN) are inbred/outbred rat strains — NOT alleles.
  - Congenic and consomic strain designations describe genetic background, not specific alleles.
  - Strain names belong in strain context, not in alleles[].

  ### Pharmacological models
  - Rat studies frequently use pharmacological induction rather than genetic alleles.
  - Drug treatments (streptozotocin, 6-OHDA) are experimental conditions, NOT alleles.
  - Only capture genetic alleles/variants, not pharmacological interventions.
