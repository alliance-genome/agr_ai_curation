group_id: FB
content: |
  ## FB-SPECIFIC RULES (Drosophila Allele Extraction)

  ### Nomenclature conventions
  - Format: gene[allele] with brackets or superscript — e.g., w[1118], N[55e11], sev[S11].
  - P-element insertions: P{construct}insertion_site — e.g., P{GAL4}elav, P{UAS-GFP}.
  - FRT-mediated alleles and CRISPR alleles follow lab-specific naming conventions.

  ### Balancers (exclude from alleles[])
  - Balancer chromosomes are genetic tools, NOT alleles of specific genes.
  - Common balancers: FM7, FM7a, FM7c (X chromosome); CyO (chromosome 2); TM3, TM6B, TM6C (chromosome 3).
  - Capture in raw_mentions[] but exclude from alleles[] with reason_code: balancer_or_deficiency.

  ### Deficiencies and duplications (exclude from alleles[])
  - Deficiencies: Df(chromosome_arm)name — e.g., Df(3R)Exel6197. These are chromosomal deletions.
  - Duplications: Dp(chromosome_arm)name. These are chromosomal tools.
  - Exclude from alleles[] with reason_code: balancer_or_deficiency.

  ### Strain disambiguation
  - Canton-S (CS) and Oregon-R (OR) are standard wild-type strains — NOT alleles.
  - w1118 is debatable — it IS a specific allele of the white gene, but is often used only as a genetic background.
    If the paper uses w1118 only as a background strain and not experimentally, exclude with reason_code: background_genotype_only.
  - Other common background stocks: yw (yellow white), OreR.

  ### GAL4/UAS system
  - GAL4 drivers and UAS responders are transgenic tools.
  - Exclude from alleles[] unless the GAL4 or UAS construct is itself the subject of study.
