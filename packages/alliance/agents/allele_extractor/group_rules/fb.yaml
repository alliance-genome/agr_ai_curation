group_id: FB
content: |
  ## FB-SPECIFIC RULES (Drosophila Allele Extraction)

  ### Nomenclature conventions
  - Format: gene[allele] with brackets or superscript — e.g., w[1118], N[55e11], sev[S11].
  - P-element insertions: P{construct}insertion_site — e.g., P{GAL4}elav, P{UAS-GFP}.
  - FRT-mediated alleles and CRISPR alleles follow lab-specific naming conventions.

  ### Balancers (exclude from curatable_objects[])
  - Balancer chromosomes are genetic tools, NOT alleles of specific genes.
  - Common balancers: FM7, FM7a, FM7c (X chromosome); CyO (chromosome 2); TM3, TM6B, TM6C (chromosome 3).
  - Capture in metadata.raw_mentions[] but exclude from curatable_objects[] with reason_code: balancer_or_deficiency.

  ### Deficiencies and duplications (exclude from curatable_objects[])
  - Deficiencies: Df(chromosome_arm)name — e.g., Df(3R)Exel6197. These are chromosomal deletions.
  - Duplications: Dp(chromosome_arm)name. These are chromosomal tools.
  - Exclude from curatable_objects[] with reason_code: balancer_or_deficiency.

  ### Strain disambiguation
  - Canton-S (CS) and Oregon-R (OR) are standard wild-type strains — NOT alleles.
  - w1118 is debatable — it IS a specific allele of the white gene, but is often used only as a genetic background.
    If the paper uses w1118 only as a background strain and not experimentally, exclude with reason_code: background_genotype_only.
  - Other common background stocks: yw (yellow white), OreR.

  ### GAL4/UAS system
  - GAL4 drivers and UAS responders are transgenic tools.
  - Exclude from curatable_objects[] unless the GAL4 or UAS construct is itself the subject of study.


  ### Shared domain-envelope output contract
  - Emit retained semantic findings only in `curatable_objects[]`; do not emit top-level `items[]`, `annotations[]`, `genes[]`, `alleles[]`, `diseases[]`, `chemicals[]`, or `phenotypes[]`.
  - Preserve harvested mentions, exclusions, ambiguities, verified evidence, normalization notes, provenance, and repair notes under `metadata.*` as non-semantic envelope metadata.
  - Each curatable object should include `object_type`, `object_role`, `payload`, `evidence_record_ids`, `metadata_refs`, and either `object_id` or `pending_ref_id`; include `schema_ref` or `model_ref`, definition-state notes, field/object refs, and `repair_hints` when available.
  - In repair mode, keep object IDs stable and repair only the affected payload fields while preserving evidence and metadata references.
