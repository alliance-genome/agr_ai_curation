# =============================================================================
# AGENT DEFINITION: controlled_vocabulary
# =============================================================================
# Validates Alliance controlled vocabulary term fields against package tools.
# Tool name generated at runtime: ask_controlled_vocabulary_specialist
# =============================================================================

agent_id: controlled_vocabulary_validation

name: "Controlled Vocabulary Validation Agent"

description: >
  Validates Alliance controlled vocabulary rows by vocabulary name, term name,
  abbreviation, and synonym without treating vocabulary terms as ontology
  identities.

category: "Validation"
subcategory: "Data Validation"

supervisor_routing:
  enabled: false

  description: >
    Use for validating controlled vocabulary backed fields such as disease
    relations, condition relation types, expression relations, quantity units,
    and other VocabularyTerm payload snapshots.
  batchable: true
  batching_instructions: >
    When validating multiple vocabulary terms, combine them into one request
    with one target per term and preserve each target's vocabulary, term name,
    abbreviation, synonym, and obsolete-term policy.

tools:
  - get_agent_contract
  - agr_curation_query

output_schema: ControlledVocabularyValidationResult

structured_finalization:
  enabled: true
  tool_name: finalize_controlled_vocabulary_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: agr_curation_query
    provider_terms:
      - agr_curation_query
    request_keys:
      - internal_id
      - internal_ids
      - vocabulary
      - vocabularies
      - term_name
      - term_names
      - abbreviation
      - abbreviations
      - synonym
      - synonyms
      - term
      - terms
    result_collections:
      - resolved_values
      - resolved_objects
      - controlled_vocabulary_candidates
      - candidates
    grounded_fact_paths:
      - controlled_vocabulary_candidates[].internal_id
      - controlled_vocabulary_candidates[].vocabulary
      - controlled_vocabulary_candidates[].term_name
      - controlled_vocabulary_candidates[].abbreviation
      - controlled_vocabulary_candidates[].vocabulary_label
      - candidates[].value
      - candidates[].label
    resolved_fact_paths:
      - resolved_values
      - resolved_objects[]
      - controlled_vocabulary_candidates[]
    fact_identity_paths:
      - resolved_values.internal_id
      - resolved_values.vocabulary
      - resolved_values.term_name
      - resolved_values.abbreviation
      - resolved_values.vocabulary_label
      - resolved_objects[].internal_id
      - resolved_objects[].vocabulary
      - resolved_objects[].term_name
      - resolved_objects[].abbreviation
      - controlled_vocabulary_candidates[].internal_id
      - controlled_vocabulary_candidates[].vocabulary
      - controlled_vocabulary_candidates[].term_name
      - controlled_vocabulary_candidates[].abbreviation
      - controlled_vocabulary_candidates[].vocabulary_label

model_config:
  model: "${AGENT_CONTROLLED_VOCABULARY_MODEL:-gpt-5.6-terra}"
  temperature: 0.1
  reasoning: "medium"

requires_document: false
required_params: []

batch_capabilities:
  - domain_validator_batch

frontend:
  icon: "🏷️"
  show_in_palette: true

group_rules_enabled: false
