# =============================================================================
# AGENT DEFINITION: disease
# =============================================================================
# Maps disease terms to Disease Ontology (DOID) identifiers.
# Tool name generated at runtime: ask_disease_specialist
# =============================================================================

# -----------------------------------------------------------------------------
# BASIC INFORMATION
# -----------------------------------------------------------------------------
agent_id: disease_validation

name: "Disease Ontology Agent"

description: >
  Maps disease terms to Disease Ontology (DOID) identifiers.
  Supports lookup by disease name, synonym, or DOID.

category: "Validation"
subcategory: "Data Validation"

# -----------------------------------------------------------------------------
# SUPERVISOR ROUTING
# -----------------------------------------------------------------------------
# Tool name is generated at runtime as: ask_{folder}_specialist
supervisor_routing:
  enabled: false

  description: >
    Use for mapping disease terms to DOID identifiers, looking up disease names,
    finding disease synonyms, or disease ontology queries.
  batchable: true
  batching_instructions: >
    When mapping multiple diseases, combine them into a single request.
    Example: "Map these diseases: Alzheimer disease, diabetes mellitus, cancer"

# -----------------------------------------------------------------------------
# TOOLS
# -----------------------------------------------------------------------------
tools:
  - get_agent_contract
  - agr_curation_query

# -----------------------------------------------------------------------------
# OUTPUT SCHEMA
# -----------------------------------------------------------------------------
output_schema: DiseaseValidationResult

structured_finalization:
  enabled: true
  tool_name: finalize_disease_lookup
  checks:
    - lookup_provenance
  lookup:
    tool_name: agr_curation_query
    provider_terms:
      - agr_curation_query
    request_keys:
      - curie
      - curies
      - doid
      - doids
      - disease
      - diseases
      - disease_name
      - disease_names
      - label
      - labels
      - name
      - names
    result_collections:
      - resolved_values
      - resolved_objects
      - candidates
    grounded_fact_paths:
      - candidates[].value
      - candidates[].label
      - candidates[].details.curie
      - candidates[].details.name
      - candidates[].details.ontology_type
    resolved_fact_paths:
      - resolved_values
      - resolved_objects[]
    fact_identity_paths:
      - resolved_values.curie
      - resolved_values.doid
      - resolved_values.label
      - resolved_values.name
      - resolved_values.ontology_term_type
      - resolved_objects[].curie
      - resolved_objects[].id
      - resolved_objects[].name
      - resolved_objects[].label
      - resolved_objects[].ontology_type

# -----------------------------------------------------------------------------
# MODEL CONFIGURATION
# -----------------------------------------------------------------------------
model_config:
  model: "${AGENT_DISEASE_MODEL:-gpt-5.4-mini}"
  temperature: 0.1
  reasoning: "high"

# -----------------------------------------------------------------------------
# EXECUTION REQUIREMENTS
# -----------------------------------------------------------------------------
requires_document: false
required_params: []

batch_capabilities: []

# -----------------------------------------------------------------------------
# FRONTEND DISPLAY
# -----------------------------------------------------------------------------
frontend:
  icon: "🏥"
  show_in_palette: true

# -----------------------------------------------------------------------------
# GROUP RULES
# -----------------------------------------------------------------------------
group_rules_enabled: false
