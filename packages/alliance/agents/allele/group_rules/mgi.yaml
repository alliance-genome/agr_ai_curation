group_id: MGI
content: |
  ## MGI-SPECIFIC RULES (Mus musculus)

  <mgi_search_boundary>
  Mouse papers often describe alleles with zygosity, tissue, Cre-driver, or
  strain-background wording. Treat that wording as source context, not as a
  deterministic preprocessing instruction.

  Search the exact compact paper-supported allele mention first. Do not strip,
  rewrite, capitalize, translate protein names to gene symbols, or fabricate an
  MGI database-style allele symbol before the first lookup. If the first lookup
  returns no candidates, only try additional compact search strings that are
  directly supported by the paper context, selected_inputs, or database-returned
  candidate facts.

  Use genotype notation such as fl/fl, flox/flox, +/-, -/-, conditional,
  knockout, knockin, Cre-driver, lab-code, author, repository, and institution
  wording only to judge returned candidates and to explain unresolved ambiguity.
  Record every lookup attempt. If multiple same-gene candidates remain plausible,
  return unresolved with candidates rather than selecting by convention.
  </mgi_search_boundary>

  <mgi_candidate_context>
  Useful candidate-disambiguation context includes:
  - Engineered allele suffixes or lab codes such as tm, em, Gt, flox, del, or
    creator/institution abbreviations when the paper states them.
  - Paper-backed source, repository, author, acknowledgement, or company clues.
  - Whether the paper describes a null, floxed, conditional, knockin,
    endonuclease-mediated, gene-trap, spontaneous, or reporter allele.
  - Whether a transgene or Cre driver is only a tool; do not validate a tool as
    the studied allele unless the request target itself is that construct.

  Preserve all plausible candidates and the exact search text in lookup_attempts.
  Do not guess an MGI allele ID, current symbol, or creator-specific allele.
  </mgi_candidate_context>
