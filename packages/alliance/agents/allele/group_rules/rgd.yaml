group_id: RGD
content: |
  ## RGD-SPECIFIC RULES (Rattus norvegicus)

  <rgd_search_boundary>
  Rat papers may describe alleles with zygosity, knockout, transgenic, strain,
  or source-lab wording. Treat those details as paper context for candidate
  interpretation, not as a local rule to rewrite the query.

  Search the exact compact paper-supported allele mention first. Do not strip
  +/+, +/-, -/-, translate symbols across species, force mouse-style
  capitalization, or guess an RGD database spelling before the first lookup. If
  that lookup returns no candidates, try only compact alternate strings that are
  directly supported by selected_inputs, the evidence quote, or database-returned
  candidate context.

  Use zygosity, knockout/transgenic wording, lab/source attribution, and strain
  background only to decide whether returned RGD candidates match the intended
  paper allele. If the paper lacks enough source context to distinguish multiple
  candidates, return unresolved with all useful candidates.
  </rgd_search_boundary>

  <rgd_candidate_context>
  Useful candidate-disambiguation context includes:
  - Full paper wording for the allele or variant.
  - Source institution, lab, repository, or vendor mentioned in the paper.
  - Allele type described in the evidence, such as knockout, endonuclease,
    targeted mutation, transgene, or spontaneous mutation.
  - Rat strain background as context only; strain names are not allele IDs.

  Preserve each lookup attempt and do not choose by result order, popularity,
  organism convention, or training-data knowledge.
  </rgd_candidate_context>
