  - tool_id: finalize_disease_extraction
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.disease_builder_tools:finalize_disease_extraction
    required_context: []
    description: Submit the run's draft disease annotation list so the specialists can confirm each one.
    source_file: python/src/agr_ai_curation_alliance/tools/disease_builder_tools.py
    metadata:
      name: Finalize Disease Extraction
      category: Database
      # Marks this tool as a builder-materializer finalize tool. The platform runtime derives the
      # set of builder finalize-tool names from this flag
      # (streaming_tools._builder_finalization_tool_names) so this is a domain-pack edit, not a
      # platform edit.
      builder_finalization: true
      builder_run_state: true
      audit:
        display_name: Finalize Disease Extraction
      documentation:
        summary: Takes the disease annotation drafts the agent settled on and hands them off for confirmation by the disease specialists, which confirm the disease term, the affected gene/allele/model, evidence codes, and provider against the Alliance database. The agent proposes the set; the specialists confirm the official identities and produce the records that curators review. The handoff turns each draft into the right kind of disease record (gene, allele, or model) based on the affected subject the agent chose.
        parameters:
          - name: candidate_ids
            type: array
            required: true
            description: The list of draft entries the agent wants to hand off for confirmation.
  - tool_id: search_document
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_search_document_tool
    required_context:
      - document_id
      - user_id
    description: Search the uploaded PDF for passages relevant to a query, using meaning-based matching, exact word matching, or a blend.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Search Document
      category: Document
      documentation:
        summary: Finds passages in the uploaded PDF that match a query. The default blended search combines meaning-based and exact-word matching, so it catches passages worded differently from the query (for example "expressed in" versus "detected in"). Exact-word matching is best for specific gene symbols, strains, alleles, probes, or identifiers, and very short queries automatically lean on exact-word matching. The search can be limited to particular sections, such as Results or figure legends. The matching passages can then be read in full to pick out exact supporting quotes.
        parameters:
        - name: query
          type: string
          required: true
          description: What to search the paper for.
        - name: limit
          type: integer
          required: false
          description: The most matching passages to return (default 5).
        - name: section_keywords
          type: array
          required: false
          description: Limit the search to certain sections, such as Methods or Results.
        - name: search_mode
          type: enum
          required: false
          description: 'How to match: by meaning (best for broad concepts), by exact words (best for specific symbols and IDs), or a blend. The default blends both.'
          enum:
          - auto
          - hybrid
          - lexical
          - hybrid_lexical_first
  - tool_id: read_chunk
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_read_chunk_tool
    required_context:
      - document_id
      - user_id
    description: Read the full text of one passage from the PDF and get back the exact pieces of it that can be saved as evidence.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Read Chunk
      category: PDF Extraction
      documentation:
        summary: Returns the complete text of one passage, pointers to the passages just before and after it, and the specific snippets within it that can be captured as supporting evidence. This is the step where evidence is chosen, since the snippets selected here become the exact verified quote on a saved piece of evidence.
        parameters:
        - name: chunk_id
          type: string
          required: true
          description: Which passage to read, taken from a search result or a section's list of passages.
  - tool_id: read_section
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_read_section_tool
    required_context:
      - document_id
      - user_id
    description: Read the full text of a named section of the paper.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Read Section
      category: PDF Extraction
      documentation:
        summary: Returns the complete text of every passage in a section, grouped by the paper's own structure rather than by page order, so it gives full coverage of the section even when a search might overlook a faintly matching passage. This is the way to read an entire section, including tables and figure legends. The individual passages it lists can then be read in full to pick out exact supporting quotes.
        parameters:
        - name: section_name
          type: string
          required: true
          description: The section to read, such as Methods or Introduction.
  - tool_id: read_subsection
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_read_subsection_tool
    required_context:
      - document_id
      - user_id
    description: Read the full text of a named subsection inside a section of the paper.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Read Subsection
      category: PDF Extraction
      documentation:
        summary: Returns the complete text of every passage in one subsection, grouped by the paper's own structure rather than by page order, so it gives full coverage of that subsection even when a search might overlook a faintly matching passage. This is the way to read a whole subsection, including its figure legends. The relevant passages can then be read in full to pick out exact supporting quotes.
        parameters:
        - name: section_name
          type: string
          required: true
          description: The section that contains the subsection.
        - name: subsection_name
          type: string
          required: true
          description: The subsection to read.
  - tool_id: record_evidence
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_record_evidence_tool
    required_context:
      - document_id
      - user_id
    description: Save one piece of supporting evidence from the PDF, using snippets picked out of a passage that was read.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Record Evidence
      category: PDF Extraction
      documentation:
        summary: Turns chosen snippets from a passage into a saved piece of evidence with the exact verified quote and where it came from in the paper. Each call saves one piece of evidence; if several snippets are chosen together, they are stored as one joined quote.
        parameters:
        - name: entity
          type: string
          required: true
          description: The thing this evidence is about (for example, the gene or allele name).
        - name: span_ids
          type: array[string]
          required: true
          description: The snippets to save, picked from a passage that was read.
  - tool_id: list_recorded_evidence
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_list_recorded_evidence_tool
    required_context:
      - document_id
      - user_id
    description: Review the evidence saved so far in this run before finishing.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: List Recorded Evidence
      category: PDF Extraction
      documentation:
        summary: Shows the pieces of evidence saved so far in this run, so the agent can confirm the full set of support before finishing. Withdrawn evidence is left out unless it is explicitly included.
        parameters:
        - name: include_discarded
          type: boolean
          required: false
          description: Also show evidence that was previously withdrawn.
        - name: object_id
          type: string
          required: false
          description: Show only evidence attached to this particular finding.
        - name: pending_ref_id
          type: string
          required: false
          description: Show only evidence attached to this particular draft finding.
  - tool_id: get_recorded_evidence
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_get_recorded_evidence_tool
    required_context:
      - document_id
      - user_id
    description: Look at one saved piece of evidence from this run in full detail.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Get Recorded Evidence
      category: PDF Extraction
      documentation:
        summary: Returns the complete details of one saved piece of evidence from this run.
        parameters:
        - name: evidence_record_id
          type: string
          required: true
          description: Which saved piece of evidence to look at.
  - tool_id: attach_evidence_to_object
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_attach_evidence_to_object_tool
    required_context:
      - document_id
      - user_id
    description: Link a saved piece of evidence to the finding it supports.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Attach Evidence To Object
      category: PDF Extraction
      documentation:
        summary: Connects a saved piece of evidence to a finding (or to a specific field of it), without changing the quote itself or where it came from.
        parameters:
        - name: evidence_record_id
          type: string
          required: true
          description: Which saved piece of evidence to link.
        - name: object_id
          type: string
          required: false
          description: The finding to link the evidence to.
        - name: pending_ref_id
          type: string
          required: false
          description: The draft finding to link the evidence to.
        - name: field_path
          type: string
          required: false
          description: The specific field this evidence supports, if it applies to just one field.
  - tool_id: detach_evidence_from_object
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_detach_evidence_from_object_tool
    required_context:
      - document_id
      - user_id
    description: Remove a link between a saved piece of evidence and a finding it was wrongly tied to.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Detach Evidence From Object
      category: PDF Extraction
      documentation:
        summary: Disconnects a saved piece of evidence from a finding (or from a specific field) it was linked to. The evidence itself stays saved.
        parameters:
        - name: evidence_record_id
          type: string
          required: true
          description: Which saved piece of evidence to unlink.
        - name: object_id
          type: string
          required: false
          description: The finding to unlink the evidence from.
        - name: pending_ref_id
          type: string
          required: false
          description: The draft finding to unlink the evidence from.
        - name: field_path
          type: string
          required: false
          description: The specific field link to remove, if it applied to just one field.
  - tool_id: discard_recorded_evidence
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_discard_recorded_evidence_tool
    required_context:
      - document_id
      - user_id
    description: Withdraw a saved piece of evidence that turned out to be wrong or too weak, while keeping it in the run's history.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Discard Recorded Evidence
      category: PDF Extraction
      documentation:
        summary: Sets one piece of evidence aside so it will not be used in the final result. It is not erased — it stays in the run's history for auditing and is left out of the output by default.
        parameters:
        - name: evidence_record_id
          type: string
          required: true
          description: Which saved piece of evidence to withdraw.
        - name: reason
          type: string
          required: true
          description: A short note on why the evidence should not be kept.
  - tool_id: update_recorded_evidence_metadata
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.documents:create_update_recorded_evidence_metadata_tool
    required_context:
      - document_id
      - user_id
    description: Update the editable notes on a saved piece of evidence.
    source_file: python/src/agr_ai_curation_alliance/tools/documents.py
    metadata:
      name: Update Evidence Metadata
      category: PDF Extraction
      documentation:
        summary: Changes the editable details on a piece of evidence — what it is about, which field it supports, and the agent's note. The quote itself and where it came from cannot be changed.
        parameters:
        - name: evidence_record_id
          type: string
          required: true
          description: Which saved piece of evidence to update.
        - name: entity
          type: string
          required: false
          description: An updated label for what this evidence is about.
        - name: field_path
          type: string
          required: false
          description: The field this evidence supports.
        - name: agent_note
          type: string
          required: false
          description: A note on how this evidence should be used.
  - tool_id: curation_db_sql
    binding_kind: context_factory
    callable_factory: agr_ai_curation_alliance.tools.sql:create_curation_db_sql_tool
    required_context:
      - database_url
    description: Run a direct query against the Alliance Curation Database to look up Disease Ontology terms and how they relate to one another.
    source_file: python/src/agr_ai_curation_alliance/tools/sql.py
    metadata:
      name: Curation Database SQL
      category: Database
      documentation:
        summary: Runs a direct database query to find Disease Ontology terms (DOID, the standard set of disease term IDs) and the relationships between them.
        parameters:
        - name: query
          type: string
          required: true
          description: The database query to run against the curation database.
  - tool_id: chebi_api_call
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.rest:chebi_api_call
    required_context: []
    description: Look up a chemical compound in ChEBI (Chemical Entities of Biological Interest, a standard chemical database).
    source_file: python/src/agr_ai_curation_alliance/tools/rest.py
    metadata:
      name: ChEBI API
      category: API
      documentation:
        summary: Looks up chemical compound IDs and related information in ChEBI, the standard chemical-compound database hosted at EBI.
        parameters:
        - name: url
          type: string
          required: true
          description: Full URL to query (must be on ebi.ac.uk domain).
        - name: method
          type: string
          required: false
          description: 'HTTP method (default: GET).'
        - name: headers_json
          type: string
          required: false
          description: Optional JSON string for request headers.
