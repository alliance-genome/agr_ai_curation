    callable: agr_ai_curation_alliance.tools.phenotype_builder_tools:patch_phenotype_observation
    required_context: []
    description: Make small, allowed corrections to a draft phenotype annotation that is already on the run's working list.
    source_file: python/src/agr_ai_curation_alliance/tools/phenotype_builder_tools.py
    metadata:
      name: Patch Phenotype Observation
      category: Database
      builder_run_state: true
      audit:
        display_name: Patch Phenotype Observation
      documentation:
        summary: Updates specific fields on one draft phenotype annotation the agent staged earlier — for example fixing a typo in a captured value or attaching better supporting quotes. Only the small set of fields meant to be editable can be changed; the rest of the draft stays as recorded.
        parameters:
          - name: candidate_id
            type: string
            required: true
            description: Identifies which draft entry on the working list this action applies to.
          - name: pending_ref_id
            type: string
            required: true
            description: A short label the agent gives this draft so it can refer back to the same entry later in the run.
          - name: updates
            type: array
            required: true
            description: The specific fields to correct on the draft, each paired with its new value.
  - tool_id: discard_phenotype_observation
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.phenotype_builder_tools:discard_phenotype_observation
    required_context: []
    description: Drop one draft phenotype annotation from the run's working list when it turned out to be wrong or unsupported.
    source_file: python/src/agr_ai_curation_alliance/tools/phenotype_builder_tools.py
    metadata:
      name: Discard Phenotype Observation
      category: Database
      builder_run_state: true
      audit:
        display_name: Discard Phenotype Observation
      documentation:
        summary: 'Marks one draft phenotype annotation as withdrawn so it will not appear in the final result. The entry is set aside rather than erased: it stays in the run''s history for auditing, with the short reason the agent gave for dropping it.'
        parameters:
          - name: candidate_id
            type: string
            required: true
            description: Identifies which draft entry on the working list this action applies to.
          - name: reason
            type: any
            required: false
            default: null
            description: A short note explaining why the draft is being dropped, kept in the run's history.
  - tool_id: list_staged_phenotype_observations
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.phenotype_builder_tools:list_staged_phenotype_observations
    required_context: []
    description: Show a short summary of every draft phenotype annotation currently on the run's working list.
    source_file: python/src/agr_ai_curation_alliance/tools/phenotype_builder_tools.py
    metadata:
      name: List Staged Phenotype Observations
      category: Database
      builder_run_state: true
      audit:
        display_name: List Staged Phenotype Observations
      documentation:
        summary: Returns a compact overview of the phenotype annotation drafts staged so far in this run, so the agent can review the working set before finishing. Withdrawn drafts are left out unless they are explicitly included.
        parameters:
          - name: include_discarded
            type: boolean
            required: true
            description: Whether to also show drafts that were previously withdrawn.
  - tool_id: finalize_phenotype_extraction
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.phenotype_builder_tools:finalize_phenotype_extraction
    required_context: []
    description: Submit the run's draft phenotype annotation list so the specialists can confirm each one.
    source_file: python/src/agr_ai_curation_alliance/tools/phenotype_builder_tools.py
    metadata:
      name: Finalize Phenotype Extraction
      category: Database
      # Marks this tool as a builder-materializer finalize tool. The platform runtime derives
      # the set of builder finalize-tool names from this flag
      # (streaming_tools._builder_finalization_tool_names) so this is a domain-pack edit, not a
      # platform edit.
      builder_finalization: true
      builder_run_state: true
      audit:
        display_name: Finalize Phenotype Extraction
      documentation:
        summary: Takes the phenotype annotation drafts the agent settled on and hands them off for confirmation by the phenotype specialists, which confirm the affected entity and the phenotype term against the Alliance database. The agent proposes the set; the specialists confirm the official identities and produce the records that curators review.
        parameters:
          - name: candidate_ids
            type: array
            required: true
            description: The list of draft entries the agent wants to hand off for confirmation.
  # ---------------------------------------------------------------------------------------
  # Disease extractor builder tools (Phase 2 envelope -> builder migration, FULL LinkML alignment).
  # Per-domain module disease_builder_tools.py over the project-agnostic ExtractionBuilderWorkspace.
  # The active disease_ontology_term_lookup / subject_entity_validation / disease_relation_cv_lookup /
  # disease_evidence_code_lookup / disease_data_provider_lookup bindings resolve the staged inputs
  # inline, so there are NO resolver-backed controlled fields here.
  # ---------------------------------------------------------------------------------------
  - tool_id: stage_disease_observation
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.disease_builder_tools:stage_disease_observation
    required_context: []
    description: Add one new draft disease annotation to the run's working list, backed by the exact wording the agent found in the paper.
    source_file: python/src/agr_ai_curation_alliance/tools/disease_builder_tools.py
    metadata:
      name: Stage Disease Observation
      category: Database
      # Run-state builder tool: the platform closure-binds the active builder workspace +
      # evidence records into this tool per run (streaming_tools._bind_run_state_into_tools).
      builder_run_state: true
      audit:
        display_name: Stage Disease Observation
      documentation:
        summary: 'Records a single disease annotation the agent read in the paper, together with the supporting quotes it captured — a first-pass draft, not a final record. Afterward, the disease specialists confirm the disease term, the affected gene/allele/model, the evidence codes, and the data provider against the Alliance database and settle the official identity. One call adds one draft entry. It is the richest of the five: one draft carries the disease mention and disease term, the affected subject (gene, allele, or model), evidence codes, the relation (such as "is model of"), the data provider, and any experimental conditions. The choice of subject decides whether the final record is a gene, allele, or model disease annotation.'
        parameters:
          - name: pending_ref_id
            type: string
            required: true
            description: A short label the agent gives this draft so it can refer back to the same entry later in the run.
          - name: mention
            type: string
            required: true
            description: The exact wording for this entity as it appears in the paper.
          - name: disease_name
            type: string
            required: true
            description: The disease name as the agent read it from the paper.
          - name: role
            type: string
            required: true
            description: 'How the disease appears in this paper: the main disease studied (primary), mentioned as background, used for comparison (comparative), the disease being modeled (model context), or unspecified. This is the agent''s read of the paper context, not a stored relationship.'
          - name: confidence
            type: string
            required: true
            description: How sure the agent is about this finding (high, medium, or low).
          - name: data_provider
            type: string
            required: true
            description: The Alliance group this belongs to, such as FB (FlyBase), WB (WormBase), MGI (Mouse), ZFIN (Zebrafish), RGD (Rat), SGD (Yeast), or HGNC (Human).
          - name: evidence_record_ids
            type: array
            required: true
            description: The supporting quotes (captured earlier from the PDF) that back up this draft.
          - name: source_mentions
            type: array
            required: true
            description: The exact paper phrases the agent read this finding from.
          - name: disease_curie
            type: any
            required: false
            default: null
            description: The Disease Ontology ID (DOID, a standard disease term ID) the agent proposes, if it found one; the disease specialist confirms it.
          - name: subject_type
            type: any
            required: false
            default: null
            description: What kind of thing has the disease association — a gene, an allele, or a whole modified organism (model). This choice decides what kind of record is produced.
          - name: subject_identifier
            type: any
            required: false
            default: null
            description: The ID of the gene, allele, or model the disease is associated with.
          - name: subject_label
            type: any
            required: false
            default: null
            description: The name of the gene, allele, or model the disease is associated with.
          - name: disease_relation_name
            type: any
            required: false
            default: null
            description: The official relationship between the subject (gene, allele, or model) and the disease, chosen from the Disease Relation vocabulary — for example "is model of" or "is implicated in". The specialist confirms this term.
          - name: evidence_code_curies
            type: any
            required: false
            default: null
            description: The Evidence and Conclusion Ontology codes (ECO, a standard set of "how was this shown" codes) the agent proposes for this association.
          - name: genetic_sex_name
            type: any
            required: false
            default: null
            description: The genetic sex stated for this finding, if any (a standard controlled value).
          - name: disease_qualifier_names
            type: any
            required: false
            default: null
            description: Standard qualifier terms that refine the disease association, if the paper states any.
          - name: with_gene_identifiers
            type: any
            required: false
            default: null
            description: IDs of additional genes the paper says were involved together with the subject.
          - name: condition_relations
            type: any
            required: false
            default: null
            description: Any experimental conditions the paper explicitly tied to this finding (for example a drug treatment or temperature), with the kind of relationship each had to the result. Left empty when the paper states no conditions.
          - name: negated
            type: any
            required: false
            default: null
            description: True when the paper explicitly says the finding did NOT occur.
  - tool_id: patch_disease_observation
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.disease_builder_tools:patch_disease_observation
