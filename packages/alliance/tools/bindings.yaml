        display_name: List Staged Gene Expression Observations
      documentation:
        summary: Returns a compact overview of the gene-expression observation drafts staged so far in this run, so the agent can review the working set before finishing. Withdrawn drafts are left out unless they are explicitly included.
        parameters:
          - name: include_discarded
            type: boolean
            required: true
            description: Whether to also show drafts that were previously withdrawn.
