  - tool_id: agr_literature_reference_lookup
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.literature_references:agr_literature_reference_lookup
    required_context: []
    description: Look up a paper in the Alliance literature collection by its ID, or find candidate papers by title or citation text.
    source_file: python/src/agr_ai_curation_alliance/tools/literature_references.py
    metadata:
      name: AGR Literature Reference Lookup
      category: Literature
      audit:
        display_name: AGR Literature Reference Lookup
      documentation:
        summary: Finds papers in the Alliance literature collection. Give it a known ID (such as a PubMed ID or DOI) to fetch the exact paper, or a title/citation to search for likely matches. It reports what it tried, the candidate papers it found, any cases where the match was unclear or nothing matched, and a plain status message.
        example_queries:
          - Resolve PMID:27528223 to an Alliance reference
          - Search Hahm KB Suppressed Helicobocter pylori by title text
        parameters:
          - name: method
            type: string
            required: true
            description: Choose whether to fetch one exact paper by ID/title, or search for likely matches.
          - name: identifier
            type: string
            required: false
            description: A known ID or exact title for the paper you want — a PubMed ID, DOI, Alliance reference ID, or member-group reference ID.
          - name: query
            type: string
            required: false
            description: A title, citation, or identifier to search for when you do not have an exact match.
          - name: exact_match
            type: boolean
            required: false
            description: When searching, require an exact match instead of likely matches.
          - name: limit
            type: integer
            required: false
            description: The most candidate papers to return from a search.
      methods:
        get_literature_reference:
          name: Get Literature Reference
          description: Fetch one exact paper by a known identifier — a PubMed ID (PMID), DOI, Alliance reference ID, member-group reference ID, or exact title.
          required_params: [identifier]
          optional_params: []
          source: literature_es
          example:
            method: get_literature_reference
            identifier: PMID:27528223
        search_literature_references:
          name: Search Literature References
          description: Search for likely-matching papers by title, citation text, or any known identifier when you do not have an exact match.
          required_params: [query]
          optional_params: [exact_match, limit]
          source: literature_es
          example:
            method: search_literature_references
            query: Hahm KB Suppressed Helicobocter pylori
            exact_match: false
            limit: 20
