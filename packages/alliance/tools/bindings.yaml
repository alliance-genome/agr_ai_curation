package_id: agr.alliance
bindings_api_version: 1.0.0
tools:
  - tool_id: get_agent_contract
    binding_kind: static
    callable: src.lib.openai_agents.tools.agent_contract:get_agent_contract
    required_context: []
    description: Look up an agent's setup details — which tools it uses, the shape of its output, which specialists confirm its findings, and the rules on individual fields — without running anything.
    source_file: backend/src/lib/openai_agents/tools/agent_contract.py
    metadata:
      name: Agent Contract Lookup
      category: Runtime Metadata
      audit:
        display_name: Agent Contract Lookup
      documentation:
        summary: 'Shows a read-only summary of how a configured agent is set up: its tools, its output structure, the specialists tied to it, the ontology rules on its fields, and field-by-field details. It only reports the setup; it does not run the agent or change anything.'
        parameters:
          - name: agent_id
            type: string
            required: true
            description: Which agent's setup you want to look at.
          - name: topic
            type: string
            required: true
            description: 'Which part of the setup to show: its tools, its output shape, its data structure, the specialists tied to it, its ontology rules, or one specific field.'
          - name: field_path
            type: string
            required: false
            description: The specific field to look at, when you want details on just one field.
          - name: detail_level
            type: string
            required: false
            description: Choose a short overview or the full details.
  - tool_id: agr_curation_query
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:agr_curation_query
    required_context: []
    description: Look things up in the Alliance Curation Database — genes, alleles, ontology terms, controlled-vocabulary terms, species, and member groups — through one tool with many specific lookup methods.
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    provider_adapters:
      groq_schema_constraints:
        callable_factory: agr_ai_curation_alliance.tools.agr_curation:create_groq_agr_curation_query_tool
        description: Compact method and payload_json wrapper for Groq tool schema constraints
    metadata:
      name: AGR Curation Query
      category: Database
      audit:
        display_name: AGR Curation Query
      documentation:
        summary: A single tool for looking up Alliance curation data. It offers many specific methods — search for a gene, fetch an allele by ID, look up an ontology term, list member groups, and more. Different agents use the methods that fit their job.
        example_queries:
          - Find gene daf-2 in WormBase
          - Get allele information for e1370
        parameters:
          - name: method
            type: string
            required: true
            description: Which lookup to run (for example, search for a gene or fetch an allele by ID). This decides what is looked up.
          - name: gene_symbol
            type: string
            required: false
            description: Gene symbol to search for.
          - name: gene_symbols
            type: array[string]
            required: false
            description: List of gene symbols for bulk lookup.
          - name: gene_id
            type: string
            required: false
            description: A gene ID for a direct lookup.
          - name: allele_symbol
            type: string
            required: false
            description: Allele symbol to search for.
          - name: allele_symbols
            type: array[string]
            required: false
            description: List of allele symbols for bulk lookup.
          - name: allele_id
            type: string
            required: false
            description: An allele ID for a direct lookup.
          - name: entity_type
            type: string
            required: false
            description: Generic entity helper type, such as gene, allele, or agm.
          - name: entity_names
            type: array[string]
            required: false
            description: Entity labels or symbols for generic entity-to-CURIE lookup.
          - name: entity_curies
            type: array[string]
            required: false
            description: A list of entity IDs to look up facts for.
          - name: data_provider
            type: string
            required: false
            description: "Filter by group/provider: MGI, FB, WB, ZFIN, RGD, SGD, HGNC."
          - name: provider_name
            type: string
            required: false
            description: Data provider display name for provider lookup.
          - name: limit
            type: integer
            required: false
            description: Maximum results to return.
          - name: term
            type: string
            required: false
            description: A search word, an ID, or a controlled-vocabulary term to look up.
          - name: terms
            type: array[string]
            required: false
            description: A list of term IDs to look up in bulk.
          - name: vocabulary
            type: string
            required: false
            description: Controlled vocabulary name or label filter.
          - name: term_name
            type: string
            required: false
            description: Controlled vocabulary term name.
          - name: abbreviation
            type: string
            required: false
            description: Controlled vocabulary term abbreviation.
          - name: synonym
            type: string
            required: false
            description: Controlled vocabulary term synonym.
          - name: ontology_term_type
            type: string
            required: false
            description: Which kind of ontology term to limit the lookup to (for example, a GO term or a mouse phenotype term).
          - name: category
            type: string
            required: false
            description: Category for generic CURIE-to-name mapping.
          - name: curies
            type: array[string]
            required: false
            description: A list of IDs to map to display names.
      methods:
        search_genes:
          name: Search Genes
          description: Find genes whose symbol contains the text you give.
          required_params: [gene_symbol]
          optional_params: [data_provider, limit, include_synonyms]
          example:
            method: search_genes
            gene_symbol: daf
            data_provider: WB
            limit: 10
        search_genes_bulk:
          name: Search Genes (Bulk)
          description: Search for many gene symbols at once in a single call.
          required_params: [gene_symbols]
          optional_params: [data_provider, limit, include_synonyms]
          example:
            method: search_genes_bulk
            gene_symbols: [crb, ninaE, Rh1]
            data_provider: FB
            limit: 10
        get_gene_by_exact_symbol:
          name: Get Gene by Exact Symbol
          description: Find the gene whose official symbol exactly matches.
          required_params: [gene_symbol]
          optional_params: [data_provider]
          example:
            method: get_gene_by_exact_symbol
            gene_symbol: daf-2
            data_provider: WB
        get_gene_by_id:
          name: Get Gene by ID
          description: Get full details for one gene by its ID.
          required_params: [gene_id]
          optional_params: []
          example:
            method: get_gene_by_id
            gene_id: WB:WBGene00000898
        search_alleles:
          name: Search Alleles
          description: Find alleles whose symbol contains the text you give.
          required_params: [allele_symbol]
          optional_params: [data_provider, limit, include_synonyms]
          example:
            method: search_alleles
            allele_symbol: tm1
            data_provider: WB
            limit: 10
        search_alleles_bulk:
          name: Search Alleles (Bulk)
          description: Search for many allele symbols at once in a single call.
          required_params: [allele_symbols]
          optional_params: [data_provider, limit, include_synonyms]
          example:
            method: search_alleles_bulk
            allele_symbols: [tm1, e1370, n765]
            data_provider: WB
            limit: 10
        get_allele_by_exact_symbol:
          name: Get Allele by Exact Symbol
          description: Find the allele whose official symbol exactly matches.
          required_params: [allele_symbol]
          optional_params: [data_provider]
          example:
            method: get_allele_by_exact_symbol
            allele_symbol: e1370
            data_provider: WB
        get_allele_by_id:
          name: Get Allele by ID
          description: Get full details for one allele by its ID.
          required_params: [allele_id]
          optional_params: []
          example:
            method: get_allele_by_id
            allele_id: WB:WBVar00143949
        search_anatomy_terms:
          name: Search Anatomy Terms
          description: Search anatomy terms for a specific species.
          required_params: [term, data_provider]
          optional_params: [exact_match, include_synonyms, limit]
          example:
            method: search_anatomy_terms
            term: body wall muscle
            data_provider: WB
        search_life_stage_terms:
          name: Search Life Stage Terms
          description: Search developmental-stage (life-stage) terms for a specific species.
          required_params: [term, data_provider]
          optional_params: [exact_match, include_synonyms, limit]
          example:
            method: search_life_stage_terms
            term: adult
            data_provider: WB
        search_go_terms:
          name: Search GO Terms
          description: Search Gene Ontology (GO) terms by name or keyword.
          required_params: [term]
          optional_params: [go_aspect, exact_match, include_synonyms, limit]
          example:
            method: search_go_terms
            term: kinase activity
            go_aspect: molecular_function
        get_ontology_term:
          name: Get Ontology Term
          description: Fetch one exact ontology term by its ID, optionally limited to a certain kind of term.
          required_params: [term]
          optional_params: [ontology_term_type]
          example:
            method: get_ontology_term
            term: GO:0003674
            ontology_term_type: GOTerm
        get_ontology_terms:
          name: Get Ontology Terms
          description: Fetch several exact ontology terms by their IDs at once.
          required_params: [terms]
          optional_params: []
          example:
            method: get_ontology_terms
            terms: [GO:0003674, ECO:0000314]
        search_ontology_terms:
          name: Search Ontology Terms
          description: Search ontology terms by name within one chosen kind of term (for example, mouse phenotype terms).
          required_params: [term, ontology_term_type]
          optional_params: [exact_match, include_synonyms, limit]
          example:
            method: search_ontology_terms
            term: abnormal locomotor behavior
            ontology_term_type: MPTerm
            exact_match: true
        map_curies_to_names:
          name: Map CURIEs to Names
          description: Turn a list of IDs into their human-readable names.
          required_params: [category, curies]
          optional_params: []
          example:
            method: map_curies_to_names
            category: ontology
            curies: [GO:0003674]
        get_vocabulary_term:
          name: Get Vocabulary Term
          description: Fetch one exact term from a controlled list by its name, abbreviation, or synonym. You can narrow the search to a named part of the list, or leave that out to search the whole list.
          required_params: [vocabulary]
          optional_params: [term, term_name, abbreviation, synonym, subset, include_synonyms, include_obsolete, limit]
          example:
            method: get_vocabulary_term
            vocabulary: Disease Relation
            subset: AGM Disease Relation
            term_name: is_model_of
        search_vocabulary_terms:
          name: Search Vocabulary Terms
          description: Search a controlled list for terms by name, abbreviation, or synonym. You can narrow it to a named part of the list, or search the whole list.
          required_params: []
          optional_params: [vocabulary, term, term_name, abbreviation, synonym, subset, exact_match, include_synonyms, include_obsolete, limit]
          example:
            method: search_vocabulary_terms
            vocabulary: relation
            term: expressed in
            exact_match: true
        get_species:
          name: Get Species
          description: List every supported species.
          required_params: []
          optional_params: []
          example:
            method: get_species
        get_data_providers:
          name: Get Data Providers
          description: List every Alliance member group, with its short code, species ID, and full name where available.
          required_params: []
          optional_params: []
          example:
            method: get_data_providers
        get_data_provider:
          name: Get Data Provider
          description: Look up one Alliance member group by its short code, full name, or species ID, and flag any cases where the group and species do not line up.
          required_params: []
          optional_params: [abbreviation, provider_name, taxon_id, limit]
          example:
            method: get_data_provider
            abbreviation: WB
            taxon_id: NCBITaxon:6239
        map_entity_names_to_curies:
          name: Map Entity Names to CURIEs
          description: Turn entity names or labels into their Alliance IDs, for a stated species.
          required_params: [entity_type, entity_names]
          optional_params: [taxon_id, data_provider]
          example:
            method: map_entity_names_to_curies
            entity_type: agm
            entity_names: ["Pax6<tm1>"]
            taxon_id: NCBITaxon:10090
        map_entity_curies_to_info:
          name: Map Entity CURIEs to Info
          description: Get facts about Alliance entities from their IDs.
          required_params: [entity_type, entity_curies]
          optional_params: []
          example:
            method: map_entity_curies_to_info
            entity_type: agm
            entity_curies: [MGI:8308849]
      agent_methods:
        agm_validation:
          agent_name: AGM Validation Agent
          methods:
            - map_entity_curies_to_info
            - map_entity_names_to_curies
          description: The Affected Genomic Model (AGM) specialist confirms which modified organism a finding refers to, using its ID, name, and species.
        subject_entity_validation:
          agent_name: Subject Entity Validation Agent
          methods:
            - get_gene_by_id
            - search_genes
            - get_gene_by_exact_symbol
            - get_allele_by_id
            - search_alleles
            - get_allele_by_exact_symbol
            - map_entity_curies_to_info
            - map_entity_names_to_curies
          description: The Subject specialist confirms the affected entity — sending it to the gene, allele, or modified-organism path depending on what it is.
        gene:
          agent_name: Gene Validation Agent
          methods: [search_genes, search_genes_bulk, get_gene_by_exact_symbol, get_gene_by_id]
          description: The Gene specialist confirms gene identities and pulls full gene details against the Alliance database.
        allele:
          agent_name: Allele Validation Agent
          methods: [search_alleles, search_alleles_bulk, get_allele_by_exact_symbol, get_allele_by_id]
          description: The Allele specialist confirms allele and variant identities against the Alliance database.
        gene_expression:
          agent_name: Gene Expression Extractor
          methods: [search_genes, search_genes_bulk, get_gene_by_exact_symbol]
          description: The Gene Expression agent confirms gene names it found while reading the PDF.
        gene_ontology:
          agent_name: Gene Ontology Agent
          methods: [search_go_terms]
          description: The Gene Ontology agent looks up GO terms.
        ontology_term_validation:
          agent_name: Ontology Term Resolver Agent
          methods:
            - get_ontology_term
            - get_ontology_terms
            - search_ontology_terms
            - search_anatomy_terms
            - search_life_stage_terms
            - search_go_terms
            - map_curies_to_names
          description: The Ontology Term specialist confirms exact ontology IDs and resolves term names or synonyms, keeping note of any cases that stayed unclear.
        controlled_vocabulary_validation:
          agent_name: Controlled Vocabulary Validation Agent
          methods:
            - get_vocabulary_term
            - search_vocabulary_terms
          description: The Controlled Vocabulary specialist confirms terms by their list name, term name, abbreviation, and synonym.
        data_provider_validation:
          agent_name: Data Provider Validation Agent
          methods:
            - get_data_provider
            - get_data_providers
          description: The Member Group specialist confirms group codes and checks that the group and species line up.
        experimental_condition_validation:
          agent_name: Experimental Condition Validation Agent
          methods:
            - get_ontology_term
            - get_ontology_terms
            - search_ontology_terms
            - map_curies_to_names
            - get_vocabulary_term
            - search_vocabulary_terms
            - get_data_provider
            - get_data_providers
          description: The Experimental Condition specialist brings together ontology, controlled-vocabulary, member-group, species, and chemical checks into one decision for each condition.
      agent_studio:
        prompt_description: "Structured lookups in the Alliance Curation Database. Narrow results to a member group: MGI, FB, WB, ZFIN, RGD, SGD, HGNC."
        diagnostic:
          enabled: true
          category: api
          tags: [gene, allele, ontology, alliance]
          hint: >-
            For PDF evidence and document-tool advice, inspect the live runtime catalog with
            `get_tool_inventory` and `get_tool_details` instead of relying on remembered tool schemas.
          input_schema:
            type: object
            properties:
              method:
                type: string
                description: Query method to execute
                enum:
                  - search_genes
                  - search_genes_bulk
                  - get_gene_by_exact_symbol
                  - get_gene_by_id
                  - search_alleles
                  - search_alleles_bulk
                  - get_allele_by_exact_symbol
                  - get_allele_by_id
                  - get_data_providers
                  - get_data_provider
                  - map_entity_names_to_curies
                  - map_entity_curies_to_info
                  - get_ontology_term
                  - get_ontology_terms
                  - search_ontology_terms
                  - map_curies_to_names
                  - get_vocabulary_term
                  - search_vocabulary_terms
                  - search_anatomy_terms
                  - search_life_stage_terms
                  - search_go_terms
              gene_symbol:
                type: string
                description: Gene symbol to search
              gene_symbols:
                type: array
                items:
                  type: string
                description: Gene symbols for bulk search
              gene_id:
                type: string
                description: Gene CURIE for direct lookup
              allele_symbol:
                type: string
                description: Allele symbol to search
              allele_symbols:
                type: array
                items:
                  type: string
                description: Allele symbols for bulk search
              allele_id:
                type: string
                description: Allele CURIE for direct lookup
              entity_type:
                type: string
                description: Entity helper type
                enum: [gene, allele, agm, construct, targeting_reagent]
              entity_names:
                type: array
                items:
                  type: string
                description: Entity names or labels for generic entity lookup
              entity_curies:
                type: array
                items:
                  type: string
                description: Entity CURIEs for generic entity lookup
              data_provider:
                type: string
                description: Filter by species/group
                enum: [MGI, FB, WB, ZFIN, RGD, SGD, HGNC]
              provider_name:
                type: string
                description: Data provider display name for provider lookup
              taxon_id:
                type: string
                description: NCBITaxon ID alternative to data_provider
              term:
                type: string
                description: Search term for ontology searches
              terms:
                type: array
                items:
                  type: string
                description: CURIE list for bulk ontology term lookup
              ontology_term_type:
                type: string
                description: Curation DB ontologytermtype filter
              vocabulary:
                type: string
                description: Controlled vocabulary name or display label
              term_name:
                type: string
                description: Controlled vocabulary term name
              abbreviation:
                type: string
                description: Controlled vocabulary term abbreviation
              synonym:
                type: string
                description: Controlled vocabulary term synonym
              category:
                type: string
                description: Category for generic CURIE-to-name mapping
              curies:
                type: array
                items:
                  type: string
                description: CURIE list for generic mapping helpers
              go_aspect:
                type: string
                description: GO aspect filter
                enum: [molecular_function, biological_process, cellular_component]
              exact_match:
                type: boolean
                description: Require exact match
              include_synonyms:
                type: boolean
                description: Search synonyms
              include_obsolete:
                type: boolean
                description: Include obsolete controlled vocabulary terms
              limit:
                type: integer
                description: Max results
              force:
                type: boolean
                description: Backward-compatible no-op; search methods no longer perform local symbol-shape validation
              force_reason:
                type: string
                description: Backward-compatible no-op for older callers
            required: [method]
      required_tool_call:
        enforce: true
        failure_message: did not call required database lookup tools before answering
        guardrail_message: You must query the package-declared curation lookup tool before answering. Use agr_curation_query first.
      bulk_list_optimization:
        enabled: true
        minimum_entities: 8
        min_turns: 40
        max_turns: 120
        instruction: |
          TOOL EFFICIENCY REQUIREMENT:
          The request includes a large entity list. Minimize tool rounds.
          Prefer bulk lookup methods when available (for example search_genes_bulk/search_alleles_bulk) using list inputs instead of one-call-per-entity loops.
          If provider/model supports it, issue parallel tool calls in the same turn.
          Avoid one-call-per-entity loops when enough evidence already exists to synthesize output.
  - tool_id: agr_species_context_lookup
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:agr_species_context_lookup
    required_context: []
    description: Work out the species, the Alliance group, and the standard species ID for a paper, without looking up any genes or alleles.
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: AGR Species Context Lookup
      category: Database
      audit:
        display_name: AGR Species Context Lookup
      documentation:
        summary: A focused lookup that matches a species name to its Alliance group (such as FlyBase or WormBase) and its standard NCBI Taxonomy ID. It is just for species and group context; it does not look up genes, alleles, or other entities.
        parameters:
          - name: species
            type: string
            required: false
            description: A species name from the paper, such as Drosophila melanogaster or C. elegans.
          - name: data_provider
            type: string
            required: false
            description: An Alliance group code, such as FB, WB, MGI, HGNC, ZFIN, RGD, or SGD.
          - name: provider_name
            type: string
            required: false
            description: The full display name of the group or organism.
          - name: taxon_id
            type: string
            required: false
            description: A standard NCBI Taxonomy species ID, such as NCBITaxon:7227 (fruit fly).
          - name: limit
            type: integer
            required: false
            description: The most matching groups to return.
  - tool_id: search_domain_field_terms
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:search_domain_field_terms
    required_context: []
    description: Search for candidate standard terms (from an ontology or controlled list) that could fill one specific field, based on a phrase the agent read in the paper.
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: Search Domain Field Terms
      category: Database
      audit:
        display_name: Search Domain Field Terms
      documentation:
        summary: Casts a wide net for possible standard-term matches for one field, starting from a phrase backed by evidence in the paper. The results are suggestions to compare, not a final choice — the agent settles on the official term separately with Resolve Domain Field Term.
        parameters:
          - name: domain_pack_id
            type: string
            required: true
            description: Which curation area this field belongs to (for example, gene expression).
          - name: object_type
            type: string
            required: true
            description: The kind of record this field is part of.
          - name: field_path
            type: string
            required: true
            description: Which field the agent is trying to fill (for example, "where expressed").
          - name: query
            type: string
            required: true
            description: The phrase from the paper to look up candidate terms for.
          - name: evidence_context
            type: object
            required: false
            description: Optional supporting context from the paper — the source phrase, quote, figure, provider, or species.
          - name: data_provider
            type: string
            required: false
            description: The Alliance group to scope a species-specific anatomy lookup to.
          - name: taxon
            type: string
            required: false
            description: The species context, kept for the record.
          - name: branch_root_curie
            type: string
            required: false
            description: An optional starting point in the ontology to limit the search to one branch.
          - name: limit
            type: integer
            required: false
            description: The most candidate terms to return.
          - name: exact_match
            type: boolean
            required: false
            description: Require an exact name match instead of close matches, where supported.
  - tool_id: inspect_ontology_term
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:inspect_ontology_term
    required_context: []
    description: Look at one ontology term in detail, plus a limited view of its neighbors in the term tree (broader terms above it, narrower terms below it, or terms beside it).
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: Inspect Ontology Term
      category: Database
      audit:
        display_name: Inspect Ontology Term
      documentation:
        summary: Shows one ontology term and a small, bounded set of nearby terms so the agent can walk the term tree and compare candidates. It is for exploring and comparing; the official term choice is settled separately with Resolve Domain Field Term.
        parameters:
          - name: domain_pack_id
            type: string
            required: true
            description: Which curation area this field belongs to.
          - name: object_type
            type: string
            required: true
            description: The kind of record this field is part of.
          - name: field_path
            type: string
            required: true
            description: The field whose rules apply to this term.
          - name: curie
            type: string
            required: true
            description: The ID of the ontology term to look at.
          - name: data_provider
            type: string
            required: false
            description: The Alliance group to scope species-specific anatomy context to.
          - name: include_parents
            type: boolean
            required: false
            description: Also show the broader terms above this one.
          - name: include_children
            type: boolean
            required: false
            description: Also show the narrower terms below this one.
          - name: include_siblings
            type: boolean
            required: false
            description: Also show neighboring terms at the same level.
          - name: max_depth
            type: integer
            required: false
            description: How many levels up or down the term tree to walk.
          - name: limit
            type: integer
            required: false
            description: The most neighboring terms to return for each relationship.
  - tool_id: resolve_domain_field_term
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:resolve_domain_field_term
    required_context: []
    description: Settle the official standard term for one field and return a confirmed value with its supporting trail, ready to use.
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: Resolve Domain Field Term
      category: Database
      # Run-state builder/resolver tool: platform closure-binds the active resolver ledger +
      # builder workspace into this tool per run (streaming_tools._bind_run_state_into_tools).
      builder_run_state: true
      audit:
        display_name: Resolve Domain Field Term
      documentation:
        summary: Confirms the one official standard term for a field, after the agent has explored candidates with the search and inspect tools. Its result is the trusted choice the agent can record, with a clear trail of how the term was decided.
        parameters:
          - name: domain_pack_id
            type: string
            required: true
            description: Which curation area this field belongs to.
          - name: object_type
            type: string
            required: true
            description: The kind of record this field is part of.
          - name: field_path
            type: string
            required: true
            description: Which field is being settled.
          - name: source_phrase
            type: string
            required: true
            description: The phrase from the paper that this term is being matched to.
          - name: evidence_context
            type: object
            required: false
            description: Optional supporting context — quote, page, section, provider, or species.
          - name: candidate_curie
            type: string
            required: false
            description: The ID of the candidate term picked from the search or inspect results.
          - name: candidate_value
            type: string
            required: false
            description: A candidate value that is a name rather than an ID, picked from the search results (for example a controlled-list term name).
          - name: data_provider
            type: string
            required: false
            description: The Alliance group to scope the lookup to.
          - name: taxon
            type: string
            required: false
            description: The species context, kept for the record.
          - name: limit
            type: integer
            required: false
            description: The most candidates to check while confirming.
  - tool_id: stage_gene_expression_observation
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:stage_gene_expression_observation
    required_context: []
    description: Add one new draft gene-expression observation to the run's working list, backed by the exact wording the agent found in the paper.
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: Stage Gene Expression Observation
      category: Database
      builder_run_state: true
      audit:
        display_name: Stage Gene Expression Observation
      documentation:
        summary: 'Records a single gene-expression observation the agent read in the paper, together with the supporting quotes it captured — a first-pass draft, not a final record. Afterward, the gene-expression specialists confirm the gene and the controlled terms against the Alliance database and settle the official identity. One call adds one draft entry. One draft carries the gene whose expression was observed, the reference it came from, a plain "where expressed" statement, and the controlled-term choices (such as the anatomy and developmental-stage terms) that a term specialist confirms.'
        parameters:
          - name: pending_ref_id
            type: string
            required: true
            description: A short label the agent gives this draft so it can refer back to the same entry later in the run.
          - name: evidence_record_ids
            type: array
            required: true
            description: The supporting quotes (captured earlier from the PDF) that back up this draft.
          - name: where_expressed_statement
            type: string
            required: true
            description: A plain sentence describing where (and when) the gene was seen to be expressed, in the agent's words from the paper.
          - name: subject
            type: any
            required: true
            description: The gene whose expression was observed, with the exact phrase from the paper and the agent's proposed symbol/ID.
          - name: reference
            type: any
            required: true
            description: The paper the observation came from, with the exact phrase and its reference ID.
          - name: controlled_fields
            type: array
            required: true
            description: The standard-term choices the agent made for this observation (such as the anatomy and developmental-stage terms), each paired with the value it selected. A term specialist confirms these.
          - name: condition_relations
            type: any
            required: true
            description: Any experimental conditions the paper explicitly tied to this finding (for example a drug treatment or temperature), with the kind of relationship each had to the result. Left empty when the paper states no conditions.
  - tool_id: patch_gene_expression_observation
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:patch_gene_expression_observation
    required_context: []
    description: Make small, allowed corrections to a draft gene-expression observation that is already on the run's working list.
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: Patch Gene Expression Observation
      category: Database
      builder_run_state: true
      audit:
        display_name: Patch Gene Expression Observation
      documentation:
        summary: Updates specific fields on one draft gene-expression observation the agent staged earlier — for example fixing a typo in a captured value or attaching better supporting quotes. Only the small set of fields meant to be editable can be changed; the rest of the draft stays as recorded.
        parameters:
          - name: candidate_id
            type: string
            required: true
            description: Identifies which draft entry on the working list this action applies to.
          - name: pending_ref_id
            type: string
            required: true
            description: A short label the agent gives this draft so it can refer back to the same entry later in the run.
          - name: updates
            type: array
            required: true
            description: The specific fields to correct on the draft, each paired with its new value.
