package_id: agr.alliance
bindings_api_version: 1.0.0
tools:
  - tool_id: get_agent_contract
    binding_kind: static
    callable: src.lib.openai_agents.tools.agent_contract:get_agent_contract
    required_context: []
    description: Read-only deterministic agent contract lookup for tools, output schemas, domain-envelope metadata, validator bindings, ontology constraints, and field-level details
    source_file: backend/src/lib/openai_agents/tools/agent_contract.py
    metadata:
      name: Agent Contract Lookup
      category: Runtime Metadata
      audit:
        display_name: Agent Contract Lookup
      documentation:
        summary: Inspect compact, deterministic runtime contract metadata for generated system agents without reading live envelope state or executing validation.
        parameters:
          - name: agent_id
            type: string
            required: true
            description: Runtime agent identifier whose contract should be inspected.
          - name: topic
            type: string
            required: true
            description: One of tools, output_schema, domain_envelope, validator_bindings, ontology_constraints, or field.
          - name: field_path
            type: string
            required: false
            description: Field path for field-specific lookup; use object_type.field_path when disambiguation is needed.
          - name: detail_level
            type: string
            required: false
            description: Use summary for compact responses or detail for field/schema/tool metadata details.
  - tool_id: agr_curation_query
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:agr_curation_query
    required_context: []
    description: Structured AGR curation database queries with lookup attempts, candidate matches, classifications, provider projections, ontology term and controlled vocabulary lookup/search helpers, and flow validation attachment reference lookups
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    provider_adapters:
      groq_schema_constraints:
        callable_factory: agr_ai_curation_alliance.tools.agr_curation:create_groq_agr_curation_query_tool
        description: Compact method and payload_json wrapper for Groq tool schema constraints
    metadata:
      name: AGR Curation Query
      category: Database
      audit:
        display_name: AGR Curation Query
      documentation:
        summary: A unified package-owned tool for querying the Alliance Curation Database. Different agents use different methods of this tool based on their specialization.
        example_queries:
          - Find gene daf-2 in WormBase
          - Get allele information for e1370
        parameters:
          - name: method
            type: string
            required: true
            description: The query method to execute. Determines what type of data to retrieve.
          - name: gene_symbol
            type: string
            required: false
            description: Gene symbol to search for.
          - name: gene_symbols
            type: array[string]
            required: false
            description: List of gene symbols for bulk lookup.
          - name: gene_id
            type: string
            required: false
            description: Gene CURIE for direct lookup.
          - name: allele_symbol
            type: string
            required: false
            description: Allele symbol to search for.
          - name: allele_symbols
            type: array[string]
            required: false
            description: List of allele symbols for bulk lookup.
          - name: allele_id
            type: string
            required: false
            description: Allele CURIE for direct lookup.
          - name: entity_type
            type: string
            required: false
            description: Generic entity helper type, such as gene, allele, or agm.
          - name: entity_names
            type: array[string]
            required: false
            description: Entity labels or symbols for generic entity-to-CURIE lookup.
          - name: entity_curies
            type: array[string]
            required: false
            description: Entity CURIEs for generic entity information lookup.
          - name: data_provider
            type: string
            required: false
            description: "Filter by group/provider: MGI, FB, WB, ZFIN, RGD, SGD, HGNC."
          - name: provider_name
            type: string
            required: false
            description: Data provider display name for provider lookup.
          - name: limit
            type: integer
            required: false
            description: Maximum results to return.
          - name: term
            type: string
            required: false
            description: Search term, CURIE, or controlled vocabulary term query.
          - name: terms
            type: array[string]
            required: false
            description: CURIE list for bulk ontology term lookup.
          - name: vocabulary
            type: string
            required: false
            description: Controlled vocabulary name or label filter.
          - name: term_name
            type: string
            required: false
            description: Controlled vocabulary term name.
          - name: abbreviation
            type: string
            required: false
            description: Controlled vocabulary term abbreviation.
          - name: synonym
            type: string
            required: false
            description: Controlled vocabulary term synonym.
          - name: ontology_term_type
            type: string
            required: false
            description: Curation DB ontologytermtype filter for ontology term lookup and generic ontology searches.
          - name: category
            type: string
            required: false
            description: Category for generic CURIE-to-name mapping.
          - name: curies
            type: array[string]
            required: false
            description: CURIE list for generic CURIE-to-name mapping.
      methods:
        search_genes:
          name: Search Genes
          description: Search for genes by symbol using LIKE matching.
          required_params: [gene_symbol]
          optional_params: [data_provider, limit, include_synonyms]
          example:
            method: search_genes
            gene_symbol: daf
            data_provider: WB
            limit: 10
        search_genes_bulk:
          name: Search Genes (Bulk)
          description: Bulk gene symbol search in one tool call.
          required_params: [gene_symbols]
          optional_params: [data_provider, limit, include_synonyms]
          example:
            method: search_genes_bulk
            gene_symbols: [crb, ninaE, Rh1]
            data_provider: FB
            limit: 10
        get_gene_by_exact_symbol:
          name: Get Gene by Exact Symbol
          description: Find a gene by its exact official symbol.
          required_params: [gene_symbol]
          optional_params: [data_provider]
          example:
            method: get_gene_by_exact_symbol
            gene_symbol: daf-2
            data_provider: WB
        get_gene_by_id:
          name: Get Gene by ID
          description: Retrieve detailed gene information by CURIE.
          required_params: [gene_id]
          optional_params: []
          example:
            method: get_gene_by_id
            gene_id: WB:WBGene00000898
        search_alleles:
          name: Search Alleles
          description: Search for alleles by symbol using LIKE matching.
          required_params: [allele_symbol]
          optional_params: [data_provider, limit, include_synonyms]
          example:
            method: search_alleles
            allele_symbol: tm1
            data_provider: WB
            limit: 10
        search_alleles_bulk:
          name: Search Alleles (Bulk)
          description: Bulk allele symbol search in one tool call.
          required_params: [allele_symbols]
          optional_params: [data_provider, limit, include_synonyms]
          example:
            method: search_alleles_bulk
            allele_symbols: [tm1, e1370, n765]
            data_provider: WB
            limit: 10
        get_allele_by_exact_symbol:
          name: Get Allele by Exact Symbol
          description: Find an allele by its exact official symbol.
          required_params: [allele_symbol]
          optional_params: [data_provider]
          example:
            method: get_allele_by_exact_symbol
            allele_symbol: e1370
            data_provider: WB
        get_allele_by_id:
          name: Get Allele by ID
          description: Retrieve detailed allele information by CURIE.
          required_params: [allele_id]
          optional_params: []
          example:
            method: get_allele_by_id
            allele_id: WB:WBVar00143949
        search_anatomy_terms:
          name: Search Anatomy Terms
          description: Search species-specific anatomy ontology terms.
          required_params: [term, data_provider]
          optional_params: [exact_match, include_synonyms, limit]
          example:
            method: search_anatomy_terms
            term: body wall muscle
            data_provider: WB
        search_life_stage_terms:
          name: Search Life Stage Terms
          description: Search species-specific developmental stage ontology terms.
          required_params: [term, data_provider]
          optional_params: [exact_match, include_synonyms, limit]
          example:
            method: search_life_stage_terms
            term: adult
            data_provider: WB
        search_go_terms:
          name: Search GO Terms
          description: Search Gene Ontology terms by name or keyword.
          required_params: [term]
          optional_params: [go_aspect, exact_match, include_synonyms, limit]
          example:
            method: search_go_terms
            term: kinase activity
            go_aspect: molecular_function
        get_ontology_term:
          name: Get Ontology Term
          description: Exact ontology term lookup by CURIE with optional ontologytermtype filtering.
          required_params: [term]
          optional_params: [ontology_term_type]
          example:
            method: get_ontology_term
            term: GO:0003674
            ontology_term_type: GOTerm
        get_ontology_terms:
          name: Get Ontology Terms
          description: Bulk exact ontology term lookup by CURIE.
          required_params: [terms]
          optional_params: []
          example:
            method: get_ontology_terms
            terms: [GO:0003674, ECO:0000314]
        search_ontology_terms:
          name: Search Ontology Terms
          description: Search ontology terms by label within a required curation DB ontologytermtype.
          required_params: [term, ontology_term_type]
          optional_params: [exact_match, include_synonyms, limit]
          example:
            method: search_ontology_terms
            term: abnormal locomotor behavior
            ontology_term_type: MPTerm
            exact_match: true
        map_curies_to_names:
          name: Map CURIEs to Names
          description: Bulk map CURIEs to display names for a supported helper category.
          required_params: [category, curies]
          optional_params: []
          example:
            method: map_curies_to_names
            category: ontology
            curies: [GO:0003674]
        get_vocabulary_term:
          name: Get Vocabulary Term
          description: Exact controlled vocabulary term lookup by vocabulary and term name, abbreviation, or synonym.
          required_params: [vocabulary]
          optional_params: [term, term_name, abbreviation, synonym, include_synonyms, include_obsolete, limit]
          example:
            method: get_vocabulary_term
            vocabulary: Disease Relation
            term_name: is_implicated_in
        search_vocabulary_terms:
          name: Search Vocabulary Terms
          description: Search controlled vocabulary terms by vocabulary name/label and term name, abbreviation, or synonym.
          required_params: []
          optional_params: [vocabulary, term, term_name, abbreviation, synonym, exact_match, include_synonyms, include_obsolete, limit]
          example:
            method: search_vocabulary_terms
            vocabulary: relation
            term: expressed in
            exact_match: true
        get_species:
          name: Get Species
          description: List all supported species/organisms.
          required_params: []
          optional_params: []
          example:
            method: get_species
        get_data_providers:
          name: Get Data Providers
          description: List all Alliance group data providers with abbreviation, taxon, and display name when available.
          required_params: []
          optional_params: []
          example:
            method: get_data_providers
        get_data_provider:
          name: Get Data Provider
          description: Resolve one Alliance data provider by abbreviation, provider display name, or taxon ID and preserve provider/taxon mismatch candidates.
          required_params: []
          optional_params: [abbreviation, provider_name, taxon_id, limit]
          example:
            method: get_data_provider
            abbreviation: WB
            taxon_id: NCBITaxon:6239
        map_entity_names_to_curies:
          name: Map Entity Names to CURIEs
          description: Resolve generic Alliance biological entity names or labels to CURIEs within explicit taxon context.
          required_params: [entity_type, entity_names]
          optional_params: [taxon_id, data_provider]
          example:
            method: map_entity_names_to_curies
            entity_type: agm
            entity_names: ["Pax6<tm1>"]
            taxon_id: NCBITaxon:10090
        map_entity_curies_to_info:
          name: Map Entity CURIEs to Info
          description: Retrieve generic Alliance biological entity facts by CURIE.
          required_params: [entity_type, entity_curies]
          optional_params: []
          example:
            method: map_entity_curies_to_info
            entity_type: agm
            entity_curies: [MGI:8308849]
      agent_methods:
        agm_validation:
          agent_name: AGM Validation Agent
          methods:
            - map_entity_curies_to_info
            - map_entity_names_to_curies
          description: The AGM Validation agent validates affected genomic model subjects with explicit identifier, label, and taxon context.
        subject_entity_validation:
          agent_name: Subject Entity Validation Agent
          methods:
            - get_gene_by_id
            - search_genes
            - get_gene_by_exact_symbol
            - get_allele_by_id
            - search_alleles
            - get_allele_by_exact_symbol
            - map_entity_curies_to_info
            - map_entity_names_to_curies
          description: The Subject Entity agent routes explicit subject_type values to gene, allele, or AGM validation paths.
        gene:
          agent_name: Gene Validation Agent
          methods: [search_genes, search_genes_bulk, get_gene_by_exact_symbol, get_gene_by_id]
          description: The Gene Agent uses these methods to validate gene identifiers and retrieve gene information.
        allele:
          agent_name: Allele Validation Agent
          methods: [search_alleles, search_alleles_bulk, get_allele_by_exact_symbol, get_allele_by_id]
          description: The Allele Agent uses these methods to validate allele/variant identifiers.
        gene_expression:
          agent_name: Gene Expression Extractor
          methods: [search_genes, search_genes_bulk, get_gene_by_exact_symbol]
          description: The Gene Expression agent validates gene names found during PDF extraction.
        gene_ontology:
          agent_name: Gene Ontology Agent
          methods: [search_go_terms]
          description: The GO Agent searches for Gene Ontology terms.
        ontology_term_validation:
          agent_name: Ontology Term Resolver Agent
          methods:
            - get_ontology_term
            - get_ontology_terms
            - search_ontology_terms
            - search_anatomy_terms
            - search_life_stage_terms
            - search_go_terms
            - map_curies_to_names
          description: The Ontology Term Resolver agent validates exact ontology CURIEs and resolves typed label or synonym lookups while preserving ambiguous or unresolved candidates.
        controlled_vocabulary_validation:
          agent_name: Controlled Vocabulary Validation Agent
          methods:
            - get_vocabulary_term
            - search_vocabulary_terms
          description: The Controlled Vocabulary Validation agent validates vocabulary rows by vocabulary name, term name, abbreviation, and synonym.
        data_provider_validation:
          agent_name: Data Provider Validation Agent
          methods:
            - get_data_provider
            - get_data_providers
          description: The Data Provider Validation agent validates provider abbreviations and provider-to-taxon consistency.
        experimental_condition_validation:
          agent_name: Experimental Condition Validation Agent
          methods:
            - get_ontology_term
            - get_ontology_terms
            - search_ontology_terms
            - map_curies_to_names
            - get_vocabulary_term
            - search_vocabulary_terms
            - get_data_provider
            - get_data_providers
          description: The Experimental Condition Validation agent composes ontology, controlled vocabulary, data-provider, taxon, and chemical component validation evidence into one condition-level decision.
      agent_studio:
        prompt_description: "Structured API for Alliance curation database lookups. Filter by data_provider: MGI, FB, WB, ZFIN, RGD, SGD, HGNC."
        diagnostic:
          enabled: true
          category: api
          tags: [gene, allele, ontology, alliance]
          hint: >-
            For PDF evidence and document-tool advice, inspect the live runtime catalog with
            `get_tool_inventory` and `get_tool_details` instead of relying on remembered tool schemas.
          input_schema:
            type: object
            properties:
              method:
                type: string
                description: Query method to execute
                enum:
                  - search_genes
                  - search_genes_bulk
                  - get_gene_by_exact_symbol
                  - get_gene_by_id
                  - search_alleles
                  - search_alleles_bulk
                  - get_allele_by_exact_symbol
                  - get_allele_by_id
                  - get_data_providers
                  - get_data_provider
                  - map_entity_names_to_curies
                  - map_entity_curies_to_info
                  - get_ontology_term
                  - get_ontology_terms
                  - search_ontology_terms
                  - map_curies_to_names
                  - get_vocabulary_term
                  - search_vocabulary_terms
                  - search_anatomy_terms
                  - search_life_stage_terms
                  - search_go_terms
              gene_symbol:
                type: string
                description: Gene symbol to search
              gene_symbols:
                type: array
                items:
                  type: string
                description: Gene symbols for bulk search
              gene_id:
                type: string
                description: Gene CURIE for direct lookup
              allele_symbol:
                type: string
                description: Allele symbol to search
              allele_symbols:
                type: array
                items:
                  type: string
                description: Allele symbols for bulk search
              allele_id:
                type: string
                description: Allele CURIE for direct lookup
              entity_type:
                type: string
                description: Entity helper type
                enum: [gene, allele, agm, construct, targeting_reagent]
              entity_names:
                type: array
                items:
                  type: string
                description: Entity names or labels for generic entity lookup
              entity_curies:
                type: array
                items:
                  type: string
                description: Entity CURIEs for generic entity lookup
              data_provider:
                type: string
                description: Filter by species/group
                enum: [MGI, FB, WB, ZFIN, RGD, SGD, HGNC]
              provider_name:
                type: string
                description: Data provider display name for provider lookup
              taxon_id:
                type: string
                description: NCBITaxon ID alternative to data_provider
              term:
                type: string
                description: Search term for ontology searches
              terms:
                type: array
                items:
                  type: string
                description: CURIE list for bulk ontology term lookup
              ontology_term_type:
                type: string
                description: Curation DB ontologytermtype filter
              vocabulary:
                type: string
                description: Controlled vocabulary name or display label
              term_name:
                type: string
                description: Controlled vocabulary term name
              abbreviation:
                type: string
                description: Controlled vocabulary term abbreviation
              synonym:
                type: string
                description: Controlled vocabulary term synonym
              category:
                type: string
                description: Category for generic CURIE-to-name mapping
              curies:
                type: array
                items:
                  type: string
                description: CURIE list for generic mapping helpers
              go_aspect:
                type: string
                description: GO aspect filter
                enum: [molecular_function, biological_process, cellular_component]
              exact_match:
                type: boolean
                description: Require exact match
              include_synonyms:
                type: boolean
                description: Search synonyms
              include_obsolete:
                type: boolean
                description: Include obsolete controlled vocabulary terms
              limit:
                type: integer
                description: Max results
              force:
                type: boolean
                description: Backward-compatible no-op; search methods no longer perform local symbol-shape validation
              force_reason:
                type: string
                description: Backward-compatible no-op for older callers
            required: [method]
      required_tool_call:
        enforce: true
        failure_message: did not call required database lookup tools before answering
        guardrail_message: You must query the package-declared curation lookup tool before answering. Use agr_curation_query first.
      bulk_list_optimization:
        enabled: true
        minimum_entities: 8
        min_turns: 40
        max_turns: 120
        instruction: |
          TOOL EFFICIENCY REQUIREMENT:
          The request includes a large entity list. Minimize tool rounds.
          Prefer bulk lookup methods when available (for example search_genes_bulk/search_alleles_bulk) using list inputs instead of one-call-per-entity loops.
          If provider/model supports it, issue parallel tool calls in the same turn.
          Avoid one-call-per-entity loops when enough evidence already exists to synthesize output.
  - tool_id: agr_species_context_lookup
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:agr_species_context_lookup
    required_context: []
    description: Resolve Alliance species, data provider, and NCBI taxon context without gene or allele lookup
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: AGR Species Context Lookup
      category: Database
      audit:
        display_name: AGR Species Context Lookup
      documentation:
        summary: Narrow extractor-safe lookup for provider/species/taxon context. This tool does not search gene names, gene IDs, synonyms, or generic entity mappings.
        parameters:
          - name: species
            type: string
            required: false
            description: Species label from the paper, such as Drosophila melanogaster or C. elegans.
          - name: data_provider
            type: string
            required: false
            description: Alliance provider abbreviation, such as FB, WB, MGI, HGNC, ZFIN, RGD, or SGD.
          - name: provider_name
            type: string
            required: false
            description: Data provider display name or organism/provider label.
          - name: taxon_id
            type: string
            required: false
            description: NCBI Taxon CURIE, such as NCBITaxon:7227.
          - name: limit
            type: integer
            required: false
            description: Maximum number of provider candidates to return.
  - tool_id: search_domain_field_terms
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:search_domain_field_terms
    required_context: []
    description: Search domain-pack-declared ontology and controlled-vocabulary candidates for one controlled field without accepting a final selector
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: Search Domain Field Terms
      category: Database
      audit:
        display_name: Search Domain Field Terms
      documentation:
        summary: Broad field-scoped candidate discovery from evidence-backed paper phrases. Search results are candidate guidance only; final selectors must be resolved with resolve_domain_field_term.
        parameters:
          - name: domain_pack_id
            type: string
            required: true
            description: Domain pack identifier, such as agr.alliance.gene_expression.
          - name: object_type
            type: string
            required: true
            description: Curatable object type, such as GeneExpressionAnnotation.
          - name: field_path
            type: string
            required: true
            description: Domain payload field path, such as relation.name or expression_pattern.where_expressed.
          - name: query
            type: string
            required: true
            description: Evidence-backed paper label or controlled-field query text.
          - name: evidence_context
            type: object
            required: false
            description: Optional source phrase, quote, figure, provider, or taxon context from verified evidence.
          - name: data_provider
            type: string
            required: false
            description: Alliance provider abbreviation for provider-scoped anatomy lookup.
          - name: taxon
            type: string
            required: false
            description: Optional taxon context preserved for audit and future routing.
          - name: branch_root_curie
            type: string
            required: false
            description: Optional ontology branch root preserved for field-scoped branch filtering where available.
          - name: limit
            type: integer
            required: false
            description: Maximum number of candidates to return.
          - name: exact_match
            type: boolean
            required: false
            description: Require exact label/name matching when the declared package lookup method supports it.
  - tool_id: inspect_ontology_term
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:inspect_ontology_term
    required_context: []
    description: Inspect one authoritative ontology term and bounded parent, child, or sibling context for a domain-pack field
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: Inspect Ontology Term
      category: Database
      audit:
        display_name: Inspect Ontology Term
      documentation:
        summary: Bounded ontology term context inspection. This tool helps tree-walk and compare candidates but does not justify final controlled selector values.
        parameters:
          - name: domain_pack_id
            type: string
            required: true
            description: Domain pack identifier, such as agr.alliance.gene_expression.
          - name: object_type
            type: string
            required: true
            description: Curatable object type, such as GeneExpressionAnnotation.
          - name: field_path
            type: string
            required: true
            description: Domain payload field path for policy checks.
          - name: curie
            type: string
            required: true
            description: Ontology term CURIE to inspect.
          - name: data_provider
            type: string
            required: false
            description: Alliance provider abbreviation for provider-scoped anatomy context.
          - name: include_parents
            type: boolean
            required: false
            description: Include bounded parent terms when available.
          - name: include_children
            type: boolean
            required: false
            description: Include bounded child terms when available.
          - name: include_siblings
            type: boolean
            required: false
            description: Include bounded sibling terms when available.
          - name: max_depth
            type: integer
            required: false
            description: Maximum tree-walk depth; currently bounded by available API-client support.
          - name: limit
            type: integer
            required: false
            description: Maximum context rows to return per relation.
  - tool_id: resolve_domain_field_term
    binding_kind: static
    callable: agr_ai_curation_alliance.tools.agr_curation:resolve_domain_field_term
    required_context: []
    description: Resolve one final domain-pack controlled field selector and return copyable resolver provenance
    source_file: python/src/agr_ai_curation_alliance/tools/agr_curation.py
    metadata:
      name: Resolve Domain Field Term
      category: Database
      # Run-state builder/resolver tool: platform closure-binds the active resolver ledger +
      # builder workspace into this tool per run (streaming_tools._bind_run_state_into_tools).
      builder_run_state: true
      audit:
        display_name: Resolve Domain Field Term
      documentation:
        summary: Final controlled-field resolver. This is the only ontology/CV resolver tool whose output may justify writing a controlled selector into extractor JSON.
        parameters:
          - name: domain_pack_id
            type: string
            required: true
            description: Domain pack identifier, such as agr.alliance.gene_expression.
          - name: object_type
            type: string
            required: true
            description: Curatable object type, such as GeneExpressionAnnotation.
          - name: field_path
            type: string
            required: true
            description: Domain payload field path to resolve.
          - name: source_phrase
            type: string
