pack_id: gene
display_name: Gene Evidence Domain Pack
version: 0.1.0
metadata_api_version: 1.0.0
description: Exportable, non-mutating validated-reference evidence for extracted Alliance gene mentions.
status: in_development
schema_refs:
  - schema_id: alliance.linkml
    provider: alliance_linkml
    name: Alliance curation LinkML schema
    version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
    uri: https://github.com/alliance-genome/agr_curation_schema/tree/1b11d0888f19eba4ca72022200bb7d96b30d4a52
    definition_state: stable
    metadata:
      provider_refs:
        alliance_linkml:
          repository: https://github.com/alliance-genome/agr_curation_schema.git
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          schema_dir: model/schema
          root_schema: model/schema/allianceModel.yaml
          cache_script: scripts/testing/cache_agr_curation_schema.sh
          ref_kind: schema
enum_definitions:
  - enum_id: GeneMentionConfidence
    display_name: Gene mention confidence
    description: Extractor confidence in the normalized gene reference and paper-evidence match.
    values:
      - value: high
        label: High
      - value: medium
        label: Medium
      - value: low
        label: Low
model_definitions:
  - model_id: GeneMentionEvidencePayload
    display_name: Gene mention evidence payload
    description: Envelope-only payload grounded to Alliance Gene reference fields plus verified paper evidence.
    schema_ref:
      schema_id: alliance.linkml.Gene
      provider: alliance_linkml
      name: Gene
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/gene.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/gene.yaml
            class: Gene
    definition_state: stable
    definition_notes:
      - Payload is evidence/reference data only and is not an Alliance Gene write DTO.
object_definitions:
  - object_type: gene_mention_evidence
    display_name: Gene mention
    description: A tool-verified paper gene mention normalized to an existing Alliance Gene reference.
    model_ref: GeneMentionEvidencePayload
    schema_ref:
      schema_id: alliance.linkml.Gene
      provider: alliance_linkml
      name: Gene
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/gene.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/gene.yaml
            class: Gene
    definition_state: stable
    definition_notes:
      - Envelope-only validated reference evidence; this object does not create or mutate Alliance Gene rows.
      - Paper-gene association write behavior is intentionally out of scope until a concrete target is verified.
    metadata:
      object_role: validated_reference
      evidence_role: gene_mention_evidence
      blocking_validation: false
      workspace_display:
        primary_label_field: mention
        secondary_label_field: gene_symbol
        summary_fields:
          - mention
          - proposed_gene_symbol
          - data_provider_hint
          - gene_symbol
          - primary_external_id
          - taxon
          - confidence
          - section
          - page
        evidence_quote_field: verified_quote
        evidence_locator_fields:
          - page
          - section
          - subsection
          - figure_reference
          - chunk_id
      validator_bindings:
        active:
          - binding_id: alliance_gene_reference_lookup
            display_name: Alliance gene lookup
            validator_agent:
              package_id: agr.alliance
              agent_id: gene_validation
            applies_to:
              domain_pack_id: gene
              object_types:
                - gene_mention_evidence
            input_fields:
              mention:
                source: payload
                path: mention
              proposed_gene_id:
                source: payload
                path: proposed_primary_external_id
                required: false
              proposed_symbol:
                source: payload
                path: proposed_gene_symbol
                required: false
              proposed_taxon:
                source: payload
                path: proposed_taxon
                required: false
              taxon_hint:
                source: payload
                path: taxon_hint
                required: false
              data_provider_hint:
                source: payload
                path: data_provider_hint
                required: false
              species:
                source: payload
                path: species
                required: false
              evidence_quote:
                source: payload
                path: verified_quote
                required: false
              identity_resolution_notes:
                source: payload
                path: identity_resolution_notes
                required: true
                allow_multiple: true
            expected_result_fields:
              curie: primary_external_id
              symbol: gene_symbol
              taxon: taxon
            batch:
              enabled: false
              family: alliance_gene_reference_lookup
            required: true
            blocking: false
            allow_opt_out: true
            curator_override:
              allowed: false
      export_behavior:
        status: ready
        mode: validated_reference_evidence
        target_key: gene_validated_reference_evidence
        exportable: true
        mutates_base_gene: false
        creates_paper_gene_association: false
        reason: Export verified gene reference/evidence data without requiring a paper-gene association write target.
      write_behavior:
        mode: none
        write_target: none
        mutate_canonical_gene: false
        creates_paper_gene_association: false
        reason: Keep extracted genes as validated-reference envelope evidence until a concrete target is verified.
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/gene.yaml
          class: Gene
    fields:
      - field_path: mention
        field_type: string
        display_name: Paper mention
        description: Gene mention exactly as written in the paper.
        required: true
        metadata:
          evidence_source_field: true
          protected: true
          curator_action_note: Paper mention text is the source evidence anchor, not a normalized edit target.
      - field_path: primary_external_id
        field_type: string
        display_name: Gene ID
        description: Alliance Gene primary external identifier materialized by validation tooling.
        metadata:
          validatable: true
          validator_binding_id: alliance_gene_reference_lookup
          validation_result_field: curie
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: Gene
              slot: primary_external_id
              range: string
      - field_path: gene_symbol
        field_type: string
        display_name: Gene symbol
        description: Current accepted symbol materialized by validation tooling.
        metadata:
          validatable: true
          validator_binding_id: alliance_gene_reference_lookup
          validation_result_field: symbol
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/gene.yaml
              class: Gene
              slot: gene_symbol
              range: GeneSymbolSlotAnnotation
      - field_path: taxon
        field_type: string
        display_name: Taxon
        description: NCBI Taxon CURIE materialized by validation tooling for the resolved gene.
        metadata:
          validatable: true
          validator_binding_id: alliance_gene_reference_lookup
          validation_result_field: taxon
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: Gene
              slot: taxon
              range: NCBITaxonTerm
      - field_path: species
        field_type: string
        display_name: Species
        description: Curator-facing species label when available from extraction context.
      - field_path: taxon_hint
        field_type: string
        display_name: Taxon hint
        description: Paper-backed NCBI Taxon CURIE hint preserved for validator input.
      - field_path: data_provider_hint
        field_type: string
        display_name: Data provider hint
        description: Paper-backed Alliance provider hint preserved for validator input.
      - field_path: proposed_primary_external_id
        field_type: string
        display_name: Proposed gene ID
        description: Extractor-proposed Alliance Gene identifier for validator confirmation.
      - field_path: proposed_gene_symbol
        field_type: string
        display_name: Proposed gene symbol
        description: Extractor-proposed gene symbol for validator confirmation.
      - field_path: proposed_taxon
        field_type: string
        display_name: Proposed taxon
        description: Extractor-proposed NCBI Taxon CURIE for validator confirmation.
      - field_path: identity_resolution_notes
        field_type: array
        display_name: Identity resolution notes
        required: true
        description: Extractor-side notes describing paper-backed species or proposed identity hints.
      - field_path: confidence
        field_type: enum
        display_name: Confidence
        required: true
        enum_ref: GeneMentionConfidence
      - field_path: evidence_record_id
        field_type: string
        display_name: Evidence record ID
        description: Stable ID returned by the paper evidence verification tool.
        required: true
        metadata:
          evidence_source_field: true
      - field_path: verified_quote
        field_type: string
        display_name: Verified quote
        description: Verbatim paper text verified by record_evidence.
        required: true
        metadata:
          evidence_source_field: true
      - field_path: page
        field_type: integer
        display_name: Page
        required: true
        metadata:
          evidence_locator_field: true
      - field_path: section
        field_type: string
        display_name: Section
        required: true
        metadata:
          evidence_locator_field: true
      - field_path: subsection
        field_type: string
        display_name: Subsection
        metadata:
          evidence_locator_field: true
      - field_path: chunk_id
        field_type: string
        display_name: Chunk ID
        required: true
        metadata:
          evidence_locator_field: true
      - field_path: figure_reference
        field_type: string
        display_name: Figure/table reference
        metadata:
          evidence_locator_field: true
fixture_packs:
  - fixture_pack_id: tool_verified
    display_name: Tool-verified gene mention evidence fixtures
    path: fixtures/tool_verified.yaml
    description: Pending-ref domain envelopes converted from verified gene extraction fixtures.
    object_types:
      - gene_mention_evidence
metadata:
  base_pack_id: agr.alliance.base
  object_role_key: object_role
  supported_object_roles:
    - validated_reference
  provider_refs:
    alliance_linkml:
      schema_ref: alliance.linkml
      repository: https://github.com/alliance-genome/agr_curation_schema.git
      commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      schema_dir: model/schema
      root_schema: model/schema/allianceModel.yaml
      cache_script: scripts/testing/cache_agr_curation_schema.sh
  extraction_builder:
    enabled: true
    stage_tool: stage_gene_mention_evidence
    finalize_tool: finalize_gene_extraction
    retained_unit: gene_mention_evidence
    per_retained_finding: true
    model_final_ack_schema: ExtractionToolFinalizationAck
    curation_output_schema: GeneExtractionResultEnvelope
    primary_stage_field: mention
    dedupe_fields:
      - mention
      - evidence_record_ids
    stage_description: Submit one retained gene mention after verifying its supporting quote with record_evidence.
    finalize_description: Call exactly once after all retained gene mentions have been staged; the backend builds the final gene envelope.
    fields:
      mention:
        json_type: string
        required: true
        maps_to: gene_mention_evidence.payload.mention
        hint: Exact gene mention or most searchable paper-backed label for the retained entity.
      evidence_record_ids:
        json_type: array
        required: true
        collection: true
        min_items: 1
        maps_to: gene_mention_evidence.payload.evidence_record_id
        hint: Each value must be returned by a verified record_evidence call from the current run.
      identity_resolution_notes:
        json_type: array
        required: true
        collection: true
        min_items: 1
        maps_to: gene_mention_evidence.payload.identity_resolution_notes
        hint: One to three paper-backed notes preserving aliases, species/provider context, assay context, or disambiguation clues for the gene validator.
      confidence:
        json_type: string
        required: true
        maps_to: gene_mention_evidence.payload.confidence
        hint: Extractor confidence; use high, medium, or low.
      species:
        json_type: string
        maps_to: gene_mention_evidence.payload.species
        hint: Paper-backed species label when available.
      taxon_hint:
        json_type: string
        maps_to: gene_mention_evidence.payload.taxon_hint
        hint: Paper-backed NCBI Taxon CURIE hint when available.
      data_provider_hint:
        json_type: string
        maps_to: gene_mention_evidence.payload.data_provider_hint
        hint: Paper-backed Alliance provider hint when available.
      proposed_primary_external_id:
        json_type: string
        maps_to: gene_mention_evidence.payload.proposed_primary_external_id
        hint: Optional paper-supplied or context-supported identifier hint; do not invent final identity.
      proposed_gene_symbol:
        json_type: string
        maps_to: gene_mention_evidence.payload.proposed_gene_symbol
        hint: Optional paper-backed symbol hint for validator confirmation.
      proposed_taxon:
        json_type: string
        maps_to: gene_mention_evidence.payload.proposed_taxon
        hint: Optional NCBI Taxon CURIE hint for validator confirmation.
      raw_mentions:
        json_type: array
        collection: true
        maps_to: metadata.raw_mentions
        hint: Optional supporting harvested mentions for audit metadata.
    finalize_fields:
      summary:
        json_type: string
        required: true
        hint: Concise run summary.
      candidate_count:
        json_type: integer
        required: true
        hint: Number of harvested gene-like candidates considered.
      kept_count:
        json_type: integer
        required: true
        hint: Must equal the number of successfully staged retained gene findings.
      excluded_count:
        json_type: integer
        required: true
        hint: Must equal exclusions.length.
      ambiguous_count:
        json_type: integer
        required: true
        hint: Must equal ambiguities.length.
      exclusions:
        json_type: array
        collection: true
        hint: Excluded gene-like candidates with allowed reason codes.
      ambiguities:
        json_type: array
        collection: true
        hint: Unresolved candidates requiring curator review.
      notes:
        json_type: array
        collection: true
        hint: Optional run-level audit notes.
    object_graph:
      required_objects:
        - gene_mention_evidence
      validator_targets:
        - target_id: gene_reference
          binding_id: alliance_gene_reference_lookup
          object_type: gene_mention_evidence
          field_path: mention
      objects:
        - object_type: gene_mention_evidence
          model_ref: GeneMentionEvidencePayload
          schema_ref:
            schema_id: alliance.linkml.Gene
            provider: alliance_linkml
            name: Gene
            version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/gene.yaml
          object_role: validated_reference
          definition_state: in_development
          definition_notes:
            - Envelope-only validated-reference evidence; this object does not create or mutate Alliance Gene rows.
          pending_ref_template: gene_mention_{staged_id}_{evidence_record_id}
          repeat_for: evidence_record_ids
          payload_fields:
            mention: mention
            species: species
            taxon_hint: taxon_hint
            data_provider_hint: data_provider_hint
            proposed_primary_external_id: proposed_primary_external_id
            proposed_gene_symbol: proposed_gene_symbol
            proposed_taxon: proposed_taxon
            identity_resolution_notes: identity_resolution_notes
            confidence: confidence
            evidence_record_id: evidence_record_id
            verified_quote: verified_quote
            page: page
            section: section
            subsection: subsection
            chunk_id: chunk_id
            figure_reference: figure_reference
          metadata:
            object_role: validated_reference
            evidence_role: gene_mention_evidence
            write_behavior:
              mode: none
              write_target: none
              reason: Keep extracted genes as validated-reference envelope evidence until a concrete target is verified.
    allowed_exclusion_reason_codes:
      - previously_reported
      - non_experimental_claim
      - insufficient_experimental_evidence
      - out_of_scope
      - ambiguous_entity
      - duplicate_mention
      - unsupported_entity_type
      - gene_family_not_individual
      - author_or_reagent_name
      - reference_list_only
    allowed_ambiguity_reason_codes:
      - ambiguous_entity
      - insufficient_selector_context
      - unresolved_identity
    examples:
      stage:
        mention: daf-2
        evidence_record_ids:
          - ev_verified_gene_quote_1
        identity_resolution_notes:
          - The paper studies C. elegans daf-2 mutants and reports insulin-like signaling phenotypes.
        confidence: high
        taxon_hint: NCBITaxon:6239
      finalize:
        summary: Staged one retained gene mention and excluded one pathway-only candidate.
        candidate_count: 2
        kept_count: 1
        excluded_count: 1
        ambiguous_count: 0
    repair_messages:
      invalid_stage_input: Submit one gene mention with paper-backed identity_resolution_notes and verified evidence_record_ids from this run.
      invalid_finalize_input: Finalization requires internally consistent counts and allowed reason codes.
      invalid_finalization: Resolve builder finalization issues before ending the run.
      duplicate_finalization: finalize_gene_extraction must be called exactly once, after all retained gene mentions are staged.
