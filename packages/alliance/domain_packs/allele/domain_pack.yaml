pack_id: agr.alliance.allele
display_name: Alliance Allele Paper Evidence Domain Pack
version: 0.1.0
metadata_api_version: 1.0.0
description: Pending allele paper/evidence association envelopes grounded to pinned Alliance LinkML and read-only curation DB targets.
status: in_development
schema_refs:
  - schema_id: alliance.linkml
    provider: alliance_linkml
    name: Alliance curation LinkML schema
    version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
    uri: https://github.com/alliance-genome/agr_curation_schema/tree/1b11d0888f19eba4ca72022200bb7d96b30d4a52
    definition_state: stable
    metadata:
      provider_refs:
        alliance_linkml:
          repository: https://github.com/alliance-genome/agr_curation_schema.git
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          schema_dir: model/schema
          root_schema: model/schema/allianceModel.yaml
          cache_script: scripts/testing/cache_agr_curation_schema.sh
          ref_kind: schema
model_definitions:
  - model_id: AllelePaperEvidenceAssociationPayload
    display_name: Allele paper/evidence association payload
    description: Pending association payload for an extracted allele mention, a paper reference, and verified evidence quotes.
    schema_ref:
      schema_id: alliance.linkml.AlleleAssociation
      provider: alliance_linkml
      name: AlleleAssociation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/allele.yaml
      definition_state: in_development
      definition_notes:
        - The LinkML class is abstract; this pack emits pending envelopes only and blocks writes.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/allele.yaml
            class: AlleleAssociation
  - model_id: AlleleReferencePayload
    display_name: Allele validated-reference payload
    schema_ref:
      schema_id: alliance.linkml.Allele
      provider: alliance_linkml
      name: Allele
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/allele.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/allele.yaml
            class: Allele
  - model_id: ReferencePayload
    display_name: Reference validated-reference payload
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
  - model_id: AlleleMentionPayload
    display_name: Allele mention payload
    description: Metadata-only payload preserving the paper mention that produced an allele reference candidate.
    definition_state: in_development
    definition_notes:
      - Provider-neutral extracted mention object; not a LinkML write target.
  - model_id: EvidenceQuotePayload
    display_name: Verified evidence quote payload
    description: Metadata-only payload preserving record_evidence-verified paper text and document location.
    definition_state: in_development
    definition_notes:
      - Provider-neutral evidence quote object; not a LinkML write target.
object_definitions:
  - object_type: AllelePaperEvidenceAssociation
    display_name: Allele paper/evidence association
    description: Pending curatable unit linking an allele reference candidate, source paper, and verified evidence quote.
    model_ref: AllelePaperEvidenceAssociationPayload
    schema_ref:
      schema_id: alliance.linkml.AlleleAssociation
      provider: alliance_linkml
      name: AlleleAssociation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/allele.yaml
      definition_state: in_development
      definition_notes:
        - Abstract LinkML target used only for grounded association metadata; writes are blocked.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/allele.yaml
            class: AlleleAssociation
    definition_state: in_development
    definition_notes:
      - Write behavior is blocked until reference materialization and a non-mutating submission path are verified.
    metadata:
      object_role: curatable_unit
      association_kind: allele_paper_evidence
      export_behavior:
        status: blocked
        mode: verified_association_targets_only
        reason: Allele association export requires durable allele, reference, and evidence IDs before any verified target operation can be emitted.
        verified_targets:
          - public.allele_reference
          - public.allelegeneassociation
          - public.allelegeneassociation_informationcontententity
        blocked_targets:
          - public.allele_reference
          - public.allelegeneassociation_informationcontententity
      write_behavior:
        status: blocked
        reason: The allele_reference table shape is verified, but this pack only emits pending envelopes because reference IDs and a non-mutating write path are not yet verified for this workflow.
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/allele.yaml
          class: AlleleAssociation
    fields:
      - field_path: association_kind
        field_type: string
        display_name: Association kind
        required: true
        metadata:
          protected: true
          curator_action_note: Association kind is a domain-pack routing invariant.
      - field_path: allele
        field_type: object_ref
        display_name: Allele
        required: false
        object_type_ref: Allele
        metadata:
          validation_result_binding_id: allele_mention_reference_validation
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/allele.yaml
              class: AlleleAssociation
              attribute: allele_association_subject
              range: Allele
      - field_path: reference
        field_type: object_ref
        display_name: Paper reference
        required: true
        object_type_ref: Reference
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: Allele
              slot: references
              range: Reference
      - field_path: evidence_quote
        field_type: object_ref
        display_name: Verified evidence quote
        required: true
        object_type_ref: EvidenceQuote
        metadata:
          collection: true
          allows_repeated_refs: true
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/reference.yaml
              class: EvidenceAssociation
              slot: evidence
              range: InformationContentEntity
      - field_path: mention
        field_type: object_ref
        display_name: Source allele mention
        required: true
        object_type_ref: AlleleMention
      - field_path: allele_identifier
        field_type: string
        display_name: Allele identifier
        required: false
        metadata:
          validation_result_binding_id: allele_mention_reference_validation
          validation_result_field: curie
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/allele.yaml
              class: AlleleGenomicEntityAssociationDTO
              slot: allele_identifier
              range: string
      - field_path: evidence_record_ids[0]
        field_type: string
        display_name: First evidence record ID
  - object_type: Allele
    display_name: Allele
    description: Pending validated-reference object for an existing Alliance allele.
    model_ref: AlleleReferencePayload
    schema_ref:
      schema_id: alliance.linkml.Allele
      provider: alliance_linkml
      name: Allele
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/allele.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/allele.yaml
            class: Allele
    definition_state: in_development
    metadata:
      object_role: validated_reference
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/allele.yaml
          class: Allele
    fields:
      - field_path: primary_external_id
        field_type: string
        display_name: Primary external ID
        required: true
        metadata:
          validation_result_binding_id: allele_mention_reference_validation
          validation_result_field: curie
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: Allele
              slot: primary_external_id
              range: string
      - field_path: allele_symbol
        field_type: string
        display_name: Allele symbol
        required: true
        metadata:
          validation_result_binding_id: allele_mention_reference_validation
          validation_result_field: symbol
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/allele.yaml
              class: Allele
              slot: allele_symbol
              range: AlleleSymbolSlotAnnotation
      - field_path: taxon
        field_type: string
        display_name: Taxon
        required: true
        metadata:
          validation_result_binding_id: allele_mention_reference_validation
          validation_result_field: taxon
  - object_type: Reference
    display_name: Reference
    description: Pending literature/reference object for the source paper.
    model_ref: ReferencePayload
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
    definition_state: in_development
    metadata:
      object_role: validated_reference
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/reference.yaml
          class: Reference
    fields:
      - field_path: reference_id
        field_type: integer
        display_name: Reference ID
        required: false
        metadata:
          builder_note: Durable Alliance reference IDs are optional in first-pass extraction and must not be invented.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/reference.yaml
              class: Reference
              slot: reference_id
              range: integer
      - field_path: title
        field_type: string
        display_name: Title
  - object_type: AlleleMention
    display_name: Allele mention
    description: Metadata-only object preserving the extracted allele text and validator selector context.
    model_ref: AlleleMentionPayload
    definition_state: in_development
    metadata:
      object_role: metadata_only
    fields:
      - field_path: mention.text
        field_type: string
        display_name: Mention text
        required: true
        metadata:
          protected: true
          curator_action_note: Mention text is the source evidence anchor, not a normalized edit target.
      - field_path: mention.normalized_hint
        field_type: string
        display_name: Normalized hint
      - field_path: associated_gene.symbol
        field_type: string
        display_name: Associated gene symbol
      - field_path: taxon.curie
        field_type: string
        display_name: Taxon CURIE
      - field_path: source_mentions[0]
        field_type: string
        display_name: First source mention
  - object_type: EvidenceQuote
    display_name: Verified evidence quote
    description: Metadata-only object preserving one record_evidence-verified quote and document locator.
    model_ref: EvidenceQuotePayload
    definition_state: in_development
    metadata:
      object_role: metadata_only
    fields:
      - field_path: evidence_record_id
        field_type: string
        display_name: Evidence record ID
      - field_path: verified_quote
        field_type: string
        display_name: Verified quote
        required: true
      - field_path: page
        field_type: integer
        display_name: Page
      - field_path: section
        field_type: string
        display_name: Section
      - field_path: subsection
        field_type: string
        display_name: Subsection
      - field_path: chunk_id
        field_type: string
        display_name: Chunk ID
      - field_path: figure_reference
        field_type: string
        display_name: Figure reference
fixture_packs:
  - fixture_pack_id: tool_verified
    display_name: Tool-verified allele paper/evidence fixtures
    path: fixtures/tool_verified.yaml
    description: Production-like pending allele paper/evidence envelopes converted from verified extractor output.
    object_types:
      - AllelePaperEvidenceAssociation
      - Allele
      - Reference
      - AlleleMention
      - EvidenceQuote
    definition_state: in_development
metadata:
  semantic_source: domain_envelope.objects
  object_role_key: object_role
  supported_object_roles:
    - curatable_unit
    - validated_reference
    - metadata_only
  extraction_builder:
    enabled: true
    stage_tool: stage_allele_paper_evidence
    finalize_tool: finalize_allele_extraction
    retained_unit: AllelePaperEvidenceAssociation
    per_retained_finding: true
    model_final_ack_schema: ExtractionToolFinalizationAck
    curation_output_schema: AlleleExtractionResultEnvelope
    stage_description: Submit one retained allele or variant finding after verifying its supporting quote with record_evidence.
    finalize_description: Call exactly once after all retained allele findings have been staged; the backend builds the final allele envelope.
    fields:
      mention_text:
        json_type: string
        required: true
        maps_to: AlleleMention.payload.mention.text
        hint: Exact allele or variant notation as written in the paper; do not combine multiple alleles.
        examples:
          - daf-2(m41)
          - crb<sup>11A22</sup>
        repair_messages:
          missing: Provide the exact allele or variant notation from the paper.
          invalid: Submit one allele mention, not a comma-separated list or normalized database guess.
      evidence_record_ids:
        json_type: array
        required: true
        collection: true
        min_items: 1
        maps_to: EvidenceQuote.payload.evidence_record_id
        hint: Each value must be returned by a verified record_evidence call from the current run.
        examples:
          - ["ev_daf2_m41_1"]
        repair_messages:
          missing: Verify supporting source text with record_evidence before staging the allele.
          unverified: Use only evidence_record_id values returned by successful record_evidence calls.
      verified_quotes:
        json_type: array
        collection: true
        maps_to: EvidenceQuote.payload.verified_quote
        hint: Optional echoes of the verified quotes; if present they must match record_evidence output exactly.
      page:
        json_type: integer
        maps_to: EvidenceQuote.payload.page
        hint: Optional page echo from record_evidence for repair diagnostics.
      section:
        json_type: string
        maps_to: EvidenceQuote.payload.section
        hint: Optional section echo from record_evidence for repair diagnostics.
      chunk_id:
        json_type: string
        maps_to: EvidenceQuote.payload.chunk_id
        hint: Optional chunk_id echo from record_evidence for repair diagnostics.
      associated_gene_symbol:
        json_type: string
        maps_to: AlleleMention.payload.associated_gene.symbol
        hint: Include only when paper-supported or clear from study context.
      taxon_curie:
        json_type: string
        maps_to: AlleleMention.payload.taxon.curie
        hint: Include only when paper-supported or clear from study context.
      normalized_hint:
        json_type: string
        maps_to: AlleleMention.payload.mention.normalized_hint
        hint: Optional only when the paper itself supplies an explicit identifier or normalized name; do not invent final allele identity.
      reference:
        json_type: object
        maps_to: Reference.payload
        hint: Optional paper/runtime reference metadata. Durable Alliance reference_id is optional and must not be invented.
      finding_notes:
        json_type: string
        maps_to: metadata.notes
        hint: Optional concise curator-facing note for this retained finding.
      raw_mentions:
        json_type: array
        collection: true
        maps_to: metadata.raw_mentions
        hint: Optional supporting harvested mentions for audit metadata.
    finalize_fields:
      summary:
        json_type: string
        required: true
        hint: Concise run summary.
      candidate_count:
        json_type: integer
        required: true
        hint: Number of harvested allele-like candidates considered.
      kept_count:
        json_type: integer
        required: true
        hint: Must equal the number of successfully staged retained allele findings.
      excluded_count:
        json_type: integer
        required: true
        hint: Must equal exclusions.length.
      ambiguous_count:
        json_type: integer
        required: true
        hint: Must equal ambiguities.length.
      exclusions:
        json_type: array
        collection: true
        hint: Excluded allele-like candidates with allowed reason codes.
      ambiguities:
        json_type: array
        collection: true
        hint: Unresolved candidates requiring curator review.
      notes:
        json_type: array
        collection: true
        hint: Optional run-level audit notes.
    object_graph:
      required_objects:
        - AllelePaperEvidenceAssociation
        - Reference
        - AlleleMention
        - EvidenceQuote
      validator_target:
        object_type: AlleleMention
        field_path: mention.text
      objects:
        - object_type: Reference
          model_ref: ReferencePayload
          object_role: validated_reference
          definition_state: in_development
          pending_ref_template: reference_{staged_id}
          payload_fields:
            reference_id: reference.reference_id
            curie: reference.curie
            pmid: reference.pmid
            doi: reference.doi
            title: reference.title
        - object_type: AlleleMention
          model_ref: AlleleMentionPayload
          object_role: metadata_only
          definition_state: in_development
          pending_ref_template: mention_{staged_id}
          payload_fields:
            mention.text: mention_text
            mention.normalized_hint: normalized_hint
            associated_gene.symbol: associated_gene_symbol
            taxon.curie: taxon_curie
            source_mentions: raw_mentions
        - object_type: EvidenceQuote
          model_ref: EvidenceQuotePayload
          object_role: metadata_only
          definition_state: in_development
          pending_ref_template: evidence_quote_{evidence_record_id}
          payload_fields:
            evidence_record_id: evidence_record_id
            verified_quote: verified_quote
            page: page
            section: section
            subsection: subsection
            chunk_id: chunk_id
            figure_reference: figure_reference
        - object_type: AllelePaperEvidenceAssociation
          model_ref: AllelePaperEvidenceAssociationPayload
          object_role: curatable_unit
          definition_state: in_development
          pending_ref_template: association_{staged_id}
          payload_fields:
            association_kind: literal:allele_paper_evidence
            evidence_record_ids: evidence_record_ids
          metadata:
            write_behavior:
              status: blocked
              reason: Builder-generated allele paper/evidence associations remain pending until durable reference and allele materialization are verified.
          object_refs:
            - field_path: reference
              object_type: Reference
            - field_path: mention
              object_type: AlleleMention
            - field_path: evidence_quote
              object_type: EvidenceQuote
              collection: true
    allowed_exclusion_reason_codes:
      - previously_reported
      - non_experimental_claim
      - insufficient_experimental_evidence
      - out_of_scope
      - ambiguous_entity
      - duplicate_mention
      - unsupported_entity_type
      - strain_not_allele
      - transgene_construct
      - balancer_or_deficiency
      - wild_type_reference
      - background_genotype_only
    allowed_ambiguity_reason_codes:
      - ambiguous_entity
      - insufficient_selector_context
      - unresolved_identity
    examples:
      stage:
        mention_text: daf-2(m41)
        evidence_record_ids:
          - ev_verified_quote_1
        associated_gene_symbol: daf-2
        taxon_curie: NCBITaxon:6239
      finalize:
        summary: Staged one retained allele finding and excluded two background genotypes.
        candidate_count: 3
        kept_count: 1
        excluded_count: 2
        ambiguous_count: 0
    repair_messages:
      invalid_stage_input: Submit one allele finding with mention_text and verified evidence_record_ids from this run.
      invalid_finalize_input: Finalization requires internally consistent counts and allowed reason codes.
      invalid_finalization: Resolve builder finalization issues before ending the run.
      duplicate_finalization: finalize_allele_extraction must be called exactly once, after all retained findings are staged.
  provider_refs:
    alliance_linkml:
      schema_ref: alliance.linkml
      repository: https://github.com/alliance-genome/agr_curation_schema.git
      commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      schema_dir: model/schema
      root_schema: model/schema/allianceModel.yaml
      cache_script: scripts/testing/cache_agr_curation_schema.sh
  validators:
    active:
      - validator_id: allele_mention_reference_validation
        display_name: Allele mention lookup
        description: Validate extracted allele mention text against Alliance allele rows and materialize allele identifier, symbol, and taxon fields through the active package-scoped allele validator binding.
    under_development:
      - validator_id: allele_pending_envelope_validator
        display_name: Data check
        description: Pending allele envelope data checks are structural review metadata until concrete selector inputs and expected result fields are defined.
      - validator_id: source_reference_validation
        display_name: Source reference validation
        description: Validate source paper reference identifiers through the API-backed reference validator after dependent reference materialization and export flows are activated.
  validator_bindings:
    active:
      - binding_id: allele_mention_reference_validation
        display_name: Allele mention reference
        validator_agent:
          package_id: agr.alliance
          agent_id: allele_validation
        applies_to:
          domain_pack_id: agr.alliance.allele
          object_types:
            - AlleleMention
          field_paths:
            - mention.text
        input_fields:
          mention:
            source: payload
            path: mention.text
          normalized_hint:
            source: payload
            path: mention.normalized_hint
            required: false
          associated_gene:
            source: payload
            path: associated_gene.symbol
            required: false
          taxon:
            source: payload
            path: taxon.curie
            required: false
          evidence_quote:
            source: evidence_record
            path: verified_quote
            required: false
        expected_result_fields:
          curie: allele.primary_external_id
          symbol: allele.allele_symbol
          taxon: allele.taxon
        required: true
        blocking: true
        allow_opt_out: false
        curator_override:
          allowed: false
    under_development:
      - binding_id: allele_pending_envelope_validator
        display_name: Data check
        state_explanation: Pending allele envelope data checks are structural review metadata and must not dispatch until concrete selector inputs and expected result fields are defined.
        validator_agent:
          package_id: agr.alliance
          agent_id: allele_validation
        applies_to:
          domain_pack_id: agr.alliance.allele
          object_types:
            - AllelePaperEvidenceAssociation
            - Allele
            - Reference
            - AlleleMention
            - EvidenceQuote
        input_fields: {}
        expected_result_fields: {}
        definition_state: in_development
      - binding_id: source_reference_validation
        display_name: Source reference validation
        validator_agent:
          package_id: agr.alliance
          agent_id: reference_validation
        state_explanation: Reference validation is prepared around the API-backed package tool but remains metadata-only until dependent reference materialization and export flows are activated.
        applies_to:
          domain_pack_id: agr.alliance.allele
          object_types:
            - Reference
          field_paths:
            - reference_id
            - curie
            - title
        input_fields:
          reference_id:
            source: payload
            path: reference_id
            required: false
          curie:
            source: payload
            path: curie
            required: false
