pack_id: agr.alliance.disease
display_name: Alliance Disease Domain Pack
version: 0.1.0
metadata_api_version: 1.0.0
description: Pending disease assertion envelopes grounded to Alliance DiseaseAnnotation LinkML metadata and read-only curation DB target tables.
status: in_development
schema_refs:
  - schema_id: alliance.linkml
    provider: alliance_linkml
    name: Alliance curation LinkML schema
    version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
    uri: https://github.com/alliance-genome/agr_curation_schema/tree/1b11d0888f19eba4ca72022200bb7d96b30d4a52
    definition_state: stable
    metadata:
      provider_refs:
        alliance_linkml:
          repository: https://github.com/alliance-genome/agr_curation_schema.git
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          schema_dir: model/schema
          root_schema: model/schema/allianceModel.yaml
          cache_script: scripts/testing/cache_agr_curation_schema.sh
          ref_kind: schema
enum_definitions:
  - enum_id: DiseaseAssertionRole
    display_name: Disease assertion role
    description: Extractor role for the disease mention in the paper context.
    values:
      - value: primary
        label: Primary
      - value: background
        label: Background
      - value: comparative
        label: Comparative
      - value: model_context
        label: Model context
      - value: unspecified
        label: Unspecified
  - enum_id: DiseaseAssertionConfidence
    display_name: Disease assertion confidence
    description: Extractor confidence in disease normalization and role classification.
    values:
      - value: high
        label: High
      - value: medium
        label: Medium
      - value: low
        label: Low
  - enum_id: DiseaseSubjectType
    display_name: Disease assertion subject type
    description: Pending type for the biological entity subject before concrete annotation materialization.
    definition_state: in_development
    values:
      - value: gene
        label: Gene
      - value: allele
        label: Allele
      - value: agm
        label: Affected genomic model
      - value: unknown
        label: Unknown
model_definitions:
  - model_id: PendingDiseaseAssertionPayload
    display_name: Pending disease assertion payload
    description: One pending disease assertion grounded to abstract DiseaseAnnotation metadata; concrete Gene/Allele/AGM write targets are blocked.
    schema_ref:
      schema_id: alliance.linkml.DiseaseAnnotation
      provider: alliance_linkml
      name: DiseaseAnnotation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      definition_notes:
        - DiseaseAnnotation is abstract in LinkML; this pack emits pending envelopes and blocks writes until concrete subject materialization is verified.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: DiseaseAnnotation
    definition_state: in_development
    definition_notes:
      - Required write DTO fields such as subject, reference, evidence code, and data provider are declared but not required for pending assertion validation.
  - model_id: DiseaseOntologyTermSnapshotPayload
    display_name: Disease ontology term snapshot payload
    description: Embedded Disease Ontology term identity for the asserted disease.
    schema_ref:
      schema_id: alliance.linkml.DOTerm
      provider: alliance_linkml
      name: DOTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: DOTerm
  - model_id: DiseaseSubjectSnapshotPayload
    display_name: Pending disease subject snapshot payload
    description: Extractor-observed subject context before concrete Gene, Allele, or AGM materialization.
    definition_state: in_development
    definition_notes:
      - Subject identity is not a stable write target until the disease extractor migration emits concrete subject identifiers.
  - model_id: ReferenceSnapshotPayload
    display_name: Reference snapshot payload
    description: Source paper reference fields needed before a single_reference can be materialized.
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
  - model_id: VocabularyTermSnapshotPayload
    display_name: Vocabulary term snapshot payload
    description: Embedded controlled vocabulary term identity.
    schema_ref:
      schema_id: alliance.linkml.VocabularyTerm
      provider: alliance_linkml
      name: VocabularyTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/controlledVocabulary.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/controlledVocabulary.yaml
            class: VocabularyTerm
  - model_id: ConditionRelationPayload
    display_name: Condition relation payload
    description: Optional embedded condition relation context for pending disease assertions.
    schema_ref:
      schema_id: alliance.linkml.ConditionRelation
      provider: alliance_linkml
      name: ConditionRelation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ConditionRelation
  - model_id: ExperimentalConditionPayload
    display_name: Experimental condition payload
    description: Optional embedded experimental condition context.
    schema_ref:
      schema_id: alliance.linkml.ExperimentalCondition
      provider: alliance_linkml
      name: ExperimentalCondition
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ExperimentalCondition
  - model_id: EvidenceRecordPayload
    display_name: Verified evidence record payload
    description: Metadata-only record_evidence result preserved inside the pending disease assertion.
    definition_state: stable
object_definitions:
  - object_type: DiseaseAnnotation
    display_name: Disease annotation
    description: Pending curatable unit for one evidence-backed disease assertion before concrete subject/reference/write materialization.
    model_ref: PendingDiseaseAssertionPayload
    schema_ref:
      schema_id: alliance.linkml.DiseaseAnnotation
      provider: alliance_linkml
      name: DiseaseAnnotation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      definition_notes:
        - DiseaseAnnotation is abstract in LinkML; pending envelopes distinguish complete extraction fields from blocked write-target fields.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: DiseaseAnnotation
    definition_state: in_development
    definition_notes:
      - Pending only; write behavior is blocked until subject type, subject ID, source reference ID, evidence codes, and concrete annotation subtype are verified.
    metadata:
      object_role: curatable_unit
      assertion_kind: pending_disease_assertion
      semantic_source: domain_envelope.objects
      validator_binding_id: disease_pending_envelope_validator
      write_behavior:
        status: blocked
        blocked_by: ALL-425
        reason: The read-only DB projection is verified, but writes require concrete GeneDiseaseAnnotation, AlleleDiseaseAnnotation, or AGMDiseaseAnnotation materialization plus durable reference and evidence-code mappings.
        blocked_operations:
          - insert public.diseaseannotation
          - insert public.genediseaseannotation
          - insert public.allelediseaseannotation
          - insert public.agmdiseaseannotation
          - insert public.diseaseannotation_conditionrelation
      export_behavior:
        status: blocked
        blocked_by: ALL-425
        reason: Disease export/submission adapters are out of scope for this pack and wait for verified submission payload mapping.
      definition_state_summary:
        complete:
          - mention
          - disease_annotation_object
          - role
          - confidence
          - evidence_record_ids
          - evidence_records
        under_development:
          - disease_relation_name
          - condition_relations
        blocked:
          - disease_annotation_subject
          - single_reference
          - evidence_code_curies
          - data_provider
      db_projection:
        base_table: public.diseaseannotation
        concrete_tables:
          - public.genediseaseannotation
          - public.allelediseaseannotation
          - public.agmdiseaseannotation
        condition_tables:
          - public.diseaseannotation_conditionrelation
          - public.conditionrelation
          - public.conditionrelation_experimentalcondition
          - public.experimentalcondition
        representative_rows:
          - row_id: 209127250
            subtype: GeneDiseaseAnnotation
            subject_primary_external_id: SGD:S000004578
            disease_curie: DOID:0050730
            relation_name: is_implicated_in
            data_provider: SGD
          - row_id: 209127267
            subtype: AlleleDiseaseAnnotation
            subject_primary_external_id: MGI:3689328
            disease_curie: DOID:0111789
            relation_name: is_implicated_in
            data_provider: MGI
          - row_id: 209127402
            subtype: AGMDiseaseAnnotation
            subject_primary_external_id: MGI:8308849
            disease_curie: DOID:0111441
            relation_name: is_model_of
            data_provider: MGI
        representative_condition_row:
          diseaseannotation_id: 209127194
          condition_relation_type: has_condition
          condition_class_curie: ZECO:0000111
          condition_id_curie: ZECO:0000238
          condition_chemical_curie: CHEBI:6909
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
          class: DiseaseAnnotation
        alliance_curation_db:
          inspected_tables:
            - public.diseaseannotation
            - public.genediseaseannotation
            - public.allelediseaseannotation
            - public.agmdiseaseannotation
            - public.diseaseannotation_conditionrelation
            - public.conditionrelation
            - public.conditionrelation_experimentalcondition
            - public.experimentalcondition
          row_counts:
            diseaseannotation: 81227
            genediseaseannotation: 43148
            allelediseaseannotation: 5551
            agmdiseaseannotation: 32528
            diseaseannotation_conditionrelation: 4191
            conditionrelation: 19549
            conditionrelation_experimentalcondition: 23532
            experimentalcondition: 15338
    fields:
      - field_path: mention
        field_type: string
        display_name: Paper disease mention
        description: Disease mention exactly as written in the paper.
        required: true
        metadata:
          evidence_source_field: true
          definition_state_category: complete
      - field_path: disease_annotation_object
        field_type: object
        display_name: Disease ontology term
        description: Disease Ontology term asserted by the pending disease annotation.
        required: true
        model_ref: DiseaseOntologyTermSnapshotPayload
        metadata:
          validatable: true
          validator_binding_id: disease_ontology_term_lookup
          validator_state: planned
          definition_state_category: complete
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: DiseaseAnnotation
              attribute: disease_annotation_object
              range: DOTerm
              db_table: diseaseannotation
              db_column: diseaseannotationobject_id
      - field_path: disease_annotation_object.curie
        field_type: string
        display_name: Disease term CURIE
        description: Disease Ontology CURIE for the asserted disease term.
        required: true
        metadata:
          validatable: true
          validator_binding_id: disease_ontology_term_lookup
          validator_state: planned
          validation_result_field: curie
          definition_state_category: complete
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: DOTerm
              slot: curie
              range: uriorcurie
              db_table: ontologyterm
              db_column: curie
      - field_path: disease_annotation_object.name
        field_type: string
        display_name: Disease term name
        description: Disease Ontology label for the asserted disease term.
        required: true
        metadata:
          validatable: true
          validator_binding_id: disease_ontology_term_lookup
          validator_state: planned
          validation_result_field: name
          definition_state_category: complete
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
