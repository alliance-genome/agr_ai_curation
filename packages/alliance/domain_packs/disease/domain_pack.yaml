fixture_packs:
  - fixture_pack_id: tool_verified
    display_name: Tool-verified disease assertion fixtures
    path: fixtures/tool_verified.yaml
    description: Pending disease assertion domain envelopes converted from verified disease extraction fixtures.
    object_types:
      - DiseaseAnnotation
  - fixture_pack_id: alzheimers_builder_pending
    display_name: Builder concrete GeneDiseaseAnnotation fixtures
    path: fixtures/alzheimers_builder_pending.yaml
    description: Concrete GeneDiseaseAnnotation domain envelope produced by the disease builder materializer (FULL LinkML alignment) with RELATIVE metadata_refs.
    object_types:
      - GeneDiseaseAnnotation
metadata:
  object_role_key: object_role
  curatable_unit_object_type: DiseaseAnnotation
  semantic_source: domain_envelope.extracted_objects
  legacy_semantic_lists: []
  supported_object_roles:
    - curatable_unit
  validators:
    active:
      - validator_id: disease.domain_envelope_shape
        display_name: Disease data structure
        description: Load the envelope through the provider-agnostic DomainEnvelope contract.
      - validator_id: disease.required_payload_fields
        display_name: Required disease fields
        description: Required pending disease assertion field paths declared in this pack must be present.
      - validator_id: disease.tool_verified_evidence_links
        display_name: Evidence link preservation
        description: Disease assertions must retain non-empty verified evidence_record_ids and evidence_records.
      - validator_id: disease.no_legacy_semantic_lists
        display_name: Current extraction format
        description: Reject legacy semantic collections such as items, annotations, genes, alleles, diseases, chemicals, and phenotypes in new domain-envelope fixtures.
      - validator_id: disease_ontology_term_lookup
        display_name: Disease ontology lookup
        description: Validate Disease Ontology curies and labels through the active ontology-term package validator binding.
      - validator_id: disease_relation_cv_lookup
        display_name: Disease relation vocabulary lookup
        description: Validate disease_relation_name against the Disease Relation vocabulary through the active controlled-vocabulary package validator binding.
      - validator_id: disease_condition_relation_lookup
        display_name: Condition relation lookup
        description: Validate condition relation names through the active controlled-vocabulary package validator binding.
      - validator_id: disease_data_provider_lookup
        display_name: Data provider lookup
        description: Validate disease data-provider abbreviations through the active data-provider package validator binding.
      - validator_id: disease_subject_materialization
        display_name: Disease subject lookup
        description: Resolve the staged disease_annotation_subject to concrete Gene, Allele, or AGM identity through the active subject-entity package validator binding (D2 full LinkML alignment).
      - validator_id: disease_evidence_code_lookup
        display_name: Evidence code lookup
        description: Validate ECO evidence-code curies through the active ontology-term package validator binding (D3 full LinkML alignment).
      - validator_id: disease_annotation_type_cv_lookup
        display_name: Annotation type lookup
        description: Validate the curation-method constant (manually_curated) against the Annotation Type vocabulary through the active controlled-vocabulary package validator binding (R4).
      - validator_id: disease_genetic_sex_cv_lookup
        display_name: Genetic sex lookup
        description: Validate the optional genetic_sex_name against the Genetic Sex vocabulary through the active controlled-vocabulary package validator binding (R4).
      - validator_id: disease_qualifier_cv_lookup
        display_name: Disease qualifier lookup
        description: Validate the disease_qualifier_names terms against the Disease Qualifier vocabulary through the active controlled-vocabulary package validator binding (R4).
      - validator_id: disease_with_gene_validation
        display_name: With/from gene lookup
        description: Validate the with_gene_identifiers genes through the active gene_validation package validator binding (R4).
      - validator_id: experimental_condition_validation
        display_name: Experimental condition validation
        description: Compose disease condition relation, experimental condition ontology, chemical, taxon, and data-provider component checks into one auditable per-condition decision. Fans out one composite validation per ExperimentalCondition via the nested multivalued engine.
    under_development:
      - validator_id: disease.export_submission_projection
        display_name: Disease ready for export
        blocked_by: ALL-425
        description: Export/submission validation waits for verified disease phenotype and chemical export/submission adapters.
      - validator_id: disease_reference_materialization
        display_name: Reference lookup
        description: Durable reference IDs (AGRKB/PMID/DOI) are not available at chat-extraction time (D4 blocked); single_reference resolution is deferred.
  validator_bindings:
    active:
      - binding_id: disease_ontology_term_lookup
        display_name: Disease ontology lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: ontology_term_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - disease_annotation_object.curie
            - disease_annotation_object.name
        input_fields:
          curie:
            source: payload
            path: disease_annotation_object.curie
            required: false
          label:
            source: payload
            path: disease_annotation_object.name
            required: false
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
          ontology_family:
            source: literal
            value: disease
          ontology_term_type:
            source: literal
            value: DOTerm
          accepted_prefixes:
            source: literal
            value:
              - DOID
        expected_result_fields:
          curie: disease_annotation_object.curie
          label: disease_annotation_object.name
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      - binding_id: disease_relation_cv_lookup
        display_name: Disease relation vocabulary lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - disease_relation_name
        input_fields:
          vocabulary:
            source: literal
            value: Disease Relation
          # D5 ENFORCEMENT: the per-subtype Disease Relation CV subset is selected by the
          # staged subject_type (Gene/Allele/AGM), which is established before the relation
          # resolves (D1/D2). payload_keyed_literal reads the sibling subject_type and maps it
          # to the matching vocabularytermset name; the controlled_vocabulary validator forwards
          # this `subset` to agr_curation_query so the lookup is restricted to that subset's
          # members. A wrong-subtype relation (e.g. is_model_of on a Gene subject) is therefore
          # rejected/unresolved instead of passing against the umbrella vocabulary. The subset
          # names below are the live curation-DB vocabularytermset names.
          subset:
            source: payload_keyed_literal
            path: disease_annotation_subject.subject_type
            key_map:
              # gene spans two named termsets (union): direct Gene Disease Relation plus
              # the Via Orthology Disease Relation terms permitted for orthology inferences.
              gene:
                - Gene Disease Relation
                - Via Orthology Disease Relation
              allele: Allele Disease Relation
              agm: AGM Disease Relation
            required: false
          term_name:
            source: payload
            path: disease_relation_name
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
        expected_result_fields:
          term_name: disease_relation_name
          vocabulary: disease_relation_vocabulary
          internal_id: disease_relation_id
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      - binding_id: disease_condition_relation_lookup
        display_name: Condition relation type lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          # FIX 1 — the materializer emits CONCRETE subtypes when the subject is known, and the
          # condition field block is now declared on all three concrete subtypes (mirroring
          # disease_relation_cv_lookup / R4), so this binding scopes to all four object types.
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - condition_relations.condition_relation_type.name
        input_fields:
          vocabulary:
            source: literal
            value: Condition Relation Type
          # STATIC CV subset: condition relations on annotations use the
          # 'Expression Condition Relation' subset of Condition Relation Type
          # (members: has_condition, induced_by). condition_relations is now declared
          # multivalued, so this binding fans out per relation: one CV validation per
          # condition_relations[i].condition_relation_type.name (the engine substitutes the
          # relation index into the bare input/expected paths below).
          subset:
            source: literal
            value: Expression Condition Relation
            required: false
          term_name:
            source: payload
            path: condition_relations.condition_relation_type.name
            required: false
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
        expected_result_fields:
          term_name: condition_relations.condition_relation_type.name
          vocabulary: condition_relations.condition_relation_type.vocabulary
          internal_id: condition_relations.condition_relation_type.id
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      - binding_id: disease_data_provider_lookup
        display_name: Data provider lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: data_provider_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - data_provider.abbreviation
        input_fields:
          abbreviation:
            source: payload
            path: data_provider.abbreviation
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
        expected_result_fields:
          abbreviation: data_provider.abbreviation
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      # FULL LinkML alignment (D2): subject_entity_validation activated. The staged subject
      # (subject_type + subject_identifier) is resolved to concrete Gene/Allele/AGM identity, and
      # selects the concrete DiseaseAnnotation subtype materialized by the builder.
      - binding_id: disease_subject_materialization
        display_name: Disease subject lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: subject_entity_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - disease_annotation_subject.subject_identifier
            - disease_annotation_subject.subject_type
        input_fields:
          subject_type:
            source: payload
            path: disease_annotation_subject.subject_type
          subject_identifier:
            source: payload
            path: disease_annotation_subject.subject_identifier
          subject_label:
            source: payload
            path: disease_annotation_subject.subject_label
            required: false
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
        expected_result_fields:
          subject_identifier: disease_annotation_subject.subject_identifier
          subject_type: disease_annotation_subject.subject_type
          subject_label: disease_annotation_subject.subject_label
        # R3: a disease annotation cannot be curated without a subject, so a missing required
        # subject input (e.g. a paper naming a genotype/AGM with no MOD identifier) must force the
        # curator to resolve it at the submission-review step. blocking+required makes the
        # selector_missing finding gate submission readiness; curator_override.allowed makes it
        # WAIVABLE — the curator can override when a genotype legitimately has no durable ID yet.
        required: true
        blocking: true
        allow_opt_out: true
        curator_override:
          allowed: true
      # FULL LinkML alignment (D3): ECO evidence-code lookup activated. evidence_codes is
      # LinkML-required + multivalued; ECO CURIEs are validated through the ontology-term validator.
      - binding_id: disease_evidence_code_lookup
        display_name: Evidence code lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: ontology_term_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - evidence_code_curies
        input_fields:
          curie:
            source: payload
            path: evidence_code_curies
            required: false
          ontology_family:
            source: literal
            value: evidence
          ontology_term_type:
            source: literal
            value: ECOTerm
          accepted_prefixes:
            source: literal
            value:
              - ECO
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
        expected_result_fields:
          curie: evidence_code_curies
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
        batch:
          enabled: true
          family: disease_evidence_code_lookup
          max_size: 25
      # R4 SLOT 1: annotation_type — constant manually_curated. Both vocabulary and term_name are
      # literals, so this binding always builds a request and validates the fixed constant against
      # the Annotation Type vocabulary; the result snapshots back to the sibling vocabulary/id fields.
      - binding_id: disease_annotation_type_cv_lookup
        display_name: Annotation type lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - annotation_type_name
        input_fields:
          vocabulary:
            source: literal
            value: Annotation Type
          term_name:
            source: literal
            value: manually_curated
        expected_result_fields:
          term_name: annotation_type_name
          vocabulary: annotation_type_vocabulary
          internal_id: annotation_type_id
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      # R4 SLOT 2: genetic_sex — single Genetic Sex CV term, optional. When genetic_sex_name is
      # absent the optional payload selector skips the request (no finding); when present it
      # validates and snapshots vocabulary/id back to the sibling fields.
      - binding_id: disease_genetic_sex_cv_lookup
        display_name: Genetic sex lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - genetic_sex_name
        input_fields:
          vocabulary:
            source: literal
            value: Genetic Sex
          term_name:
            source: payload
            path: genetic_sex_name
            required: false
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
        expected_result_fields:
          term_name: genetic_sex_name
          vocabulary: genetic_sex_vocabulary
          internal_id: genetic_sex_id
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      # R4 SLOT 3: disease_qualifiers — MULTIVALUED Disease Qualifier CV. The field is declared
      # `multivalued: true`, so every staged qualifier name fans out to its own per-element
      # validation against the Disease Qualifier vocabulary.
      - binding_id: disease_qualifier_cv_lookup
        display_name: Disease qualifier lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - disease_qualifier_names
        input_fields:
          vocabulary:
            source: literal
            value: Disease Qualifier
          term_name:
            source: payload
            path: disease_qualifier_names
            required: false
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
        expected_result_fields:
          term_name: disease_qualifier_names
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
        batch:
          enabled: true
          family: disease_qualifier_cv_lookup
          max_size: 25
      # R4 SLOT 4: with_or_from — MULTIVALUED Gene reference via with_gene_identifiers. The field is
      # declared `multivalued: true`, so every staged gene identifier fans out to its own per-element
      # validation through gene_validation, mirroring the subject_gene_validation binding.
      - binding_id: disease_with_gene_validation
        display_name: With/from gene lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: gene_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - with_gene_identifiers
        input_fields:
          gene_id:
            source: payload
            path: with_gene_identifiers
            required: false
          data_provider:
            source: payload
            path: data_provider.abbreviation
            required: false
            context_only: true
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
        expected_result_fields:
          primary_external_id: with_gene_identifiers
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
        batch:
          enabled: true
          family: disease_with_gene_validation
          max_size: 25
      # EXPERIMENTAL CONDITIONS: composite validation at the CONDITION grain. The single
      # fan-out target is condition_relations.conditions (the ExperimentalCondition object,
      # declared multivalued under the multivalued condition_relations). The nested engine
      # fans out the cartesian product and emits ONE composite validation per
      # condition_relations[i].conditions[j]; the experimental_condition agent composes the
      # per-field ontology/CV/chemical/taxon existence checks AND the cross-field coherence
      # into a single condition-level decision. Per-condition input_fields are declared with
      # bare nested paths; the engine substitutes the resolved (i, j) indexes so each
      # composite request carries that condition's own components plus its relation context.
      - binding_id: experimental_condition_validation
        display_name: Experimental condition validation
        validator_agent:
          package_id: agr.alliance
          agent_id: experimental_condition_validation
        applies_to:
          # FIX 1 — the condition field block is now declared on all three concrete subtypes too
          # (the materializer emits the concrete subtype when the subject is known, and
          # _matching_objects matches strictly). Mirroring disease_relation_cv_lookup, this binding
          # scopes to all four object types so the composite fires on the concrete subtype.
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
            - GeneDiseaseAnnotation
            - AlleleDiseaseAnnotation
            - AGMDiseaseAnnotation
          field_paths:
            - condition_relations.conditions
        input_fields:
          # condition_statement = the per-condition source summary (the anchoring text the
          # condition was read from). Rewritten to condition_relations[i].conditions[j].condition_summary.
          condition_statement:
            source: payload
            path: condition_relations.conditions.condition_summary
            required: false
          # Relation context for THIS condition's parent relation. Shares the OUTER multivalued
          # prefix (condition_relations[i]) with the fan-out base, so the engine substitutes the
          # relation index i into this sibling path.
          # FIX 2 — context_only: the dedicated disease_condition_relation_lookup binding OWNS
          # relation validation (it already resolves has_condition in vocabulary
          # "Condition Relation Type"). The composite agent must NOT re-look-up the relation (it
          # previously guessed the non-existent vocabulary "Condition Relation" and false-negatived);
          # it uses the relation purely as coherence context (does the class fit the relation?).
          condition_relation_type:
            source: payload
            path: condition_relations.condition_relation_type.name
            required: false
            context_only: true
          # The whole ExperimentalCondition object for this element (component bundle).
          condition_components:
            source: payload
            path: condition_relations.conditions
            required: false
          condition_class_curie:
            source: payload
            path: condition_relations.conditions.condition_class.curie
            required: false
          condition_id_curie:
            source: payload
            path: condition_relations.conditions.condition_id.curie
            required: false
          condition_chemical_curie:
            source: payload
            path: condition_relations.conditions.condition_chemical.curie
            required: false
          condition_taxon_curie:
            source: payload
            path: condition_relations.conditions.condition_taxon.curie
            required: false
          condition_free_text:
            source: payload
            path: condition_relations.conditions.condition_free_text
            required: false
          source_mentions:
            source: payload
            path: source_mentions
            required: false
            allow_multiple: true
            context_only: true
          data_provider_abbreviation:
            source: payload
            path: data_provider.abbreviation
            required: false
            context_only: true
          # EVIDENCE CONTRACT: the validator sees the backend-resolved exact source text for the
          # spans the condition was read from; the model never types the quote.
          evidence_quote:
            source: evidence_record
            path: verified_quote
            required: false
            context_only: true
        # The composite resolves on the always-present condition_class (the experimental-variable
        # TYPE every condition carries); condition_id (a more specific ZECO term) is OPTIONAL and
        # absent in ~74% of curated conditions, so requiring it would false-negative the majority.
        # The agent still reports unresolved if any PRESENT component (class/chemical/...) fails.
        expected_result_fields:
          condition_class_curie: condition_relations.conditions.condition_class.curie
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
        batch:
          enabled: true
          family: experimental_condition_validation
          max_size: 25
