fixture_packs:
  - fixture_pack_id: tool_verified
    display_name: Tool-verified disease assertion fixtures
    path: fixtures/tool_verified.yaml
    description: Pending disease assertion domain envelopes converted from verified disease extraction fixtures.
    object_types:
      - DiseaseAnnotation
metadata:
  object_role_key: object_role
  curatable_unit_object_type: DiseaseAnnotation
  semantic_source: domain_envelope.objects
  legacy_semantic_lists: []
  supported_object_roles:
    - curatable_unit
  validators:
    active:
      - validator_id: disease.domain_envelope_shape
        display_name: Disease data structure
        description: Load the envelope through the provider-agnostic DomainEnvelope contract.
      - validator_id: disease.required_payload_fields
        display_name: Required disease fields
        description: Required pending disease assertion field paths declared in this pack must be present.
      - validator_id: disease.tool_verified_evidence_links
        display_name: Evidence link preservation
        description: Disease assertions must retain non-empty verified evidence_record_ids and evidence_records.
      - validator_id: disease.no_legacy_semantic_lists
        display_name: Current extraction format
        description: Reject legacy semantic collections such as items, annotations, genes, alleles, diseases, chemicals, and phenotypes in new domain-envelope fixtures.
    planned:
      - validator_id: disease.disease_ontology_term_lookup
        display_name: Disease ontology lookup
        description: Validate Disease Ontology curies and labels against public.ontologyterm rows with ontology_term_type DOTerm.
      - validator_id: disease.disease_relation_cv_lookup
        display_name: Disease relation vocabulary lookup
        description: Validate disease_relation_name against the Disease Relation vocabulary.
      - validator_id: disease.condition_relation_lookup
        display_name: Condition relation lookup
        description: Validate condition relation names and condition ontology curies against public.conditionrelation and public.experimentalcondition projections.
      - validator_id: experimental_condition_validation
        display_name: Experimental condition validation
        description: Compose disease condition relation, experimental condition ontology, chemical, taxon, and data-provider component checks into one auditable condition decision.
    blocked:
      - validator_id: disease.subject_materialization
        display_name: Disease subject lookup
        blocked_by: ALL-410
        description: Concrete Gene, Allele, or AGM subject validation waits for the disease extractor output migration.
      - validator_id: disease.export_submission_projection
        display_name: Disease ready for export
        blocked_by: ALL-425
        description: Export/submission validation waits for verified disease phenotype and chemical export/submission adapters.
      - validator_id: disease.reference_and_evidence_code_materialization
        display_name: Reference and evidence code lookup
        blocked_by: ALL-425
        description: Durable reference IDs and ECO evidence-code mapping must be verified before writes can be enabled.
  validator_bindings:
    active:
      - binding_id: disease_pending_envelope_validator
        display_name: Data check
        validator_agent:
          package_id: agr.alliance
          agent_id: disease_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
        input_fields: {}
        expected_result_fields: {}
        definition_state: in_development
    under_development:
      - binding_id: disease_ontology_term_lookup
        display_name: Disease ontology lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: ontology_term_validation
        state_explanation: Disease ontology lookup remains under development until generic ontology term validator dispatch is reviewed end to end.
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
          field_paths:
            - disease_annotation_object.curie
            - disease_annotation_object.name
        input_fields:
          curie:
            source: payload
            path: disease_annotation_object.curie
          label:
            source: payload
            path: disease_annotation_object.name
          ontology_family:
            source: literal
            value: disease
          ontology_term_type:
            source: literal
            value: DOTerm
          accepted_prefixes:
            source: literal
            value:
              - DOID
        expected_result_fields:
          curie: disease_annotation_object.curie
          label: disease_annotation_object.name
          ontology_term_type: DOTerm
      - binding_id: disease_relation_cv_lookup
        display_name: Disease relation vocabulary lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        state_explanation: Disease relation vocabulary lookup remains under development until controlled vocabulary package tool dispatch is reviewed end to end.
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
          field_paths:
            - disease_relation_name
        input_fields:
          vocabulary:
            source: literal
            value: Disease Relation
          term_name:
            source: payload
            path: disease_relation_name
        expected_result_fields:
          term_name: disease_relation_name
          vocabulary: disease_relation_vocabulary
          internal_id: disease_relation_id
      - binding_id: experimental_condition_validation
        display_name: Experimental condition validation
        validator_agent:
          package_id: agr.alliance
          agent_id: experimental_condition_validation
        state_explanation: Composite experimental-condition validation remains under development until condition relation, condition ontology, chemical, taxon, provider, and quantity/unit component prerequisites are all active.
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
          field_paths:
            - condition_relations[0].conditions
            - condition_relations[0].condition_relation_type.name
            - condition_relations[0].conditions[0].condition_class.curie
            - condition_relations[0].conditions[0].condition_id.curie
            - condition_relations[0].conditions[0].condition_chemical.curie
            - condition_relations[0].conditions[0].condition_taxon.curie
            - condition_relations[0].conditions[0].condition_free_text
            - condition_relations[0].conditions[0].condition_summary
        input_fields:
          condition_statement:
            source: payload
            path: condition_relations[0].conditions[0].condition_summary
            required: false
          condition_relation_type:
            source: payload
            path: condition_relations[0].condition_relation_type.name
            required: false
          condition_components:
            source: payload
            path: condition_relations[0].conditions
            required: false
          condition_class_curie:
            source: payload
            path: condition_relations[0].conditions[0].condition_class.curie
            required: false
          condition_id_curie:
            source: payload
            path: condition_relations[0].conditions[0].condition_id.curie
            required: false
          condition_chemical_curie:
            source: payload
            path: condition_relations[0].conditions[0].condition_chemical.curie
            required: false
          condition_taxon_curie:
            source: payload
            path: condition_relations[0].conditions[0].condition_taxon.curie
            required: false
          condition_free_text:
            source: payload
            path: condition_relations[0].conditions[0].condition_free_text
            required: false
          data_provider_abbreviation:
            source: payload
            path: data_provider.abbreviation
            required: false
          evidence_quote:
            source: evidence_record
            path: quote
            required: false
        expected_result_fields:
          condition_id: ExperimentalCondition.condition_id
          normalized_components: ExperimentalCondition.components
        definition_state: in_development
      - binding_id: disease_condition_relation_lookup
        display_name: Condition relation type lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        state_explanation: Condition relation type lookup remains under development until controlled vocabulary package tool dispatch is reviewed end to end.
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
          field_paths:
            - condition_relations[0].condition_relation_type.name
        input_fields:
          vocabulary:
            source: literal
            value: Condition Relation Type
          term_name:
            source: payload
            path: condition_relations[0].condition_relation_type.name
          abbreviation:
            source: payload
            path: condition_relations[0].condition_relation_type.abbreviation
            required: false
        expected_result_fields:
          term_name: condition_relations[0].condition_relation_type.name
          vocabulary: condition_relations[0].condition_relation_type.vocabulary
          internal_id: condition_relations[0].condition_relation_type.id
      - binding_id: disease_subject_materialization
        display_name: Disease subject lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: subject_entity_validation
        state_explanation: Disease subject lookup routes explicit disease_annotation_subject.subject_type values to gene, allele, or AGM validation paths; materialization remains under development until extractor and export targets are reviewed end to end.
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
          field_paths:
            - disease_annotation_subject.subject_identifier
            - disease_annotation_subject.subject_type
        input_fields:
          subject_type:
            source: payload
            path: disease_annotation_subject.subject_type
          subject_identifier:
            source: payload
            path: disease_annotation_subject.subject_identifier
          subject_label:
            source: payload
            path: disease_annotation_subject.subject_label
            required: false
          taxon:
            source: payload
            path: data_provider.taxon
            required: false
        expected_result_fields:
          subject_identifier: disease_annotation_subject.subject_identifier
          subject_type: disease_annotation_subject.subject_type
          subject_label: disease_annotation_subject.subject_label
          taxon: disease_annotation_subject.taxon
      - binding_id: disease_reference_materialization
        display_name: Reference lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: reference_validation
        state_explanation: Reference validation is prepared around the API-backed package tool but remains metadata-only until dependent disease materialization and export flows are activated.
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
          field_paths:
            - single_reference.reference_id
            - single_reference.curie
            - single_reference.title
        input_fields:
          reference_id:
            source: payload
            path: single_reference.reference_id
            required: false
          curie:
            source: payload
            path: single_reference.curie
            required: false
          pmid:
            source: payload
            path: single_reference.pmid
            required: false
          doi:
            source: payload
            path: single_reference.doi
            required: false
          title:
            source: payload
            path: single_reference.title
            required: false
          source_document_id:
            source: envelope_metadata
            path: document_id
            required: false
        expected_result_fields:
          reference_id: single_reference.reference_id
          curie: single_reference.curie
          title: single_reference.title
      - binding_id: disease_evidence_code_lookup
        display_name: Evidence code lookup
        state_explanation: ECO evidence-code mapping is blocked by ALL-425.
        validator_agent:
          package_id: agr.alliance
          agent_id: ontology_term_validation
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
          field_paths:
            - evidence_code_curies[0]
        input_fields:
          curie:
            source: payload
            path: evidence_code_curies[0]
          ontology_family:
            source: literal
            value: evidence
          ontology_term_type:
            source: literal
            value: ECOTerm
          accepted_prefixes:
            source: literal
            value:
              - ECO
        expected_result_fields:
          curie: evidence_code_curies[0]
          ontology_term_type: ECOTerm
      - binding_id: disease_data_provider_lookup
        display_name: Data provider lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: data_provider_validation
        state_explanation: Data provider validation remains under development until provider-backed validator dispatch is reviewed end to end.
        applies_to:
          domain_pack_id: agr.alliance.disease
          object_types:
            - DiseaseAnnotation
          field_paths:
            - data_provider.abbreviation
        input_fields:
          abbreviation:
            source: payload
            path: data_provider.abbreviation
          provider_name:
            source: payload
            path: data_provider.name
            required: false
          taxon:
            source: payload
            path: taxon
            required: false
        expected_result_fields:
          abbreviation: data_provider.abbreviation
          taxon: data_provider.taxon
  provider_refs:
    alliance_linkml:
      schema_ref: alliance.linkml
      repository: https://github.com/alliance-genome/agr_curation_schema.git
      commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      schema_dir: model/schema
      root_schema: model/schema/allianceModel.yaml
      cache_script: scripts/testing/cache_agr_curation_schema.sh
    alliance_curation_db:
      inspected_at: "2026-05-09"
      readonly_user: ai_curation_readonly_curation
      inspected_tables:
        - public.diseaseannotation
        - public.genediseaseannotation
        - public.allelediseaseannotation
        - public.agmdiseaseannotation
        - public.diseaseannotation_conditionrelation
        - public.conditionrelation
        - public.conditionrelation_experimentalcondition
        - public.experimentalcondition
