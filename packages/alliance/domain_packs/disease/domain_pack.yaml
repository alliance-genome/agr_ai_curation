pack_id: agr.alliance.disease
display_name: Alliance Disease Domain Pack
version: 0.1.0
metadata_api_version: 1.0.0
description: Pending disease assertion envelopes grounded to Alliance DiseaseAnnotation LinkML metadata and read-only curation DB target tables.
status: in_development
schema_refs:
  - schema_id: alliance.linkml
    provider: alliance_linkml
    name: Alliance curation LinkML schema
    version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
    uri: https://github.com/alliance-genome/agr_curation_schema/tree/1b11d0888f19eba4ca72022200bb7d96b30d4a52
    definition_state: stable
    metadata:
      provider_refs:
        alliance_linkml:
          repository: https://github.com/alliance-genome/agr_curation_schema.git
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          schema_dir: model/schema
          root_schema: model/schema/allianceModel.yaml
          cache_script: scripts/testing/cache_agr_curation_schema.sh
          ref_kind: schema
enum_definitions:
  - enum_id: DiseaseAssertionRole
    display_name: Disease assertion role
    description: Extractor role for the disease mention in the paper context.
    values:
      - value: primary
        label: Primary
      - value: background
        label: Background
      - value: comparative
        label: Comparative
      - value: model_context
        label: Model context
      - value: unspecified
        label: Unspecified
  - enum_id: DiseaseAssertionConfidence
    display_name: Disease assertion confidence
    description: Extractor confidence in disease normalization and role classification.
    values:
      - value: high
        label: High
      - value: medium
        label: Medium
      - value: low
        label: Low
  - enum_id: DiseaseSubjectType
    display_name: Disease assertion subject type
    description: Pending type for the biological entity subject before concrete annotation materialization.
    definition_state: in_development
    values:
      - value: gene
        label: Gene
      - value: allele
        label: Allele
      - value: agm
        label: Affected genomic model
      - value: unknown
        label: Unknown
model_definitions:
  - model_id: PendingDiseaseAssertionPayload
    display_name: Pending disease assertion payload
    description: One pending disease assertion grounded to abstract DiseaseAnnotation metadata; concrete Gene/Allele/AGM write targets are blocked.
    schema_ref:
      schema_id: alliance.linkml.DiseaseAnnotation
      provider: alliance_linkml
      name: DiseaseAnnotation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      definition_notes:
        - DiseaseAnnotation is abstract in LinkML; this pack emits pending envelopes and blocks writes until concrete subject materialization is verified.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: DiseaseAnnotation
    definition_state: in_development
    definition_notes:
      - Required write DTO fields such as subject, reference, evidence code, and data provider are declared but not required for pending assertion validation.
  - model_id: DiseaseOntologyTermSnapshotPayload
    display_name: Disease ontology term snapshot payload
    description: Embedded Disease Ontology term identity for the asserted disease.
    schema_ref:
      schema_id: alliance.linkml.DOTerm
      provider: alliance_linkml
      name: DOTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: DOTerm
  - model_id: DiseaseSubjectSnapshotPayload
    display_name: Pending disease subject snapshot payload
    description: Extractor-observed subject context before concrete Gene, Allele, or AGM materialization.
    definition_state: in_development
    definition_notes:
      - Subject identity is not a stable write target until the disease extractor migration emits concrete subject identifiers.
  - model_id: ReferenceSnapshotPayload
    display_name: Reference snapshot payload
    description: Source paper reference fields needed before a single_reference can be materialized.
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
  - model_id: VocabularyTermSnapshotPayload
    display_name: Vocabulary term snapshot payload
    description: Embedded controlled vocabulary term identity.
    schema_ref:
      schema_id: alliance.linkml.VocabularyTerm
      provider: alliance_linkml
      name: VocabularyTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/controlledVocabulary.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/controlledVocabulary.yaml
            class: VocabularyTerm
  - model_id: ConditionRelationPayload
    display_name: Condition relation payload
    description: Optional embedded condition relation context for pending disease assertions.
    schema_ref:
      schema_id: alliance.linkml.ConditionRelation
      provider: alliance_linkml
      name: ConditionRelation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ConditionRelation
  - model_id: ExperimentalConditionPayload
    display_name: Experimental condition payload
    description: Optional embedded experimental condition context.
    schema_ref:
      schema_id: alliance.linkml.ExperimentalCondition
      provider: alliance_linkml
      name: ExperimentalCondition
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ExperimentalCondition
  - model_id: EvidenceRecordPayload
    display_name: Verified evidence record payload
    description: Metadata-only record_evidence result preserved inside the pending disease assertion.
    definition_state: stable
object_definitions:
  - object_type: DiseaseAnnotation
    display_name: Disease annotation
    description: Pending curatable unit for one evidence-backed disease assertion before concrete subject/reference/write materialization.
    model_ref: PendingDiseaseAssertionPayload
    schema_ref:
      schema_id: alliance.linkml.DiseaseAnnotation
      provider: alliance_linkml
      name: DiseaseAnnotation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      definition_notes:
        - DiseaseAnnotation is abstract in LinkML; pending envelopes distinguish complete extraction fields from blocked write-target fields.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: DiseaseAnnotation
    definition_state: in_development
    definition_notes:
      - Pending only; write behavior is blocked until subject type, subject ID, source reference ID, evidence codes, and concrete annotation subtype are verified.
    metadata:
      object_role: curatable_unit
      assertion_kind: pending_disease_assertion
      semantic_source: domain_envelope.extracted_objects
      validator_binding_id: disease_pending_envelope_validator
      supervisor_manifest:
        primary_label_field: disease_annotation_object.name
        secondary_label_field: disease_annotation_subject.subject_label
        summary_fields:
          - disease_annotation_object.curie
          - disease_relation_name
      workspace_display:
        primary_label_field: disease_annotation_object.name
        secondary_label_field: disease_annotation_subject.subject_label
        summary_fields:
          - disease_annotation_object.name
          - disease_relation_name
          - disease_annotation_subject.subject_label
        groups:
          - id: disease
            label: Disease
            fields:
              - disease_annotation_object.curie
              - disease_relation_name
          - id: subject
            label: Subject
            fields:
              - disease_annotation_subject.subject_identifier
              - disease_annotation_subject.subject_type
              - disease_annotation_subject.subject_label
          - id: evidence_codes
            label: Evidence & codes
            fields:
              - evidence_code_curies
          - id: conditions
            label: Experimental conditions
            fields:
              - condition_relations
          - id: qualifiers
            label: Optional qualifiers
            fields:
              - disease_qualifier_names
              - genetic_sex_name
              - with_gene_identifiers
          - id: provenance
            label: Provenance
            fields:
              - data_provider.abbreviation
      write_behavior:
        status: blocked
        blocked_by: ALL-425
        reason: The read-only DB projection is verified, but writes require concrete GeneDiseaseAnnotation, AlleleDiseaseAnnotation, or AGMDiseaseAnnotation materialization plus durable reference and evidence-code mappings.
        blocked_operations:
          - insert public.diseaseannotation
          - insert public.genediseaseannotation
          - insert public.allelediseaseannotation
          - insert public.agmdiseaseannotation
          - insert public.diseaseannotation_conditionrelation
      export_behavior:
        status: blocked
        blocked_by: ALL-425
        reason: Disease export/submission adapters are out of scope for this pack and wait for verified submission payload mapping.
      definition_state_summary:
        complete:
          - mention
          - disease_annotation_object
          - role
          - confidence
          - evidence_record_ids
          - evidence_records
          - condition_relations
        under_development:
          - disease_relation_name
        blocked:
          - disease_annotation_subject
          - single_reference
          - evidence_code_curies
          - data_provider
      db_projection:
        base_table: public.diseaseannotation
        concrete_tables:
          - public.genediseaseannotation
          - public.allelediseaseannotation
          - public.agmdiseaseannotation
        condition_tables:
          - public.diseaseannotation_conditionrelation
          - public.conditionrelation
          - public.conditionrelation_experimentalcondition
          - public.experimentalcondition
        representative_rows:
          - row_id: 209127250
            subtype: GeneDiseaseAnnotation
            subject_primary_external_id: SGD:S000004578
            disease_curie: DOID:0050730
            relation_name: is_implicated_in
            data_provider: SGD
          - row_id: 209127267
            subtype: AlleleDiseaseAnnotation
            subject_primary_external_id: MGI:3689328
            disease_curie: DOID:0111789
            relation_name: is_implicated_in
            data_provider: MGI
          - row_id: 209127402
            subtype: AGMDiseaseAnnotation
            subject_primary_external_id: MGI:8308849
            disease_curie: DOID:0111441
            relation_name: is_model_of
            data_provider: MGI
        representative_condition_row:
          diseaseannotation_id: 209127194
          condition_relation_type: has_condition
          condition_class_curie: ZECO:0000111
          condition_id_curie: ZECO:0000238
          condition_chemical_curie: CHEBI:6909
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
          class: DiseaseAnnotation
        alliance_curation_db:
          inspected_tables:
            - public.diseaseannotation
            - public.genediseaseannotation
            - public.allelediseaseannotation
            - public.agmdiseaseannotation
            - public.diseaseannotation_conditionrelation
            - public.conditionrelation
            - public.conditionrelation_experimentalcondition
            - public.experimentalcondition
          row_counts:
            diseaseannotation: 81227
            genediseaseannotation: 43148
            allelediseaseannotation: 5551
            agmdiseaseannotation: 32528
            diseaseannotation_conditionrelation: 4191
            conditionrelation: 19549
            conditionrelation_experimentalcondition: 23532
            experimentalcondition: 15338
    fields:
      - field_path: mention
        field_type: string
        display_name: Paper disease mention
        description: Disease mention exactly as written in the paper.
        required: true
        metadata:
          evidence_source_field: true
          definition_state_category: complete
      - field_path: disease_annotation_object
        field_type: object
        display_name: Disease ontology term
        description: Disease Ontology term asserted by the pending disease annotation.
        required: true
        model_ref: DiseaseOntologyTermSnapshotPayload
        metadata:
          validatable: true
          validator_binding_id: disease_ontology_term_lookup
          validator_state: active
          definition_state_category: complete
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: DiseaseAnnotation
              attribute: disease_annotation_object
              range: DOTerm
              db_table: diseaseannotation
              db_column: diseaseannotationobject_id
      - field_path: disease_annotation_object.curie
        field_type: string
        display_name: Disease term CURIE
        description: Optional exact-CURIE fast path for the asserted disease term; label-backed candidates remain valid for ontology validation without it.
        required: false
        metadata:
          render_as: curie-chip
          validatable: true
          validator_binding_id: disease_ontology_term_lookup
          validator_state: active
          validation_result_field: curie
          definition_state_category: complete
          editable: true
          source_of_truth: alliance_linkml
          # FULL LinkML alignment: the validated DOID snapshot mirrors onto the payload's
          # disease_annotation_object so the embedded DOTerm matches the validated ontology lookup
          # (LinkML "X must match Y"). Domain-pack-driven (materialization._propagate_materialized_mirror_paths),
          # not code special-casing (invariant §5.4).
          materializes_to_field_paths:
            - disease_annotation_object.curie
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: DOTerm
              slot: curie
              range: uriorcurie
              db_table: ontologyterm
              db_column: curie
      - field_path: disease_annotation_object.name
        field_type: string
        display_name: Disease term name
        description: Disease Ontology label for the asserted disease term.
        required: true
        metadata:
          validatable: true
          validator_binding_id: disease_ontology_term_lookup
          validator_state: active
          validation_result_field: name
          definition_state_category: complete
          editable: true
          source_of_truth: alliance_linkml
          materializes_to_field_paths:
            - disease_annotation_object.name
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: DOTerm
              slot: name
              range: string
              db_table: ontologyterm
              db_column: name
      - field_path: role
        field_type: enum
        display_name: Paper role
        description: Extractor classification for how the paper uses the disease mention.
        required: true
        enum_ref: DiseaseAssertionRole
        metadata:
          definition_state_category: complete
      - field_path: confidence
        field_type: enum
        display_name: Confidence
        required: true
        enum_ref: DiseaseAssertionConfidence
        metadata:
          definition_state_category: complete
      - field_path: disease_relation_name
        field_type: string
        display_name: Disease relation name
        description: Name of the Disease Relation vocabulary term, validated against the subject-type CV subset (D5).
        metadata:
          validatable: true
          validator_binding_id: disease_relation_cv_lookup
          validator_state: active
          definition_state_category: complete
          editable: true
          # FULL LinkML alignment (D5): per-subtype Disease Relation CV subsets. VERIFIED that LinkML,
          # the formal CV subsets, and curator usage agree. R2 CLOSED: this per-subtype restriction is
          # now ENFORCED (not LLM-only) by the disease_relation_cv_lookup binding's payload_keyed_literal
          # `subset` input (below), which maps the staged subject_type to the matching vocabularytermset
          # so the controlled_vocabulary validator restricts the lookup to subset members. The term-name
          # lists here are the reference allowlist (kept in sync with the binding's termset selection);
          # the enforcement source of truth is the binding `subset` config.
          relation_subsets:
            gene:
              - is_implicated_in
              - is_marker_for
              - is_implicated_via_orthology
              - is_marker_via_orthology
            allele:
              - is_implicated_in
            agm:
              - is_model_of
              - is_ameliorated_model_of
              - is_exacerbated_model_of
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: DiseaseAnnotationDTO
              slot: disease_relation_name
              range: string
              db_table: vocabularyterm
              db_column: name
      - field_path: disease_relation_vocabulary
        field_type: string
        display_name: Disease relation vocabulary
        description: Disease Relation vocabulary name materialized by validation tooling.
        metadata:
          validatable: true
          validator_binding_id: disease_relation_cv_lookup
          validation_result_field: vocabulary
          validator_state: active
          definition_state_category: complete
          editable: true
      - field_path: disease_relation_id
        field_type: string
        display_name: Disease relation internal ID
        description: Disease Relation vocabulary term internal identifier materialized by validation tooling.
        metadata:
          validatable: true
          validator_binding_id: disease_relation_cv_lookup
          validation_result_field: internal_id
          validator_state: active
          definition_state_category: complete
          editable: true
      - field_path: disease_annotation_subject
        field_type: object
        display_name: Disease annotation subject
        model_ref: DiseaseSubjectSnapshotPayload
        definition_notes:
          - The subject biological entity selects the concrete GeneDiseaseAnnotation, AlleleDiseaseAnnotation, or AGMDiseaseAnnotation subtype (D1/D2). Concrete identity is resolved by the active subject_entity_validation binding.
        metadata:
          validatable: true
          validator_binding_id: disease_subject_materialization
          validator_state: active
          definition_state_category: complete
          editable: true
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: DiseaseAnnotation
              slot: disease_annotation_subject
              range: BiologicalEntity
      - field_path: disease_annotation_subject.subject_type
        field_type: enum
        display_name: Subject type
        enum_ref: DiseaseSubjectType
        metadata:
          definition_state_category: complete
          editable: true
      - field_path: disease_annotation_subject.subject_label
        field_type: string
        display_name: Subject label
        metadata:
          definition_state_category: complete
          editable: true
      - field_path: disease_annotation_subject.subject_identifier
        field_type: string
        display_name: Subject identifier
        metadata:
          validatable: true
          validator_binding_id: disease_subject_materialization
          validator_state: active
          definition_state_category: complete
          editable: true
      - field_path: single_reference
        field_type: object
        display_name: Source reference
        model_ref: ReferenceSnapshotPayload
        definition_state: in_development
        metadata:
          validatable: true
          validator_binding_id: disease_reference_materialization
          validator_state: under_development
          definition_state_category: blocked
          blocked_by: ALL-425
          protected: true
          curator_action_note: Reference materialization remains blocked until source reference projection is verified.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: DiseaseAnnotation
              slot: single_reference
              range: Reference
              db_table: diseaseannotation
              db_column: evidenceitem_id
      - field_path: single_reference.curie
        field_type: string
        display_name: Reference CURIE
        definition_state: in_development
        metadata:
          validatable: true
          validator_binding_id: disease_reference_materialization
          validator_state: under_development
          definition_state_category: blocked
          blocked_by: ALL-425
          protected: true
          curator_action_note: Reference materialization remains blocked until source reference projection is verified.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/reference.yaml
              class: DiseaseAnnotationDTO
              slot: reference_curie
              range: string
              db_table: informationcontententity
              db_column: curie
      - field_path: evidence_code_curies
        field_type: string
        display_name: Evidence code CURIEs
        metadata:
          render_as: chip
          hide_when_empty: true
          validatable: true
          multivalued: true
          validator_binding_id: disease_evidence_code_lookup
          validator_state: active
          definition_state_category: complete
          editable: true
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/ontologyTerm.yaml
              class: DiseaseAnnotationDTO
              slot: evidence_code_curies
              range: string
      # R4 SLOT 1: annotation_type (curation method) — constant manually_curated, NOT extracted.
      - field_path: annotation_type_name
        field_type: string
        display_name: Annotation type name
        description: Curation-method vocabulary term; fixed to manually_curated by the backend (not an extractor edit target).
        metadata:
          validatable: true
          validator_binding_id: disease_annotation_type_cv_lookup
          validator_state: active
          definition_state_category: complete
          protected: true
          curator_action_note: Annotation type is the curation method, fixed to manually_curated; not an extractor edit target.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: DiseaseAnnotationDTO
              slot: annotation_type_name
              range: string
              db_table: vocabularyterm
              db_column: name
      - field_path: annotation_type_vocabulary
        field_type: string
        display_name: Annotation type vocabulary
        metadata:
          definition_state_category: complete
          editable: false
      - field_path: annotation_type_id
        field_type: string
        display_name: Annotation type internal id
        metadata:
          definition_state_category: complete
          editable: false
      # R4 SLOT 2: genetic_sex — single Genetic Sex CV term, optional, extractor-supplied.
      - field_path: genetic_sex_name
        field_type: string
        display_name: Genetic sex name
        description: Name of the Genetic Sex vocabulary term; staged only when the paper states the model/cohort sex.
        metadata:
          hide_when_empty: true
          validatable: true
          validator_binding_id: disease_genetic_sex_cv_lookup
          validator_state: active
          definition_state_category: complete
          editable: true
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: DiseaseAnnotationDTO
              slot: genetic_sex_name
              range: string
              db_table: vocabularyterm
              db_column: name
      - field_path: genetic_sex_vocabulary
        field_type: string
        display_name: Genetic sex vocabulary
        metadata:
          definition_state_category: complete
          editable: false
      - field_path: genetic_sex_id
        field_type: string
        display_name: Genetic sex internal id
        metadata:
          definition_state_category: complete
          editable: false
      # R4 SLOT 3: disease_qualifiers — MULTIVALUED Disease Qualifier CV. Every staged
      # qualifier name is validated per-element against the Disease Qualifier vocabulary.
      - field_path: disease_qualifier_names
        field_type: string
        display_name: Disease qualifier names
