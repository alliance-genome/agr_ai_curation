object_definitions:
  - object_type: GeneExpressionAnnotation
    display_name: Gene expression annotation
    description: One curatable unit per gene-expression annotation, with required experiment and context fields embedded in the annotation payload.
    model_ref: GeneExpressionAnnotationPayload
    schema_ref:
      schema_id: alliance.linkml.GeneExpressionAnnotation
      provider: alliance_linkml
      name: GeneExpressionAnnotation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/expression.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/expression.yaml
            class: GeneExpressionAnnotation
    definition_state: stable
    definition_notes:
      - The envelope carries exactly one GeneExpressionAnnotation object per annotation; gene, reference, experiment, assay, and expression context values are embedded in that object's payload.
      - LinkML postconditions that require one of anatomical_structure or cellular_component are declared for validator execution rather than represented as helper semantic lists.
    metadata:
      object_role: curatable_unit
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/expression.yaml
          class: GeneExpressionAnnotation
      db_projection:
        table: geneexpressionannotation
        representative_rows:
          - row_id: 206552169
            gene_primary_external_id: MGI:1923928
            gene_symbol: Tmem67
            data_provider: MGI
          - row_id: 209060898
            gene_primary_external_id: RGD:1586167
            gene_symbol: Tmem67
            data_provider: RGD
    fields:
      - field_path: unique_id
        field_type: string
        display_name: Unique ID
        metadata:
          protected: true
          curator_action_note: Unique IDs are stable persistence identifiers.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: GeneExpressionAnnotation
              slot: unique_id
              range: string
              db_table: geneexpressionannotation
              db_column: uniqueid
      - field_path: date_created
        field_type: string
        display_name: Date assigned
        required: true
        metadata:
          protected: true
          curator_action_note: Creation timestamps are persistence metadata, not extraction edit targets.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
