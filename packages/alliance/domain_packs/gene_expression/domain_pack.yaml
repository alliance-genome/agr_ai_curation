  - fixture_pack_id: tmem67_pending
    display_name: tmem67 pending gene expression fixtures
    path: fixtures/tmem67_pending.yaml
    description: Production-like pending GeneExpressionAnnotation envelope preserving tmem67 extraction evidence metadata.
    object_types:
