              db_table: geneexpressionannotation
              db_column: datecreated
      - field_path: internal
        field_type: boolean
        display_name: Internal
        required: true
        metadata:
          repair:
            protected: true
            reason: Internal visibility is a curation policy flag.
          provider_refs:
            alliance_linkml:
