fixture_packs:
  - fixture_pack_id: tmem67_pending
    display_name: tmem67 pending gene expression fixtures
    path: fixtures/tmem67_pending.yaml
    description: Production-like pending GeneExpressionAnnotation envelope preserving tmem67 extraction evidence metadata.
    object_types:
      - GeneExpressionAnnotation
    definition_state: stable
    definition_notes:
      - Fixture values mirror grounded tmem67 curation DB shape while preserving extractor-side metadata.
metadata:
  object_role_key: object_role
  curatable_unit_object_type: GeneExpressionAnnotation
  semantic_source: domain_envelope.objects
  legacy_semantic_lists: []
  extraction_builder:
    enabled: true
    stage_tool: stage_gene_expression_evidence
    finalize_tool: finalize_gene_expression_extraction
    retained_unit: gene_expression_observation
    per_retained_finding: true
    model_final_ack_schema: ExtractionToolFinalizationAck
    curation_output_schema: GeneExpressionEnvelope
    primary_stage_field: expression_statement
    dedupe_fields:
      - gene_symbol
      - where_expressed_statement
      - evidence_record_ids
    stage_description: Submit one retained gene-expression observation after verifying supporting quote text with record_evidence.
    finalize_description: Call exactly once after all retained expression observations have been staged; the backend builds the final gene-expression envelope.
    fields:
      expression_statement:
        json_type: string
        required: true
        maps_to: GeneExpressionAnnotation.payload.where_expressed_statement
        hint: Concise paper-backed expression observation; preserve the gene, stage, anatomy, and assay context.
      gene_symbol:
        json_type: string
        required: true
        maps_to: GeneExpressionAnnotation.payload.expression_annotation_subject.gene_symbol
        hint: Paper-supported gene symbol for the expression annotation subject.
      subject_primary_external_id:
        json_type: string
        default: pending_gene_resolution
        maps_to: GeneExpressionAnnotation.payload.expression_annotation_subject.primary_external_id
        hint: Durable gene identifier only when directly supplied by the paper or workflow; otherwise leave the pending-resolution placeholder.
      data_provider_abbreviation:
        json_type: string
        required: true
        maps_to: GeneExpressionAnnotation.payload.data_provider.abbreviation
        hint: Paper-supported Alliance data-provider selector such as ZFIN, MGI, FB, or WB.
      relation_name:
        json_type: string
        default: is_expressed_in
        maps_to: GeneExpressionAnnotation.payload.relation.name
        hint: Gene-expression relation selector; use is_expressed_in for retained expression observations.
      evidence_record_ids:
        json_type: array
        required: true
        collection: true
        min_items: 1
        maps_to: GeneExpressionAnnotation.evidence_record_ids
        hint: Each value must be returned by a verified record_evidence call from the current run.
      where_expressed_statement:
        json_type: string
        required: true
        maps_to: GeneExpressionAnnotation.payload.where_expressed_statement
        hint: Paper-backed spatial expression statement such as brain, retina, hatching gland, or fin bud.
      anatomical_structure_name:
        json_type: string
        required: true
        maps_to: GeneExpressionAnnotation.payload.expression_pattern.where_expressed.anatomical_structure.name
        hint: Searchable anatomical structure label from the paper; do not invent ontology CURIEs.
      anatomical_structure_curie:
        json_type: string
        maps_to: GeneExpressionAnnotation.payload.expression_pattern.where_expressed.anatomical_structure.curie
        hint: Optional exact anatomy ontology CURIE only when supplied by the paper or workflow.
      cellular_component_name:
        json_type: string
        maps_to: GeneExpressionAnnotation.payload.expression_pattern.where_expressed.cellular_component.name
        hint: Optional cellular component label when the expression finding is subcellular.
      cellular_component_curie:
        json_type: string
        maps_to: GeneExpressionAnnotation.payload.expression_pattern.where_expressed.cellular_component.curie
        hint: Optional cellular component CURIE only when supplied by the paper or workflow.
      when_expressed_stage_name:
        json_type: string
        default: unspecified developmental stage
        maps_to: GeneExpressionAnnotation.payload.when_expressed_stage_name
        hint: Paper-backed developmental or life-stage phrase; use the default only when stage is not specified.
      assay_name:
        json_type: string
        default: expression assay
        maps_to: GeneExpressionAnnotation.payload.expression_experiment.expression_assay_used.name
        hint: Paper-backed assay label, reporter, in situ, immunostaining, RT-PCR, or expression assay phrase.
      assay_curie:
        json_type: string
        default: pending_assay_resolution
        maps_to: GeneExpressionAnnotation.payload.expression_experiment.expression_assay_used.curie
        hint: Optional exact MMO assay CURIE when directly available; otherwise keep the pending-resolution placeholder.
      expression_experiment_unique_id:
        json_type: string
        default: pending_expression_experiment
        maps_to: GeneExpressionAnnotation.payload.expression_experiment.unique_id
        hint: Durable experiment unique ID only when already known; otherwise keep the pending placeholder.
      reference_id:
        json_type: string
        default: pending_reference_resolution
        maps_to: GeneExpressionAnnotation.payload.single_reference.reference_id
        hint: Durable reference ID only when already known; otherwise keep the pending placeholder.
      reference:
        json_type: object
        maps_to: GeneExpressionAnnotation.payload.single_reference
        hint: Optional source-reference metadata such as title, PMID, DOI, or source filename.
      date_created:
        json_type: string
        default: pending_curation_date
        maps_to: GeneExpressionAnnotation.payload.date_created
        hint: Curation date when known; otherwise keep the pending placeholder.
      internal:
        json_type: boolean
        default: false
        maps_to: GeneExpressionAnnotation.payload.internal
      obsolete:
        json_type: boolean
        default: false
        maps_to: GeneExpressionAnnotation.payload.obsolete
      uncertain:
        json_type: boolean
        default: false
        maps_to: GeneExpressionAnnotation.payload.uncertain
      normalization_notes:
        json_type: array
        collection: true
        maps_to: metadata.normalization_notes
        hint: Optional curator-facing expression identity, anatomy, stage, assay, provider, or gene-resolution notes.
      raw_mentions:
        json_type: array
        collection: true
        maps_to: metadata.raw_mentions
        hint: Optional supporting harvested expression mentions for audit metadata.
    finalize_fields:
      summary:
        json_type: string
        required: true
        hint: Concise run summary.
      candidate_count:
        json_type: integer
        required: true
        hint: Number of harvested gene-expression candidates considered.
      kept_count:
        json_type: integer
        required: true
        hint: Must equal the number of successfully staged retained observations.
      excluded_count:
        json_type: integer
        required: true
        hint: Must equal exclusions.length.
      ambiguous_count:
        json_type: integer
        required: true
        hint: Must equal ambiguities.length.
      exclusions:
        json_type: array
        collection: true
        hint: Excluded expression candidates with allowed reason codes.
      ambiguities:
        json_type: array
        collection: true
        hint: Unresolved candidates requiring curator review.
      notes:
        json_type: array
        collection: true
        hint: Optional run-level audit notes.
    object_graph:
      required_objects:
        - GeneExpressionAnnotation
      validator_targets:
        - target_id: relation
          binding_id: relation_vocabulary_validation
          object_type: GeneExpressionAnnotation
          field_path: relation.name
        - target_id: data_provider
          binding_id: data_provider_validation
          object_type: GeneExpressionAnnotation
          field_path: data_provider.abbreviation
      objects:
        - object_type: GeneExpressionAnnotation
          model_ref: GeneExpressionAnnotationPayload
          schema_ref:
            schema_id: alliance.linkml.GeneExpressionAnnotation
            provider: alliance_linkml
            name: GeneExpressionAnnotation
            version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/expression.yaml
          object_role: curatable_unit
          definition_state: in_development
          definition_notes:
            - The builder emits one pending GeneExpressionAnnotation object per retained expression observation.
            - Evidence and raw extraction details are preserved as envelope metadata.
          pending_ref_template: gene_expression_annotation_{staged_id}
          payload_fields:
            unique_id: expression_experiment_unique_id
            date_created: date_created
            internal: internal
            obsolete: obsolete
            data_provider.abbreviation: data_provider_abbreviation
            expression_annotation_subject.primary_external_id: subject_primary_external_id
            expression_annotation_subject.gene_symbol: gene_symbol
            relation.name: relation_name
            single_reference.reference_id: reference_id
            single_reference.title: reference.title
            single_reference.pmid: reference.pmid
            single_reference.doi: reference.doi
            expression_experiment.unique_id: expression_experiment_unique_id
            expression_experiment.expression_assay_used.curie: assay_curie
            expression_experiment.expression_assay_used.name: assay_name
            when_expressed_stage_name: when_expressed_stage_name
            where_expressed_statement: where_expressed_statement
            expression_pattern.when_expressed.developmental_stage_start.name: when_expressed_stage_name
            expression_pattern.where_expressed.anatomical_structure.curie: anatomical_structure_curie
            expression_pattern.where_expressed.anatomical_structure.name: anatomical_structure_name
            expression_pattern.where_expressed.cellular_component.curie: cellular_component_curie
            expression_pattern.where_expressed.cellular_component.name: cellular_component_name
            uncertain: uncertain
          metadata_refs:
            - raw_mentions[0]
          metadata:
            semantic_source: domain_envelope.objects
            export_behavior:
              status: blocked
              exportable: false
              submit: false
              reason: Gene-expression export remains blocked until pending gene, reference, assay, anatomy, and experiment identifiers are resolved.
            write_behavior:
              status: blocked
              reason: The curation DB target shape is verified, but this builder emits pending envelopes only.
    allowed_exclusion_reason_codes:
      - previously_reported
      - non_experimental_claim
      - marker_only_visualization
      - promoter_driven_marker_localization
      - mutant_background_only
      - structural_label_or_fusion_only
      - rescue_experiment_not_expression
      - insufficient_experimental_evidence
      - out_of_scope
      - ambiguous_entity
      - duplicate_mention
      - unsupported_entity_type
    allowed_ambiguity_reason_codes:
      - ambiguous_entity
      - insufficient_selector_context
      - unresolved_gene
      - unresolved_anatomy
      - unresolved_stage
      - unresolved_assay
    examples:
      stage:
        expression_statement: flcn expression in embryonic brain
        gene_symbol: flcn
        data_provider_abbreviation: ZFIN
        evidence_record_ids:
          - ev_verified_expression_quote_1
        where_expressed_statement: embryonic brain
        anatomical_structure_name: brain
        when_expressed_stage_name: embryonic development
      finalize:
        summary: Staged one retained gene-expression observation and excluded one rescue-only mention.
        candidate_count: 2
        kept_count: 1
        excluded_count: 1
        ambiguous_count: 0
    repair_messages:
      invalid_stage_input: Submit one gene-expression observation with gene symbol, provider, anatomy/stage context, and verified evidence_record_ids from this run.
      invalid_finalize_input: Finalization requires internally consistent counts and allowed reason codes.
      invalid_finalization: Resolve builder finalization issues before ending the run.
      duplicate_finalization: finalize_gene_expression_extraction must be called exactly once, after all retained observations are staged.
  validators:
    active:
      - validator_id: gene_expression.domain_envelope_shape
        display_name: Gene expression data structure
        description: Load the envelope through the provider-agnostic DomainEnvelope contract.
      - validator_id: gene_expression.required_payload_fields
        display_name: Required gene expression fields
        description: Required GeneExpressionAnnotation field paths declared in this pack must be present in each pending object payload.
      - validator_id: gene_expression.no_legacy_semantic_lists
        display_name: Current extraction format
        description: Reject legacy semantic collections such as items, annotations, genes, alleles, diseases, chemicals, and phenotypes in new domain-envelope fixtures.
      - validator_id: gene_expression.extractor_output_migration
        display_name: Gene expression extractor format
        description: Validate runtime extractor output through the GeneExpressionAnnotation domain-envelope schema and pending-envelope conversion.
      - validator_id: gene_expression.export_submission_projection
        display_name: Gene expression ready for export
        description: Validate GeneExpressionAnnotation export/submission target projection payloads.
      - validator_id: relation_vocabulary_validation
        display_name: Relation vocabulary lookup
        description: Active package binding validates the LinkML-required GeneExpressionAnnotation relation against controlled vocabulary rows.
      - validator_id: data_provider_validation
        display_name: Data provider validation
        description: Active package binding validates the LinkML-required data provider abbreviation through the shared Alliance data-provider validator.
    under_development:
      - validator_id: gene_expression.linkml_anatomical_site_postcondition
        display_name: Anatomical site postcondition
        description: Enforce the LinkML AnatomicalSite rule requiring anatomical_structure or cellular_component once validator runtime wiring lands.
      - validator_id: gene_expression.ontology_term_resolution
        display_name: Expression ontology term resolution
        description: Validate embedded MMO assay, stage, anatomy, UBERON, and GO term CURIEs against configured Alliance ontology sources.
      - validator_id: gene_expression.subject_gene_resolution
        display_name: Subject gene validation
        description: Validate embedded expression annotation subject gene identifiers and symbols through the shared Alliance gene validator.
      - validator_id: source_reference_validation
        display_name: Source reference validation
        description: Validate embedded literature/reference identifiers through the API-backed reference validator once gene-expression materialization and export flows are ready.
      - validator_id: gene_expression.reagent_context_materialization
        display_name: Reagent context materialization
        description: Preserve reagent, genotype, reporter, and strain context as evidence metadata until explicit LinkML/export materialization targets and validators are active.
      - validator_id: gene_expression.live_write_transport
        display_name: Live database write path
        blocked_by: read_only_curation_db
        description: Direct live DB writes remain blocked until an approved Alliance write transport replaces the read-only submission handoff adapter.
  validator_bindings:
    active:
      - binding_id: relation_vocabulary_validation
        display_name: Relation vocabulary lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - relation.name
        input_fields:
          vocabulary:
            source: literal
            value: Expression Relation
          term_name:
            source: payload
            path: relation.name
        expected_result_fields:
          term_name: relation.name
          vocabulary: relation.vocabulary
          internal_id: relation.id
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      - binding_id: data_provider_validation
        display_name: Data provider validation
        validator_agent:
          package_id: agr.alliance
          agent_id: data_provider_validation
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - data_provider.abbreviation
        input_fields:
          abbreviation:
            source: payload
            path: data_provider.abbreviation
        expected_result_fields:
          abbreviation: data_provider.abbreviation
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
    under_development:
      - binding_id: subject_gene_validation
        display_name: Subject gene validation
        validator_agent:
          package_id: agr.alliance
          agent_id: gene_validation
        state_explanation: Subject gene validation is planned for embedded GeneExpressionAnnotation subjects but is not active until request selectors and materialization targets are promoted for this pack.
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - expression_annotation_subject.primary_external_id
            - expression_annotation_subject.gene_symbol
        input_fields:
          gene_id:
            source: payload
            path: expression_annotation_subject.primary_external_id
            required: false
          gene_symbol:
            source: payload
            path: expression_annotation_subject.gene_symbol
            required: false
          data_provider:
            source: payload
            path: data_provider.abbreviation
            required: false
        expected_result_fields:
          primary_external_id: expression_annotation_subject.primary_external_id
          gene_symbol: expression_annotation_subject.gene_symbol
      - binding_id: expression_context_ontology_validation
        display_name: Expression context ontology validation
        validator_agent:
          package_id: agr.alliance
          agent_id: ontology_term_validation
        state_explanation: Assay, stage, anatomy, UBERON, cellular-component, and qualifier ontology validation remains metadata-only until per-field selectors and result materialization are promoted.
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - expression_experiment.expression_assay_used.curie
            - expression_experiment.expression_assay_used.name
            - when_expressed_stage_name
            - expression_pattern.when_expressed.developmental_stage_start
            - expression_pattern.when_expressed.stage_uberon_slim_terms
            - expression_pattern.where_expressed.anatomical_structure
            - expression_pattern.where_expressed.anatomical_structure.curie
            - expression_pattern.where_expressed.anatomical_structure.name
            - expression_pattern.where_expressed.anatomical_structure_uberon_terms
            - expression_pattern.where_expressed.cellular_component
            - expression_pattern.where_expressed.cellular_component.curie
            - expression_pattern.where_expressed.cellular_component.name
            - expression_pattern.where_expressed.cellular_component_qualifiers
      - binding_id: reagent_context_materialization
        display_name: Reagent context materialization
        state_explanation: Reagent, genotype, reporter, and strain details currently remain in metadata.raw_mentions, metadata.normalization_notes, metadata.ambiguities, or object metadata; no LinkML payload field or validator materialization target is active yet.
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
      - binding_id: source_reference_validation
        display_name: Source reference validation
        validator_agent:
          package_id: agr.alliance
          agent_id: reference_validation
        state_explanation: Reference validation is prepared around the API-backed package tool but remains metadata-only until dependent gene-expression materialization and export flows are activated.
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - single_reference.reference_id
            - single_reference.curie
            - single_reference.title
        input_fields:
          reference_id:
            source: payload
            path: single_reference.reference_id
            required: false
          curie:
            source: payload
            path: single_reference.curie
            required: false
          pmid:
            source: payload
            path: single_reference.pmid
            required: false
          doi:
            source: payload
            path: single_reference.doi
            required: false
          title:
            source: payload
            path: single_reference.title
            required: false
          source_document_id:
            source: envelope_metadata
            path: document_id
            required: false
        expected_result_fields:
          reference_id: single_reference.reference_id
          curie: single_reference.curie
          title: single_reference.title
  provider_refs:
    alliance_linkml:
      schema_ref: alliance.linkml
      repository: https://github.com/alliance-genome/agr_curation_schema.git
      commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      schema_dir: model/schema
      root_schema: model/schema/allianceModel.yaml
      cache_script: scripts/testing/cache_agr_curation_schema.sh
    alliance_curation_db:
      inspected_tables:
        - geneexpressionannotation
        - geneexpressionexperiment
        - expressionpattern
        - temporalcontext
        - anatomicalsite
      representative_gene_symbols:
        - Tmem67
