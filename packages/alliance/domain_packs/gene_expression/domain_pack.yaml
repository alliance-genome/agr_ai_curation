          protected: true
          curator_action_note: Data provider is workflow context, not an extractor edit target.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: Organization
              slot: abbreviation
              range: string
              db_table: organization
              db_column: abbreviation
      - field_path: expression_annotation_subject
        field_type: object
        display_name: Expression annotation subject
        required: true
        model_ref: GeneReferenceSnapshotPayload
        metadata:
          validatable: true
          validator_binding_id: subject_gene_validation
          validator_state: active
          provider_refs:
