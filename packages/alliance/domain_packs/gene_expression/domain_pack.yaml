              db_table: geneexpressionannotation
              db_column: datecreated
      - field_path: internal
        field_type: boolean
        display_name: Internal
        required: true
        metadata:
          protected: true
          curator_action_note: Internal visibility is a curation policy flag.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
