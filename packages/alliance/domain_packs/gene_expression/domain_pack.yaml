          validatable: true
          validator_binding_id: subject_gene_validation
          validator_state: active
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/gene.yaml
              class: Gene
              slot: gene_symbol
              range: GeneSymbolSlotAnnotation
              db_table: slotannotation
              db_column: displaytext
      - field_path: relation
        field_type: object
        display_name: Relation
        required: true
        model_ref: VocabularyTermSnapshotPayload
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
