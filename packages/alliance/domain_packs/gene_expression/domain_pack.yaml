object_definitions:
  - object_type: GeneExpressionAnnotation
    display_name: Gene expression annotation
    description: One curatable unit per gene-expression annotation, with required experiment and context fields embedded in the annotation payload.
    model_ref: GeneExpressionAnnotationPayload
    schema_ref:
      schema_id: alliance.linkml.GeneExpressionAnnotation
      provider: alliance_linkml
      name: GeneExpressionAnnotation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/expression.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/expression.yaml
            class: GeneExpressionAnnotation
    definition_state: stable
    definition_notes:
      - The envelope carries exactly one GeneExpressionAnnotation object per annotation; gene, reference, experiment, assay, and expression context values are embedded in that object's payload.
      - LinkML postconditions require one of anatomical_structure or cellular_component for expression_pattern.where_expressed; extraction helper metadata exposes that routing without making helper output validator authority.
    metadata:
      object_role: curatable_unit
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/expression.yaml
          class: GeneExpressionAnnotation
      db_projection:
        table: geneexpressionannotation
        representative_rows:
          - row_id: 206552169
            gene_primary_external_id: MGI:1923928
            gene_symbol: Tmem67
            data_provider: MGI
          - row_id: 209060898
            gene_primary_external_id: RGD:1586167
            gene_symbol: Tmem67
            data_provider: RGD
      workspace_display:
        primary_label_field: expression_annotation_subject.gene_symbol
        secondary_label_field: where_expressed_statement
        summary_fields:
          - expression_annotation_subject.gene_symbol
          - where_expressed_statement
          - when_expressed_stage_name
          - relation.name
          - expression_experiment.expression_assay_used.name
        groups:
          - id: subject
            label: Subject gene
            fields:
              - expression_annotation_subject.primary_external_id
              - expression_annotation_subject.gene_symbol
          - id: reference
            label: Reference
            fields:
              - single_reference.reference_id
          - id: assay
            label: Assay
            fields:
              - expression_experiment.expression_assay_used.curie
          - id: expression_site
            label: Expression site
            fields:
              - where_expressed_statement
              - expression_pattern.where_expressed.anatomical_structure.curie
              - expression_pattern.where_expressed.cellular_component.curie
              - expression_pattern.where_expressed.anatomical_structure_uberon_terms
              - expression_pattern.where_expressed.cellular_component_qualifiers
              - condition_relations
          - id: stage_relation
            label: Stage & relation
            fields:
              - when_expressed_stage_name
              - expression_pattern.when_expressed.developmental_stage_start.curie
              - expression_pattern.when_expressed.stage_uberon_slim_terms
              - relation.name
              - data_provider.abbreviation
      controlled_field_helper_gaps:
        - field_path: expression_experiment.detection_reagents
          status: under_development
          reason: Detection reagent/probe/construct/reporter is LinkML-backed, but controlled reagent lookup and export join materialization are not active yet; preserve exact paper labels with this field path and use structured placeholders only when evidence supports them.
        - field_path: expression_experiment.specimen_genomic_model
          status: under_development
          reason: Specimen AGM/genotype is LinkML-backed, but helper-backed AGM materialization is not active for Gene Expression extraction yet; preserve specimen context with this field path.
        - field_path: expression_experiment.specimen_alleles
          status: under_development
          reason: Specimen allele context is LinkML-backed, but helper-backed allele materialization is not active for Gene Expression extraction yet; preserve allele/genotype context with this field path.
    fields:
      - field_path: unique_id
        field_type: string
        display_name: Unique ID
        metadata:
          protected: true
          curator_action_note: Unique IDs are stable persistence identifiers.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: GeneExpressionAnnotation
              slot: unique_id
              range: string
              db_table: geneexpressionannotation
              db_column: uniqueid
      - field_path: date_created
        field_type: string
        display_name: Date assigned
        required: true
        metadata:
          protected: true
          curator_action_note: Creation timestamps are persistence metadata, not extraction edit targets.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: GeneExpressionAnnotation
              slot: date_created
              range: datetime
              db_table: geneexpressionannotation
              db_column: datecreated
      - field_path: internal
        field_type: boolean
        display_name: Internal
        required: true
        metadata:
          protected: true
          curator_action_note: Internal visibility is a curation policy flag.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: GeneExpressionAnnotation
              slot: internal
              range: boolean
              db_table: geneexpressionannotation
              db_column: internal
      - field_path: obsolete
        field_type: boolean
        display_name: Obsolete
        metadata:
          protected: true
          curator_action_note: Obsolete state is lifecycle metadata, not an extraction edit target.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: GeneExpressionAnnotation
              slot: obsolete
              range: boolean
              db_table: geneexpressionannotation
              db_column: obsolete
      - field_path: data_provider
        field_type: object
        display_name: Data provider
        required: true
        model_ref: OrganizationSnapshotPayload
        metadata:
          validatable: true
          validator_binding_id: data_provider_validation
          validator_state: active
          definition_state_category: under_development
          protected: true
          curator_action_note: Data provider is workflow context, not an extractor edit target.
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: GeneExpressionAnnotation
              slot: data_provider
