          validatable: true
          validator_binding_id: subject_gene_validation
          validator_state: active
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: Gene
              slot: primary_external_id
              range: string
              db_table: biologicalentity
              db_column: primaryexternalid
      - field_path: expression_annotation_subject.gene_symbol
        field_type: string
        display_name: Gene symbol
        required: true
        definition_notes:
          - Flattened from the Gene.gene_symbol slot annotation display text for pending envelope review.
        metadata:
          editable: true
