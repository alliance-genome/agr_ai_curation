      - binding_id: gene_expression_condition_relation_lookup
        display_name: Condition relation type lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - condition_relations.condition_relation_type.name
        input_fields:
          vocabulary:
            source: literal
            value: Condition Relation Type
          # STATIC CV subset: condition relations on annotations use the
          # 'Expression Condition Relation' subset of Condition Relation Type
          # (members: has_condition, induced_by). condition_relations is multivalued, so this
          # binding fans out per relation: one CV validation per
          # condition_relations[i].condition_relation_type.name (the engine substitutes the
          # relation index into the bare input/expected paths below).
          subset:
            source: literal
            value: Expression Condition Relation
            required: false
          term_name:
            source: payload
            path: condition_relations.condition_relation_type.name
            required: false
        expected_result_fields:
          term_name: condition_relations.condition_relation_type.name
          vocabulary: condition_relations.condition_relation_type.vocabulary
          internal_id: condition_relations.condition_relation_type.id
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      # EXPERIMENTAL CONDITIONS: composite validation at the CONDITION grain. The single fan-out
      # target is condition_relations.conditions (the ExperimentalCondition object, declared
      # multivalued under the multivalued condition_relations). The nested engine fans out the
      # cartesian product and emits ONE composite validation per condition_relations[i].conditions[j];
      # the experimental_condition agent composes the per-field ontology/CV/chemical/taxon existence
      # checks AND the cross-field coherence into a single condition-level decision. Per-condition
      # input_fields are declared with bare nested paths; the engine substitutes the resolved (i, j)
      # indexes so each composite request carries that condition's own components plus its relation context.
      - binding_id: experimental_condition_validation
        display_name: Experimental condition validation
        validator_agent:
          package_id: agr.alliance
          agent_id: experimental_condition_validation
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - condition_relations.conditions
        input_fields:
          # condition_statement = the per-condition source summary (the anchoring text the
          # condition was read from). Rewritten to condition_relations[i].conditions[j].condition_summary.
          condition_statement:
            source: payload
            path: condition_relations.conditions.condition_summary
            required: false
          # Relation context for THIS condition's parent relation. Shares the OUTER multivalued
          # prefix (condition_relations[i]) with the fan-out base, so the engine substitutes the
          # relation index i into this sibling path. context_only: the dedicated
          # gene_expression_condition_relation_lookup binding OWNS relation validation (vocabulary
          # "Condition Relation Type"); the composite agent uses the relation purely as coherence
          # context (does the class fit the relation?) and never re-looks-it-up.
          condition_relation_type:
            source: payload
            path: condition_relations.condition_relation_type.name
            required: false
            context_only: true
          # The whole ExperimentalCondition object for this element (component bundle).
          condition_components:
            source: payload
            path: condition_relations.conditions
            required: false
          condition_class_curie:
            source: payload
            path: condition_relations.conditions.condition_class.curie
            required: false
          condition_id_curie:
            source: payload
            path: condition_relations.conditions.condition_id.curie
            required: false
          condition_chemical_curie:
            source: payload
            path: condition_relations.conditions.condition_chemical.curie
            required: false
          condition_taxon_curie:
            source: payload
            path: condition_relations.conditions.condition_taxon.curie
            required: false
          condition_free_text:
            source: payload
            path: condition_relations.conditions.condition_free_text
            required: false
          data_provider_abbreviation:
            source: payload
            path: data_provider.abbreviation
            required: false
            context_only: true
          # EVIDENCE CONTRACT: the validator sees the backend-resolved exact source text for the
          # spans the condition was read from; the model never types the quote.
          evidence_quote:
            source: evidence_record
            path: verified_quote
            required: false
            context_only: true
        # The composite resolves on the always-present condition_class (the experimental-variable
        # TYPE every condition carries); condition_id (a more specific ZECO term) is OPTIONAL and
        # absent in ~74% of curated conditions, so requiring it would false-negative the majority.
        # The agent still reports unresolved if any PRESENT component (class/chemical/...) fails.
        expected_result_fields:
          condition_class_curie: condition_relations.conditions.condition_class.curie
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
        batch:
          enabled: true
          family: experimental_condition_validation
          max_size: 25
