fixture_packs:
  - fixture_pack_id: tmem67_pending
    display_name: tmem67 pending gene expression fixtures
    path: fixtures/tmem67_pending.yaml
    description: Production-like pending GeneExpressionAnnotation envelope preserving tmem67 extraction evidence metadata.
    object_types:
      - GeneExpressionAnnotation
    definition_state: stable
    definition_notes:
      - Fixture values mirror grounded tmem67 curation DB shape while preserving extractor-side metadata.
  - fixture_pack_id: tmem67_multi_annotation_pending
    display_name: tmem67 multi-annotation pending gene expression fixtures
    path: fixtures/tmem67_multi_annotation_pending.yaml
    description: Focused same-gene multi-expression fixture proving one GeneExpressionAnnotation review row per retained expression statement.
    object_types:
      - GeneExpressionAnnotation
    definition_state: stable
    definition_notes:
      - Two retained expression statements share the same gene and reference but differ by expression site, stage, evidence, and metadata refs.
  - fixture_pack_id: curator_guidance_pending
    display_name: Curator guidance gene expression fixtures
    path: fixtures/curator_guidance_pending.yaml
    description: Release-oriented fixtures covering ZFIN flcn multi-site statements, anatomy-only, cellular-component-only, mixed site routing, negated expression, and optional experiment context preservation.
    object_types:
      - GeneExpressionAnnotation
    definition_state: stable
    definition_notes:
      - Optional reagent, specimen, allele, and condition context remains LinkML-backed pending payload or field-addressed metadata; it is not silently dropped just because it is non-export-blocking in 0.7.0.
      - Helper selections in fixture metadata document controlled-field provenance for relation, assay, stage, anatomy, and GO cellular-component selectors.
metadata:
  object_role_key: object_role
  curatable_unit_object_type: GeneExpressionAnnotation
  semantic_source: domain_envelope.objects
  legacy_semantic_lists: []
  validators:
    active:
      - validator_id: gene_expression.domain_envelope_shape
        display_name: Gene expression data structure
        description: Load the envelope through the provider-agnostic DomainEnvelope contract.
      - validator_id: gene_expression.required_payload_fields
        display_name: Required gene expression fields
        description: Required GeneExpressionAnnotation field paths declared in this pack must be present in each pending object payload.
      - validator_id: gene_expression.no_legacy_semantic_lists
        display_name: Current extraction format
        description: Reject legacy semantic collections such as items, annotations, genes, alleles, diseases, chemicals, and phenotypes in new domain-envelope fixtures.
      - validator_id: gene_expression.extractor_output_migration
        display_name: Gene expression extractor format
        description: Validate runtime extractor output through the GeneExpressionAnnotation domain-envelope schema and pending-envelope conversion.
      - validator_id: gene_expression.linkml_extraction_contract
        display_name: Gene expression LinkML extraction contract
        description: Package-owned deterministic validator emits field-addressed extraction diagnostics for LinkML-required selectors, evidence integrity, relation vocabulary, assay/method selectors, and expression context postconditions.
      - validator_id: gene_expression.export_submission_projection
        display_name: Gene expression ready for export
        description: Validate GeneExpressionAnnotation export/submission target projection payloads.
      - validator_id: relation_vocabulary_validation
        display_name: Relation vocabulary lookup
        description: Active package binding validates the LinkML-required GeneExpressionAnnotation relation against controlled vocabulary rows.
      - validator_id: data_provider_validation
        display_name: Data provider validation
        description: Active package binding validates the LinkML-required data provider abbreviation through the shared Alliance data-provider validator.
      - validator_id: subject_gene_validation
        display_name: Subject gene validation
        description: Active package binding resolves embedded expression annotation subject gene identifiers and symbols through the shared Alliance gene validator.
      - validator_id: source_reference_validation
        display_name: Source reference validation
        description: Active package binding resolves embedded literature/reference identifiers through the API-backed reference validator.
      - validator_id: expression_stage_ontology_validation
        display_name: Expression stage ontology lookup
        description: Active package binding resolves paper-facing GeneExpressionAnnotation stage labels to authoritative stage ontology terms while preserving original labels in materialization metadata.
      - validator_id: expression_assay_ontology_validation
        display_name: Expression assay ontology lookup
        description: Active package binding resolves paper-facing GeneExpressionAnnotation assay/method labels to authoritative MMO terms while preserving original labels in materialization metadata.
      - validator_id: expression_stage_uberon_slim_validation
        display_name: Stage UBERON slim lookup
        description: Active package binding validates and materializes stage UBERON slim term arrays through ontology lookup evidence.
      - validator_id: expression_anatomical_structure_validation
        display_name: Anatomical structure ontology lookup
        description: Active package binding resolves anatomical expression-site labels and CURIEs to authoritative anatomy ontology terms.
      - validator_id: expression_anatomical_uberon_slim_validation
        display_name: Anatomical UBERON slim lookup
        description: Active package binding validates and materializes anatomical UBERON slim term arrays through ontology lookup evidence.
      - validator_id: expression_cellular_component_validation
        display_name: GO cellular component lookup
        description: Active package binding resolves GO cellular-component expression-site labels and CURIEs while allowing cellular-component-only sites.
      - validator_id: expression_cellular_component_qualifier_validation
        display_name: GO cellular component qualifier lookup
        description: Active package binding validates and materializes cellular-component qualifier term arrays through GO cellular-component lookup evidence.
      - validator_id: gene_expression_condition_relation_lookup
        display_name: Condition relation type lookup
        description: Active package binding validates each gene-expression condition relation type against the 'Condition Relation Type' controlled vocabulary (Expression Condition Relation subset); fans out per condition_relations entry.
      - validator_id: experimental_condition_validation
        display_name: Experimental condition validation
        description: Compose gene-expression condition relation, experimental condition ontology, chemical, taxon, and data-provider component checks into one auditable per-condition decision. Fans out one composite validation per ExperimentalCondition via the nested multivalued engine.
    under_development:
      - validator_id: gene_expression.reagent_context_materialization
        display_name: Reagent context materialization
        description: Preserve reagent, genotype, reporter, construct, strain, specimen, allele, and condition context as LinkML-backed pending fields when possible, or field-addressed evidence metadata when helper-backed identifiers/export joins are unavailable.
      - validator_id: gene_expression.live_write_transport
        display_name: Live database write path
        blocked_by: read_only_curation_db
        description: Direct live DB writes remain blocked until an approved Alliance write transport replaces the read-only submission handoff adapter.
  validator_bindings:
    active:
      - binding_id: relation_vocabulary_validation
        display_name: Relation vocabulary lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - relation.name
        input_fields:
          vocabulary:
            source: literal
            value: Expression Relation
          term_name:
            source: payload
            path: relation.name
        expected_result_fields:
          term_name: relation.name
          vocabulary: relation.vocabulary
          internal_id: relation.id
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      - binding_id: data_provider_validation
        display_name: Data provider validation
        validator_agent:
          package_id: agr.alliance
          agent_id: data_provider_validation
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - data_provider.abbreviation
        input_fields:
          abbreviation:
            source: payload
            path: data_provider.abbreviation
        expected_result_fields:
          abbreviation: data_provider.abbreviation
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      - binding_id: subject_gene_validation
        display_name: Subject gene validation
        validator_agent:
          package_id: agr.alliance
          agent_id: gene_validation
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - expression_annotation_subject.primary_external_id
            - expression_annotation_subject.gene_symbol
        input_fields:
          gene_id:
            source: payload
            path: expression_annotation_subject.primary_external_id
            required: false
          gene_symbol:
            source: payload
            path: expression_annotation_subject.gene_symbol
            required: false
          data_provider:
            source: payload
            path: data_provider.abbreviation
            required: false
            context_only: true
        expected_result_fields:
          primary_external_id: expression_annotation_subject.primary_external_id
          gene_symbol: expression_annotation_subject.gene_symbol
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
        batch:
          enabled: false
          family: gene_expression_subject_gene_validation
      - binding_id: source_reference_validation
        display_name: Source reference validation
        validator_agent:
          package_id: agr.alliance
          agent_id: reference_validation
        applies_to:
          domain_pack_id: agr.alliance.gene_expression
          object_types:
            - GeneExpressionAnnotation
          field_paths:
            - single_reference.reference_id
            - single_reference.curie
            - single_reference.title
        input_fields:
          reference_id:
            source: payload
            path: single_reference.reference_id
            required: false
          curie:
            source: payload
            path: single_reference.curie
            required: false
          pmid:
            source: payload
            path: single_reference.pmid
            required: false
          doi:
            source: payload
            path: single_reference.doi
            required: false
