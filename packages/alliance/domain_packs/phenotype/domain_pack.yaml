pack_id: agr.alliance.phenotype
display_name: Alliance Phenotype Domain Pack
version: 0.1.0
metadata_api_version: 1.0.0
description: Pending phenotype assertion envelopes grounded to pinned Alliance LinkML and read-only curation DB targets.
status: in_development
schema_refs:
  - schema_id: alliance.linkml
    provider: alliance_linkml
    name: Alliance curation LinkML schema
    version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
    uri: https://github.com/alliance-genome/agr_curation_schema/tree/1b11d0888f19eba4ca72022200bb7d96b30d4a52
    definition_state: stable
    metadata:
      provider_refs:
        alliance_linkml:
          repository: https://github.com/alliance-genome/agr_curation_schema.git
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          schema_dir: model/schema
          root_schema: model/schema/allianceModel.yaml
          cache_script: scripts/testing/cache_agr_curation_schema.sh
          ref_kind: schema
enum_definitions:
  - enum_id: PhenotypeSubjectResolutionState
    display_name: Phenotype subject resolution state
    description: Resolution state for the biological entity that carries the phenotype assertion.
    values:
      - value: resolved
        label: Resolved
      - value: pending_entity_resolution
        label: Pending entity resolution
      - value: blocked_missing_subject
        label: Blocked missing subject
    definition_state: in_development
  - enum_id: PhenotypeTermResolutionState
    display_name: Phenotype term resolution state
    description: Resolution state for phenotype ontology candidates retained for validation.
    values:
      - value: resolved
        label: Resolved
      - value: pending_ontology_resolution
        label: Pending ontology resolution
    definition_state: in_development
model_definitions:
  - model_id: PhenotypeAnnotationPayload
    display_name: Phenotype annotation payload
    description: Pending phenotype assertion payload shaped from Alliance PhenotypeAnnotation fields plus review-only evidence context.
    schema_ref:
      schema_id: alliance.linkml.PhenotypeAnnotation
      provider: alliance_linkml
      name: PhenotypeAnnotation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      definition_notes:
        - Concrete write subtype remains blocked until the subject resolves to GenePhenotypeAnnotation, AllelePhenotypeAnnotation, or AGMPhenotypeAnnotation.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: PhenotypeAnnotation
  - model_id: PhenotypeSubjectPayload
    display_name: Phenotype subject payload
    description: Pending biological entity subject metadata for a phenotype assertion.
    schema_ref:
      schema_id: alliance.linkml.BiologicalEntity
      provider: alliance_linkml
      name: BiologicalEntity
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/core.yaml
      definition_state: in_development
      definition_notes:
        - This pack keeps the unresolved paper subject as pending metadata until a subject resolver identifies the Gene, Allele, or AGM row.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/core.yaml
            class: BiologicalEntity
  - model_id: PhenotypeTermPayload
    display_name: Phenotype term payload
    description: Pending ontology term reference for a phenotype assertion.
    schema_ref:
      schema_id: alliance.linkml.PhenotypeTerm
      provider: alliance_linkml
      name: PhenotypeTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: PhenotypeTerm
  - model_id: ReferencePayload
    display_name: Reference payload
    description: Pending literature reference object for phenotype evidence.
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
  - model_id: EvidenceQuotePayload
    display_name: Verified evidence quote payload
    description: Metadata-only payload preserving record_evidence-verified paper text and document location.
    definition_state: in_development
    definition_notes:
      - Provider-neutral evidence quote object; not a LinkML write target.
  - model_id: ConditionRelationPayload
    display_name: Condition relation payload
    description: Optional embedded condition relation context (relation type + its experimental conditions) for a phenotype assertion.
    schema_ref:
      schema_id: alliance.linkml.ConditionRelation
      provider: alliance_linkml
      name: ConditionRelation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ConditionRelation
  - model_id: ExperimentalConditionPayload
    display_name: Experimental condition payload
    description: Optional embedded experimental condition context (ontology/chemical/taxon refs + free text).
    schema_ref:
      schema_id: alliance.linkml.ExperimentalCondition
      provider: alliance_linkml
      name: ExperimentalCondition
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ExperimentalCondition
object_definitions:
  - object_type: PhenotypeAnnotation
    display_name: Phenotype annotation
    description: Pending curatable unit linking one extracted phenotype statement to a pending subject, phenotype term, source paper, and verified evidence.
    model_ref: PhenotypeAnnotationPayload
    schema_ref:
      schema_id: alliance.linkml.PhenotypeAnnotation
      provider: alliance_linkml
      name: PhenotypeAnnotation
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      definition_notes:
        - Pending only; export is blocked until subject subtype, durable reference, and ontology term row targets are verified for submission.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: PhenotypeAnnotation
    definition_state: in_development
    definition_notes:
      - Envelope JSON and object refs are the semantic source of truth; no legacy phenotype list is required or emitted.
      - Export/submission is blocked until a resolver supplies the concrete Gene, Allele, or AGM subject row and a non-mutating submission path is proven.
    metadata:
      object_role: curatable_unit
      association_kind: phenotype_assertion
      semantic_source: domain_envelope.objects
      export_behavior:
        status: blocked
        exportable: false
        submit: false
        reason: Phenotype assertions remain pending until subject subtype, reference materialization, and ontology term projection are verified for the downstream exporter.
      write_behavior:
        status: blocked
        reason: The curation DB phenotype target shape is verified, but this pack does not write phenotypeannotation or subtype rows.
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
          class: PhenotypeAnnotation
    fields:
      - field_path: annotation_kind
        field_type: string
        display_name: Annotation kind
        required: true
        metadata:
          protected: true
          curator_action_note: Annotation kind is a domain-pack routing invariant.
      - field_path: phenotype_annotation_object
        field_type: string
        display_name: Phenotype statement
        description: Free-text phenotype statement carried by the LinkML PhenotypeAnnotation attribute.
        required: true
        metadata:
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: PhenotypeAnnotation
              attribute: phenotype_annotation_object
              range: string
              db_table: phenotypeannotation
              db_column: phenotypeannotationobject
      - field_path: phenotype_annotation_subject
        field_type: object_ref
        display_name: Phenotype annotation subject
        required: true
        object_type_ref: PhenotypeSubject
        metadata:
          validator_binding_id: phenotype_subject_entity_validator
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: PhenotypeAnnotation
              slot: phenotype_annotation_subject
              range: BiologicalEntity
              db_targets:
                - genephenotypeannotation.phenotypeannotationsubject_id
                - allelephenotypeannotation.phenotypeannotationsubject_id
                - agmphenotypeannotation.phenotypeannotationsubject_id
      - field_path: phenotype_terms[0]
        field_type: object_ref
        display_name: First phenotype ontology term
        required: true
        object_type_ref: PhenotypeTerm
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: PhenotypeAnnotation
              slot: phenotype_terms
              range: PhenotypeTerm
              db_table: phenotypeannotation_ontologyterm
      - field_path: phenotype_terms[0].curie
        field_type: string
        display_name: First phenotype term CURIE
        description: Optional exact-CURIE fast path; label-backed pending candidates remain valid without it.
        required: false
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: PhenotypeTerm
              slot: curie
              range: uriorcurie
              db_table: ontologyterm
              db_column: curie
      - field_path: phenotype_terms[0].label
        field_type: string
        display_name: First phenotype term label
        description: >-
          Display-only ontology label retained for curator review; Alliance
          LinkML PhenotypeTerm has no label slot.
        metadata:
          protected: true
          curator_action_note: >-
              Display-only label is not a LinkML edit target; updates grounded
              phenotype term fields such as phenotype_terms[0].curie.
      - field_path: phenotype_terms[0].source_mentions[0]
        field_type: string
        display_name: First phenotype term source mention
        metadata:
          protected: true
          curator_action_note: Source mentions anchor pending ontology candidates to paper text.
      - field_path: phenotype_terms[0].ontology_lookup_hint.data_provider
        field_type: string
        display_name: Phenotype term lookup data provider
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
          protected: true
      - field_path: phenotype_terms[0].ontology_lookup_hint.taxon_id
        field_type: string
        display_name: Phenotype term lookup taxon
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
          protected: true
      - field_path: phenotype_terms[0].ontology_lookup_hint.evidence_record_id
        field_type: string
        display_name: Phenotype term lookup evidence record
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
          protected: true
      - field_path: phenotype_terms[0].export_state
        field_type: string
        display_name: Phenotype term export state
        metadata:
          protected: true
          curator_action_note: Pending ontology candidates are blocked from export until validator resolution succeeds.
      - field_path: phenotype_terms[0].write_blocked_reason
        field_type: string
        display_name: Phenotype term write blocker
        metadata:
          protected: true
          curator_action_note: Pending ontology candidates are blocked from write materialization until validator resolution succeeds.
      - field_path: single_reference
        field_type: object_ref
        display_name: Evidence reference
        required: true
        object_type_ref: Reference
        metadata:
          validator_binding_id: phenotype_reference_validator
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: PhenotypeAnnotation
              slot: single_reference
              range: Reference
              db_table: phenotypeannotation
              db_column: evidenceitem_id
      - field_path: evidence_quote
        field_type: object_ref
        display_name: Verified evidence quote
        required: true
        object_type_ref: EvidenceQuote
      - field_path: evidence_record_ids[0]
        field_type: string
        display_name: First evidence record ID
        required: true
      - field_path: negated
        field_type: boolean
        display_name: Negated
        description: >-
          Missing negation in the extractor output is intentionally represented
          as false; true must be supplied explicitly when the source states
          negation.
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: PhenotypeAnnotation
              slot: negated
              range: boolean
              db_table: phenotypeannotation
      - field_path: source_mentions[0]
        field_type: string
        display_name: First source mention
        metadata:
          protected: true
          curator_action_note: Source mentions are paper evidence anchors, not normalized edit targets.
      # EXPERIMENTAL CONDITIONS: condition_relations[] is the OUTER multivalued list (one
      # ConditionRelation per entry: relation_type + its conditions[]). Declared multivalued so
      # the nested fan-out engine indexes condition_relations[i] when fanning the inner
      # conditions[j] and when fanning the relation-type lookup per relation. The composite
      # experimental_condition_validation binding targets condition_relations.conditions (the
      # ExperimentalCondition object) so the engine emits ONE composite validation per condition.
      - field_path: condition_relations
        field_type: array
        display_name: Condition relations
        model_ref: ConditionRelationPayload
        metadata:
          multivalued: true
          definition_state_category: complete
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: Annotation
              slot: condition_relations
              range: ConditionRelation
              db_table: phenotypeannotation_conditionrelation
      - field_path: condition_relations.condition_relation_type.name
        field_type: string
        display_name: Condition relation type
        metadata:
          validatable: true
          validator_binding_id: phenotype_condition_relation_lookup
          validator_state: active
          definition_state_category: complete
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ConditionRelationDTO
              slot: condition_relation_type_name
              range: string
              db_table: vocabularyterm
              db_column: name
      - field_path: condition_relations.conditions
        field_type: array
        display_name: Experimental conditions
        model_ref: ExperimentalConditionPayload
        metadata:
          # condition_relations.conditions is the INNER multivalued list AND the composite
          # fan-out target: the experimental_condition_validation binding targets this path so the
          # nested engine emits ONE composite validation per ExperimentalCondition object
          # (condition_relations[i].conditions[j]), composing every per-field component check into
          # one condition-level decision.
          multivalued: true
          validatable: true
          validator_binding_id: experimental_condition_validation
          validator_state: active
          definition_state_category: complete
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ConditionRelation
              slot: conditions
              range: ExperimentalCondition
              db_table: conditionrelation_experimentalcondition
      - field_path: condition_relations.conditions.condition_class.curie
        field_type: string
        display_name: Condition class CURIE
        metadata:
          # Per-condition component (ZECO). Grounded by the extractor via the term helper and
          # composed (not separately bound) by experimental_condition_validation at the condition grain.
          term_helper:
            field_path: condition_relations.conditions.condition_class.curie
            authority: hint_only
            resolver:
              primary_tool: resolve_domain_field_term
              search_tool: search_domain_field_terms
              inspect_tool: inspect_ontology_term
              accepted_provenance_tools:
                - resolve_domain_field_term
              search_channels:
                - exact_label
                - exact_synonym
                - trigram_label
                - trigram_synonym
                - definition
              unresolved_metadata_path: metadata.normalization_notes
            term_source:
              kind: ontology
              ontology_family: zeco
              ontology_term_type: ZECOTerm
            lookup:
              package_tool: search_domain_field_terms
              method: search_ontology_terms
              candidate_authority: hint_only
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalConditionDTO
              slot: condition_class_curie
              range: string
              db_table: ontologyterm
              db_column: curie
      - field_path: condition_relations.conditions.condition_id.curie
        field_type: string
        display_name: Condition ID CURIE
        metadata:
          # Per-condition component (ZECO/XCO). Grounded by the extractor; composed by the
          # condition-grain composite validator.
          term_helper:
            field_path: condition_relations.conditions.condition_id.curie
            authority: hint_only
            resolver:
              primary_tool: resolve_domain_field_term
              search_tool: search_domain_field_terms
              inspect_tool: inspect_ontology_term
              accepted_provenance_tools:
                - resolve_domain_field_term
              search_channels:
                - exact_label
                - exact_synonym
                - trigram_label
                - trigram_synonym
                - definition
              unresolved_metadata_path: metadata.normalization_notes
            term_source:
              kind: ontology
              ontology_family: zeco
              ontology_term_type: ZECOTerm
            lookup:
              package_tool: search_domain_field_terms
              method: search_ontology_terms
              candidate_authority: hint_only
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalConditionDTO
              slot: condition_id_curie
              range: string
              db_table: ontologyterm
              db_column: curie
      - field_path: condition_relations.conditions.condition_chemical.curie
        field_type: string
        display_name: Chemical CURIE
        metadata:
          # ChEBI is an ontology term in the curation DB (db_table: ontologyterm, ontologytermtype
          # CHEBITerm); the composite validator resolves it via agr_curation_query get_ontology_term.
          definition_state_category: complete
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalConditionDTO
              slot: condition_chemical_curie
              range: string
              db_table: ontologyterm
              db_column: curie
      - field_path: condition_relations.conditions.condition_taxon.curie
        field_type: string
        display_name: Taxon CURIE
        metadata:
          definition_state_category: complete
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalConditionDTO
              slot: condition_taxon_curie
              range: string
              db_table: ontologyterm
              db_column: curie
      - field_path: condition_relations.conditions.condition_free_text
        field_type: string
        display_name: Condition free text
        metadata:
          definition_state_category: complete
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_free_text
              range: string
              db_table: experimentalcondition
              db_column: conditionfreetext
      - field_path: condition_relations.conditions.condition_summary
        field_type: string
        display_name: Condition summary
        metadata:
          definition_state_category: complete
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_summary
              range: string
              db_table: experimentalcondition
              db_column: conditionsummary
  - object_type: PhenotypeSubject
    display_name: Phenotype subject
    description: Pending biological entity subject for a phenotype annotation.
    model_ref: PhenotypeSubjectPayload
    schema_ref:
      schema_id: alliance.linkml.BiologicalEntity
      provider: alliance_linkml
      name: BiologicalEntity
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/core.yaml
      definition_state: in_development
      definition_notes:
        - Generic subject placeholder; concrete DB subtype must be resolved before export.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/core.yaml
            class: BiologicalEntity
    definition_state: in_development
    metadata:
      object_role: validated_reference
      validation_state: pending_entity_resolution
      validator_binding_id: phenotype_subject_entity_validator
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/core.yaml
          class: BiologicalEntity
    fields:
      - field_path: resolution_state
        field_type: enum
        display_name: Resolution state
        required: true
        enum_ref: PhenotypeSubjectResolutionState
      - field_path: subject_identifier
        field_type: string
        display_name: Subject identifier
        metadata:
          validator_binding_id: phenotype_subject_entity_validator
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: BiologicalEntity
              slot: primary_external_id
              range: string
              db_table: biologicalentity
              db_column: primaryexternalid
      - field_path: subject_label
        field_type: string
        display_name: Subject label
      - field_path: subject_type
        field_type: string
        display_name: Subject type
      - field_path: taxon
        field_type: string
        display_name: Taxon
        description: >-
          NCBI Taxon CURIE for the biological entity carrying the phenotype
          assertion. LinkML requires taxon for resolved BiologicalEntity
          subjects; missing taxon must remain explicit through pending or
          blocked subject resolution state.
        required: true
        definition_state: in_development
        definition_notes:
          - Required for resolved/exportable BiologicalEntity subjects; pending envelopes may still block subject resolution when the source cannot support a taxon.
        metadata:
          validatable: true
          validator_binding_id: phenotype_subject_entity_validator
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: BiologicalEntity
              slot: taxon
              range: NCBITaxonTerm
  - object_type: PhenotypeTerm
    display_name: Phenotype ontology term
    description: Pending validated-reference object for a phenotype ontology term.
    model_ref: PhenotypeTermPayload
    schema_ref:
      schema_id: alliance.linkml.PhenotypeTerm
      provider: alliance_linkml
      name: PhenotypeTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: PhenotypeTerm
    definition_state: in_development
    metadata:
      object_role: validated_reference
      validation_state: pending_ontology_resolution
      validator_binding_id: phenotype_term_ontology_validator
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/ontologyTerm.yaml
          class: PhenotypeTerm
    fields:
      - field_path: resolution_state
        field_type: enum
        display_name: Resolution state
        required: true
        enum_ref: PhenotypeTermResolutionState
      - field_path: curie
        field_type: string
        display_name: Term CURIE
        description: Optional exact-CURIE fast path; pending label candidates use validator lookup.
        required: false
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: PhenotypeTerm
              slot: curie
              range: uriorcurie
              db_table: ontologyterm
              db_column: curie
      - field_path: label
        field_type: string
        display_name: Curator-facing label
      - field_path: source_mentions[0]
        field_type: string
        display_name: First source mention
      - field_path: ontology_lookup_hint.data_provider
        field_type: string
        display_name: Lookup data provider
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
      - field_path: ontology_lookup_hint.taxon_id
        field_type: string
        display_name: Lookup taxon
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
      - field_path: ontology_lookup_hint.evidence_record_id
        field_type: string
        display_name: Lookup evidence record
        metadata:
          validator_binding_id: phenotype_term_ontology_validator
      - field_path: export_state
        field_type: string
        display_name: Export state
      - field_path: write_blocked_reason
        field_type: string
        display_name: Write blocked reason
  - object_type: Reference
    display_name: Reference
    description: Pending literature/reference object for the source paper.
    model_ref: ReferencePayload
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
    definition_state: in_development
    metadata:
      object_role: validated_reference
      validation_state: pending_reference_resolution
      validator_binding_id: phenotype_reference_validator
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/reference.yaml
          class: Reference
    fields:
      - field_path: reference_id
        field_type: integer
        display_name: Reference ID
        metadata:
          validator_binding_id: phenotype_reference_validator
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/reference.yaml
              class: Reference
              slot: reference_id
              range: integer
              db_table: reference
              db_column: id
      - field_path: title
        field_type: string
        display_name: Title
      - field_path: filename
        field_type: string
        display_name: Filename
  - object_type: EvidenceQuote
    display_name: Verified evidence quote
    description: Metadata-only object preserving one record_evidence-verified phenotype quote and document locator.
    model_ref: EvidenceQuotePayload
    definition_state: in_development
    metadata:
      object_role: metadata_only
    fields:
      - field_path: evidence_record_id
        field_type: string
        display_name: Evidence record ID
        required: true
      - field_path: entity
        field_type: string
        display_name: Evidence entity
      - field_path: verified_quote
        field_type: string
        display_name: Verified quote
        required: true
      - field_path: page
        field_type: integer
        display_name: Page
      - field_path: section
        field_type: string
        display_name: Section
      - field_path: subsection
        field_type: string
        display_name: Subsection
      - field_path: chunk_id
        field_type: string
        display_name: Chunk ID
      - field_path: figure_reference
        field_type: string
        display_name: Figure reference
fixture_packs:
  - fixture_pack_id: tool_verified_pending
    display_name: Tool-verified pending phenotype fixtures
    path: fixtures/tool_verified_pending.yaml
    description: Production-like pending PhenotypeAnnotation envelopes preserving phenotype extractor evidence and audit metadata.
    object_types:
      - PhenotypeAnnotation
      - PhenotypeSubject
      - PhenotypeTerm
      - Reference
      - EvidenceQuote
    definition_state: in_development
    definition_notes:
      - Fixtures use curatable_objects/domain-envelope objects as the semantic source of truth.
  - fixture_pack_id: cilia_builder_pending
    display_name: Builder-materialized pending phenotype fixtures
    path: fixtures/cilia_builder_pending.yaml
    description: Production-like pending PhenotypeAnnotation envelope produced by the phenotype builder materializer with RELATIVE metadata_refs.
    object_types:
      - PhenotypeAnnotation
      - PhenotypeSubject
      - PhenotypeTerm
      - Reference
      - EvidenceQuote
    definition_state: in_development
    definition_notes:
      - Builder-pattern golden fixture; metadata_refs are RELATIVE to envelope.metadata.extraction_metadata.
metadata:
  base_pack_id: agr.alliance.base
  object_role_key: object_role
  curatable_unit_object_type: PhenotypeAnnotation
  semantic_source: domain_envelope.objects
  legacy_semantic_lists: []
  supported_object_roles:
    - curatable_unit
    - validated_reference
    - metadata_only
  provider_refs:
    alliance_linkml:
      schema_ref: alliance.linkml
      repository: https://github.com/alliance-genome/agr_curation_schema.git
      commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      schema_dir: model/schema
      root_schema: model/schema/allianceModel.yaml
      cache_script: scripts/testing/cache_agr_curation_schema.sh
  validator_bindings:
    active:
      - binding_id: phenotype_term_ontology_validator
        display_name: Phenotype ontology term lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: ontology_term_validation
        applies_to:
          domain_pack_id: agr.alliance.phenotype
          object_types:
            - PhenotypeTerm
        input_fields:
          curie:
            source: payload
            path: curie
            required: false
          label:
            source: payload
            path: label
            required: false
          data_provider:
            source: payload
            path: ontology_lookup_hint.data_provider
            required: false
            context_only: true
          taxon_id:
            source: payload
            path: ontology_lookup_hint.taxon_id
            required: false
            context_only: true
          evidence_record_id:
            source: payload
            path: ontology_lookup_hint.evidence_record_id
            required: false
            context_only: true
          evidence_quote:
            source: evidence_record
            path: verified_quote
            required: false
            context_only: true
          source_chunk_id:
            source: evidence_record
            path: chunk_id
            required: false
            context_only: true
          source_section:
            source: evidence_record
            path: section
            required: false
            context_only: true
          ontology_family:
            source: literal
            value: phenotype
          accepted_prefixes:
            source: literal
            value:
              - MP
              - WBPhenotype
          provider_taxon_ontology_mappings:
            source: literal
            value:
              - data_provider: WB
                taxon_id: NCBITaxon:6239
                ontology_term_type: WBPhenotypeTerm
                accepted_prefixes:
                  - WBPhenotype
                grounding:
                  package_tool: agr_curation_query.search_ontology_terms
                  live_db_term_type_verified: true
                  representative_terms:
                    - WBPhenotype:0000180
                    - WBPhenotype:0000886
              - data_provider: MGI
                taxon_id: NCBITaxon:10090
                ontology_term_type: MPTerm
                accepted_prefixes:
                  - MP
                grounding:
                  package_tool: agr_curation_query.search_ontology_terms
                  live_db_term_type_verified: true
                  representative_terms:
                    - MP:0001569
                    - MP:0003733
        expected_result_fields:
          curie: curie
          label: label
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      - binding_id: phenotype_condition_relation_lookup
        display_name: Condition relation type lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: controlled_vocabulary_validation
        applies_to:
          domain_pack_id: agr.alliance.phenotype
          object_types:
            - PhenotypeAnnotation
          field_paths:
            - condition_relations.condition_relation_type.name
        input_fields:
          vocabulary:
            source: literal
            value: Condition Relation Type
          # STATIC CV subset: condition relations on annotations use the
          # 'Expression Condition Relation' subset of Condition Relation Type
          # (members: has_condition, induced_by). condition_relations is multivalued, so this
          # binding fans out per relation: one CV validation per
          # condition_relations[i].condition_relation_type.name (the engine substitutes the
          # relation index into the bare input/expected paths below).
          subset:
            source: literal
            value: Expression Condition Relation
            required: false
          term_name:
            source: payload
            path: condition_relations.condition_relation_type.name
            required: false
        expected_result_fields:
          term_name: condition_relations.condition_relation_type.name
          vocabulary: condition_relations.condition_relation_type.vocabulary
          internal_id: condition_relations.condition_relation_type.id
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
      # EXPERIMENTAL CONDITIONS: composite validation at the CONDITION grain. The single fan-out
      # target is condition_relations.conditions (the ExperimentalCondition object, declared
      # multivalued under the multivalued condition_relations). The nested engine fans out the
      # cartesian product and emits ONE composite validation per condition_relations[i].conditions[j];
      # the experimental_condition agent composes the per-field ontology/CV/chemical/taxon existence
      # checks AND the cross-field coherence into a single condition-level decision. Per-condition
      # input_fields are declared with bare nested paths; the engine substitutes the resolved (i, j)
      # indexes so each composite request carries that condition's own components plus its relation context.
      - binding_id: experimental_condition_validation
        display_name: Experimental condition validation
        validator_agent:
          package_id: agr.alliance
          agent_id: experimental_condition_validation
        applies_to:
          domain_pack_id: agr.alliance.phenotype
          object_types:
            - PhenotypeAnnotation
          field_paths:
            - condition_relations.conditions
        input_fields:
          # condition_statement = the per-condition source summary (the anchoring text the
          # condition was read from). Rewritten to condition_relations[i].conditions[j].condition_summary.
          condition_statement:
            source: payload
            path: condition_relations.conditions.condition_summary
            required: false
          # Relation context for THIS condition's parent relation. Shares the OUTER multivalued
          # prefix (condition_relations[i]) with the fan-out base, so the engine substitutes the
          # relation index i into this sibling path. context_only: the dedicated
          # phenotype_condition_relation_lookup binding OWNS relation validation (vocabulary
          # "Condition Relation Type"); the composite agent uses the relation purely as coherence
          # context (does the class fit the relation?) and never re-looks-it-up.
          condition_relation_type:
            source: payload
            path: condition_relations.condition_relation_type.name
            required: false
            context_only: true
          # The whole ExperimentalCondition object for this element (component bundle).
          condition_components:
            source: payload
            path: condition_relations.conditions
            required: false
          condition_class_curie:
            source: payload
            path: condition_relations.conditions.condition_class.curie
            required: false
          condition_id_curie:
            source: payload
            path: condition_relations.conditions.condition_id.curie
            required: false
          condition_chemical_curie:
            source: payload
            path: condition_relations.conditions.condition_chemical.curie
            required: false
          condition_taxon_curie:
            source: payload
            path: condition_relations.conditions.condition_taxon.curie
            required: false
          condition_free_text:
            source: payload
            path: condition_relations.conditions.condition_free_text
            required: false
          # NOTE: unlike disease/gene_expression, the phenotype pack does not declare an
          # annotation-level data_provider.abbreviation field (provider context lives on the term
          # ontology_lookup_hint), so the optional context_only data_provider_abbreviation input is
          # omitted here. The composite still resolves on the per-condition ontology components.
          # EVIDENCE CONTRACT: the validator sees the backend-resolved exact source text for the
          # spans the condition was read from; the model never types the quote.
          evidence_quote:
            source: evidence_record
            path: verified_quote
            required: false
            context_only: true
        # The composite resolves on the always-present condition_class (the experimental-variable
        # TYPE every condition carries); condition_id (a more specific ZECO term) is OPTIONAL and
        # absent in ~74% of curated conditions, so requiring it would false-negative the majority.
        # The agent still reports unresolved if any PRESENT component (class/chemical/...) fails.
        expected_result_fields:
          condition_class_curie: condition_relations.conditions.condition_class.curie
        required: true
        blocking: false
        allow_opt_out: true
        curator_override:
          allowed: false
        batch:
          enabled: true
          family: experimental_condition_validation
          max_size: 25
    under_development:
      - binding_id: phenotype_pending_envelope_validator
        display_name: Data check
        state_explanation: Phenotype validator dispatch waits for a package-scoped phenotype validation agent.
        applies_to:
          domain_pack_id: agr.alliance.phenotype
          object_types:
            - PhenotypeAnnotation
            - PhenotypeSubject
            - PhenotypeTerm
            - Reference
            - EvidenceQuote
        definition_state: in_development
      - binding_id: phenotype_subject_entity_validator
        display_name: Phenotype subject lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: subject_entity_validation
        state_explanation: Subject entity lookup routes explicit subject_type values to gene, allele, or AGM validation paths; binding remains under development until validator dispatch is reviewed end to end.
        applies_to:
          domain_pack_id: agr.alliance.phenotype
          object_types:
            - PhenotypeSubject
          field_paths:
            - subject_identifier
            - subject_type
        input_fields:
          subject_type:
            source: payload
            path: subject_type
          subject_identifier:
            source: payload
            path: subject_identifier
          subject_label:
            source: payload
            path: subject_label
            required: false
          taxon:
            source: payload
            path: taxon
            required: false
        expected_result_fields:
          subject_identifier: subject_identifier
          subject_type: subject_type
          subject_label: subject_label
          taxon: taxon
        definition_state: in_development
      - binding_id: phenotype_reference_validator
        display_name: Reference lookup
        validator_agent:
          package_id: agr.alliance
          agent_id: reference_validation
        state_explanation: Reference validation is prepared around the API-backed package tool but remains metadata-only until dependent phenotype materialization and export flows are activated.
        applies_to:
          domain_pack_id: agr.alliance.phenotype
          object_types:
            - Reference
          field_paths:
            - reference_id
            - curie
            - title
        input_fields:
          reference_id:
            source: payload
            path: reference_id
            required: false
          curie:
            source: payload
            path: curie
            required: false
          pmid:
            source: payload
            path: pmid
            required: false
          doi:
            source: payload
            path: doi
            required: false
          title:
            source: payload
            path: title
            required: false
          source_document_id:
            source: envelope_metadata
            path: document_id
            required: false
            context_only: true
        expected_result_fields:
          reference_id: Reference.reference_id
          curie: Reference.curie
          title: Reference.title
        definition_state: in_development
  validators:
    active:
      - validator_id: phenotype.domain_envelope_shape
        display_name: Phenotype data structure
        description: Load the envelope through the provider-agnostic DomainEnvelope contract.
      - validator_id: phenotype.pending_envelope_policy
        display_name: Phenotype export requirements
        description: Pending PhenotypeAnnotation objects must carry blocked export/write policy until subject, reference, and ontology targets are resolved.
      - validator_id: phenotype.no_legacy_semantic_lists
        display_name: Current extraction format
        description: Reject legacy semantic collections such as items, annotations, genes, alleles, diseases, chemicals, and phenotypes in new domain-envelope fixtures.
      - validator_id: phenotype_term_ontology_validator
        display_name: Phenotype ontology term lookup
        description: Validate WB and MGI phenotype term CURIEs or labels through the active ontology-term package validator binding. Unsupported provider/taxon mappings remain blocked before lookup until their live ontologyterm grounding is verified.
      - validator_id: phenotype_condition_relation_lookup
        display_name: Condition relation type lookup
        description: Active package binding validates each phenotype condition relation type against the 'Condition Relation Type' controlled vocabulary (Expression Condition Relation subset); fans out per condition_relations entry.
      - validator_id: experimental_condition_validation
        display_name: Experimental condition validation
        description: Compose phenotype condition relation, experimental condition ontology, chemical, taxon, and data-provider component checks into one auditable per-condition decision. Fans out one composite validation per ExperimentalCondition via the nested multivalued engine.
    under_development:
      - validator_id: phenotype.subject_entity_resolution
        display_name: Phenotype subject resolution
        description: Resolve phenotype_annotation_subject to Gene, Allele, or AGM DB rows before export.
      - validator_id: phenotype.additional_provider_ontology_mappings
        display_name: Additional phenotype ontology mappings
        description: Verify live ontologyterm grounding for RGD, HGNC, ZFIN, FB, and SGD provider/taxon phenotype mappings before allowing label lookup outside the active WB/MGI policy.
      - validator_id: phenotype.export_submission_projection
        display_name: Phenotype ready for export
        blocked_by: ALL-425
        description: Export/submission adapter validation waits for disease phenotype and chemical export/submission adapters.
      - validator_id: phenotype.extractor_output_migration
        display_name: Phenotype extractor format migration
        blocked_by: ALL-412
        description: Runtime extractor output validation waits for the phenotype extractor migration to domain envelopes.
  curation_db_grounding:
    verified_with: read_only_curation_db
    verified_date: "2026-05-09"
    tables:
      - table: public.phenotypeannotation
        key_columns:
          - id
        verified_columns:
          - phenotypeannotationobject
          - evidenceitem_id
          - relation_id
          - dataprovider_id
        verified_constraints:
          - phenotypeannotation_evidenceitem_id_fk references public.informationcontententity(id)
          - phenotypeannotation_relation_id_fk references public.vocabularyterm(id)
          - phenotypeannotation_dataprovider_id_fk references public.organization(id)
      - table: public.genephenotypeannotation
        key_columns:
          - id
        verified_constraints:
          - genephenotypeannotation_pasubject_id_fk references public.gene(id) on delete cascade
          - fkf2daag5p16ps0d9jbgys9q8wn references public.phenotypeannotation(id)
      - table: public.allelephenotypeannotation
        key_columns:
          - id
        verified_constraints:
          - allelephenotypeannotation_pasubject_id_fk references public.allele(id) on delete cascade
          - fke1pme5isgq73km4sakb00ke0p references public.phenotypeannotation(id)
      - table: public.agmphenotypeannotation
        key_columns:
          - id
        verified_constraints:
          - agmphenotypeannotation_pasubject_id_fk references public.affectedgenomicmodel(id) on delete cascade
          - fkpfm2mj21xe7sk0yolm5gmsmlo references public.phenotypeannotation(id)
      - table: public.phenotypeannotation_ontologyterm
        key_columns:
          - phenotypeannotation_id
          - phenotypeterms_id
        verified_constraints:
          - phenotypeannotation_ontologyterm_pa_id_fk references public.phenotypeannotation(id)
          - phenotypeannotation_ontologyterm_phenotypeterms_id_fk references public.ontologyterm(id)
    verified_fixture_terms:
      - curie: WBPhenotype:0000886
      - curie: WBPhenotype:0001174
      - curie: MP:0001569
      - curie: MP:0003733
    phenotype_provider_taxon_mappings:
      active:
        - data_provider: WB
          taxon_id: NCBITaxon:6239
          ontology_term_type: WBPhenotypeTerm
          accepted_prefixes:
            - WBPhenotype
          evidence:
            - public.ontologyterm rows verify WBPhenotypeTerm.
            - phenotype fixtures carry WBPhenotype terms.
            - package tool supports typed search_ontology_terms.
        - data_provider: MGI
          taxon_id: NCBITaxon:10090
          ontology_term_type: MPTerm
          accepted_prefixes:
            - MP
          evidence:
            - public.ontologyterm rows verify MPTerm.
            - live phenotype projection fixture verifies MP phenotype terms.
            - package tool supports typed search_ontology_terms.
      under_development:
        - data_provider: RGD
          reason: Rat provider mapping to MP is not enabled until provider/taxon-specific fixture and live projection coverage are present.
        - data_provider: HGNC
          reason: Human phenotype mapping to HPO is not enabled because HPO term type/tool coverage is not verified in this release.
        - data_provider: ZFIN
          reason: Zebrafish ZP mapping is not enabled until ZP ontology term type and fixture coverage are verified; 2026-05-19 live curation DB inspection found no ZP CURIE rows or ZP ontologytermtype rows.
        - data_provider: FB
          reason: Fly FBcv phenotype mapping is not enabled until DB/tool/test grounding is verified.
        - data_provider: SGD
          reason: Yeast APO phenotype mapping is not enabled until DB/tool/test grounding is verified.
    verified_fixture_subjects:
      - primary_external_id: WB:WBGene00000912
      - primary_external_id: WB:WBVar00000001
      - primary_external_id: WB:WBVar00000002
  export_blocker_policy:
    status: blocked
    reason: Pending phenotype assertions cannot be exported or submitted until the biological subject subtype, source reference, phenotype ontology term row, and exact non-mutating adapter target are resolved.
    blocked_operations:
      - insert public.phenotypeannotation
      - insert public.genephenotypeannotation
      - insert public.allelephenotypeannotation
      - insert public.agmphenotypeannotation
      - insert public.phenotypeannotation_ontologyterm
    required_before_export:
      - Resolve phenotype_annotation_subject to exactly one Gene, Allele, or AGM DB row.
      - Resolve source papers to durable public.reference or public.informationcontententity rows.
      - Validate phenotype term CURIEs against public.ontologyterm.
      - Prove the exporter can create phenotype rows without mutating canonical entity rows.
