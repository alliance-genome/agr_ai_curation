pack_id: agr.alliance.chemical_condition
display_name: Alliance Chemical Condition Domain Pack
version: 0.1.0
metadata_api_version: 1.0.0
description: Pending chemical-condition envelopes grounded to Alliance ExperimentalCondition, ChemicalTerm, and condition-relation targets.
status: in_development
schema_refs:
  - schema_id: alliance.linkml
    provider: alliance_linkml
    name: Alliance curation LinkML schema
    version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
    uri: https://github.com/alliance-genome/agr_curation_schema/tree/1b11d0888f19eba4ca72022200bb7d96b30d4a52
    definition_state: stable
    metadata:
      provider_refs:
        alliance_linkml:
          repository: https://github.com/alliance-genome/agr_curation_schema.git
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          schema_dir: model/schema
          root_schema: model/schema/allianceModel.yaml
          cache_script: scripts/testing/cache_agr_curation_schema.sh
          ref_kind: schema
model_definitions:
  - model_id: ChemicalConditionPayload
    display_name: Chemical condition payload
    description: Pending chemical condition with embedded condition class, chemical term, relation type, source evidence, and export context blockers.
    schema_ref:
      schema_id: alliance.linkml.ExperimentalCondition
      provider: alliance_linkml
      name: ExperimentalCondition
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ExperimentalCondition
  - model_id: ChemicalTermPayload
    display_name: Chemical term reference payload
    description: Validated-reference snapshot of the ChEBI or molecular ontology term used by a chemical condition.
    schema_ref:
      schema_id: alliance.linkml.ChemicalTerm
      provider: alliance_linkml
      name: ChemicalTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: ChemicalTerm
  - model_id: ReferencePayload
    display_name: Reference validated-reference payload
    description: Pending source-paper reference; durable reference_id materialization is required before export.
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
  - model_id: VocabularyTermSnapshotPayload
    display_name: Vocabulary term snapshot payload
    description: Embedded condition-relation vocabulary term identity.
    schema_ref:
      schema_id: alliance.linkml.VocabularyTerm
      provider: alliance_linkml
      name: VocabularyTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/controlledVocabulary.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/controlledVocabulary.yaml
            class: VocabularyTerm
  - model_id: OntologyTermSnapshotPayload
    display_name: Ontology term snapshot payload
    description: Embedded ontology term identity for condition class and chemical references.
    schema_ref:
      schema_id: alliance.linkml.OntologyTerm
      provider: alliance_linkml
      name: OntologyTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: OntologyTerm
  - model_id: EvidenceQuotePayload
    display_name: Verified evidence quote payload
    description: Metadata-only payload preserving record_evidence-verified paper text and document location.
    definition_state: in_development
    definition_notes:
      - Provider-neutral evidence quote object; not a LinkML write target.
object_definitions:
  - object_type: ChemicalCondition
    display_name: Chemical condition
    description: Pending chemical experimental condition extracted from paper evidence.
    model_ref: ChemicalConditionPayload
    schema_ref:
      schema_id: alliance.linkml.ExperimentalCondition
      provider: alliance_linkml
      name: ExperimentalCondition
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      definition_notes:
        - Export requires a host annotation condition-relation join and durable reference_id that chemical extraction does not produce.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ExperimentalCondition
    definition_state: in_development
    definition_notes:
      - Pending only; export and submission are blocked until source reference materialization and host annotation context are supplied.
    metadata:
      object_role: curatable_unit
      condition_kind: chemical_condition
      semantic_source: domain_envelope.objects
      validator_binding_ids:
        - chemical_condition.pending_envelope_validator
        - chemical_condition.chebi_curie_format
      export_behavior:
        status: blocked
        exportable: false
        submit: false
        reason: Chemical condition export requires a host annotation, materialized reference, and downstream submission adapter.
        required_export_context_fields:
          - host_annotation_type
          - host_annotation_id
          - source_reference.reference_id
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
          class: ExperimentalCondition
    fields:
      - field_path: chemical
        field_type: object_ref
        display_name: Chemical term reference
        required: true
        object_type_ref: ChemicalTerm
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_chemical
              range: ChemicalTerm
      - field_path: source_reference
        field_type: object_ref
        display_name: Source reference
        required: true
        object_type_ref: Reference
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ConditionRelation
              slot: single_reference
              range: Reference
      - field_path: evidence_quote
        field_type: object_ref
        display_name: Verified evidence quote
        required: true
        object_type_ref: EvidenceQuote
      - field_path: condition_relation_type
        field_type: object
        display_name: Condition relation type
        required: true
        model_ref: VocabularyTermSnapshotPayload
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ConditionRelation
              slot: condition_relation_type
              range: VocabularyTerm
              db_table: conditionrelation
              db_column: conditionrelationtype_id
      - field_path: condition_relation_type.name
        field_type: string
        display_name: Condition relation type name
        required: true
        metadata:
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: VocabularyTerm
              slot: name
              range: string
              db_table: vocabularyterm
              db_column: name
      - field_path: condition_class
        field_type: object
        display_name: Condition class
        required: true
        model_ref: OntologyTermSnapshotPayload
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_class
              range: ZECOTerm
              db_table: experimentalcondition
              db_column: conditionclass_id
      - field_path: condition_class.curie
        field_type: string
        display_name: Condition class CURIE
        required: true
        metadata:
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ZECOTerm
              slot: curie
              range: uriorcurie
              db_table: ontologyterm
              db_column: curie
      - field_path: condition_class.name
        field_type: string
        display_name: Condition class name
        required: true
        metadata:
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ZECOTerm
              slot: name
              range: string
              db_table: ontologyterm
              db_column: name
      - field_path: condition_chemical
        field_type: object
        display_name: Condition chemical
        required: true
        model_ref: ChemicalTermPayload
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_chemical
              range: ChemicalTerm
              db_table: experimentalcondition
              db_column: conditionchemical_id
      - field_path: condition_chemical.curie
        field_type: string
        display_name: Chemical CURIE
        required: true
        metadata:
          validatable: true
          validator_binding_id: chemical_condition.chebi_curie_format
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ChemicalTerm
              slot: curie
              range: uriorcurie
              db_table: ontologyterm
              db_column: curie
      - field_path: condition_chemical.name
        field_type: string
        display_name: Chemical name
        required: true
        metadata:
          validatable: true
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ChemicalTerm
              slot: name
              range: string
              db_table: ontologyterm
              db_column: name
      - field_path: condition_quantity
        field_type: string
        display_name: Condition quantity
        metadata:
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_quantity
              range: string
              db_table: experimentalcondition
              db_column: conditionquantity
      - field_path: condition_free_text
        field_type: string
        display_name: Condition free text
        metadata:
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_free_text
              range: string
              db_table: experimentalcondition
              db_column: conditionfreetext
      - field_path: condition_summary
        field_type: string
        display_name: Condition summary
        metadata:
          repair:
            repairable: true
            source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_summary
              range: string
              db_table: experimentalcondition
              db_column: conditionsummary
      - field_path: source_chemical_mention
        field_type: string
        display_name: Source chemical mention
        required: true
        metadata:
          evidence_source_field: true
          repair:
            protected: true
            reason: Source mention text is a paper evidence anchor, not a normalized repair target.
      - field_path: source_mentions[0]
        field_type: string
        display_name: First source mention
      - field_path: role
        field_type: string
        display_name: Extractor role
      - field_path: timing
        field_type: string
        display_name: Timing
      - field_path: confidence
        field_type: string
        display_name: Confidence
        required: true
      - field_path: evidence_record_ids[0]
        field_type: string
        display_name: First evidence record ID
        required: true
      - field_path: host_annotation_type
        field_type: string
        display_name: Host annotation type
        metadata:
          export_context_field: true
          provider_refs:
            alliance_curation_db:
              target_join_tables:
                - diseaseannotation_conditionrelation
                - phenotypeannotation_conditionrelation
                - geneexpressionannotation_conditionrelation
      - field_path: host_annotation_id
        field_type: string
        display_name: Host annotation ID
        metadata:
          export_context_field: true
          provider_refs:
            alliance_curation_db:
              target_join_tables:
                - diseaseannotation_conditionrelation.annotation_id
                - phenotypeannotation_conditionrelation.annotation_id
                - geneexpressionannotation_conditionrelation.annotation_id
  - object_type: ChemicalTerm
    display_name: Chemical term
    description: Pending validated-reference object for the chemical ontology term used by the condition.
    model_ref: ChemicalTermPayload
    schema_ref:
      schema_id: alliance.linkml.ChemicalTerm
      provider: alliance_linkml
      name: ChemicalTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: ChemicalTerm
    definition_state: in_development
    metadata:
      object_role: validated_reference
      validation_state: pending_chebi_lookup
      validator_binding_id: chemical_condition.chebi_curie_format
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/ontologyTerm.yaml
          class: ChemicalTerm
    fields:
      - field_path: curie
        field_type: string
        display_name: Chemical CURIE
        required: true
        metadata:
          validatable: true
          validator_binding_id: chemical_condition.chebi_curie_format
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ChemicalTerm
              slot: curie
              range: uriorcurie
      - field_path: name
        field_type: string
        display_name: Chemical name
        required: true
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ChemicalTerm
              slot: name
              range: string
      - field_path: source_mentions[0]
        field_type: string
        display_name: First source mention
  - object_type: Reference
    display_name: Reference
    description: Pending literature/reference object for the source paper.
    model_ref: ReferencePayload
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
    definition_state: in_development
    metadata:
      object_role: validated_reference
      validation_state: pending_reference_materialization
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/reference.yaml
          class: Reference
    fields:
      - field_path: reference_id
        field_type: integer
        display_name: Reference ID
        definition_state: in_development
        definition_notes:
          - Required for export but omitted by pending chemical extraction fixtures until reference materialization is wired.
        metadata:
          export_context_field: true
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/reference.yaml
              class: Reference
              slot: reference_id
              range: integer
              db_table: reference
              db_column: id
      - field_path: title
        field_type: string
        display_name: Title
      - field_path: filename
        field_type: string
        display_name: Filename
  - object_type: EvidenceQuote
    display_name: Verified evidence quote
    description: Metadata-only object preserving one record_evidence-verified quote and document locator.
    model_ref: EvidenceQuotePayload
    definition_state: in_development
    metadata:
      object_role: metadata_only
    fields:
      - field_path: evidence_record_id
        field_type: string
        display_name: Evidence record ID
      - field_path: entity
        field_type: string
        display_name: Evidence entity
      - field_path: verified_quote
        field_type: string
        display_name: Verified quote
        required: true
      - field_path: page
        field_type: integer
        display_name: Page
      - field_path: section
        field_type: string
        display_name: Section
      - field_path: subsection
        field_type: string
        display_name: Subsection
      - field_path: chunk_id
        field_type: string
        display_name: Chunk ID
      - field_path: figure_reference
        field_type: string
        display_name: Figure reference
metadata:
  object_role_key: object_role
  curatable_unit_object_type: ChemicalCondition
  semantic_source: domain_envelope.objects
  legacy_semantic_lists: []
  supported_object_roles:
    - curatable_unit
    - validated_reference
    - metadata_only
  validators:
    active:
      - validator_id: chemical_condition.domain_envelope_shape
        display_name: Chemical condition data structure
        description: Load the envelope through the provider-agnostic DomainEnvelope contract.
      - validator_id: chemical_condition.required_payload_fields
        display_name: Required chemical condition fields
        description: Required chemical-condition field paths declared in this pack must be present in each pending object payload.
      - validator_id: chemical_condition.chebi_curie_format
        display_name: ChEBI CURIE check
        description: Require CHEBI CURIE syntax for condition_chemical.curie and ChemicalTerm.curie until external ChEBI lookup is wired.
      - validator_id: chemical_condition.export_context_blocker
        display_name: Required export context
        description: Emit blocker findings when host annotation or source reference materialization is missing.
    planned:
      - validator_id: chemical_condition.chebi_api_lookup
        display_name: ChEBI lookup
        tool_name: chebi_api_call
        description: Validate ChEBI identity and label against ChEBI once domain-pack validator runtime can call tool bindings.
      - validator_id: chemical_condition.condition_ontology_lookup
        display_name: Condition ontology lookup
        description: Validate ZECO/XCO condition class and condition ID terms against configured ontology sources once condition validators are wired.
    blocked:
      - validator_id: chemical_condition.export_submission_projection
        display_name: Chemical condition ready for export
        blocked_by: ALL-425
        description: Export/submission adapter validation waits for the disease, phenotype, and chemical export/submission adapters.
  validator_bindings:
    active:
      - binding_id: chemical_condition.pending_envelope_validator
        display_name: Data check
        validator_agent:
          package_id: agr.alliance
          agent_id: chemical_validation
        applies_to:
          domain_pack_id: agr.alliance.chemical_condition
          object_types:
            - ChemicalCondition
            - ChemicalTerm
            - Reference
            - EvidenceQuote
        input_fields: {}
        expected_result_fields: {}
        definition_state: in_development
      - binding_id: chemical_condition.chebi_curie_format
        display_name: Chemical condition ChEBI CURIE check
        validator_agent:
          package_id: agr.alliance
          agent_id: chemical_validation
        applies_to:
          domain_pack_id: agr.alliance.chemical_condition
          object_types:
            - ChemicalCondition
          field_paths:
            - condition_chemical.curie
        input_fields:
          curie:
            source: payload
            path: condition_chemical.curie
        expected_result_fields:
          chebi_id: condition_chemical.curie
        required: true
        blocking: true
        allow_opt_out: true
      - binding_id: chemical_condition.term_chebi_curie_format
        display_name: Chemical term ChEBI CURIE check
        validator_agent:
          package_id: agr.alliance
          agent_id: chemical_validation
        applies_to:
          domain_pack_id: agr.alliance.chemical_condition
          object_types:
            - ChemicalTerm
          field_paths:
            - curie
        input_fields:
          curie:
            source: payload
            path: curie
        expected_result_fields:
          chebi_id: curie
        required: true
        blocking: true
        allow_opt_out: true
    under_development:
      - binding_id: chemical_condition.chebi_api_lookup
        display_name: ChEBI lookup
        state_explanation: ChEBI lookup remains informational until package-scoped validator dispatch owns external ontology calls.
        expected_result_fields:
          chebi_id: condition_chemical.curie
          name: condition_chemical.name
        applies_to:
          domain_pack_id: agr.alliance.chemical_condition
          object_types:
            - ChemicalCondition
          field_paths:
            - condition_chemical.curie
            - condition_chemical.name
        definition_state: in_development
      - binding_id: chemical_condition.condition_ontology_lookup
        display_name: Condition ontology lookup
        state_explanation: Condition ontology lookup remains informational until ontology validator dispatch is wired.
        applies_to:
          domain_pack_id: agr.alliance.chemical_condition
          object_types:
            - ChemicalCondition
          field_paths:
            - condition_class.curie
            - condition_id.curie
        definition_state: in_development
      - binding_id: chemical_condition.export_projection_validator
        display_name: Chemical condition ready for export
        state_explanation: Host annotation export/submission projections are owned by ALL-425.
  provider_refs:
    alliance_linkml:
      schema_ref: alliance.linkml
