pack_id: agr.alliance.chemical_condition
display_name: Alliance Chemical Condition Domain Pack
version: 0.1.0
metadata_api_version: 1.0.0
description: Pending chemical-condition envelopes grounded to Alliance ExperimentalCondition, ChemicalTerm, and condition-relation targets.
status: in_development
schema_refs:
  - schema_id: alliance.linkml
    provider: alliance_linkml
    name: Alliance curation LinkML schema
    version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
    uri: https://github.com/alliance-genome/agr_curation_schema/tree/1b11d0888f19eba4ca72022200bb7d96b30d4a52
    definition_state: stable
    metadata:
      provider_refs:
        alliance_linkml:
          repository: https://github.com/alliance-genome/agr_curation_schema.git
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          schema_dir: model/schema
          root_schema: model/schema/allianceModel.yaml
          cache_script: scripts/testing/cache_agr_curation_schema.sh
          ref_kind: schema
model_definitions:
  - model_id: ChemicalConditionPayload
    display_name: Chemical condition payload
    description: Pending chemical condition with embedded condition class, chemical term, relation type, source evidence, and export context blockers.
    schema_ref:
      schema_id: alliance.linkml.ExperimentalCondition
      provider: alliance_linkml
      name: ExperimentalCondition
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ExperimentalCondition
  - model_id: ChemicalTermPayload
    display_name: Chemical term reference payload
    description: Validated-reference snapshot of the ChEBI or molecular ontology term used by a chemical condition.
    schema_ref:
      schema_id: alliance.linkml.ChemicalTerm
      provider: alliance_linkml
      name: ChemicalTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: ChemicalTerm
  - model_id: ReferencePayload
    display_name: Reference validated-reference payload
    description: Pending source-paper reference; durable reference_id materialization is required before export.
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
  - model_id: VocabularyTermSnapshotPayload
    display_name: Vocabulary term snapshot payload
    description: Embedded condition-relation vocabulary term identity.
    schema_ref:
      schema_id: alliance.linkml.VocabularyTerm
      provider: alliance_linkml
      name: VocabularyTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/controlledVocabulary.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/controlledVocabulary.yaml
            class: VocabularyTerm
  - model_id: OntologyTermSnapshotPayload
    display_name: Ontology term snapshot payload
    description: Embedded ontology term identity for condition class and chemical references.
    schema_ref:
      schema_id: alliance.linkml.OntologyTerm
      provider: alliance_linkml
      name: OntologyTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: OntologyTerm
  - model_id: EvidenceQuotePayload
    display_name: Verified evidence quote payload
    description: Metadata-only payload preserving record_evidence-verified paper text and document location.
    definition_state: in_development
    definition_notes:
      - Provider-neutral evidence quote object; not a LinkML write target.
object_definitions:
  - object_type: ChemicalCondition
    display_name: Chemical condition
    description: Pending chemical experimental condition extracted from paper evidence.
    model_ref: ChemicalConditionPayload
    schema_ref:
      schema_id: alliance.linkml.ExperimentalCondition
      provider: alliance_linkml
      name: ExperimentalCondition
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
      definition_state: in_development
      definition_notes:
        - Export requires a host annotation condition-relation join and durable reference_id that chemical extraction does not produce.
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
            class: ExperimentalCondition
    definition_state: in_development
    definition_notes:
      - Pending only; export and submission are blocked until source reference materialization and host annotation context are supplied.
    metadata:
      object_role: curatable_unit
      condition_kind: chemical_condition
      semantic_source: domain_envelope.objects
      validator_binding_ids:
        - chemical_condition.pending_envelope_validator
        - chemical_condition.chebi_api_lookup
        - source_reference_validation
        - experimental_condition_validation
      export_behavior:
        status: blocked
        exportable: false
        submit: false
        reason: Chemical condition export requires a host annotation, materialized reference, and downstream submission adapter.
        required_export_context_fields:
          - host_annotation_type
          - host_annotation_id
          - source_reference.reference_id
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
          class: ExperimentalCondition
    fields:
      - field_path: chemical
        field_type: object_ref
        display_name: Chemical term reference
        required: true
        object_type_ref: ChemicalTerm
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_chemical
              range: ChemicalTerm
      - field_path: source_reference
        field_type: object_ref
        display_name: Source reference
        required: true
        object_type_ref: Reference
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ConditionRelation
              slot: single_reference
              range: Reference
      - field_path: evidence_quote
        field_type: object_ref
        display_name: Verified evidence quote
        required: true
        object_type_ref: EvidenceQuote
      - field_path: condition_relation_type
        field_type: object
        display_name: Condition relation type
        required: true
        model_ref: VocabularyTermSnapshotPayload
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ConditionRelation
              slot: condition_relation_type
              range: VocabularyTerm
              db_table: conditionrelation
              db_column: conditionrelationtype_id
      - field_path: condition_relation_type.name
        field_type: string
        display_name: Condition relation type name
        required: true
        metadata:
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: VocabularyTerm
              slot: name
              range: string
              db_table: vocabularyterm
              db_column: name
      - field_path: condition_class
        field_type: object
        display_name: Condition class
        required: true
        model_ref: OntologyTermSnapshotPayload
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_class
              range: ZECOTerm
              db_table: experimentalcondition
              db_column: conditionclass_id
      - field_path: condition_class.curie
        field_type: string
        display_name: Condition class CURIE
        description: Optional exact-CURIE fast path; label-backed condition-class candidates remain valid for ontology validation without it.
        required: false
        metadata:
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ZECOTerm
              slot: curie
              range: uriorcurie
              db_table: ontologyterm
              db_column: curie
      - field_path: condition_class.name
        field_type: string
        display_name: Condition class name
        required: true
        metadata:
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ZECOTerm
              slot: name
              range: string
              db_table: ontologyterm
              db_column: name
      - field_path: condition_chemical
        field_type: object
        display_name: Condition chemical
        required: true
        model_ref: ChemicalTermPayload
        metadata:
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_chemical
              range: ChemicalTerm
              db_table: experimentalcondition
              db_column: conditionchemical_id
      - field_path: condition_chemical.curie
        field_type: string
        display_name: Chemical CURIE
        description: Optional ChEBI exact-CURIE fast path; chemical name candidates remain valid for ChEBI validation without it.
        required: false
        metadata:
          validatable: true
          validator_binding_id: chemical_condition.chebi_api_lookup
          validation_result_field: chebi_id
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ChemicalTerm
              slot: curie
              range: uriorcurie
              db_table: ontologyterm
              db_column: curie
      - field_path: condition_chemical.name
        field_type: string
        display_name: Chemical name
        required: true
        metadata:
          validatable: true
          validator_binding_id: chemical_condition.chebi_api_lookup
          validation_result_field: name
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ChemicalTerm
              slot: name
              range: string
              db_table: ontologyterm
              db_column: name
      - field_path: condition_quantity
        field_type: string
        display_name: Condition quantity
        metadata:
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_quantity
              range: string
              db_table: experimentalcondition
              db_column: conditionquantity
      - field_path: condition_free_text
        field_type: string
        display_name: Condition free text
        metadata:
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_free_text
              range: string
              db_table: experimentalcondition
              db_column: conditionfreetext
      - field_path: condition_summary
        field_type: string
        display_name: Condition summary
        metadata:
          editable: true
          source_of_truth: alliance_linkml
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/phenotypeAndDiseaseAnnotation.yaml
              class: ExperimentalCondition
              slot: condition_summary
              range: string
              db_table: experimentalcondition
              db_column: conditionsummary
      - field_path: source_chemical_mention
        field_type: string
        display_name: Source chemical mention
        required: true
        metadata:
          evidence_source_field: true
          protected: true
          curator_action_note: Source mention text is a paper evidence anchor, not a normalized edit target.
      - field_path: source_mentions[0]
        field_type: string
        display_name: First source mention
      - field_path: role
        field_type: string
        display_name: Extractor role
      - field_path: timing
        field_type: string
        display_name: Timing
      - field_path: confidence
        field_type: string
        display_name: Confidence
        required: true
      - field_path: evidence_record_ids[0]
        field_type: string
        display_name: First evidence record ID
        required: true
      - field_path: host_annotation_type
        field_type: string
        display_name: Host annotation type
        metadata:
          export_context_field: true
          provider_refs:
            alliance_curation_db:
              target_join_tables:
                - diseaseannotation_conditionrelation
                - phenotypeannotation_conditionrelation
                - geneexpressionannotation_conditionrelation
      - field_path: host_annotation_id
        field_type: string
        display_name: Host annotation ID
        metadata:
          export_context_field: true
          provider_refs:
            alliance_curation_db:
              target_join_tables:
                - diseaseannotation_conditionrelation.annotation_id
                - phenotypeannotation_conditionrelation.annotation_id
                - geneexpressionannotation_conditionrelation.annotation_id
  - object_type: ChemicalTerm
    display_name: Chemical term
    description: Pending validated-reference object for the chemical ontology term used by the condition.
    model_ref: ChemicalTermPayload
    schema_ref:
      schema_id: alliance.linkml.ChemicalTerm
      provider: alliance_linkml
      name: ChemicalTerm
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/ontologyTerm.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/ontologyTerm.yaml
            class: ChemicalTerm
    definition_state: in_development
    metadata:
      object_role: validated_reference
      validation_state: pending_chebi_lookup
      validator_binding_id: chemical_condition.term_chebi_api_lookup
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/ontologyTerm.yaml
          class: ChemicalTerm
    fields:
      - field_path: curie
        field_type: string
        display_name: Chemical CURIE
        description: Optional ChEBI exact-CURIE fast path; chemical name candidates remain valid for ChEBI validation without it.
        required: false
        metadata:
          validatable: true
          validator_binding_id: chemical_condition.term_chebi_api_lookup
          validation_result_field: chebi_id
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ChemicalTerm
              slot: curie
              range: uriorcurie
      - field_path: name
        field_type: string
        display_name: Chemical name
        required: true
        metadata:
          validatable: true
          validator_binding_id: chemical_condition.term_chebi_api_lookup
          validation_result_field: name
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/core.yaml
              class: ChemicalTerm
              slot: name
              range: string
      - field_path: source_mentions[0]
        field_type: string
        display_name: First source mention
  - object_type: Reference
    display_name: Reference
    description: Pending literature/reference object for the source paper.
    model_ref: ReferencePayload
    schema_ref:
      schema_id: alliance.linkml.Reference
      provider: alliance_linkml
      name: Reference
      version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
      uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/reference.yaml
      metadata:
        provider_refs:
          alliance_linkml:
            schema_ref: alliance.linkml
            commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            source_file: model/schema/reference.yaml
            class: Reference
    definition_state: in_development
    metadata:
      object_role: validated_reference
      validation_state: pending_reference_materialization
      provider_refs:
        alliance_linkml:
          schema_ref: alliance.linkml
          commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
          source_file: model/schema/reference.yaml
          class: Reference
    fields:
      - field_path: reference_id
        field_type: integer
        display_name: Reference ID
        definition_state: in_development
        definition_notes:
          - Required for export but omitted by pending chemical extraction fixtures until reference materialization is wired.
        metadata:
          export_context_field: true
          provider_refs:
            alliance_linkml:
              schema_ref: alliance.linkml
              commit: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
              source_file: model/schema/reference.yaml
              class: Reference
              slot: reference_id
              range: integer
              db_table: reference
              db_column: id
      - field_path: title
        field_type: string
        display_name: Title
      - field_path: filename
        field_type: string
        display_name: Filename
  - object_type: EvidenceQuote
    display_name: Verified evidence quote
    description: Metadata-only object preserving one record_evidence-verified quote and document locator.
    model_ref: EvidenceQuotePayload
    definition_state: in_development
    metadata:
      object_role: metadata_only
    fields:
      - field_path: evidence_record_id
        field_type: string
        display_name: Evidence record ID
      - field_path: entity
        field_type: string
        display_name: Evidence entity
      - field_path: verified_quote
        field_type: string
        display_name: Verified quote
        required: true
      - field_path: page
        field_type: integer
        display_name: Page
      - field_path: section
        field_type: string
        display_name: Section
      - field_path: subsection
        field_type: string
        display_name: Subsection
      - field_path: chunk_id
        field_type: string
        display_name: Chunk ID
      - field_path: figure_reference
        field_type: string
        display_name: Figure reference
metadata:
  object_role_key: object_role
  curatable_unit_object_type: ChemicalCondition
  semantic_source: domain_envelope.objects
  legacy_semantic_lists: []
  supported_object_roles:
    - curatable_unit
    - validated_reference
    - metadata_only
  extraction_builder:
    enabled: true
    stage_tool: stage_chemical_condition_evidence
    finalize_tool: finalize_chemical_extraction
    retained_unit: chemical_condition
    per_retained_finding: true
    model_final_ack_schema: ExtractionToolFinalizationAck
    curation_output_schema: ChemicalExtractionResultEnvelope
    primary_stage_field: source_chemical_mention
    dedupe_fields:
      - source_chemical_mention
      - condition_chemical_name
      - evidence_record_ids
    stage_description: Submit one retained chemical condition after verifying supporting quote text with record_evidence.
    finalize_description: Call exactly once after all retained chemical conditions have been staged; the backend builds the final chemical-condition envelope.
    fields:
      source_chemical_mention:
        json_type: string
        required: true
        maps_to: ChemicalCondition.payload.source_chemical_mention
        hint: Exact chemical mention as written in the paper; do not combine multiple chemicals.
      condition_chemical_name:
        json_type: string
        required: true
        maps_to: ChemicalCondition.payload.condition_chemical.name
        hint: Paper-backed chemical label or most searchable name for ChEBI validation.
      condition_chemical_curie:
        json_type: string
        maps_to: ChemicalCondition.payload.condition_chemical.curie
        hint: Optional exact CHEBI CURIE only when supplied by the paper; do not invent ontology IDs.
      condition_relation_type_name:
        json_type: string
        default: has_condition
        maps_to: ChemicalCondition.payload.condition_relation_type.name
        hint: Condition relation type selector; use has_condition for retained chemical treatments unless the paper requires a different supported term.
      condition_class_name:
        json_type: string
        default: chemical treatment
        maps_to: ChemicalCondition.payload.condition_class.name
        hint: Condition ontology label selector; normally chemical treatment for retained chemical exposures.
      condition_class_curie:
        json_type: string
        maps_to: ChemicalCondition.payload.condition_class.curie
        hint: Optional exact ZECO CURIE only when supplied by the paper or schema context; label-backed validation is valid without it.
      evidence_record_ids:
        json_type: array
        required: true
        collection: true
        min_items: 1
        maps_to: ChemicalCondition.payload.evidence_record_ids
        hint: Each value must be returned by a verified record_evidence call from the current run.
      role:
        json_type: string
        required: true
        maps_to: ChemicalCondition.payload.role
        hint: One of treatment, assay_reagent, buffer, control, other, or unspecified.
      confidence:
        json_type: string
        required: true
        maps_to: ChemicalCondition.payload.confidence
        hint: Extractor confidence; use high, medium, or low.
      condition_quantity:
        json_type: string
        maps_to: ChemicalCondition.payload.condition_quantity
        hint: Paper wording for dose, concentration, or amount when stated.
      condition_free_text:
        json_type: string
        maps_to: ChemicalCondition.payload.condition_free_text
        hint: Exact or lightly trimmed treatment wording from the paper.
      condition_summary:
        json_type: string
        maps_to: ChemicalCondition.payload.condition_summary
        hint: Concise paper-backed condition summary for curator review.
      timing:
        json_type: string
        maps_to: ChemicalCondition.payload.timing
        hint: Paper wording for timing, stage, duration, or exposure window when stated.
      host_annotation_type:
        json_type: string
        maps_to: ChemicalCondition.payload.host_annotation_type
        hint: Optional host annotation type only when paper-supported; export remains blocked without downstream materialization.
      host_annotation_id:
        json_type: string
        maps_to: ChemicalCondition.payload.host_annotation_id
        hint: Optional host annotation identifier only when directly supplied by the workflow; do not invent.
      reference:
        json_type: object
        maps_to: Reference.payload
        hint: Optional source-reference metadata such as title or source_filename.
      normalization_notes:
        json_type: array
        collection: true
        maps_to: metadata.normalization_notes
        hint: Optional curator-facing chemical, dose, route, abbreviation, or condition-class notes.
      raw_mentions:
        json_type: array
        collection: true
        maps_to: metadata.raw_mentions
