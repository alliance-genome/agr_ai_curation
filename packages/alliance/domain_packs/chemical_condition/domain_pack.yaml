            version: 1b11d0888f19eba4ca72022200bb7d96b30d4a52
            uri: https://github.com/alliance-genome/agr_curation_schema/blob/1b11d0888f19eba4ca72022200bb7d96b30d4a52/model/schema/phenotypeAndDiseaseAnnotation.yaml
            definition_state: in_development
          object_role: curatable_unit
          definition_state: in_development
          definition_notes:
            - Pending only; export is blocked until host annotation context and reference materialization are supplied.
          pending_ref_template: chemical_condition_{staged_id}
          payload_fields:
            condition_relation_type.name: condition_relation_type_name
            condition_class.curie: condition_class_curie
            condition_class.name: condition_class_name
            condition_chemical.curie: condition_chemical_curie
            condition_chemical.name: condition_chemical_name
            source_chemical_mention: source_chemical_mention
            source_mentions: raw_mentions
            role: role
            confidence: confidence
            evidence_record_ids: evidence_record_ids
            condition_quantity: condition_quantity
            condition_free_text: condition_free_text
            condition_summary: condition_summary
            timing: timing
            host_annotation_type: host_annotation_type
            host_annotation_id: host_annotation_id
          object_refs:
            - field_path: chemical
              object_type: ChemicalTerm
            - field_path: source_reference
              object_type: Reference
            - field_path: evidence_quote
              object_type: EvidenceQuote
              collection: true
          metadata:
            condition_kind: chemical_condition
            semantic_source: domain_envelope.objects
            validator_binding_ids:
              - chemical_condition.chebi_api_lookup
              - chemical_condition.term_chebi_api_lookup
              - chemical_condition.condition_ontology_lookup
              - chemical_condition.condition_relation_type_lookup
            export_behavior:
              status: blocked
              exportable: false
              submit: false
              reason: Chemical condition export requires a host annotation, materialized reference, and downstream submission adapter.
              required_export_context_fields:
                - host_annotation_type
                - host_annotation_id
                - source_reference.reference_id
    allowed_exclusion_reason_codes:
      - previously_reported
      - non_experimental_claim
      - insufficient_experimental_evidence
      - out_of_scope
      - ambiguous_entity
      - duplicate_mention
      - unsupported_entity_type
      - buffer_or_media_component
      - standard_lab_reagent
      - vehicle_control_only
      - assay_reagent_only
      - reference_list_only
    allowed_ambiguity_reason_codes:
      - ambiguous_entity
      - insufficient_selector_context
      - unresolved_identity
    examples:
      stage:
        source_chemical_mention: rapamycin
        condition_chemical_name: sirolimus
        evidence_record_ids:
          - ev_verified_chemical_quote_1
        role: treatment
        confidence: high
        condition_quantity: 100 nM
        condition_free_text: Rapamycin treatment at 100 nM after 24 hours
        timing: after 24 hours
      finalize:
        summary: Staged one retained chemical condition and excluded one vehicle-only candidate.
        candidate_count: 2
        kept_count: 1
        excluded_count: 1
        ambiguous_count: 0
    repair_messages:
      invalid_stage_input: Submit one chemical condition with a paper-backed chemical name, role, confidence, and verified evidence_record_ids from this run.
      invalid_finalize_input: Finalization requires internally consistent counts and allowed reason codes.
      invalid_finalization: Resolve builder finalization issues before ending the run.
      duplicate_finalization: finalize_chemical_extraction must be called exactly once, after all retained chemical conditions are staged.
  validators:
    active:
