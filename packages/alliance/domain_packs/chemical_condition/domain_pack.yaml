      ambiguities:
        json_type: array
        collection: true
        hint: Unresolved candidates requiring curator review.
      notes:
        json_type: array
        collection: true
        hint: Optional run-level audit notes.
    object_graph:
      required_objects:
        - ChemicalCondition
        - ChemicalTerm
        - Reference
        - EvidenceQuote
      validator_targets:
        - target_id: chemical_condition_identity
          binding_id: chemical_condition.chebi_api_lookup
