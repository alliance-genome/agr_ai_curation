package_id: agr.alliance
display_name: Alliance Defaults
version: 1.0.0
package_api_version: 1.0.0
min_runtime_version: 1.0.0
max_runtime_version: 2.0.0
python_package_root: python/src/agr_ai_curation_alliance
requirements_file: requirements/runtime.txt
exports:
  - kind: tool_binding
    name: default
    path: tools/bindings.yaml
    description: Default AGR Alliance specialist tool bindings
  - kind: tool_policy_defaults
    name: default_tool_policies
    path: config/tool_policy_defaults.yaml
    description: Default AGR Alliance specialist tool policy defaults
  - kind: curation_adapter
    name: default
    path: python/src/agr_ai_curation_alliance/curation_adapters.py
    description: Package-owned curation adapter registrations
# MAINTAINER NOTE: Adding a directory under packages/alliance/agents/ is not enough
# to activate a specialist. Every bundle with agents/<name>/agent.yaml must also be
# listed in agent_bundles below or startup will warn and skip that on-disk bundle.
agent_bundles:
  - name: agm
    has_schema: true
  - name: allele
    has_schema: true
    group_rules: [fb, hgnc, mgi, rgd, sgd, wb, zfin]
  - name: allele_extractor
    has_schema: true
    group_rules: [fb, hgnc, mgi, rgd, sgd, wb, zfin]
  - name: chat_output
  - name: chemical
    has_schema: true
  - name: chemical_extractor
    has_schema: true
    group_rules: [fb, hgnc, mgi, rgd, sgd, wb, zfin]
  - name: controlled_vocabulary
    has_schema: true
  - name: data_provider
    has_schema: true
  - name: csv_formatter
  - name: disease
    has_schema: true
  - name: disease_extractor
    has_schema: true
    group_rules: [fb, hgnc, mgi, rgd, sgd, wb, zfin]
  - name: experimental_condition
    has_schema: true
  - name: gene
    has_schema: true
    group_rules: [fb, hgnc, mgi, rgd, sgd, wb, zfin]
  - name: gene_expression
    has_schema: true
    group_rules: [wb, zfin]
  - name: gene_extractor
    has_schema: true
    group_rules: [fb, hgnc, mgi, rgd, sgd, wb, zfin]
  - name: gene_ontology
    has_schema: true
  - name: go_annotations
    has_schema: true
  - name: json_formatter
  - name: ontology_term
    has_schema: true
  - name: orthologs
    has_schema: true
  - name: pdf
    group_rules: [fb, hgnc, mgi, rgd, sgd, wb, zfin]
  - name: phenotype_extractor
    has_schema: true
    group_rules: [fb, hgnc, mgi, rgd, sgd, wb, zfin]
  - name: reference
    has_schema: true
  - name: subject_entity
    has_schema: true
  - name: tsv_formatter
