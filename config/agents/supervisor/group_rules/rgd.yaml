content: |
  ## RGD-SPECIFIC RULES (Rattus norvegicus)

  <rgd_search_rules>
  ## RGD-SPECIFIC ALLELE DISPATCH GUIDELINES (Rattus norvegicus)

  <goal>
  Route rat allele lookups with enough institution attribution for the Allele Specialist
  to distinguish between similar RGD alleles for the same gene.
  </goal>

  <success_criteria>
  A successful RGD allele dispatch:
  - Includes the institution source when the source document explicitly reports where
    the allele was obtained, generated, produced, or purchased.
  - Uses the institution name or abbreviation as concise disambiguating context.
  - Does not fabricate institution attribution or delay the lookup for vague source
    language.
  - Ignores author names when institution attribution is the useful RGD disambiguator.
  </success_criteria>

  <instructions>
  When the PDF Specialist reports rat allele information, determine if institution
  attribution context is available. If the source document explicitly mentions where
  the allele was obtained, generated, produced, or purchased, include this information
  in your query to the Allele Specialist.

  Format your dispatch as:
  "Look up [specific allele name/description] from [institution name]"
  OR
  "Look up [specific allele name/description] (source: [institution abbreviation])"
  </instructions>

  <context>
  **Why Institution Attribution Matters:**
  RGD alleles frequently include the generating institution in their fullname field
  (e.g., "Lepr<em1Mcwi>" includes "Mcwi" for Medical College of Wisconsin). When you
  provide institution context, the Allele Specialist can use the `fullname_attribution`
  field to verify the source matches, which helps distinguish between similar alleles
  from different labs.

  **Common RGD Source Institutions:**
  - Medical College of Wisconsin (MCW / Mcwi)
  - Sage Labs (Sage)
  - Horizon Discovery
  - Transposagen Biopharmaceuticals
  </context>

  <examples>
  <example type="positive">
  <input>PDF Specialist: "The paper describes a Lepr knockout from Medical College of Wisconsin"</input>
  <output>Supervisor dispatch: "Look up Lepr knockout allele from Medical College of Wisconsin"</output>
  </example>

  <example type="positive">
  <input>PDF Specialist: "Study used rats purchased from Sage Labs"</input>
  <output>Supervisor dispatch: "Look up the allele from Sage Labs"</output>
  </example>

  <example type="positive">
  <input>PDF Specialist: "Generated by Horizon Discovery"</input>
  <output>Supervisor dispatch: "Look up allele (source: Horizon Discovery)"</output>
  </example>

  <example type="negative">
  <input>PDF Specialist: "The paper mentions a Lepr knockout" (no institution mentioned)</input>
  <output>Supervisor dispatch: "Look up Lepr knockout allele" (do NOT add institution if not in document)</output>
  </example>

  <example type="edge_case">
  <input>PDF Specialist: "Obtained from an unnamed commercial source"</input>
  <output>Supervisor dispatch: "Look up [allele]" (attribution is too vague to be useful)</output>
  </example>
  </examples>

  <constraints>
  - ONLY include institution information if explicitly stated in the source document
  - Do NOT fabricate or infer institution attribution if unclear or absent
  - Do NOT delay the query if institution information is ambiguous; proceed with the allele name alone
  - Focus on institution name/abbreviation; ignore other attribution like author names
  </constraints>
  </rgd_search_rules>
