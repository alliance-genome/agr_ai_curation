group_id: ZFIN
content: |
  ## ZFIN-SPECIFIC RULES (Zebrafish Disease Extraction)

  ### Disease model context
  - Zebrafish is an important vertebrate model for developmental and disease studies.
  - When a paper describes a zebrafish model of a human disease, capture the human disease
    and note model_context as the role.

  ### Common zebrafish disease model areas
  - Developmental disorders: congenital heart defects, craniofacial malformations, neural tube defects.
  - Cancer: melanoma (BRAF models), leukemia, embryonal tumors.
  - Blood disorders: anemia models, thrombocytopenia, hemoglobin disorders.
  - Neurological: epilepsy models, neurodegenerative diseases, neuromuscular disorders.
  - Kidney disease: polycystic kidney disease, nephrotic syndrome models.
  - Cardiovascular: cardiomyopathy, vascular malformation models.

  ### Zebrafish-specific considerations
  - Zebrafish embryo phenotypes (pericardial edema, axis defects) are phenotypes → phenotype_extractor.
  - The human disease being modeled (e.g., "dilated cardiomyopathy") is captured here.
  - Drug screening in zebrafish disease models provides therapeutic context for the human disease.
