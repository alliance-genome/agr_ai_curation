models:
  - model_id: gpt-5-mini
    name: GPT-5 Mini
    provider: openai
    description: Faster, lower-cost model for quick drafting and lightweight extraction.
    guidance: Use when speed matters more than peak accuracy. GPT-5.5 is generally more reliable for nuanced or high-stakes curation decisions.
    default: false
    supports_reasoning: false
    supports_temperature: false
    recommended_for:
      - Interactive drafting and quick iterations
      - Routine extraction and formatting
      - Follow-up checks after using search/read tools
    avoid_for:
      - Deep multi-step adjudication with conflicting evidence

  - model_id: gpt-5.5
    name: GPT-5.5
    provider: openai
    description: Highest-quality model for complex curation reasoning and nuanced judgment calls.
    guidance: Start here for most tasks. Use medium reasoning by default; low is faster, and high is slower but best for truly difficult reasoning.
    default: true
    supports_reasoning: true
    supports_temperature: false
    reasoning_options:
      - low
      - medium
      - high
    default_reasoning: medium
    reasoning_descriptions:
      low: Fastest GPT-5.5 mode. Good for quick checks and straightforward extraction.
      medium: Recommended default for curation. Strong balance of depth, reliability, and speed.
      high: Deepest reasoning but slowest. Use sparingly for hard ambiguity, not routine DB lookups.
    recommended_for:
      - Complex evidence synthesis and conflict resolution
      - High-stakes interpretation where instruction fidelity matters
      - Prompt architecture or policy refinement
    avoid_for:
      - Simple database retrieval tasks where latency is the priority

  # gpt-4o is intentionally NOT registered. It is retired; the minimum model is
  # gpt-5.5. Do not re-add it. Persisted agents that referenced gpt-4o are moved
  # to gpt-5.5 by the alembic migration migrate_agent_gpt4o_models_to_gpt55.
