tool_policies:
  search_document:
    display_name: Search Document
    description: Discovery search over the active document with auto/hybrid, lexical, or hybrid_lexical_first modes; use read_chunk on returned chunk IDs for final evidence span selection.
    category: Document
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  read_chunk:
    display_name: Read Chunk
    description: Read one active-document chunk with selectable evidence_spans[].span_id values for record_evidence.
    category: Document
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  read_section:
    display_name: Read Section
    description: Survey a specific section from the active document; use read_chunk for final evidence span selection.
    category: Document
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  read_subsection:
    display_name: Read Subsection
    description: Survey a specific subsection from the active document; use read_chunk for final evidence span selection.
    category: Document
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  record_evidence:
    display_name: Record Evidence
    description: Create verified evidence from read_chunk span_ids, preserving exact source text and span provenance with optional envelope target refs.
    category: Document
    curator_visible: false
    allow_attach: false
    allow_execute: true
    config: {}

  list_recorded_evidence:
    display_name: List Recorded Evidence
    description: Review queued active-run evidence records before final output, excluding discarded evidence by default.
    category: Document
    curator_visible: false
    allow_attach: false
    allow_execute: true
    config: {}

  get_recorded_evidence:
    display_name: Get Recorded Evidence
    description: Fetch one active-run evidence record for detailed review before finalization.
    category: Document
    curator_visible: false
    allow_attach: false
    allow_execute: true
    config: {}

  attach_evidence_to_object:
    display_name: Attach Evidence To Object
    description: Attach active-run evidence to the intended curatable object or pending reference without changing source quote or provenance.
    category: Document
    curator_visible: false
    allow_attach: false
    allow_execute: true
    config: {}

  detach_evidence_from_object:
    display_name: Detach Evidence From Object
    description: Detach active-run evidence from a wrong curatable object or pending reference without changing source quote or provenance.
    category: Document
    curator_visible: false
    allow_attach: false
    allow_execute: true
    config: {}

  discard_recorded_evidence:
    display_name: Discard Recorded Evidence
    description: Mark wrong or weak active-run evidence as discarded without deleting source quote, provenance, or audit history.
    category: Document
    curator_visible: false
    allow_attach: false
    allow_execute: true
    config: {}

  update_recorded_evidence_metadata:
    display_name: Update Evidence Metadata
    description: Update only editable active-run evidence metadata while preserving immutable source quote and provenance fields.
    category: Document
    curator_visible: false
    allow_attach: false
    allow_execute: true
    config: {}

  curation_db_sql:
    display_name: Curation DB SQL
    description: Direct SQL access to curation database (advanced/developer tool).
    category: Database
    curator_visible: false
    allow_attach: false
    allow_execute: false
    config: {}

  chebi_api_call:
    display_name: ChEBI API
    description: Query ChEBI ontology term data from external API.
    category: External API
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  quickgo_api_call:
    display_name: QuickGO API
    description: Query Gene Ontology annotation data via QuickGO.
    category: External API
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  go_api_call:
    display_name: GO API
    description: Query Gene Ontology term hierarchy and metadata.
    category: External API
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  alliance_api_call:
    display_name: Alliance API
    description: Query Alliance public API endpoints.
    category: External API
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  save_csv_file:
    display_name: Save CSV File
    description: Persist structured output as CSV.
    category: Output
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  save_tsv_file:
    display_name: Save TSV File
    description: Persist structured output as TSV.
    category: Output
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}

  save_json_file:
    display_name: Save JSON File
    description: Persist structured output as JSON.
    category: Output
    curator_visible: true
    allow_attach: true
    allow_execute: true
    config: {}
