name: Claude Code Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

# Prevent duplicate runs on the same PR — only one review at a time
concurrency:
  group: claude-review-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    if: |
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]' && (
        (github.event_name == 'pull_request' && github.event.action == 'opened') ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    steps:
      # For issue_comment events, actions/checkout defaults to the default branch.
      # Explicitly check out the PR's merge ref so `git diff origin/main...HEAD`
      # actually reflects the PR changes (matches pull_request event behavior).
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/merge', github.event.issue.number) || '' }}

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"

          # PR-specific prompt (only for automated PR reviews)
          prompt: |
            ${{ github.event_name == 'pull_request' && format('
            REPO: {1}
            PR NUMBER: {2}

            Review this pull request.

            START by running: git diff origin/{0}...HEAD --name-status
            Then examine the changed lines using: git diff origin/{0}...HEAD

            Focus your review on:
            1. NO FALLBACKS — flag any fallback mechanisms, defensive fallbacks, backwards-compatibility shims, or graceful degradation patterns as BLOCKING
            2. LEGACY CODE REMOVAL — flag any code that becomes unreferenced after this PR''s changes but was not removed as BLOCKING
            3. Code quality and best practices
            4. Security concerns (no secrets, proper validation)
            5. Test coverage for changes
            6. Docker and dependency changes

            If the repo contains a CLAUDE.md file, read it first for project context.
            If the repo contains a REVIEW.md file, follow its review guidelines.

            Keep feedback concise, actionable, and directly tied to the diff.
            If the changes look correct, say so briefly. Do NOT invent issues.
            Do NOT pad reviews with trivial suggestions or stylistic preferences.
            Focus on bugs that would break production.

            IMPORTANT: You MUST post your review as a GitHub PR comment using:
            gh pr comment {2} --body "YOUR_REVIEW_HERE"

            Do NOT just output text - you must use the gh command to post your review to the PR.
            ', github.base_ref, github.repository, github.event.pull_request.number) || '' }}
            ${{ github.event_name == 'issue_comment' && format('
            REPO: {0}
            PR NUMBER: {1}

            A user has commented on this PR requesting your assistance.

            START by reading their comment: gh pr view {1} --comments --json comments --jq ".comments[-1].body"
            Then check the PR diff: git diff origin/main...HEAD
            Also check the commit history: git log --oneline origin/main...HEAD

            If they are asking for a re-review or to check again, read through all PR comments to find your
            earlier review(s). Check whether any new commits pushed after your previous review addressed
            the feedback you raised. Frame your updated review accordingly — note which issues from your
            earlier review have been addressed by new commit(s) and which (if any) remain. Do NOT retract
            or call previous reviews inaccurate when subsequent commits fixed the issues that were flagged.

            If they are asking for a review or check, perform a full code review of the changes.

            IMPORTANT: You MUST post your response as a GitHub PR comment using:
            gh pr comment {1} --body "YOUR_RESPONSE_HERE"

            Do NOT just output text - you must use the gh command to post your response to the PR.
            ', github.repository, github.event.issue.number) || '' }}

          # CLI arguments (v1 format)
          #
          # Permission strategy:
          #   The GitHub Actions runner is an ephemeral, isolated VM. The scoped GITHUB_TOKEN
          #   has `contents: read, pull-requests: write, issues: write` and dies with the job.
          #   A narrow --allowedTools allowlist caused Claude to burn turns and budget on
          #   permission-denied tool calls, resulting in intermittent "Reached maximum
          #   budget ($3)" failures (33 denials in one failing run vs 1 in a successful run
          #   on the same SHA). The allowlist also provided less security than it appeared:
          #   per anthropics/claude-code-action#957, --allowedTools only restricts Bash
          #   subcommands, never Read/Write/Grep/Glob.
          #
          #   We use --permission-mode bypassPermissions with a --disallowedTools blocklist
          #   to close the obvious exfiltration and mutation paths while letting Claude
          #   freely run read-only exploration commands needed for a thorough review.
          #   See anthropics/claude-code#12232: --allowedTools is ignored in bypass mode,
          #   so the blocklist is the only effective restriction here.
          #
          #   This is NOT a hardened security boundary — a determined prompt-injection
          #   attack could exfiltrate via interpreters (python -c, node -e, /dev/tcp, etc).
          #   The model is: ephemeral runner + trusted-contributor repo + scoped token.
          #   If the repo ever opens to untrusted contributors, revisit this config.
          claude_args: |
            --model ${{ vars.CLAUDE_PR_REVIEW_MODEL || 'claude-sonnet-4-6' }}
            --max-turns 60
            --max-budget-usd 5.00
            --permission-mode bypassPermissions
            --disallowedTools "WebFetch,WebSearch,Edit,Write,NotebookEdit,Bash(curl:*),Bash(wget:*),Bash(nc:*),Bash(ssh:*),Bash(scp:*),Bash(rsync:*),Bash(gh pr close:*),Bash(gh pr edit:*),Bash(gh pr review:*),Bash(gh api:*),Bash(env),Bash(printenv:*),Bash(sudo:*)"
            --append-system-prompt "You are reviewing a pull request for the AI Curation application - a full-stack platform
            for AI-assisted scientific literature curation built with FastAPI (Python) backend and
            React (TypeScript) frontend.

            ## Repository Structure
            - `backend/` - FastAPI application with agents, flows, and API endpoints
            - `frontend/` - React TypeScript application
            - `docker-compose*.yml` - Docker orchestration files
            - `.github/workflows/` - CI/CD workflows

            ## CRITICAL Review Rules (BLOCKING Issues)

            ### Rule 1: NO FALLBACKS
            This project has an absolute rule against fallback mechanisms. Flag as BLOCKING any instance of:
            - Fallback values or defaults that mask missing data (e.g. `value ?? fallbackValue`, `value || defaultValue` where the intent is graceful degradation)
            - Backwards-compatibility shims or legacy support code
            - Defensive coding patterns that silently handle unexpected states instead of failing clearly
            - Try/catch blocks that swallow errors and return default values
            - Feature flags or conditional paths that preserve old behavior alongside new behavior
            - Comments like 'fallback', 'graceful degradation', 'backwards compatible', 'legacy support'

            Note: Nullish coalescing (`??`) and optional chaining (`?.`) for genuinely optional fields are fine. The rule targets patterns where missing/broken data is silently papered over instead of surfaced as an error.

            ### Rule 2: REMOVE LEGACY CODE
            When a PR changes or removes functionality, ALL code that becomes unreferenced MUST be removed in the same PR. Flag as BLOCKING any instance of:
            - Imports that are no longer used after the PR's changes
            - Functions, components, hooks, or types that are no longer called/referenced after the PR's changes
            - Files that are no longer imported by anything after the PR's changes
            - Dead code paths that can no longer be reached
            - Commented-out code that was replaced
            - Variables assigned but never read
            - Test files testing components/functions that were removed in this PR

            Use grep/glob to verify whether flagged code is actually still referenced. Do not flag code as dead unless you have confirmed it is unreferenced.

            ## Standard Review Checklist

            ### 3. Code Quality
            - Python code follows PEP 8 and project conventions
            - TypeScript code follows project ESLint rules
            - No hardcoded secrets or credentials
            - Proper error handling and logging
            - No emojis in code, UI text, or comments

            ### 4. Security
            - No API keys, tokens, or secrets in code
            - Input validation on API endpoints
            - Proper authentication checks where needed

            ### 5. Testing
            - Changes include appropriate unit tests
            - Existing tests are not broken
            - Test coverage is maintained

            ### 6. Docker
            - Dockerfile changes maintain build efficiency
            - No removal of pids_limit from Docker configurations (has caused production crashes)

            ### 7. Dependencies
            - New dependencies are necessary and from trusted sources
            - requirements.txt and package.json changes are intentional

            ## Output Format

            Provide your review as a structured comment with:
            - A summary of what the PR does
            - BLOCKING issues first (fallbacks found, legacy code not removed) with exact file:line references
            - Other issues (categorized by severity: critical, warning, suggestion)
            - Overall assessment

            For BLOCKING issues, provide the exact file and line number, explain what the issue is, and suggest the fix.

            IMPORTANT: Always end your review with:

            ---
            **Need help?** Comment `@claude` followed by your request.

            CRITICAL: You MUST post your review to the PR using gh pr comment. Do not just output text."
