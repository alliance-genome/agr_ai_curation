name: Unit Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'config/**'
      - 'alliance_agents/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - 'docker-compose.test.yml'
      - 'docker-compose.production.yml'
      - 'promtail-config.yml'
      - 'scripts/install/**'
      - 'scripts/release/**'
      - 'scripts/tests/**'
      - 'trace_review/**'
      - '.github/workflows/test.yml'
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'config/**'
      - 'alliance_agents/**'
      - 'packages/**'
      - 'docker-compose.yml'
      - 'docker-compose.test.yml'
      - 'docker-compose.production.yml'
      - 'promtail-config.yml'
      - 'scripts/install/**'
      - 'scripts/release/**'
      - 'scripts/tests/**'
      - 'trace_review/**'
      - '.github/workflows/test.yml'

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build unit test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile.unit-test
          push: false
          load: true
          tags: ai-curation-unit-tests:latest
          # Keep the unit-test Dockerfile cache in its own BuildKit namespace.
          # Without an explicit scope, unrelated CI image builds can overwrite
          # the default GHA cache entry and make layer reuse less predictable.
          cache-from: type=gha,scope=backend-unit-test
          cache-to: type=gha,mode=max,scope=backend-unit-test,ignore-error=true

      - name: Validate ignored test paths
        run: |
          bash backend/tests/unit/run_ci_unit_tests.sh --validate-only

      - name: Run unit tests
        run: |
          mkdir -p backend/htmlcov backend/file_outputs/ci
          start_seconds="${SECONDS}"
          set +e
          docker run --rm \
            -v "${{ github.workspace }}/backend:/app/backend" \
            -v "${{ github.workspace }}/alliance_agents:/app/alliance_agents" \
            -v "${{ github.workspace }}/config:/app/config" \
            -v "${{ github.workspace }}/packages:/app/packages:ro" \
            -v "${{ github.workspace }}/docs:/app/docs:ro" \
            -v "${{ github.workspace }}/frontend:/app/frontend:ro" \
            -v "${{ github.workspace }}/docker-compose.yml:/workspace/docker-compose.yml:ro" \
            -v "${{ github.workspace }}/docker-compose.production.yml:/workspace/docker-compose.production.yml:ro" \
            -v "${{ github.workspace }}/promtail-config.yml:/workspace/promtail-config.yml:ro" \
            -v "${{ github.workspace }}/scripts/install:/workspace/scripts/install:ro" \
            -e PYTHONUNBUFFERED=1 \
            -e OPENAI_API_KEY=test-key-for-unit-tests \
            -e LANGFUSE_PUBLIC_KEY=test-key \
            -e LANGFUSE_SECRET_KEY=test-key \
            -e PDF_EXTRACTION_TIMEOUT=300 \
            -e EMBEDDING_MODEL=text-embedding-3-small \
            -e EMBEDDING_TOKEN_PREFLIGHT_ENABLED=true \
            -e EMBEDDING_MODEL_TOKEN_LIMIT=8191 \
            -e EMBEDDING_TOKEN_SAFETY_MARGIN=500 \
            -e CONTENT_PREVIEW_CHARS=1600 \
            -e WEAVIATE_BATCH_REQUESTS_PER_MINUTE=5000 \
            -e BACKEND_UNIT_TEST_WORKERS=2 \
            -e BACKEND_UNIT_TEST_DURATIONS=25 \
            -e BACKEND_UNIT_JUNIT_XML=file_outputs/ci/backend-unit-junit.xml \
            -e BACKEND_UNIT_SUMMARY_FILE=file_outputs/ci/backend-unit-summary.md \
            ai-curation-unit-tests:latest \
            bash /app/backend/tests/unit/run_ci_unit_tests.sh
          test_status="$?"
          set -e
          duration_seconds="$((SECONDS - start_seconds))"
          {
            echo "### Backend unit container"
            echo ""
            echo "- Docker run plus pytest duration: \`${duration_seconds}s\`"
            echo "- Exit status: \`${test_status}\`"
            echo ""
            if [[ -f backend/file_outputs/ci/backend-unit-summary.md ]]; then
              cat backend/file_outputs/ci/backend-unit-summary.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "${test_status}"

      - name: Upload backend coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-coverage
          path: |
            backend/.coverage
            backend/coverage.xml
            backend/htmlcov
            backend/file_outputs/ci/backend-unit-junit.xml
            backend/file_outputs/ci/backend-unit-summary.md

      - name: Test Summary
        if: always()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Backend unit tests completed. See logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "Coverage artifacts uploaded: \`backend-unit-coverage\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Excluded Tests (Require Database or External Dependencies)" >> $GITHUB_STEP_SUMMARY
          echo "- \`test_files.py\` - Requires PostgreSQL" >> $GITHUB_STEP_SUMMARY
          echo "- \`test_batch_service.py\` - Requires PostgreSQL" >> $GITHUB_STEP_SUMMARY

  backend-contract-core-tests:
    name: Backend Contract Core Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend contract test image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.test
          push: false
          load: true
          tags: ai-curation-backend-tests:latest
          # Contract tests use backend/Dockerfile.test, so keep this separate
          # from the lighter backend/Dockerfile.unit-test cache namespace.
          cache-from: type=gha,scope=backend-contract-test
          cache-to: type=gha,mode=max,scope=backend-contract-test,ignore-error=true

      - name: Validate contract-core test paths
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/backend:/app/backend" \
            ai-curation-backend-tests:latest \
            bash /app/backend/tests/contract/run_ci_contract_core_tests.sh --validate-only

      - name: Run contract-core tests
        run: |
          docker compose -f docker-compose.test.yml up -d --wait postgres-test redis-test weaviate-test
          docker compose -f docker-compose.test.yml run --rm backend-contract-tests \
            bash -lc "alembic upgrade head && bash tests/contract/run_ci_contract_core_tests.sh"

      - name: Contract-core Summary
        if: always()
        run: |
          echo "## Contract Core Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Contract-core tests completed." >> $GITHUB_STEP_SUMMARY
          echo "Legacy/stale contract tests remain out-of-scope for this gate and are tracked in docs/developer/TEST_STRATEGY.md." >> $GITHUB_STEP_SUMMARY

  installer-shell-regression-tests:
    name: Installer Shell Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run installer shell regression suite
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/installer-shell-tests
          bash scripts/install/tests/run.sh | tee artifacts/installer-shell-tests/installer-shell-regression.log

      - name: Upload installer shell regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installer-shell-regression-log
          path: artifacts/installer-shell-tests/installer-shell-regression.log
          if-no-files-found: error

      - name: Installer shell summary
        if: always()
        run: |
          echo "## Installer Shell Regression Suite" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ran \`bash scripts/install/tests/run.sh\` on \`ubuntu-latest\`." >> $GITHUB_STEP_SUMMARY
          echo "Job status: \`${{ job.status }}\`." >> $GITHUB_STEP_SUMMARY
          echo "Artifact: \`installer-shell-regression-log\`." >> $GITHUB_STEP_SUMMARY

  publish-artifact-shell-regression-tests:
    name: Publish Artifact Shell Regression Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run publish-artifact shell regression suite
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/publish-artifact-shell-tests
          bash scripts/tests/test_prepare_publish_artifacts.sh | tee artifacts/publish-artifact-shell-tests/publish-artifact-shell-regression.log

      - name: Upload publish-artifact shell regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-artifact-shell-regression-log
          path: artifacts/publish-artifact-shell-tests/publish-artifact-shell-regression.log
          if-no-files-found: error

      - name: Publish-artifact shell summary
        if: always()
        run: |
          echo "## Publish Artifact Shell Regression Suite" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ran \`bash scripts/tests/test_prepare_publish_artifacts.sh\` on \`ubuntu-latest\`." >> $GITHUB_STEP_SUMMARY
          echo "This suite checks reproducible bundled core artifacts and image-tag alignment for backend, frontend, and trace-review assets." >> $GITHUB_STEP_SUMMARY
          echo "Job status: \`${{ job.status }}\`." >> $GITHUB_STEP_SUMMARY
          echo "Artifact: \`publish-artifact-shell-regression-log\`." >> $GITHUB_STEP_SUMMARY

  backend-persistence-tests:
    name: Backend Persistence Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (lightweight - no ML deps needed)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile.unit-test
          push: false
          load: true
          tags: ai-curation-unit-tests:latest
          # Reuse the same cache scope as Backend Unit Tests because this job
          # builds the same backend/Dockerfile.unit-test image.
          cache-from: type=gha,scope=backend-unit-test
          cache-to: type=gha,mode=max,scope=backend-unit-test,ignore-error=true

      - name: Run persistence tests
        run: |
          docker compose -f docker-compose.test.yml up -d weaviate-test
          echo "Waiting for Weaviate test instance..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.test.yml exec -T weaviate-test \
              wget -q -O- http://localhost:8080/v1/.well-known/ready 2>/dev/null; then
              echo "Weaviate is ready"
              break
            fi
            echo "  Attempt $i/30..."
            sleep 2
          done
          docker compose -f docker-compose.test.yml run --rm backend-persistence-tests

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Test Summary
        if: always()
        run: |
          echo "## Persistence Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Chunk persistence integration tests completed." >> $GITHUB_STEP_SUMMARY
          echo "These tests verify chunks actually persist in Weaviate after batch insert." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**No OpenAI API key required** - uses vectorizer: none" >> $GITHUB_STEP_SUMMARY

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Frontend Test Summary
        if: always()
        run: |
          echo "## Frontend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Frontend tests completed. See logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "Note: This job is currently non-blocking while we stabilize legacy failures." >> $GITHUB_STEP_SUMMARY

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Frontend Summary
        if: always()
        run: |
          echo "## Frontend Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Frontend build completed. See logs above for details." >> $GITHUB_STEP_SUMMARY
